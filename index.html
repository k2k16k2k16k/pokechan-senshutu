// ====== 計算 ======
function defensiveMult(attackType, defTypes) {
  let m = 1;
  defTypes.forEach(t => {
    const v = EFFECTIVE[attackType]?.[t];
    if (v !== undefined) m *= v;
  });
  return m;
}
function allWeaknesses(defTypes) {
  const r = {};
  TYPES.forEach(atk => { r[atk] = defensiveMult(atk, defTypes); });
  return r;
}

// 一致技(STAB)考慮の最大攻撃スコア
function bestHitScore(userPoke, opp) {
  if (!userPoke || !opp) return {score:0, mult:0, stab:false, mv:null};
  let best = {score:0, mult:0, stab:false, mv:null};
  for (const mv of (userPoke.moves || [])) {
    if (!mv.type) continue;
    const mult = defensiveMult(mv.type, opp.types);
    const stab = userPoke.types.includes(mv.type);
    const score = mult * (stab ? 1.5 : 1);
    if (score > best.score) best = {score, mult, stab, mv};
  }
  return best;
}

// チーム総合評価 (高いほど良い)
function evaluateTeam(team) {
  const filled = team.filter(Boolean);
  if (filled.length === 0) return 0;
  let weakCoverage = 0;
  let holes = 0;
  TYPES.forEach(atk => {
    let resist = 0, weak = 0;
    filled.forEach(u => {
      const m = defensiveMult(atk, u.types);
      if (m > 1) weak++;
      else if (m < 1) resist++;
    });
    weakCoverage += (resist - weak);
    if (filled.every(u => defensiveMult(atk, u.types) > 1)) holes++;
  });
  const typeSet = new Set();
  filled.forEach(u => u.types.forEach(t => typeSet.add(t)));
  const diversity = typeSet.size;
  const combos = {};
  filled.forEach(u => {
    const key = [...u.types].sort().join(',');
    combos[key] = (combos[key]||0) + 1;
  });
  const dup = Object.values(combos).reduce((s,c)=>s+(c>1?c-1:0),0);
  return weakCoverage + diversity - holes*30 - dup*5;
}

// C(n,k) 組み合わせ列挙
function combinations(arr, k) {
  const res = [];
  const rec = (start, pick) => {
    if (pick.length === k) { res.push([...pick]); return; }
    for (let i=start; i<arr.length; i++) {
      pick.push(arr[i]);
      rec(i+1, pick);
      pick.pop();
    }
  };
  rec(0, []);
  return res;
}
function idFromUrl(url) {
  const m = url.match(/\/pokemon\/(\d+)\//);
  return m ? parseInt(m[1]) : null;

function TypeIconButton({type, selectedNum, onClick}) {
  return (
    <button type="button" onClick={onClick} title={TYPE_JP[type]}
      className={`relative inline-flex items-center justify-center transition ${selectedNum?'ring-4 ring-offset-1 ring-yellow-400 rounded-full scale-110':'opacity-85 hover:opacity-100 hover:scale-105'}`}>
      <img src={typeIconUrl(type)} alt={TYPE_JP[type]} className="w-24 sm:w-28 h-auto pointer-events-none" />
      {selectedNum && <span className="absolute -top-1 -right-1 bg-yellow-400 text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center text-black border border-white">{selectedNum}</span>}
    </button>
  );
}

function TypeBadge({type, size='sm'}) {
  const sz = size === 'sm' ? 'w-12 h-auto' : 'w-16 h-auto';
  return <img src={typeIconUrl(type)} alt={TYPE_JP[type]} title={TYPE_JP[type]} className={`${sz} inline-block align-middle`} />;

function MultBadge({mult}) {
  if (mult === 0)    return <span className="text-xs px-1.5 py-0.5 rounded bg-gray-800 text-white font-bold">0×</span>;
  if (mult === 4)    return <span className="text-xs px-1.5 py-0.5 rounded bg-red-600 text-white font-bold">4×</span>;
  if (mult === 2)    return <span className="text-xs px-1.5 py-0.5 rounded bg-orange-500 text-white font-bold">2×</span>;
  if (mult === 0.5)  return <span className="text-xs px-1.5 py-0.5 rounded bg-blue-400 text-white font-bold">½</span>;
  if (mult === 0.25) return <span className="text-xs px-1.5 py-0.5 rounded bg-blue-700 text-white font-bold">¼</span>;
  return <span className="text-xs px-1.5 py-0.5 rounded bg-gray-200 text-gray-700">1×</span>;
}

// ====== 補完候補サジェスト ======
function TeamBuilderSuggest({team, onAdd}) {
  const [mode, setMode] = useState('1');
  const [results, setResults] = useState(null);
  const [computing, setComputing] = useState(false);
  const filled = team.filter(Boolean);
  const emptyCount = 6 - filled.length;

  const reasonsFor = (c, baseFilled) => {
    const reasons = [];
    const oldHoles = TYPES.filter(atk => baseFilled.every(u => defensiveMult(atk, u.types) > 1));
    const newHoles = TYPES.filter(atk => [...baseFilled, c].every(u => defensiveMult(atk, u.types) > 1));
    const removedHoles = oldHoles.filter(h => !newHoles.includes(h));
    if (removedHoles.length) reasons.push({kind:'穴解消', types: removedHoles});
    const resolved = [];
    TYPES.forEach(atk => {
      const oldWeak = baseFilled.filter(u => defensiveMult(atk, u.types) > 1).length;
      if (oldWeak >= 2 && defensiveMult(atk, c.types) < 1) resolved.push(atk);
    });
    if (resolved.length) reasons.push({kind:'共通弱点耐性', types: resolved});
    return reasons;
  };

  const compute = () => {
    setComputing(true);
    setTimeout(() => {
      const existing = new Set(filled.map(u => u.id));
      const candidates = ROSTER.filter(p => !existing.has(p.id));
      const baseScore = evaluateTeam(filled);
      if (mode === '1') {
        const scored = candidates.map(c => ({
          c,
          delta: evaluateTeam([...filled, c]) - baseScore,
          reasons: reasonsFor(c, filled)
        }));
        scored.sort((a,b) => b.delta - a.delta);
        setResults({type:'single', list: scored.slice(0, 15)});
      } else {
        // 2枠探索: 全候補×全候補（差分法で高速化）
        const singles = candidates.map(c => ({c, score: evaluateTeam([...filled, c])}));
        singles.sort((a,b) => b.score - a.score);
        const top = singles.slice(0, 80).map(s => s.c);
        const pairs = [];
        for (let i=0; i<top.length; i++) {
          for (let j=i+1; j<top.length; j++) {
            const s = evaluateTeam([...filled, top[i], top[j]]);
            pairs.push({c1: top[i], c2: top[j], delta: s - baseScore});
          }
        }
        pairs.sort((a,b) => b.delta - a.delta);
        setResults({type:'pair', list: pairs.slice(0, 12)});
      }
      setComputing(false);
    }, 10);
  };

  if (emptyCount === 0 || filled.length === 0) return null;

  return (
    <div className="bg-gradient-to-br from-purple-50 to-blue-50 border border-purple-200 rounded-lg p-3 mt-3">
      <div className="flex items-center justify-between mb-2 flex-wrap gap-2">
        <div className="text-sm font-bold text-gray-700">🪄 残り{emptyCount}枠のおすすめ候補</div>
        <div className="flex gap-1.5 flex-wrap">
          <button onClick={()=>{setMode('1');setResults(null);}}
            className={`text-xs px-2 py-1 rounded ${mode==='1'?'bg-blue-600 text-white':'bg-white border text-gray-600'}`}>
            1枠最適
          </button>
          {emptyCount >= 2 && (
            <button onClick={()=>{setMode('2');setResults(null);}}
              className={`text-xs px-2 py-1 rounded ${mode==='2'?'bg-blue-600 text-white':'bg-white border text-gray-600'}`}>
              2枠同時最適
            </button>
          )}
          <button onClick={compute} disabled={computing}
            className="text-xs px-3 py-1 rounded bg-purple-600 text-white font-bold hover:bg-purple-700 disabled:opacity-50">
            {computing ? '計算中...' : '計算する'}
          </button>
        </div>
      </div>

      {results?.type === 'single' && (
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2">
          {results.list.map((r,i) => (
            <button key={r.c.id} onClick={()=>onAdd(r.c)}
              className="border rounded p-2 bg-white hover:bg-blue-50 hover:border-blue-400 text-left flex gap-2 items-start transition">
              <span className="text-xs font-bold text-gray-400 w-4">{i+1}</span>
              <img src={pokeImg(r.c)} onError={e=>{e.target.src=pokeImgFallback(r.c)}} className="w-12 h-12 object-contain flex-shrink-0" />
              <div className="flex-1 min-w-0">
                <div className="text-xs font-bold truncate">{r.c.jp}</div>
                <div className="flex gap-1 items-center flex-wrap mt-0.5">
                  {r.c.types.map(t => <TypeBadge key={t} type={t} />)}
                  <span className="text-[9px] text-gray-500">S{r.c.spd}</span>
                </div>
                <div className="text-[10px] text-green-700 font-bold mt-0.5">+{r.delta.toFixed(0)}点</div>
                {r.reasons.map((rs,ri) => (
                  <div key={ri} className="text-[10px] text-gray-600 flex gap-0.5 items-center flex-wrap mt-0.5">
                    <span className="font-bold">{rs.kind}:</span>
                    {rs.types.map(t => <TypeBadge key={t} type={t} />)}
                  </div>
                ))}
              </div>
            </button>
          ))}
        </div>
      )}

      {results?.type === 'pair' && (
        <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
          {results.list.map((r,i) => (
            <div key={i} className="border rounded p-2 bg-white">
              <div className="flex items-center justify-between mb-1">
                <span className="text-xs font-bold text-gray-400">{i+1}位</span>
                <span className="text-[10px] text-green-700 font-bold">+{r.delta.toFixed(0)}点</span>
              </div>
              <div className="flex gap-1">
                {[r.c1, r.c2].map((c, ci) => (
                  <button key={ci} onClick={()=>onAdd(c)}
                    className="flex-1 border rounded p-1.5 hover:bg-blue-50 hover:border-blue-400 text-left transition">
                    <div className="flex items-center gap-1.5">
                      <img src={pokeImg(c)} onError={e=>{e.target.src=pokeImgFallback(c)}} className="w-10 h-10 object-contain" />
                      <div className="flex-1 min-w-0">
                        <div className="text-xs font-bold truncate">{c.jp}</div>
                        <div className="flex gap-0.5 items-center flex-wrap">
                          {c.types.map(t => <TypeBadge key={t} type={t} />)}
                        </div>
                      </div>
                    </div>
                  </button>
                ))}
              </div>
            </div>
          ))}
          <div className="text-[10px] text-gray-500 col-span-full">※ 各ポケをクリックで個別追加できます（2体まとめて追加ではありません）</div>
        </div>
      )}

      {results && results.list.length === 0 && (
        <div className="text-xs text-gray-500 text-center py-2">候補なし</div>
      )}
      {!results && (
        <div className="text-[11px] text-gray-600">
          現在{filled.length}体登録済み。「計算する」で全{ROSTER.length}体から最適候補を探索します。
        </div>
      )}
    </div>
  );
}

// ====== 相手分析 ======
function OpponentSlot({idx, opp, userTeam, onPick, onClear}) {
  if (!opp) {
    return (
      <button onClick={onPick} className="border-2 border-dashed rounded-lg p-6 text-gray-400 hover:border-blue-400 hover:text-blue-600 flex flex-col items-center justify-center gap-2 min-h-[160px]">
        <IconPlus className="w-6 h-6" />
        <span className="text-sm font-bold">相手{idx+1}を追加</span>
      </button>
    );
  }

  const weak = allWeaknesses(opp.types);
  const weak4 = TYPES.filter(t => weak[t] === 4);
  const weak2 = TYPES.filter(t => weak[t] === 2);
  const resist = TYPES.filter(t => weak[t] < 1 && weak[t] > 0);
  const immune = TYPES.filter(t => weak[t] === 0);

  const hits = [];
  userTeam.forEach((up, pi) => {
    if (!up) return;
    up.moves?.forEach(mv => {
      if (!mv.type) return;
      const m = defensiveMult(mv.type, opp.types);
      if (m >= 2) {
        const stab = up.types.includes(mv.type);
        hits.push({ userIdx:pi, userJp:up.jp, moveName:mv.name || '(無名)', moveType:mv.type, mult:m, stab, score: m * (stab?1.5:1) });
      }
    });
  });
  hits.sort((a,b)=>b.score - a.score);

  // 素早さ比較
  const oppSpd = opp.spd || 0;
  const userFaster = userTeam.filter(u => u && (u.spd||0) > oppSpd).length;
  const userTeamFilled = userTeam.filter(Boolean).length;

  return (
    <div className="border rounded-lg p-3 bg-white">
      <div className="flex gap-3 items-start">
        <img src={pokeImg(opp)} alt="" className="w-20 h-20 object-contain bg-gray-50 rounded flex-shrink-0"
          onError={e=>{e.target.src=pokeImgFallback(opp)}} />
        <div className="flex-1 min-w-0">
          <div className="flex items-center justify-between">
            <div className="font-bold truncate">{opp.jp}</div>
            <div className="flex gap-1">
              <button onClick={onPick} className="text-xs text-blue-600 hover:underline">変更</button>
              <button onClick={onClear} className="text-red-500 hover:bg-red-50 p-1 rounded"><IconX className="w-4 h-4" /></button>
            </div>
          </div>
          <div className="flex gap-1 mt-1 flex-wrap items-center">
            {opp.types.map(t => <TypeBadge key={t} type={t} />)}
            {opp.spd !== undefined && <span className="text-[10px] font-bold text-gray-600 bg-gray-100 px-1.5 py-0.5 rounded">S{opp.spd}</span>}
            {userTeamFilled > 0 && (
              <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${userFaster>=Math.ceil(userTeamFilled/2)?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}`}>
                先攻{userFaster}/{userTeamFilled}
              </span>
            )}
          </div>
        </div>
      </div>

      <div className="mt-3 space-y-1.5 text-xs">
        {weak4.length > 0 && (
          <div className="flex gap-1 flex-wrap items-center">
            <MultBadge mult={4} />
            {weak4.map(t => <TypeBadge key={t} type={t} />)}
          </div>
        )}
        {weak2.length > 0 && (
          <div className="flex gap-1 flex-wrap items-center">
            <MultBadge mult={2} />
            {weak2.map(t => <TypeBadge key={t} type={t} />)}
          </div>
        )}
        {resist.length > 0 && (
          <div className="flex gap-1 flex-wrap items-center opacity-70">
            <MultBadge mult={0.5} />
            {resist.map(t => <TypeBadge key={t} type={t} />)}
          </div>
        )}
        {immune.length > 0 && (
          <div className="flex gap-1 flex-wrap items-center opacity-70">
            <MultBadge mult={0} />
            {immune.map(t => <TypeBadge key={t} type={t} />)}
          </div>
        )}
      </div>

      <div className="mt-3 border-t pt-2">
        <div className="text-xs font-bold text-gray-600 mb-1.5 flex items-center gap-1">
          <IconSwords className="w-3 h-3" /> 自軍の抜群技
        </div>
        {hits.length === 0 ? (
          <div className="text-xs text-gray-400">抜群を取れる登録技なし</div>
        ) : (
          <div className="space-y-1">
            {hits.map((h, i) => (
              <div key={i} className="flex items-center gap-1.5 text-xs">
                <MultBadge mult={h.mult} />
                {h.stab && <span className="text-[9px] font-bold px-1 py-0.5 rounded bg-yellow-300 text-yellow-900">一致</span>}
                <TypeBadge type={h.moveType} />
                <span className="truncate flex-1">
                  <span className="font-medium">{h.userJp}</span>
                  <span className="text-gray-500"> / {h.moveName}</span>
                </span>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ====== 分析パネル ======
function AnalysisPanel({userTeam, opponents}) {
  const [open, setOpen] = useState(true);
  const users = userTeam.filter(Boolean);
  const opps = opponents.filter(Boolean);
  const ready = users.length >= 1 && opps.length >= 1;

  // 推奨選出3体（全探索）
  const trio = useMemo(() => {
    if (users.length < 3 || opps.length === 0) return null;
    const combos = combinations(users, 3);
    let best = null;
    for (const combo of combos) {
      let covered = 0, scoreSum = 0;
      for (const opp of opps) {
        const hits = combo.map(u => bestHitScore(u, opp).score);
        const mx = Math.max(...hits);
        if (mx >= 2) covered++;
        scoreSum += mx;
      }
      if (!best || covered > best.covered || (covered===best.covered && scoreSum > best.scoreSum)) {
        best = {combo, covered, scoreSum};
      }
    }
    return best;
  }, [userTeam, opponents]);

  // マトリクス
  const matrix = useMemo(() => {
    return users.map(u => opps.map(o => bestHitScore(u, o)));
  }, [userTeam, opponents]);

  // 共通弱点ランキング
  const commonWeak = useMemo(() => {
    return TYPES.map(atk => {
      let w2=0, w4=0, imm=0;
      opps.forEach(o => {
        const m = defensiveMult(atk, o.types);
        if (m === 4) w4++;
        else if (m === 2) w2++;
        if (m === 0) imm++;
      });
      return {type:atk, w2, w4, imm, effective: w2 + w4*2};
    }).filter(x=>x.w2>0||x.w4>0).sort((a,b)=>b.effective-a.effective || b.w4-a.w4);
  }, [opponents]);

  // 自軍の穴（全員が弱点 >1 のタイプ）
  const holes = useMemo(() => {
    if (users.length === 0) return [];
    return TYPES.filter(atk => users.every(u => defensiveMult(atk, u.types) > 1));
  }, [userTeam]);

  // カバー率
  const coverage = useMemo(() => {
    const moveTypes = new Set();
    users.forEach(u => (u.moves||[]).forEach(m => m.type && moveTypes.add(m.type)));
    let covered = 0;
    TYPES.forEach(def => {
      const canHit = [...moveTypes].some(atk => defensiveMult(atk, [def]) >= 2);
      if (canHit) covered++;
    });
    return {covered, total:18, moveTypes:[...moveTypes]};
  }, [userTeam]);

  if (!ready) return null;

  const scoreColor = (s) => {
    if (s >= 4) return 'bg-red-600 text-white';
    if (s >= 3) return 'bg-red-500 text-white';
    if (s >= 2) return 'bg-orange-500 text-white';
    if (s >= 1) return 'bg-gray-200 text-gray-700';
    if (s > 0) return 'bg-blue-400 text-white';
    return 'bg-gray-800 text-white';
  };
  const fmt = s => s===0?'0':(s>=1?(s%1===0?s.toString():s.toFixed(1)):(s.toString().replace('0.','.')));

  return (
    <div className="bg-white border rounded-lg mb-3">
      <button onClick={()=>setOpen(!open)} className="w-full flex items-center justify-between p-3 hover:bg-gray-50">
        <span className="text-sm font-bold text-gray-700">📊 分析パネル {open?'▼':'▶'}</span>
        <span className="text-xs text-gray-400">自軍{users.length}体 / 相手{opps.length}体</span>
      </button>
      {open && (
        <div className="border-t p-3 space-y-4">
          {/* 推奨選出3体 */}
          {users.length >= 3 && trio && (
            <div>
              <div className="text-xs font-bold text-gray-600 mb-1.5">⭐ 推奨選出3体（{trio.covered}/{opps.length}体抑制）</div>
              <div className="flex gap-2 flex-wrap">
                {trio.combo.map((u,i) => (
                  <div key={i} className="border rounded p-1.5 bg-blue-50 flex items-center gap-1.5">
                    <img src={pokeImg(u)} onError={e=>{e.target.src=pokeImgFallback(u)}} className="w-10 h-10 object-contain" />
                    <div className="text-xs font-bold">{u.jp}</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* マトリクス 6x6 */}
          <div>
            <div className="text-xs font-bold text-gray-600 mb-1.5">🔲 相性マトリクス（自軍 × 相手 / 一致技込み倍率）</div>
            <div className="overflow-x-auto">
              <table className="text-xs border-collapse">
                <thead>
                  <tr>
                    <th className="p-1 border bg-gray-50"></th>
                    {opps.map((o,i) => (
                      <th key={i} className="p-1 border bg-gray-50 text-center">
                        <img src={pokeImg(o)} onError={e=>{e.target.src=pokeImgFallback(o)}} className="w-8 h-8 object-contain mx-auto" />
                        <div className="text-[9px] truncate max-w-[60px]">{o.jp}</div>
                        <div className="text-[9px] text-gray-500">S{o.spd||'?'}</div>
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {users.map((u,ui) => (
                    <tr key={ui}>
                      <td className="p-1 border bg-gray-50">
                        <div className="flex items-center gap-1">
                          <img src={pokeImg(u)} onError={e=>{e.target.src=pokeImgFallback(u)}} className="w-8 h-8 object-contain" />
                          <div className="min-w-0">
                            <div className="text-[10px] truncate max-w-[70px]">{u.jp}</div>
                            <div className="text-[9px] text-gray-500">S{u.spd||'?'}</div>
                          </div>
                        </div>
                      </td>
                      {opps.map((o,oi) => {
                        const h = matrix[ui][oi];
                        const us = u.spd||0, os = o.spd||0;
                        const spdMark = us > os ? '先' : us < os ? '後' : '=';
                        const spdCls = us > os ? 'text-green-700 bg-green-100' : us < os ? 'text-red-700 bg-red-100' : 'text-gray-500 bg-gray-100';
                        return (
                          <td key={oi} className={`p-1 border text-center font-bold ${scoreColor(h.score)}`}>
                            <div>{fmt(h.score)}×</div>
                            <div className="flex gap-0.5 justify-center items-center text-[8px] font-normal mt-0.5">
                              {h.stab && <span className="px-0.5 rounded bg-yellow-300 text-yellow-900">一致</span>}
                              <span className={`px-0.5 rounded ${spdCls}`}>{spdMark}</span>
                            </div>
                          </td>
                        );
                      })}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          {/* 相手パ共通弱点 */}
          {commonWeak.length > 0 && (
            <div>
              <div className="text-xs font-bold text-gray-600 mb-1.5">🎯 相手パ共通弱点ランキング</div>
              <div className="space-y-1">
                {commonWeak.slice(0,8).map((w,i) => (
                  <div key={i} className="flex items-center gap-2 text-xs">
                    <span className="w-5 text-gray-400">{i+1}.</span>
                    <TypeBadge type={w.type} />
                    <span className="text-gray-600">
                      {w.w4>0 && <span className="text-red-600 font-bold">4×が{w.w4}体 </span>}
                      {w.w2>0 && <span className="text-orange-600">2×が{w.w2}体</span>}
                      {w.imm>0 && <span className="text-gray-400 ml-1">（無効{w.imm}体）</span>}
                    </span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* 自軍の穴 */}
          <div>
            <div className="text-xs font-bold text-gray-600 mb-1.5">⚠ 自軍の穴（全員が弱点のタイプ）</div>
            {holes.length === 0 ? (
              <div className="text-xs text-green-600">穴なし ✓</div>
            ) : (
              <div className="flex gap-1 flex-wrap">
                {holes.map(t => <TypeBadge key={t} type={t} size="lg" />)}
              </div>
            )}
          </div>

          {/* カバー率 */}
          <div>
            <div className="text-xs font-bold text-gray-600 mb-1.5">
              📈 攻撃カバー率 {coverage.covered}/{coverage.total}タイプ（{Math.round(coverage.covered/coverage.total*100)}%）
            </div>
            <div className="flex gap-1 flex-wrap">
              {TYPES.map(def => {
                const canHit = coverage.moveTypes.some(atk => defensiveMult(atk, [def]) >= 2);
                return (
                  <div key={def} className={`flex items-center gap-0.5 px-1 py-0.5 rounded ${canHit?'bg-green-50':'bg-gray-100 opacity-50'}`}>
                    <TypeBadge type={def} />
                    <span className="text-[9px] font-bold">{canHit?'○':'×'}</span>
                  </div>
                );
              })}
            </div>
            <div className="text-[10px] text-gray-500 mt-1">登録技タイプ: {coverage.moveTypes.length>0 ? coverage.moveTypes.map(t=>TYPE_JP[t]).join('・') : 'なし'}</div>
          </div>
        </div>
      )}
    </div>
  );
}

// ====== 天敵分析 ======
function NemesisView({userTeam}) {
  const users = userTeam.filter(Boolean);
  const userIds = new Set(users.map(u => u.id));
  const [limit, setLimit] = useState(20);

  // 各候補 e に対してスコア計算
  const analysis = useMemo(() => {
    if (users.length === 0) return null;
    const candidates = ROSTER.filter(p => !userIds.has(p.id));
    const scored = candidates.map(e => {
      let threatens = 0, cantCounter = 0, fasterThan = 0;
      const threatenedList = []; // どの自軍を脅かすか
      for (const u of users) {
        // eがuを脅かす: STAB≥2倍で攻撃可能
        const eThreatMult = Math.max(...e.types.map(t => defensiveMult(t, u.types)));
        const threatens_u = eThreatMult >= 2;
        // uがeに反撃可能: 登録技でe.typesに≥2倍
        const counterMult = Math.max(0, ...(u.moves||[]).filter(m=>m.type).map(m => defensiveMult(m.type, e.types)));
        const canCounter = counterMult >= 2;
        if (threatens_u) {
          threatens++;
          if (!canCounter) cantCounter++;
          threatenedList.push({u, mult: eThreatMult});
        }
        if ((e.spd||0) > (u.spd||0)) fasterThan++;
      }
      return {e, threatens, cantCounter, fasterThan, threatenedList};
    });
    // ソート: 反撃不能で脅かす数 > 脅威数 > 素早さ優位数
    scored.sort((a,b) => b.cantCounter - a.cantCounter || b.threatens - a.threatens || b.fasterThan - a.fasterThan);
    return scored.filter(s => s.threatens > 0);
  }, [userTeam]);

  // 各自軍ポケ別の天敵TOP5
  const perPoke = useMemo(() => {
    return users.map(u => {
      const threats = ROSTER.filter(p => !userIds.has(p.id) || p.id !== u.id).map(e => {
        const stabMult = Math.max(...e.types.map(t => defensiveMult(t, u.types)));
        const counterMult = Math.max(0, ...(u.moves||[]).filter(m=>m.type).map(m => defensiveMult(m.type, e.types)));
        const faster = (e.spd||0) > (u.spd||0);
        // スコア: STAB倍率 * (反撃不能なら2倍) * (先制なら1.3倍)
        const score = stabMult * (counterMult >= 2 ? 1 : 2) * (faster ? 1.3 : 1);
        return {e, stabMult, counterMult, faster, score};
      }).filter(t => t.stabMult >= 2);
      threats.sort((a,b) => b.score - a.score);
      return {u, threats: threats.slice(0,5)};
    });
  }, [userTeam]);

  if (users.length === 0) {
    return (
      <div className="bg-amber-50 border border-amber-300 rounded p-3 text-sm">
        自軍が未登録です。「自軍登録」タブから先に登録してください。
      </div>
    );
  }

  return (
    <div className="space-y-4">
      <div className="text-sm text-gray-600">自軍{users.length}体に対して、ROSTER全{ROSTER.length}体からの脅威度を計算。</div>

      {/* 全体天敵TOP */}
      <div className="bg-white border rounded-lg p-3">
        <div className="flex items-center justify-between mb-2">
          <div className="text-sm font-bold text-gray-700">🔥 チーム全体の天敵ランキング TOP{limit}</div>
          <select value={limit} onChange={e=>setLimit(+e.target.value)} className="border rounded px-1 py-0.5 text-xs">
            <option value={10}>10件</option>
            <option value={20}>20件</option>
            <option value={50}>50件</option>
          </select>
        </div>
        <div className="text-[10px] text-gray-500 mb-2">※ 反撃不能数 → 脅威数 → 素早さ優位 の順でソート</div>
        {analysis && analysis.length > 0 ? (
          <div className="space-y-1.5">
            {analysis.slice(0, limit).map((s, i) => (
              <div key={s.e.id} className="flex items-center gap-2 border-b pb-1.5 last:border-0">
                <span className="w-6 text-center text-xs font-bold text-gray-400">{i+1}</span>
                <img src={pokeImg(s.e)} onError={e=>{e.target.src=pokeImgFallback(s.e)}} className="w-10 h-10 object-contain flex-shrink-0" />
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-1 flex-wrap">
                    <span className="text-xs font-bold truncate">{s.e.jp}</span>
                    {s.e.types.map(t => <TypeBadge key={t} type={t} />)}
                    <span className="text-[10px] text-gray-500">S{s.e.spd}</span>
                  </div>
                  <div className="text-[10px] text-gray-600 mt-0.5">
                    <span className="text-red-600 font-bold">脅威 {s.threatens}/{users.length}</span>
                    {s.cantCounter > 0 && <span className="text-red-800 font-bold ml-1.5">反撃不能 {s.cantCounter}</span>}
                    <span className="text-gray-500 ml-1.5">先制 {s.fasterThan}/{users.length}</span>
                  </div>
                </div>
                <div className="flex gap-0.5 flex-wrap max-w-[40%] justify-end">
                  {s.threatenedList.map((tu, ti) => (
                    <img key={ti} src={pokeImg(tu.u)} title={`${tu.u.jp} (${tu.mult}×)`}
                      className={`w-7 h-7 object-contain rounded ${tu.mult>=4?'ring-2 ring-red-600':'ring-1 ring-orange-400'}`}
                      onError={e=>{e.target.src=pokeImgFallback(tu.u)}} />
                  ))}
                </div>
              </div>
            ))}
          </div>
        ) : (
          <div className="text-sm text-green-600">脅威なし ✓</div>
        )}
      </div>

      {/* 自軍各ポケの個別天敵 */}
      <div className="bg-white border rounded-lg p-3">
        <div className="text-sm font-bold text-gray-700 mb-2">👤 自軍各ポケの苦手相手 TOP5</div>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
          {perPoke.map(({u, threats}) => (
            <div key={u.id} className="border rounded p-2">
              <div className="flex items-center gap-2 mb-1.5 pb-1.5 border-b">
                <img src={pokeImg(u)} onError={e=>{e.target.src=pokeImgFallback(u)}} className="w-10 h-10 object-contain" />
                <div className="flex-1 min-w-0">
                  <div className="text-xs font-bold truncate">{u.jp}</div>
                  <div className="flex gap-1 items-center">
                    {u.types.map(t => <TypeBadge key={t} type={t} />)}
                    <span className="text-[10px] text-gray-500">S{u.spd}</span>
                  </div>
                </div>
              </div>
              {threats.length === 0 ? (
                <div className="text-xs text-green-600">苦手なし ✓</div>
              ) : (
                <div className="space-y-1">
                  {threats.map((t, i) => (
                    <div key={t.e.id} className="flex items-center gap-1.5 text-xs">
                      <span className="w-3 text-gray-400 text-[10px]">{i+1}.</span>
                      <img src={pokeImg(t.e)} onError={e=>{e.target.src=pokeImgFallback(t.e)}} className="w-7 h-7 object-contain" />
                      <div className="flex-1 min-w-0">
                        <div className="truncate">{t.e.jp}</div>
                        <div className="flex gap-0.5 items-center text-[9px]">
                          <MultBadge mult={t.stabMult>=4?4:2} />
                          {t.counterMult < 2 && <span className="text-red-600 font-bold">反撃不能</span>}
                          {t.faster && <span className="text-orange-600">先制</span>}
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

}

// ====== チームスロット選択バー ======
function TeamSlotBar({teams, activeIdx, setActiveIdx, setTeams}) {
  const [editing, setEditing] = useState(false);
  const current = teams[activeIdx];
  const addTeam = () => {
    const newTeams = [...teams, {name:`チーム${teams.length+1}`, slots:[null,null,null,null,null,null]}];
    setTeams(newTeams);
    setActiveIdx(newTeams.length-1);
  };
  const delTeam = () => {
    if (teams.length <= 1) return;
    if (!confirm(`「${current.name}」を削除しますか？`)) return;
    const newTeams = teams.filter((_,i)=>i!==activeIdx);
    setTeams(newTeams);
    setActiveIdx(Math.max(0, activeIdx-1));
  };
  const dupTeam = () => {
    const copy = JSON.parse(JSON.stringify(current));
    copy.name = current.name + ' コピー';
    const newTeams = [...teams, copy];
    setTeams(newTeams);
    setActiveIdx(newTeams.length-1);
  };
  const renameTeam = (name) => {
    const newTeams = teams.map((t,i)=> i===activeIdx ? {...t, name} : t);
    setTeams(newTeams);
  };
  return (
    <div className="bg-white border rounded-lg p-2 mb-3">
      <div className="flex items-center gap-2 mb-2">
        <span className="text-xs font-bold text-gray-600 whitespace-nowrap">チーム</span>
        <div className="flex-1 overflow-x-auto flex gap-1">
          {teams.map((t,i) => (
            <button key={i} onClick={()=>{setActiveIdx(i);setEditing(false);}}
              className={`px-3 py-1 text-xs font-bold rounded whitespace-nowrap transition ${i===activeIdx?'bg-blue-600 text-white':'bg-gray-100 text-gray-700 hover:bg-gray-200'}`}>
              {t.name}
            </button>
          ))}
          <button onClick={addTeam} title="新規チーム追加"
            className="px-2 py-1 text-xs font-bold rounded bg-green-100 text-green-700 hover:bg-green-200 whitespace-nowrap">
            <IconPlus className="w-3 h-3 inline" /> 追加
          </button>
        </div>
      </div>
      <div className="flex items-center gap-1.5 flex-wrap">
        {editing ? (
          <input autoFocus type="text" value={current.name}
            onChange={e=>renameTeam(e.target.value)}
            onBlur={()=>setEditing(false)}
            onKeyDown={e=>{if(e.key==='Enter')setEditing(false);}}
            className="border rounded px-2 py-0.5 text-xs flex-1 min-w-[140px]" />
        ) : (
          <>
            <button onClick={()=>setEditing(true)} className="text-xs text-blue-600 hover:underline">名前変更</button>
            <button onClick={dupTeam} className="text-xs text-blue-600 hover:underline">複製</button>
            {teams.length > 1 && (
              <button onClick={delTeam} className="text-xs text-red-600 hover:underline">削除</button>
            )}
            <span className="text-[10px] text-gray-400 ml-auto">{teams.length}チーム保存中</span>
          </>
        )}
      </div>
    </div>
  );
}

            <IconSettings className="w-4 h-4" /> 自軍登録
          </button>
          <button onClick={()=>setTab('nemesis')}
            className={`px-4 py-2 text-sm font-bold flex items-center gap-1 border-b-2 transition ${tab==='nemesis'?'border-blue-600 text-blue-600':'border-transparent text-gray-500 hover:text-gray-700'}`}>
            🔥 天敵
          </button>
        </div>

        {tab==='battle' && <BattleView opponents={opponents} setOpponents={setOpponents} userTeam={userTeam} />}
        {tab==='team' && <TeamSetup team={userTeam} setTeam={setUserTeam} />}
        {tab==='nemesis' && <NemesisView userTeam={userTeam} />}

        <footer className="mt-8 text-xs text-gray-400 text-center">
          データ: GameWith / PokeAPI
        </footer>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
