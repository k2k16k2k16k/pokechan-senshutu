function BattleView({opponents, setOpponents, userTeam}) {
  const [pickerIdx, setPickerIdx] = useState(null);
  const [confirmClear, setConfirmClear] = useState(false);
  const [showPhotoDetect, setShowPhotoDetect] = useState(false);

  const setSlot = (idx, poke) => {
    const copy = [...opponents];
    copy[idx] = poke;
    setOpponents(copy);
    setPickerIdx(null);
  };
  const clearSlot = idx => {
    const copy = [...opponents];
    copy[idx] = null;
    setOpponents(copy);
  };
  // 全クリア（2段階タップ方式: 1回目で赤くなり「もう一度タップで確定」、2秒で解除）
  const handleClearAll = () => {
    if (confirmClear) {
      setOpponents([null,null,null,null,null,null]);
      setConfirmClear(false);
    } else {
      setConfirmClear(true);
      setTimeout(() => setConfirmClear(false), 2000);
    }
  };

  const filled = opponents.filter(Boolean).length;
  const teamReady = userTeam.some(Boolean);

  // 相手構成の物理/特殊バイアス集計
  const biasSummary = useMemo(() => {
    const counts = { phys:0, spec:0, mixed:0 };
    opponents.forEach(o => {
      if (!o) return;
      const b = classifyByStats(o.id);
      if (b) counts[b.key] = (counts[b.key]||0) + 1;
    });
    return counts;
  }, [opponents]);

  return (
    <div className="space-y-3">
      {!teamReady && (
        <div className="bg-amber-50 border border-amber-300 rounded p-3 text-sm">
          <IconShield className="w-4 h-4 inline mr-1" />
          自軍が未登録です。上の「自軍登録」タブから先に登録してください（抜群技の判定に必要）。
        </div>
      )}
      <div className="flex items-center justify-between gap-2 flex-wrap">
        <div className="text-sm text-gray-600">相手パーティ ({filled}/6体)</div>
        <div className="flex items-center gap-1.5">
          <button
            onClick={()=>setShowPhotoDetect(true)}
            className="text-xs font-bold px-2.5 py-1 rounded border bg-white text-emerald-700 border-emerald-300 hover:bg-emerald-50"
            title="写真/スクショからAI検出"
          >
            📷 写真検出
          </button>
          {filled > 0 && (
            <button
              onClick={handleClearAll}
              className={`text-xs font-bold px-2.5 py-1 rounded border transition-colors ${
                confirmClear
                  ? 'bg-red-600 text-white border-red-600 animate-pulse'
                  : 'bg-white text-red-600 border-red-300 hover:bg-red-50'
              }`}
              title="相手の6スロットをすべてクリア"
            >
              {confirmClear ? '⚠ もう一度タップで確定' : '🗑️ 相手を全クリア'}
            </button>
          )}
        </div>
      </div>
      <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-3">
        {[0,1,2,3,4,5].map(i => (
          <OpponentSlot key={i} idx={i} opp={opponents[i]} userTeam={userTeam}
            onPick={()=>setPickerIdx(i)} onClear={()=>clearSlot(i)} />
        ))}
      </div>
      {filled > 0 && (biasSummary.phys + biasSummary.spec + biasSummary.mixed > 0) && (
        <div className="bg-gray-50 border rounded-lg p-2 flex items-center gap-2 flex-wrap text-xs">
          <span className="font-bold text-gray-700">相手構成バイアス:</span>
          {biasSummary.phys > 0 && (
            <span className="inline-flex items-center gap-0.5 px-1.5 py-0.5 rounded border bg-red-100 text-red-700 border-red-300 font-bold">
              🥊物理 ×{biasSummary.phys}
            </span>
          )}
          {biasSummary.spec > 0 && (
            <span className="inline-flex items-center gap-0.5 px-1.5 py-0.5 rounded border bg-blue-100 text-blue-700 border-blue-300 font-bold">
              ✨特殊 ×{biasSummary.spec}
            </span>
          )}
          {biasSummary.mixed > 0 && (
            <span className="inline-flex items-center gap-0.5 px-1.5 py-0.5 rounded border bg-purple-100 text-purple-700 border-purple-300 font-bold">
              ⚔️両刀 ×{biasSummary.mixed}
            </span>
          )}
          {(() => {
            const max = Math.max(biasSummary.phys, biasSummary.spec);
            if (max >= 2 && biasSummary.phys !== biasSummary.spec) {
              const hint = biasSummary.phys > biasSummary.spec
                ? '→ 物理受けを残したい'
                : '→ 特殊受けを残したい';
              return <span className="text-gray-500 ml-1">{hint}</span>;
            }
            return null;
          })()}
        </div>
      )}
      <AnalysisPanel userTeam={userTeam} opponents={opponents} />
      {pickerIdx !== null && (
        <PokemonPicker onSelect={p=>setSlot(pickerIdx, p)} onClose={()=>setPickerIdx(null)} />
      )}
      {showPhotoDetect && (
        <PhotoDetectModal
          onApply={newSlots => {
            // 既存のnullスロットは検出結果で埋め、検出結果がnullなら既存値を維持
            const merged = opponents.map((cur, i) => newSlots[i] || cur || null);
            // マッチした数が多い場合は全置換とみなす（5件以上検出された場合は完全置換）
            const detectedCount = newSlots.filter(Boolean).length;
            setOpponents(detectedCount >= 4 ? newSlots : merged);
          }}
          onClose={()=>setShowPhotoDetect(false)}
        />
      )}
    </div>
  );
}

// ====== チームスロット選択バー ======
function TeamSlotBar({teams, activeIdx, setActiveIdx, setTeams}) {
  const [editing, setEditing] = useState(false);
  const current = teams[activeIdx];
  const addTeam = () => {
    const newTeams = [...teams, {name:`チーム${teams.length+1}`, slots:[null,null,null,null,null,null]}];
    setTeams(newTeams);
    setActiveIdx(newTeams.length-1);
  };
  const delTeam = () => {
    if (teams.length <= 1) return;
    if (!confirm(`「${current.name}」を削除しますか？`)) return;
    const newTeams = teams.filter((_,i)=>i!==activeIdx);
    setTeams(newTeams);
    setActiveIdx(Math.max(0, activeIdx-1));
  };
  const dupTeam = () => {
    const copy = JSON.parse(JSON.stringify(current));
    copy.name = current.name + ' コピー';
    const newTeams = [...teams, copy];
    setTeams(newTeams);
    setActiveIdx(newTeams.length-1);
  };
  const renameTeam = (name) => {
    const newTeams = teams.map((t,i)=> i===activeIdx ? {...t, name} : t);
    setTeams(newTeams);
  };

  return (
    <div className="bg-white border rounded-lg p-2 mb-3">
      <div className="flex items-center gap-2 mb-2">
        <span className="text-xs font-bold text-gray-600 whitespace-nowrap">チーム</span>
        <div className="flex-1 overflow-x-auto flex gap-1">
          {teams.map((t,i) => (
            <button key={i} onClick={()=>{setActiveIdx(i);setEditing(false);}}
              className={`px-3 py-1 text-xs font-bold rounded whitespace-nowrap transition ${i===activeIdx?'bg-blue-600 text-white':'bg-gray-100 text-gray-700 hover:bg-gray-200'}`}>
              {t.name}
            </button>
          ))}
          <button onClick={addTeam} title="新規チーム追加"
            className="px-2 py-1 text-xs font-bold rounded bg-green-100 text-green-700 hover:bg-green-200 whitespace-nowrap">
            <IconPlus className="w-3 h-3 inline" /> 追加
          </button>
        </div>
      </div>
      <div className="flex items-center gap-1.5 flex-wrap">
        {editing ? (
          <input autoFocus type="text" value={current.name}
            onChange={e=>renameTeam(e.target.value)}
            onBlur={()=>setEditing(false)}
            onKeyDown={e=>{if(e.key==='Enter')setEditing(false);}}
            className="border rounded px-2 py-0.5 text-xs flex-1 min-w-[140px]" />
        ) : (
          <>
            <button onClick={()=>setEditing(true)} className="text-xs text-blue-600 hover:underline">名前変更</button>
            <button onClick={dupTeam} className="text-xs text-blue-600 hover:underline">複製</button>
            {teams.length > 1 && (
              <button onClick={delTeam} className="text-xs text-red-600 hover:underline">削除</button>
            )}
            <span className="text-[10px] text-gray-400 ml-auto">{teams.length}チーム保存中</span>
          </>
        )}
      </div>
    </div>
  );
}

// ====== 対戦ガイド（バトル中のリアルタイム判断支援） ======
// フロー:
//   1) 自軍から3匹を選出（メガ2体は除外）
//   2) 相手のポケモンを判明次第その場で登録
//   3) 現在の対面（自軍・相手の選択中ペア）に対して「戦う / 引く / 後続に任せる」を提案
//   4) 倒れたポケモンをKOマークで管理
function LiveBattleView({userTeam, opponents, setOpponents}) {
  const users = useMemo(() => userTeam.filter(Boolean), [userTeam]);
  // ガイド用の独立state（戦略タブには影響させない）
  const [picks, setPicks] = useState([null, null, null]); // 選出3匹 (userTeamのindexを保持)
  const [koUser, setKoUser] = useState([false, false, false]); // 選出3匹のKO状態
  const [koOpp, setKoOpp] = useState([false, false, false, false, false, false]);
  const [activeUser, setActiveUser] = useState(null); // picks内のindex
  const [activeOpp, setActiveOpp] = useState(null); // opponents内のindex
  const [userPickerOpen, setUserPickerOpen] = useState(null); // picks内のindex
  const [oppPickerOpen, setOppPickerOpen] = useState(null); // opponents内のindex

  // localStorage: 現在のバトル状態を復元
  useEffect(() => {
    try {
      const raw = localStorage.getItem('live_battle_v1');
      if (raw) {
        const d = JSON.parse(raw);
        if (Array.isArray(d.picks)) setPicks(d.picks);
        if (Array.isArray(d.koUser)) setKoUser(d.koUser);
        if (Array.isArray(d.koOpp)) setKoOpp(d.koOpp);
        if (typeof d.activeUser === 'number') setActiveUser(d.activeUser);
        if (typeof d.activeOpp === 'number') setActiveOpp(d.activeOpp);
      }
    } catch(e) {}
  }, []);

  // 相手ポケモンが削除されたらKOフラグもクリア（他タブで削除された場合の同期）
  useEffect(() => {
    setKoOpp(prev => prev.map((k, i) => (opponents[i] ? k : false)));
    if (activeOpp != null && !opponents[activeOpp]) setActiveOpp(null);
  }, [opponents]);

  // 自軍が変わった場合、選出indexが無効なら外す
  useEffect(() => {
    setPicks(prev => prev.map(pi => (pi != null && userTeam[pi]) ? pi : null));
  }, [userTeam]);
  useEffect(() => {
    try {
      localStorage.setItem('live_battle_v1', JSON.stringify({picks, koUser, koOpp, activeUser, activeOpp}));
    } catch(e) {}
  }, [picks, koUser, koOpp, activeUser, activeOpp]);

  const pickedUsers = picks.map(idx => idx != null ? userTeam[idx] : null);
  const pickedCount = pickedUsers.filter(Boolean).length;
  const megaPicked = pickedUsers.filter(u => u && isMega(u)).length;

  const toggleUserPick = (picksSlot, userIdx) => {
    // すでに他スロットで同じポケモン選出済みなら無効
    if (picks.some((p,i) => p === userIdx && i !== picksSlot)) return;
    const copy = [...picks];
    copy[picksSlot] = userIdx;
    setPicks(copy);
    setUserPickerOpen(null);
  };
  const clearUserPick = (picksSlot) => {
    const copy = [...picks];
    copy[picksSlot] = null;
    setPicks(copy);
    const koCopy = [...koUser];
    koCopy[picksSlot] = false;
    setKoUser(koCopy);
    if (activeUser === picksSlot) setActiveUser(null);
  };
  const resetBattle = () => {
    if (!confirm('バトル状態をリセットしますか？（選出・KO状態をクリア）')) return;
    setPicks([null, null, null]);
    setKoUser([false, false, false]);
    setKoOpp([false, false, false, false, false, false]);
    setActiveUser(null);
    setActiveOpp(null);
  };
  const toggleKoUser = (i) => {
    const copy = [...koUser];
    copy[i] = !copy[i];
    setKoUser(copy);
    if (copy[i] && activeUser === i) setActiveUser(null);
  };
  const toggleKoOpp = (i) => {
    const copy = [...koOpp];
    copy[i] = !copy[i];
    setKoOpp(copy);
    if (copy[i] && activeOpp === i) setActiveOpp(null);
  };
  const setOppSlot = (idx, poke) => {
    const copy = [...opponents];
    copy[idx] = poke;
    setOpponents(copy);
    setOppPickerOpen(null);
  };
  const clearOppSlot = (idx) => {
    const copy = [...opponents];
    copy[idx] = null;
    setOpponents(copy);
    const koCopy = [...koOpp];
    koCopy[idx] = false;
    setKoOpp(koCopy);
    if (activeOpp === idx) setActiveOpp(null);
  };

  // 現在の対面推奨
  const faceOff = useMemo(() => {
    if (activeUser == null || activeOpp == null) return null;
    const u = pickedUsers[activeUser];
    const o = opponents[activeOpp];
    if (!u || !o) return null;
    const ms = matchupScore(u, o);
    // 他の残存自軍から、この敵に対するベスト候補を算出
    const alternatives = picks.map((pickIdx, i) => {
      if (i === activeUser || pickIdx == null || koUser[i]) return null;
      const alt = userTeam[pickIdx];
      if (!alt) return null;
      const am = matchupScore(alt, o);
      return {idx:i, poke:alt, ms:am};
    }).filter(Boolean).sort((a,b) => b.ms.total - a.ms.total);

    // 速度分析（スカーフ警戒込み）
    const sp = speedAnalysis(u, o);
    const priority = ms.off.priority || 0;
    // 確定数計算
    const bestMv = ms.off.mv;
    const offAcc = bestMv
      ? (bestMv.accuracy && bestMv.accuracy > 0 && bestMv.accuracy <= 100
         ? bestMv.accuracy : (MOVE_ACCURACY[bestMv.name] ?? 100))
      : 100;
    const kt = killTurns(ms.off.dmgPct, offAcc);
    const ktOpp = killTurns(ms.thr.dmgPct, 90); // 相手命中は90%相当で控えめ見積
    // レース判定
    const race = raceVerdict(kt, ktOpp, sp, priority);
    // スカーフ警戒（相手持ち物未判明 & スカーフで逆転される場合）
    const oppKnownScarf = o.item === 'choice_scarf';
    const scarfRisk = sp.isFaster && sp.scarfBeats && !oppKnownScarf;

    // 判定: 戦う / 引く / 交代 （raceResultを優先的に反映）
    let verdict, verdictColor, verdictReasons = [];
    const safer = alternatives.find(a => a.ms.total > ms.total + 1.2);
    if (race.verdict === 'win' && ms.total >= 0) {
      verdict = '⚔ 戦う（勝ち筋あり）';
      verdictColor = 'bg-green-600';
      verdictReasons.push(`${race.label} / ${race.reason}`);
    } else if (race.verdict === 'winProb') {
      verdict = '⚔ 戦える（要注意）';
      verdictColor = 'bg-emerald-500';
      verdictReasons.push(`${race.label} / ${race.reason}`);
    } else if (safer && race.verdict === 'lose') {
      verdict = `🔄 交代推奨（${safer.poke.jp}が有利）`;
      verdictColor = 'bg-sky-500';
      verdictReasons.push(`${safer.poke.jp}の相性+${safer.ms.total.toFixed(1)} vs 現在+${ms.total.toFixed(1)}`);
      verdictReasons.push(`現状: ${race.label}`);
    } else if (race.verdict === 'lose' && ms.thr.dmgPct >= 100) {
      verdict = '🚫 引く（先に倒される）';
      verdictColor = 'bg-red-600';
      verdictReasons.push(`${race.label} / 被弾${ms.thr.dmgPct}%`);
    } else if (race.verdict === 'lose') {
      verdict = '🚫 不利（火力/速度負け）';
      verdictColor = 'bg-orange-500';
      verdictReasons.push(race.label);
    } else if (race.verdict === 'draw') {
      verdict = '⚖ 拮抗（相打ち圏）';
      verdictColor = 'bg-gray-500';
      verdictReasons.push(race.label);
    } else {
      verdict = '⚔ 戦える';
      verdictColor = 'bg-emerald-500';
      verdictReasons.push(`マッチアップ+${ms.total.toFixed(1)}`);
    }
    if (scarfRisk) {
      verdictReasons.push(`⚠ スカーフ警戒: 相手${o.jp}がスカーフならS${sp.osScarf}で逆転`);
    }

    // 速度情報（詳細）
    const speedInfo = sp.isFaster ? {text:`先手 (${sp.us} vs ${sp.os})`, cls:'text-green-700'}
      : sp.isSame ? {text:`同速 (${sp.us}) - 乱数50%`, cls:'text-yellow-700'}
      : {text:`後手 (${sp.us} vs ${sp.os})`, cls:'text-red-600'};
    if (priority > 0) {
      speedInfo.text += ` / 先制技+${priority}`;
      speedInfo.cls = 'text-sky-700';
    }

    // 交代読み: 相手側の未出しポケで、現自軍に有利なもの
    const oppSwitchCandidates = opponents.map((oo, oi) => {
      if (!oo || koOpp[oi] || oi === activeOpp) return null;
      const altMs = matchupScore(u, oo);
      return {opp:oo, oppIdx:oi, ms:altMs};
    }).filter(Boolean)
      .filter(c => c.ms.total < ms.total - 1.5 && c.ms.total < 0) // こちらの相性が現状より大幅に悪くなる候補のみ
      .sort((a,b) => a.ms.total - b.ms.total)
      .slice(0, 2);

    // とくせい戦略アドバイス
    const abilityAdvice = [];
    const myAb = u.ability ? ABILITY_MAP[u.ability] : null;
    if (myAb) {
      // タイプ無効
      if ((myAb.group === 'immunity' || myAb.group === 'absorb') && myAb.immuneTypes) {
        const oppHasImmuneType = o.types.some(t => myAb.immuneTypes.includes(t));
        if (oppHasImmuneType) {
          abilityAdvice.push({
            text: `🛡 ${myAb.jp}で${myAb.immuneTypes.map(t=>TYPE_JP[t]||t).join('/')}技を無効化 → 一致技が通らない`,
            cls: 'text-green-700 font-bold'
          });
        } else {
          abilityAdvice.push({
            text: `💡 ${myAb.jp}は${myAb.immuneTypes.map(t=>TYPE_JP[t]||t).join('/')}技無効。読みで交代受け可`,
            cls: 'text-gray-600'
          });
        }
      }
      // タイプ半減
      if (myAb.group === 'resist' && myAb.resistTypes) {
        const hasResistType = o.types.some(t => myAb.resistTypes.includes(t));
        if (hasResistType) {
          abilityAdvice.push({
            text: `🛡 ${myAb.jp}で${myAb.resistTypes.map(t=>TYPE_JP[t]||t).join('/')}技半減 → 被ダメ大幅減`,
            cls: 'text-green-700 font-bold'
          });
        }
      }
      // 防御系
      if (myAb.group === 'defense') {
        if (myAb.id === 'マルチスケイル') abilityAdvice.push({text:'🛡 マルチスケイル: HP満タン維持なら被ダメ半減', cls:'text-green-700'});
        if (myAb.id === 'ファーコート' && ms.thr.cat === '物') abilityAdvice.push({text:'🛡 ファーコート発動: 物理技半減', cls:'text-green-700 font-bold'});
        if ((myAb.id === 'フィルター' || myAb.id === 'ハードロック') && ms.thr.mult >= 2) abilityAdvice.push({text:`🛡 ${myAb.jp}: 抜群被ダメ×0.75`, cls:'text-green-700'});
        if (myAb.id === 'マジックガード') abilityAdvice.push({text:'🛡 マジックガード: 天候/毒/やどりぎ等のダメ無効', cls:'text-green-700'});
      }
      // 威力強化
      if (myAb.group === 'boost') {
        if (myAb.id === 'テクニシャン' && ms.off.mv) {
          const bp = (ms.off.mv.bp != null) ? ms.off.mv.bp : (MOVE_BP[ms.off.mv.name] ?? 0);
          if (bp > 0 && bp <= 60) abilityAdvice.push({text:`🔥 テクニシャン発動: ${ms.off.mv.name}(威${bp})×1.5`, cls:'text-red-700 font-bold'});
        }
        if (myAb.id === 'てきおうりょく' && ms.off.stab) {
          abilityAdvice.push({text:'🔥 てきおうりょく: 一致技が大幅強化（×1.33相当）', cls:'text-red-700 font-bold'});
        }
        if (myAb.id === 'ちからずく' && ms.off.mv) {
          abilityAdvice.push({text:`🔥 ちからずく: ${ms.off.mv.name}×1.3（追加効果は消失）`, cls:'text-red-700'});
        }
        if (myAb.id === 'ヨガパワー' && ms.off.mv?.cat === '物') {
          abilityAdvice.push({text:'🔥 ヨガパワー: 物理×2.0', cls:'text-red-700 font-bold'});
        }
        if (myAb.id === 'ちからもち' && ms.off.mv?.cat === '物') {
          abilityAdvice.push({text:'🔥 ちからもち: 物理×2.0', cls:'text-red-700 font-bold'});
        }
      }
      // 優先度
      if (myAb.group === 'priority') {
        if (myAb.id === 'イタズラゴコロ') abilityAdvice.push({text:'⚡ イタズラゴコロ: 変化技+1優先度（先制で補助技）', cls:'text-sky-700'});
        if (myAb.id === 'はやてのつばさ' && u.moves?.some(mv => mv.type === 'flying')) {
          abilityAdvice.push({text:'⚡ はやてのつばさ: HP満タンでひこう技先制', cls:'text-sky-700 font-bold'});
        }
      }
      // 天候
      if (myAb.group === 'weather') {
        const weatherName = {sun:'晴れ', rain:'雨', sand:'砂嵐', hail:'雪'}[myAb.weather];
        abilityAdvice.push({text:`☀ ${myAb.jp}: 場に出るだけで${weatherName}。天候パ展開可`, cls:'text-amber-700'});
      }
      // 威嚇
      if (myAb.id === 'いかく' && ms.thr.cat === '物') {
        abilityAdvice.push({text:'😤 いかく発動: 相手の物理火力を-1段階ダウン', cls:'text-green-700 font-bold'});
      }
      // 相手とくせい無視
      if (myAb.id === 'かたやぶり' || myAb.id === 'ターボブレイズ' || myAb.id === 'テラボルテージ') {
        if (o.ability) {
          abilityAdvice.push({text:`⚙ ${myAb.jp}: 相手の${o.ability}を無視できる`, cls:'text-purple-700 font-bold'});
        }
      }
      // いろめがね
      if (myAb.id === 'いろめがね' && ms.off.mult < 1 && ms.off.mult > 0) {
        abilityAdvice.push({text:'⚙ いろめがね: いまひとつ技を等倍化', cls:'text-purple-700'});
      }
    }
    // 有効打が全てとくせいで無効化されている場合
    if (ms.off.abilityBlocked) {
      abilityAdvice.push({text:`🚫 相手の${o.ability}で主力技が無効化されている可能性`, cls:'text-red-700 font-bold'});
    }

    return {u, o, ms, verdict, verdictColor, verdictReasons, speedInfo, bestMv, offAcc,
            alternatives, sp, kt, ktOpp, race, scarfRisk, priority, oppSwitchCandidates, abilityAdvice};
  }, [activeUser, activeOpp, picks, koUser, koOpp, userTeam, opponents, pickedUsers]);

  // 残存状況サマリ
  const aliveUsers = picks.filter((p,i)=> p != null && !koUser[i]).length;
  const aliveOpps = opponents.filter((o,i)=> o && !koOpp[i]).length;
  const knownOpps = opponents.filter(Boolean).length;

  // 残存ポケ×残存敵の全マッチアップ（サイド切替判定用）
  const remainingMatrix = useMemo(() => {
    const rows = picks.map((pi, i) => {
      if (pi == null || koUser[i]) return null;
      const u = userTeam[pi];
      if (!u) return null;
      const cols = opponents.map((o, oi) => {
        if (!o || koOpp[oi]) return null;
        return {opp:o, oppIdx:oi, ms: matchupScore(u, o)};
      }).filter(Boolean);
      return {picksIdx:i, u, cols};
    }).filter(Boolean);
    return rows;
  }, [picks, koUser, koOpp, userTeam, opponents]);

  // ベスト交代先レコメンド（現在のアクティブ相手に対して最良の自軍を算出）
  const bestSwitches = useMemo(() => {
    if (activeOpp == null) return [];
    const o = opponents[activeOpp];
    if (!o) return [];
    return picks.map((pi, i) => {
      if (pi == null || koUser[i] || i === activeUser) return null;
      const u = userTeam[pi];
      if (!u) return null;
      return {idx:i, poke:u, ms: matchupScore(u, o)};
    }).filter(Boolean).sort((a,b) => b.ms.total - a.ms.total);
  }, [activeOpp, picks, koUser, userTeam, opponents, activeUser]);

  // 終盤詰め将棋: 残存ポケモン同士の最適割当
  // 各生存自軍をどの相手に当てるか、全順列から最適を探索
  const endgamePlan = useMemo(() => {
    const aliveU = picks.map((pi, i) => ({picksIdx:i, u: pi != null ? userTeam[pi] : null}))
      .filter(x => x.u && !koUser[x.picksIdx]);
    const aliveO = opponents.map((o, oi) => ({oppIdx:oi, o}))
      .filter(x => x.o && !koOpp[x.oppIdx]);
    if (aliveU.length === 0 || aliveO.length === 0) return null;
    // 全組み合わせ探索は指数的だが、最大3×3なので問題なし
    if (aliveU.length > 4 || aliveO.length > 4) return null;
    // スコア行列
    const sm = aliveU.map(x => aliveO.map(y => matchupScore(x.u, y.o)));
    // 各敵に対する最適担当者を決定（敵基準のアサイン）
    const perOpp = aliveO.map((_, oi) => {
      let bestUi = 0, bestT = -Infinity;
      for (let ui = 0; ui < aliveU.length; ui++) {
        if (sm[ui][oi].total > bestT) { bestT = sm[ui][oi].total; bestUi = ui; }
      }
      return {oppIdx: aliveO[oi].oppIdx, opp: aliveO[oi].o, ui: bestUi, u: aliveU[bestUi].u, picksIdx: aliveU[bestUi].picksIdx, ms: sm[bestUi][oi]};
    });
    // 各自軍が一度ずつ使えれば理想だが、数が足りないならダブル割当
    const userUsage = {};
    perOpp.forEach(p => { userUsage[p.ui] = (userUsage[p.ui] || 0) + 1; });
    // 詰み判定
    const noPositive = perOpp.filter(p => p.ms.total < 0).length;
    const strongWin = perOpp.filter(p => p.ms.total >= 2).length;
    const overworked = Object.entries(userUsage).filter(([_, c]) => c >= 2).length;
    let verdict, verdictCls;
    if (aliveU.length >= aliveO.length && noPositive === 0 && overworked === 0) {
      verdict = `✅ 勝ち筋あり（${aliveO.length}体すべて担当者が有利）`;
      verdictCls = 'text-green-700 bg-green-50 border-green-300';
    } else if (aliveU.length < aliveO.length && noPositive === 0) {
      verdict = `⚠ 数的不利だが相性は良好（${aliveU.length}体vs${aliveO.length}体）`;
      verdictCls = 'text-amber-700 bg-amber-50 border-amber-300';
    } else if (strongWin >= aliveO.length - 1) {
      verdict = `✅ ほぼ勝ち筋あり（${strongWin}/${aliveO.length}体を圧倒可）`;
      verdictCls = 'text-emerald-700 bg-emerald-50 border-emerald-300';
    } else if (noPositive >= aliveO.length / 2) {
      verdict = `🚨 詰み危機（${noPositive}体を処理できない）`;
      verdictCls = 'text-red-700 bg-red-50 border-red-300';
    } else {
      verdict = `⚖ 拮抗（${noPositive}体不利 / ${strongWin}体優勢）`;
      verdictCls = 'text-gray-700 bg-gray-50 border-gray-300';
    }
    return {perOpp, verdict, verdictCls, aliveU, aliveO, noPositive, strongWin};
  }, [picks, koUser, koOpp, userTeam, opponents]);

  // 選出候補: 自軍から未選出のもの
  const availableUserIdxs = userTeam.map((u,i)=>u?i:null).filter(i => i != null && !picks.includes(i));

  if (users.length < 3) {
    return (
      <div className="bg-amber-50 border border-amber-300 rounded p-3 text-sm">
        <IconShield className="w-4 h-4 inline mr-1" />
        対戦ガイドを使うには自軍を3匹以上登録してください（「自軍登録」タブから）。
      </div>
    );
  }

  return (
    <div className="space-y-3">
      {/* 進行状況ヘッダー */}
      <div className="bg-white border rounded-lg p-2.5 flex items-center justify-between gap-2 flex-wrap">
        <div className="flex items-center gap-3 flex-wrap text-xs">
          <span className="font-bold text-gray-700">🎮 対戦ガイド</span>
          <span className={`px-2 py-0.5 rounded font-bold ${aliveUsers > 0 ? 'bg-blue-100 text-blue-700' : 'bg-gray-200 text-gray-500'}`}>
            自軍 {aliveUsers}/{pickedCount}
          </span>
          <span className={`px-2 py-0.5 rounded font-bold ${aliveOpps > 0 ? 'bg-red-100 text-red-700' : 'bg-gray-200 text-gray-500'}`}>
            相手 {aliveOpps}/{knownOpps || '?'}
          </span>
          {megaPicked > 0 && (
            <span className="px-2 py-0.5 rounded font-bold bg-purple-100 text-purple-700">
              💎 メガ{megaPicked}体
            </span>
          )}
        </div>
        <button onClick={resetBattle}
          className="text-xs font-bold px-2.5 py-1 rounded border bg-white text-red-600 border-red-300 hover:bg-red-50">
          🗑 リセット
        </button>
      </div>

      {/* STEP1: 選出3匹 */}
      <div className="bg-white border rounded-lg p-2.5">
        <div className="text-xs font-bold text-gray-700 mb-1.5">
          STEP1: 選出3匹
          {megaPicked >= 2 && <span className="ml-2 text-red-600">⚠ メガは1バトル1体のみ</span>}
        </div>
        <div className="grid grid-cols-3 gap-2">
          {[0,1,2].map(slot => {
            const pickIdx = picks[slot];
            const u = pickIdx != null ? userTeam[pickIdx] : null;
            const ko = koUser[slot];
            const isActive = activeUser === slot;
            return (
              <div key={slot}
                className={`relative border-2 rounded-lg p-1.5 flex flex-col items-center gap-1 ${
                  ko ? 'bg-gray-200 border-gray-400 opacity-60'
                    : isActive ? 'bg-blue-100 border-blue-500'
                    : u ? (isMega(u) ? 'bg-purple-50 border-purple-300' : 'bg-white border-gray-200')
                    : 'bg-gray-50 border-dashed border-gray-300'
                }`}>
                {u ? (
                  <>
                    <img src={pokeImg(u)} onError={e=>{e.target.src=pokeImgFallback(u)}}
                      className={`w-14 h-14 object-contain ${ko ? 'grayscale' : ''}`} />
                    <div className="text-[10px] font-bold truncate max-w-full flex items-center gap-0.5">
                      {isMega(u) && <span>💎</span>}
                      <span>{u.jp}</span>
                    </div>
                    <div className="flex flex-wrap gap-0.5 justify-center">
                      {u.types.map(t => <TypeBadge key={t} type={t} size="xs" />)}
                    </div>
                    <div className="flex gap-1 mt-0.5">
                      <button onClick={()=>setActiveUser(isActive ? null : slot)}
                        disabled={ko}
                        className={`text-[10px] px-1.5 py-0.5 rounded font-bold ${
                          isActive ? 'bg-blue-600 text-white'
                          : ko ? 'bg-gray-200 text-gray-400 cursor-not-allowed'
                          : 'bg-blue-100 text-blue-700 hover:bg-blue-200'
                        }`}>
                        {isActive ? '場' : '出'}
                      </button>
                      <button onClick={()=>toggleKoUser(slot)}
                        className={`text-[10px] px-1.5 py-0.5 rounded font-bold ${
                          ko ? 'bg-red-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-red-100'
                        }`}>
                        {ko ? '復帰' : 'KO'}
                      </button>
                      <button onClick={()=>clearUserPick(slot)}
                        className="text-[10px] px-1.5 py-0.5 rounded font-bold bg-gray-100 text-gray-600 hover:bg-red-100">
                        ×
                      </button>
                    </div>
                  </>
                ) : (
                  <button onClick={()=>setUserPickerOpen(slot)}
                    className="w-full h-24 flex items-center justify-center text-xs text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded">
                    + 選出{slot+1}
                  </button>
                )}
              </div>
            );
          })}
        </div>
      </div>

      {/* STEP2: 相手（判明次第登録） */}
      <div className="bg-white border rounded-lg p-2.5">
        <div className="text-xs font-bold text-gray-700 mb-1.5">
          STEP2: 相手（判明次第タップで登録）
        </div>
        <div className="grid grid-cols-3 sm:grid-cols-6 gap-1.5">
          {[0,1,2,3,4,5].map(i => {
            const o = opponents[i];
            const ko = koOpp[i];
            const isActive = activeOpp === i;
            return (
              <div key={i}
                className={`relative border rounded p-1 flex flex-col items-center gap-0.5 ${
                  ko ? 'bg-gray-200 border-gray-400 opacity-60'
                    : isActive ? 'bg-red-100 border-red-500 border-2'
                    : o ? 'bg-red-50 border-red-200'
                    : 'bg-gray-50 border-dashed border-gray-300'
                }`}>
                {o ? (
                  <>
                    <img src={pokeImg(o)} onError={e=>{e.target.src=pokeImgFallback(o)}}
                      className={`w-10 h-10 object-contain ${ko ? 'grayscale' : ''}`} />
                    <div className="text-[9px] font-bold truncate max-w-full">{o.jp}</div>
                    <div className="flex gap-0.5">
                      <button onClick={()=>setActiveOpp(isActive ? null : i)}
                        disabled={ko}
                        className={`text-[9px] px-1 py-0.5 rounded font-bold ${
                          isActive ? 'bg-red-600 text-white'
                          : ko ? 'bg-gray-200 text-gray-400'
                          : 'bg-red-100 text-red-700 hover:bg-red-200'
                        }`}>
                        {isActive ? '場' : '出'}
                      </button>
                      <button onClick={()=>toggleKoOpp(i)}
                        className={`text-[9px] px-1 py-0.5 rounded font-bold ${
                          ko ? 'bg-red-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-red-100'
                        }`}>
                        {ko ? '戻' : '✕'}
                      </button>
                      <button onClick={()=>clearOppSlot(i)}
                        className="text-[9px] px-1 py-0.5 rounded font-bold bg-gray-100 text-gray-600 hover:bg-red-100"
                        title="削除">
                        🗑
                      </button>
                    </div>
                  </>
                ) : (
                  <button onClick={()=>setOppPickerOpen(i)}
                    className="w-full h-16 flex items-center justify-center text-[10px] text-gray-400 hover:text-red-600 hover:bg-red-50 rounded">
                    + 相手{i+1}
                  </button>
                )}
              </div>
            );
          })}
        </div>
        <div className="text-[10px] text-gray-500 mt-1.5">
          ※ 出してきた順に登録すれば前半ほど重要。登録しきれなくても推奨は既知の相手から算出します。
        </div>
      </div>

      {/* STEP3: 現在の対面 */}
      {faceOff ? (
        <div className="bg-gradient-to-br from-blue-50 to-indigo-50 border-2 border-blue-400 rounded-lg p-3 space-y-2">
          <div className="text-xs font-bold text-blue-900">⚔ 現在の対面</div>
          <div className="flex items-center gap-2 justify-center">
            <div className="text-center flex-1">
              <img src={pokeImg(faceOff.u)} onError={e=>{e.target.src=pokeImgFallback(faceOff.u)}}
                className="w-16 h-16 object-contain mx-auto" />
              <div className="text-xs font-bold">{faceOff.u.jp}</div>
              <div className="text-[10px] text-gray-500">S{effectiveSpeed(faceOff.u)}</div>
              {faceOff.u.ability && ABILITY_MAP[faceOff.u.ability] && (
                <div className="text-[9px] mt-0.5 bg-indigo-100 text-indigo-800 rounded px-1 py-0.5 font-bold border border-indigo-300"
                  title={ABILITY_MAP[faceOff.u.ability].desc}>
                  ✨{faceOff.u.ability}
                </div>
              )}
            </div>
            <div className="text-2xl font-bold text-gray-400">VS</div>
            <div className="text-center flex-1">
              <img src={pokeImg(faceOff.o)} onError={e=>{e.target.src=pokeImgFallback(faceOff.o)}}
                className="w-16 h-16 object-contain mx-auto" />
              <div className="text-xs font-bold">{faceOff.o.jp}</div>
              <div className="text-[10px] text-gray-500">S{effectiveSpeed(faceOff.o)}</div>
            </div>
          </div>
          <div className={`text-center py-1.5 rounded font-bold text-white text-sm ${faceOff.verdictColor}`}>
            {faceOff.verdict}
          </div>

          {/* とくせい戦略アドバイス */}
          {faceOff.abilityAdvice && faceOff.abilityAdvice.length > 0 && (
            <div className="bg-indigo-50 border border-indigo-300 rounded p-2">
              <div className="text-[10px] font-bold text-indigo-900 mb-1">✨ とくせい戦略</div>
              <div className="space-y-0.5">
                {faceOff.abilityAdvice.map((a, i) => (
                  <div key={i} className={`text-[11px] ${a.cls}`}>{a.text}</div>
                ))}
              </div>
            </div>
          )}

          {/* 速度レース & 確定数 */}
          <div className="bg-white rounded border border-blue-200 p-2 space-y-1">
            <div className="text-[10px] font-bold text-blue-900">🏁 速度レース & 確定数</div>
            <div className="grid grid-cols-2 gap-2 text-[11px]">
              <div>
                <div className={`font-bold ${faceOff.speedInfo.cls}`}>
                  🏃 {faceOff.speedInfo.text}
                </div>
                {faceOff.scarfRisk && (
                  <div className="text-[10px] text-amber-700 mt-0.5">
                    ⚠ スカーフなら S{faceOff.sp.osScarf} で逆転
                  </div>
                )}
                {faceOff.sp.scarfSafe && (
                  <div className="text-[10px] text-green-600 mt-0.5">
                    ✓ スカーフでも先手（S{faceOff.sp.osScarf}）
                  </div>
                )}
                {faceOff.sp.isSame && (
                  <div className="text-[10px] text-yellow-700 mt-0.5">
                    ⚡ 同速乱数。先制技での差別化推奨
                  </div>
                )}
              </div>
              <div className={`font-bold ${faceOff.race.color}`}>
                🎯 {faceOff.race.label}
                <div className="text-[10px] font-normal text-gray-600 mt-0.5">
                  {faceOff.race.reason}
                </div>
              </div>
            </div>
            <div className="flex gap-2 text-[11px] pt-1 border-t border-gray-100">
              <div className="flex-1">
                <span className="text-gray-500">こちら→相手:</span>
                {faceOff.kt ? (
                  <span className="ml-1 font-bold text-blue-700">
                    {faceOff.kt.turns}発{faceOff.kt.accTurns > faceOff.kt.turns ? `(命中考慮${faceOff.kt.accTurns}発)` : ''}
                    <span className="text-gray-500 font-normal ml-1">({faceOff.ms.off.dmgPct}%)</span>
                  </span>
                ) : (
                  <span className="ml-1 text-red-600 font-bold">打点なし</span>
                )}
              </div>
              <div className="flex-1">
                <span className="text-gray-500">相手→こちら:</span>
                {faceOff.ktOpp ? (
                  <span className="ml-1 font-bold text-orange-700">
                    {faceOff.ktOpp.turns}発耐
                    <span className="text-gray-500 font-normal ml-1">({faceOff.ms.thr.dmgPct}%)</span>
                  </span>
                ) : (
                  <span className="ml-1 text-gray-500">不明</span>
                )}
              </div>
            </div>
          </div>

          <div className="text-[11px] space-y-0.5">
            {faceOff.bestMv && (
              <div className="text-gray-700">
                🎯 推奨技: <b>{faceOff.bestMv.name}</b>
                {faceOff.ms.off.dmgPct > 0 && <span className="ml-1 text-blue-700">約{faceOff.ms.off.dmgPct}%ダメ</span>}
                {faceOff.offAcc < 100 && <span className="ml-1 text-amber-600">命中{faceOff.offAcc}</span>}
                {faceOff.ms.off.stab && <span className="ml-1 text-red-600">⚡STAB</span>}
                {faceOff.ms.off.mult >= 2 && <span className="ml-1 text-green-700">✨抜群×{faceOff.ms.off.mult}</span>}
                {faceOff.priority > 0 && <span className="ml-1 text-sky-700">+{faceOff.priority}先制</span>}
              </div>
            )}
            <div className="text-orange-700">🛡 被弾予測: 最大 約{faceOff.ms.thr.dmgPct}%（{faceOff.ms.thr.cat === '物' ? '物理' : '特殊'}/{faceOff.ms.thr.type}）</div>
            {faceOff.verdictReasons.map((r, i) => (
              <div key={i} className="text-gray-600">💡 {r}</div>
            ))}
          </div>

          {/* 交代読み警告 */}
          {faceOff.oppSwitchCandidates.length > 0 && (
            <div className="bg-amber-50 border border-amber-300 rounded p-2">
              <div className="text-[10px] font-bold text-amber-800 mb-1">👁 交代読み警告（相手が引きそう）</div>
              <div className="flex gap-1.5 flex-wrap">
                {faceOff.oppSwitchCandidates.map(c => (
                  <div key={c.oppIdx}
                    className="flex items-center gap-1 border border-amber-300 bg-white rounded px-1.5 py-0.5 text-[10px]">
                    <img src={pokeImg(c.opp)} onError={e=>{e.target.src=pokeImgFallback(c.opp)}} className="w-5 h-5 object-contain" />
                    <span>{c.opp.jp}</span>
                    <span className="font-bold text-red-600">{c.ms.total.toFixed(1)}</span>
                  </div>
                ))}
              </div>
              <div className="text-[10px] text-amber-700 mt-1">
                相手は現対面を嫌って上記に引く可能性。こちらも先に交代を検討
              </div>
            </div>
          )}

          {/* 交代候補 */}
          {bestSwitches.length > 0 && (
            <div className="border-t border-blue-200 pt-1.5">
              <div className="text-[10px] font-bold text-blue-900 mb-1">🔄 交代候補（この相手への相性順）</div>
              <div className="flex gap-1.5 flex-wrap">
                {bestSwitches.map(s => (
                  <button key={s.idx} onClick={()=>setActiveUser(s.idx)}
                    className={`flex items-center gap-1 border rounded px-1.5 py-0.5 text-[10px] hover:bg-blue-100 ${
                      s.ms.total >= 2 ? 'bg-green-50 border-green-300 text-green-800'
                      : s.ms.total >= 0 ? 'bg-white border-gray-300'
                      : 'bg-orange-50 border-orange-300 text-orange-700'
                    }`}>
                    <img src={pokeImg(s.poke)} onError={e=>{e.target.src=pokeImgFallback(s.poke)}} className="w-5 h-5 object-contain" />
                    <span>{s.poke.jp}</span>
                    <span className="font-bold">{s.ms.total >= 0 ? '+' : ''}{s.ms.total.toFixed(1)}</span>
                  </button>
                ))}
              </div>
            </div>
          )}
        </div>
      ) : (
        <div className="bg-gray-50 border border-dashed border-gray-300 rounded-lg p-3 text-xs text-gray-500 text-center">
          {pickedCount < 1 ? 'STEP1で選出を決めてください' : '自軍と相手の「出」ボタンを押すと対面推奨が表示されます'}
        </div>
      )}

      {/* 終盤詰め将棋 */}
      {endgamePlan && endgamePlan.aliveO.length > 0 && endgamePlan.aliveU.length > 0 && (
        <div className="bg-white border rounded-lg p-2.5">
          <div className="text-xs font-bold text-gray-700 mb-1.5">
            ♟ 終盤詰め将棋（残 {endgamePlan.aliveU.length}vs{endgamePlan.aliveO.length}）
          </div>
          <div className={`rounded border p-2 mb-2 text-xs font-bold ${endgamePlan.verdictCls}`}>
            {endgamePlan.verdict}
          </div>
          <div className="text-[10px] text-gray-600 mb-1">各相手に対する最適担当者（数字=相性スコア）:</div>
          <div className="space-y-1">
            {endgamePlan.perOpp.map(p => {
              const t = p.ms.total;
              const cls = t >= 3 ? 'bg-green-100 border-green-400 text-green-900'
                : t >= 1 ? 'bg-emerald-50 border-emerald-300 text-emerald-800'
                : t >= 0 ? 'bg-gray-50 border-gray-300 text-gray-700'
                : 'bg-red-50 border-red-300 text-red-700';
              return (
                <div key={p.oppIdx} className={`flex items-center gap-2 border rounded px-2 py-1 ${cls}`}>
                  <div className="flex items-center gap-1 min-w-[80px]">
                    <img src={pokeImg(p.opp)} onError={e=>{e.target.src=pokeImgFallback(p.opp)}} className="w-6 h-6 object-contain" />
                    <span className="text-[11px] font-bold truncate max-w-[70px]">{p.opp.jp}</span>
                  </div>
                  <span className="text-gray-400">→</span>
                  <div className="flex items-center gap-1 flex-1 min-w-0">
                    <img src={pokeImg(p.u)} onError={e=>{e.target.src=pokeImgFallback(p.u)}} className="w-6 h-6 object-contain" />
                    <span className="text-[11px] font-bold truncate">{p.u.jp}</span>
                    {isMega(p.u) && <span title="メガ">💎</span>}
                  </div>
                  <span className="text-[11px] font-bold whitespace-nowrap">
                    {t >= 0 ? '+' : ''}{t.toFixed(1)}
                  </span>
                  <button onClick={()=>{
                    setActiveUser(p.picksIdx);
                    setActiveOpp(p.oppIdx);
                  }} className="text-[9px] px-1.5 py-0.5 rounded bg-white border hover:bg-blue-50 whitespace-nowrap">
                    対面
                  </button>
                </div>
              );
            })}
          </div>
          <div className="text-[10px] text-gray-500 mt-1.5 leading-snug">
            ※ 「対面」を押すと STEP3 にその組合せの詳細（確定数・速度レース）が出ます
          </div>
        </div>
      )}

      {/* 残存マッチアップ全景 */}
      {remainingMatrix.length > 0 && aliveOpps > 0 && (
        <div className="bg-white border rounded-lg p-2.5">
          <div className="text-xs font-bold text-gray-700 mb-1.5">📊 残存マッチアップ（数字＝相性スコア）</div>
          <div className="overflow-x-auto">
            <table className="text-[10px] border-collapse">
              <thead>
                <tr>
                  <th className="p-1 border-b"></th>
                  {opponents.map((o,oi) => (o && !koOpp[oi]) && (
                    <th key={oi} className="p-1 border-b text-center min-w-[48px]">
                      <img src={pokeImg(o)} onError={e=>{e.target.src=pokeImgFallback(o)}}
                        className="w-7 h-7 object-contain mx-auto" />
                      <div className="text-[9px] truncate max-w-[50px]">{o.jp}</div>
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {remainingMatrix.map(row => (
                  <tr key={row.picksIdx}>
                    <td className="p-1 border-r">
                      <div className="flex items-center gap-1">
                        <img src={pokeImg(row.u)} onError={e=>{e.target.src=pokeImgFallback(row.u)}}
                          className="w-6 h-6 object-contain" />
                        <span className="text-[9px] truncate max-w-[50px]">{row.u.jp}</span>
                      </div>
                    </td>
                    {opponents.map((o,oi) => {
                      if (!o || koOpp[oi]) return null;
                      const cell = row.cols.find(c => c.oppIdx === oi);
                      if (!cell) return <td key={oi} className="p-1 text-center">-</td>;
                      const t = cell.ms.total;
                      const cls = t >= 5 ? 'bg-green-700 text-white'
                        : t >= 3 ? 'bg-green-500 text-white'
                        : t >= 1.5 ? 'bg-emerald-300 text-emerald-900'
                        : t >= 0 ? 'bg-gray-100 text-gray-700'
                        : t >= -2 ? 'bg-orange-400 text-white'
                        : 'bg-red-600 text-white';
                      return (
                        <td key={oi} className="p-0.5 text-center">
                          <span className={`px-1.5 py-0.5 rounded font-bold inline-block ${cls}`}>
                            {t >= 0 ? '+' : ''}{t.toFixed(1)}
                          </span>
                        </td>
                      );
                    })}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* 自軍選出用ピッカー（自軍登録済みから選ぶ） */}
      {userPickerOpen != null && (
        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4" onClick={()=>setUserPickerOpen(null)}>
          <div className="bg-white rounded-lg max-w-md w-full p-3" onClick={e=>e.stopPropagation()}>
            <div className="flex items-center justify-between mb-2">
              <h3 className="font-bold text-sm">選出{userPickerOpen + 1} を選ぶ</h3>
              <button onClick={()=>setUserPickerOpen(null)} className="p-1 hover:bg-gray-100 rounded"><IconX className="w-4 h-4" /></button>
            </div>
            <div className="grid grid-cols-3 gap-2">
              {availableUserIdxs.map(ui => {
                const u = userTeam[ui];
                return (
                  <button key={ui} onClick={()=>toggleUserPick(userPickerOpen, ui)}
                    className="border rounded p-1.5 hover:bg-blue-50 hover:border-blue-400 transition text-left">
                    <img src={pokeImg(u)} onError={e=>{e.target.src=pokeImgFallback(u)}} className="w-full aspect-square object-contain bg-gray-50 rounded" />
                    <div className="text-[10px] font-medium text-center mt-1 truncate flex items-center justify-center gap-0.5">
                      {isMega(u) && <span>💎</span>}
                      <span>{u.jp}</span>
                    </div>
                  </button>
                );
              })}
              {availableUserIdxs.length === 0 && (
                <div className="col-span-3 text-xs text-gray-500 text-center p-3">
                  選出可能なポケモンがありません
                </div>
              )}
            </div>
          </div>
        </div>
      )}

      {/* 相手ポケモン選択ピッカー（既存） */}
      {oppPickerOpen != null && (
        <PokemonPicker onSelect={p=>setOppSlot(oppPickerOpen, p)} onClose={()=>setOppPickerOpen(null)} />
      )}
    </div>
  );
}

// ====== メイン ======
function App() {
  const [tab, setTab] = useState('battle');
  const [teams, setTeams] = useState([{name:'チーム1', slots:[null,null,null,null,null,null]}]);
  const [activeIdx, setActiveIdx] = useState(0);
  const [opponents, setOpponents] = useState([null,null,null,null,null,null]);
  const [loaded, setLoaded] = useState(false);

  // 同期関連
  const [syncKey, setSyncKey] = useState(null);
  const [syncStatus, setSyncStatus] = useState('idle'); // idle | connecting | connected | pushing | pulling | error
  const [syncError, setSyncError] = useState('');
  const [showSyncModal, setShowSyncModal] = useState(false);
  const skipNextPushRef = useRef(false);
  const lastUpdatedAtRef = useRef(null);
  const pushTimerRef = useRef(null);

  // 旧アイテムIDのクリーンアップ（ポケチャン未実装アイテム削除）
  const sanitizeTeams = (teams) => {
    if (!Array.isArray(teams)) return teams;
    return teams.map(t => ({
      ...t,
      slots: (t.slots || []).map(s => {
        if (!s) return s;
        if (s.item && !ITEM_MAP[s.item]) return {...s, item:''};
        return s;
      })
    }));
  };

  // 初回ロード: localStorage復元
  useEffect(() => {
    try {
      const rawV2 = localStorage.getItem('user_teams_v2');
      if (rawV2) {
        const d = JSON.parse(rawV2);
        if (d.teams?.length) { setTeams(sanitizeTeams(d.teams)); setActiveIdx(d.activeIdx ?? 0); }
        if (d.opponents) setOpponents(d.opponents);
      } else {
        // 旧v1からマイグレーション
        const rawV1 = localStorage.getItem('user_team_v1');
        if (rawV1) {
          const slots = JSON.parse(rawV1);
          setTeams([{name:'チーム1', slots}]);
        }
      }
      // 前回同期時のサーバー updated_at を復元（競合解決に使用）
      const savedAt = localStorage.getItem('sync_updated_at_v1');
      if (savedAt) lastUpdatedAtRef.current = savedAt;
      const savedKey = localStorage.getItem('sync_key_v1');
      if (savedKey) setSyncKey(savedKey);
    } catch(e) {}
    setLoaded(true);
  }, []);

  // サーバー updated_at をlocalStorageに保存するヘルパー
  const setLastUpdatedAt = (ts) => {
    lastUpdatedAtRef.current = ts;
    try { if (ts) localStorage.setItem('sync_updated_at_v1', ts); } catch(e) {}
  };

  // localStorage保存
  useEffect(() => {
    if (!loaded) return;
    try { localStorage.setItem('user_teams_v2', JSON.stringify({teams, activeIdx, opponents})); } catch(e) {}
  }, [teams, activeIdx, opponents, loaded]);

  // 同期キー保存
  useEffect(() => {
    if (!loaded) return;
    try {
      if (syncKey) localStorage.setItem('sync_key_v1', syncKey);
      else localStorage.removeItem('sync_key_v1');
    } catch(e) {}
  }, [syncKey, loaded]);

  // 接続確立: pull → apply or push
  //   mode: 'new'      … 新規キー発行：現ローカルを初回プッシュ
  //   mode: 'existing' … 既存キーで接続：リモート優先
  //   mode: 'auto'     … 自動再接続：サーバー updated_at を比較して新しい方を採用
  const doConnect = async (key, mode) => {
    setSyncStatus('connecting');
    setSyncError('');
    try {
      const remote = await syncPull(key);
      const prevAt = lastUpdatedAtRef.current;
      if (remote) {
        if (mode === 'existing') {
          // 明示的接続：リモート優先で上書き
          skipNextPushRef.current = true;
          const d = remote.teams_json || {};
          if (d.teams?.length) { setTeams(sanitizeTeams(d.teams)); setActiveIdx(d.activeIdx ?? 0); }
          if (d.opponents) setOpponents(d.opponents);
          setLastUpdatedAt(remote.updated_at);
        } else if (mode === 'auto') {
          // 自動再接続：前回の保存時点より新しければリモート採用、そうでなければローカルを push
          if (!prevAt || remote.updated_at > prevAt) {
            skipNextPushRef.current = true;
            const d = remote.teams_json || {};
            if (d.teams?.length) { setTeams(d.teams); setActiveIdx(d.activeIdx ?? 0); }
            if (d.opponents) setOpponents(d.opponents);
            setLastUpdatedAt(remote.updated_at);
          } else {
            // ローカルが新しい（オフライン中の編集など）→ push
            const r = await syncPush(key, { teams, activeIdx, opponents });
            setLastUpdatedAt(r.updated_at);
          }
        } else {
          // mode === 'new' でリモートが既にある異常系 → 上書きpush
          const r = await syncPush(key, { teams, activeIdx, opponents });
          setLastUpdatedAt(r.updated_at);
        }
      } else {
        // リモート未作成 → 必ずローカルをプッシュ
        const r = await syncPush(key, { teams, activeIdx, opponents });
        setLastUpdatedAt(r.updated_at);
      }
      setSyncKey(key);
      setSyncStatus('connected');
    } catch (e) {
      setSyncStatus('error');
      setSyncError(e.message || String(e));
      throw e;
    }
  };

  // 切断
  const handleDisconnect = () => {
    if (!confirm('同期を解除しますか？\n（ローカルデータは残ります）')) return;
    setSyncKey(null);
    setSyncStatus('idle');
    lastUpdatedAtRef.current = null;
    try { localStorage.removeItem('sync_updated_at_v1'); } catch(e) {}
  };

  // リロード時の自動再接続（保存キーがあれば）
  const autoReconnectRef = useRef(false);
  useEffect(() => {
    if (!loaded || autoReconnectRef.current) return;
    if (syncKey && syncStatus === 'idle') {
      autoReconnectRef.current = true;
      doConnect(syncKey, 'auto').catch(() => {});
    }
  }, [loaded, syncKey]);

  // 変更検知 → debounce 2s → push
  useEffect(() => {
    if (!loaded || !syncKey || syncStatus === 'connecting' || syncStatus === 'idle') return;
    if (skipNextPushRef.current) { skipNextPushRef.current = false; return; }
    if (pushTimerRef.current) clearTimeout(pushTimerRef.current);
    pushTimerRef.current = setTimeout(async () => {
      try {
        setSyncStatus('pushing');
        const r = await syncPush(syncKey, { teams, activeIdx, opponents });
        setLastUpdatedAt(r.updated_at);
        setSyncStatus('connected');
      } catch (e) {
        setSyncStatus('error');
        setSyncError(e.message || String(e));
      }
    }, 2000);
    return () => { if (pushTimerRef.current) clearTimeout(pushTimerRef.current); };
  }, [teams, activeIdx, opponents, syncKey, loaded]);

  // ポーリング受信 (3秒毎)
  useEffect(() => {
    if (!syncKey || syncStatus === 'idle') return;
    let alive = true;
    const poll = async () => {
      if (!alive) return;
      try {
        const remote = await syncPull(syncKey);
        if (!alive || !remote) return;
        if (remote.updated_at !== lastUpdatedAtRef.current) {
          // リモートが新しい → ローカルに反映
          setLastUpdatedAt(remote.updated_at);
          skipNextPushRef.current = true;
          const d = remote.teams_json || {};
          if (d.teams?.length) {
            setTeams(sanitizeTeams(d.teams));
            setActiveIdx(Math.min(d.activeIdx ?? 0, d.teams.length - 1));
          }
          if (d.opponents) setOpponents(d.opponents);
        }
      } catch(e) { /* 一時的な失敗は無視 */ }
    };
    const id = setInterval(poll, 3000);
    return () => { alive = false; clearInterval(id); };
  }, [syncKey, syncStatus]);

  const userTeam = teams[activeIdx]?.slots || [null,null,null,null,null,null];
  const setUserTeam = (slots) => {
    setTeams(teams.map((t,i)=> i===activeIdx ? {...t, slots} : t));
  };

  return (
    <div className="min-h-screen bg-gray-50">
      <div className="max-w-6xl mx-auto p-3 sm:p-4">
        <header className="mb-4 flex items-start justify-between gap-3">
          <div>
            <h1 className="text-xl sm:text-2xl font-bold">ポケチャン選出補助 <span className="text-[10px] font-normal text-green-600 align-middle">v2.9 技/特性大幅追加</span></h1>
            <p className="text-xs text-gray-500">タイプ相性ベース / 自軍事前登録式</p>
          </div>
          <div className="flex flex-col items-end gap-1">
            <SyncStatusBadge
              status={syncKey ? syncStatus : 'idle'}
              onClick={() => syncKey ? handleDisconnect() : setShowSyncModal(true)} />
            {syncStatus === 'error' && syncError && (
              <div className="text-[10px] text-red-600 max-w-[200px] text-right truncate" title={syncError}>{syncError}</div>
            )}
          </div>
        </header>

        <TeamSlotBar teams={teams} activeIdx={activeIdx} setActiveIdx={setActiveIdx} setTeams={setTeams} />

        <div className="flex gap-1 mb-4 border-b overflow-x-auto">
          <button onClick={()=>setTab('battle')}
            className={`px-3 sm:px-4 py-2 text-sm font-bold flex items-center gap-1 border-b-2 transition whitespace-nowrap ${tab==='battle'?'border-blue-600 text-blue-600':'border-transparent text-gray-500 hover:text-gray-700'}`}>
            <IconSwords className="w-4 h-4" /> 選出検討
          </button>
          <button onClick={()=>setTab('live')}
            className={`px-3 sm:px-4 py-2 text-sm font-bold flex items-center gap-1 border-b-2 transition whitespace-nowrap ${tab==='live'?'border-blue-600 text-blue-600':'border-transparent text-gray-500 hover:text-gray-700'}`}>
            🎮 対戦ガイド
          </button>
          <button onClick={()=>setTab('team')}
            className={`px-3 sm:px-4 py-2 text-sm font-bold flex items-center gap-1 border-b-2 transition whitespace-nowrap ${tab==='team'?'border-blue-600 text-blue-600':'border-transparent text-gray-500 hover:text-gray-700'}`}>
            <IconSettings className="w-4 h-4" /> 自軍登録
          </button>
        </div>

        {tab==='battle' && <BattleView opponents={opponents} setOpponents={setOpponents} userTeam={userTeam} />}
        {tab==='live' && <LiveBattleView userTeam={userTeam} opponents={opponents} setOpponents={setOpponents} />}
        {tab==='team' && <TeamSetup team={userTeam} setTeam={setUserTeam} />}

        {showSyncModal && (
          <SyncSetupModal onClose={()=>setShowSyncModal(false)} onConnect={doConnect} />
        )}

        <footer className="mt-8 text-xs text-gray-400 text-center">
          データ: GameWith / PokeAPI
        </footer>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
