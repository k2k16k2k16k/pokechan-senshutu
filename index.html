// ====== 計算 ======
function defensiveMult(attackType, defTypes) {
  let m = 1;
  defTypes.forEach(t => {
    const v = EFFECTIVE[attackType]?.[t];
    if (v !== undefined) m *= v;
  });
  return m;
}
function allWeaknesses(defTypes) {
  const r = {};
  TYPES.forEach(atk => { r[atk] = defensiveMult(atk, defTypes); });
  return r;
}

// 一致技(STAB)考慮の最大攻撃スコア
function bestHitScore(userPoke, opp) {
  if (!userPoke || !opp) return {score:0, mult:0, stab:false, mv:null, offF:1, itemF:1};
  let best = {score:0, mult:0, stab:false, mv:null, offF:1, itemF:1};
  for (const mv of (userPoke.moves || [])) {
    if (!mv.type || mv.cat === '変') continue;
    const mult = defensiveMult(mv.type, opp.types);
    if (mult === 0) continue;
    const stab = userPoke.types.includes(mv.type);
    const offF = offensiveFactor(userPoke, mv);
    const itemF = itemFactor(userPoke, mv);
    const score = mult * (stab ? 1.5 : 1) * offF * itemF;
    if (score > best.score) best = {score, mult, stab, mv, offF, itemF};
  }
  return best;
}

// チーム総合評価 (高いほど良い)
function evaluateTeam(team) {
  const filled = team.filter(Boolean);
  if (filled.length === 0) return 0;
  let weakCoverage = 0;
  let holes = 0;
  TYPES.forEach(atk => {
    let resist = 0, weak = 0;
    filled.forEach(u => {
      const m = defensiveMult(atk, u.types);
      if (m > 1) weak++;
      else if (m < 1) resist++;
    });
    weakCoverage += (resist - weak);
    if (filled.every(u => defensiveMult(atk, u.types) > 1)) holes++;
  });
  const typeSet = new Set();
  filled.forEach(u => u.types.forEach(t => typeSet.add(t)));
  const diversity = typeSet.size;
  const combos = {};
  filled.forEach(u => {
    const key = [...u.types].sort().join(',');
    combos[key] = (combos[key]||0) + 1;
  });
  const dup = Object.values(combos).reduce((s,c)=>s+(c>1?c-1:0),0);
  return weakCoverage + diversity - holes*30 - dup*5;
}

// C(n,k) 組み合わせ列挙
function combinations(arr, k) {
  const res = [];
  const rec = (start, pick) => {
    if (pick.length === k) { res.push([...pick]); return; }
    for (let i=start; i<arr.length; i++) {
      pick.push(arr[i]);
      rec(i+1, pick);
      pick.pop();
    }
  };
  rec(0, []);
  return res;
}

// 種族値ベース: atk/spa を比較 (1.25倍以上で偏りありと判定)
function classifyByStats(pokeId) {
  const s = POKE_STATS[pokeId];
  if (!s) return null;
  const [atk, spa] = s;
  if (atk >= spa * 1.25) return {key:'phys', jp:'物理', emoji:'🥊', cls:'bg-red-100 text-red-700 border-red-300', atk, spa};
  if (spa >= atk * 1.25) return {key:'spec', jp:'特殊', emoji:'✨', cls:'bg-blue-100 text-blue-700 border-blue-300', atk, spa};
  return {key:'mixed', jp:'両刀', emoji:'⚔️', cls:'bg-purple-100 text-purple-700 border-purple-300', atk, spa};
}
// 技カテゴリベース: 登録技の物/特/変を集計
function classifyByMoves(moves) {
  const cats = (moves||[]).map(m => m?.cat).filter(Boolean);
  const phys = cats.filter(c => c === '物').length;
  const spec = cats.filter(c => c === '特').length;
  const stat = cats.filter(c => c === '変').length;
  const off = phys + spec;
  if (off === 0) return null;
  if (phys > 0 && spec === 0) return {key:'phys', jp:'物理型', emoji:'🥊', cls:'bg-red-100 text-red-700 border-red-300', phys, spec, stat};

  return {key:'mixed', jp:'両刀型', emoji:'⚔️', cls:'bg-purple-100 text-purple-700 border-purple-300', phys, spec, stat};
}

const ITEM_MAP = Object.fromEntries(ITEMS.map(it => [it.id, it]));

// 持ち物のセレクタ用グループ定義
const ITEM_GROUPS = [
  { key:'choice',       label:'◆ こだわり' },
  { key:'type',         label:'◆ タイプ強化 ×1.2' },
  { key:'exclusive',    label:'◆ 専用アイテム' },
  { key:'recovery',     label:'◆ 回復・持続' },
  { key:'guard',        label:'◆ 行動保険' },
  { key:'utility',      label:'◆ 補助・試行回数' },
  { key:'status',       label:'◆ 状態回復きのみ' },
  { key:'berry_resist', label:'◆ 弱点半減きのみ' },
];

// 攻撃側ステータス補正（技の分類に応じて A/C を参照、不一致は減点）
function offensiveFactor(poke, mv) {
  if (!poke || !mv || !mv.cat || mv.cat === '変') return 1;
  const s = POKE_STATS[poke.id];
  if (!s) return 1;
  const [atk, spa] = s;
  const useStat = mv.cat === '物' ? atk : spa;
  const altStat = mv.cat === '物' ? spa : atk;
  let f = Math.max(0.5, Math.min(1.7, useStat / 100));
  // 不一致型（物理技なのに特殊型、など）は大幅減点
  if (useStat < altStat * 0.8) f *= 0.7;
  return f;
}

// 持ち物による攻撃側ダメージ補正（ポケチャン準拠）
// - でんきだま: ピカチュウ(id='33')限定で A/C ×2
// - タイプ強化アイテム18種: 該当タイプ技 ×1.2
// - その他（きのみ/こだわりスカーフ/補助系）: スコア補正なし（別途表示）
function itemFactor(poke, mv) {
  if (!poke?.item || !mv) return 1;
  const it = ITEM_MAP[poke.item];
  if (!it) return 1;
  if (poke.item === 'light_ball' && poke.id === '33' && (mv.cat === '物' || mv.cat === '特')) return 2.0;
  if (it.typeBoost && mv.type === it.typeBoost) return 1.2;
  return 1;
}

// 実効素早さ（こだわりスカーフ 1.5倍）
function effectiveSpeed(poke) {
  const base = poke?.spd || 0;
  if (poke?.item === 'choice_scarf') return Math.floor(base * 1.5);
  return base;
}

function ItemBadge({itemId, compact}) {
  const it = ITEM_MAP[itemId];
  if (!it || !it.id) return null;
  return (
    <span className="inline-flex items-center gap-0.5 text-[10px] font-bold px-1.5 py-0.5 rounded border bg-amber-50 text-amber-800 border-amber-300"
      title={it.desc ? `${it.jp}：${it.desc}` : it.jp}>
      <span>{it.emoji}</span>{!compact && <span>{it.short}</span>}
    </span>
  );
}

function BiasBadge({bias, compact}) {
  if (!bias) return null;
  const detail = bias.atk !== undefined
    ? ` A${bias.atk}/C${bias.spa}`
    : (bias.phys !== undefined ? ` 物${bias.phys}特${bias.spec}${bias.stat?`変${bias.stat}`:''}` : '');
  return (
    <span className={`inline-flex items-center gap-0.5 text-[10px] font-bold px-1.5 py-0.5 rounded border ${bias.cls}`}
      title={`${bias.jp}${detail}`}>
      <span>{bias.emoji}</span><span>{bias.jp}</span>
      {!compact && detail && <span className="opacity-70 font-normal">{detail}</span>}
    </span>
  );
}

// 画像を最大幅にリサイズしてJPEGに変換（API費用とレイテンシを節約）
async function resizeImageForApi(file, maxWidth = 1280) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      const scale = Math.min(1, maxWidth / img.width);
      const w = Math.max(1, Math.floor(img.width * scale));
      const h = Math.max(1, Math.floor(img.height * scale));
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      canvas.toBlob(b => {
        if (!b) return reject(new Error('画像変換に失敗しました'));
        resolve(new File([b], 'detect.jpg', { type: 'image/jpeg' }));
      }, 'image/jpeg', 0.85);
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('画像を読み込めません')); };
    img.src = url;
  });
}

async function fileToBase64Data(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result.split(',')[1]);
    r.onerror = () => reject(new Error('画像の読み込みに失敗しました'));
    r.readAsDataURL(file);
  });
}

// Gemini Vision に敵チーム6体の日本語名を問い合わせる
async function detectPokemonFromImage(apiKey, base64, mime) {
  const rosterList = ROSTER.map(r => r.jp).join('／');
  const prompt = `この画像は「ポケモンチャンピオンズ」というゲームの対戦選出画面です。画像に映っている敵ポケモン最大6体の名前を、画面の表示順に、日本語で正確に列挙してください。

ルール:
- メガ進化は「メガXXX」、アローラのすがたは「アローラXXX」、ガラルは「ガラルXXX」、ヒスイは「ヒスイXXX」、パルデアは「パルデアXXX」と表記してください。
- ロトムのフォルム（ヒート/ウォッシュ/フロスト/スピン/カット）やポワルン（たいよう/あまみず/ゆきぐも）など、フォルムチェンジがある場合は該当フォルム名を含めてください。
- 以下は「ポケモンチャンピオンズ」参戦リストです。出力はこのリストの表記に合わせてください（完全一致）:
${rosterList}
- 画像から読み取れた範囲だけを返し、推測は避けてください。識別不能なら "不明" と返してください。
- 必ず配列に最大6件まで入れてください。

JSON形式で返答してください: {"pokemon": ["名前1", "名前2", "名前3", "名前4", "名前5", "名前6"]}`;

  const resp = await fetch(GEMINI_URL(apiKey), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts: [
        { text: prompt },
        { inline_data: { mime_type: mime, data: base64 } },
      ]}],
      generationConfig: {
        temperature: 0.1,
        responseMimeType: 'application/json',
      },
    }),
  });
  if (!resp.ok) {
    let msg = `APIエラー (HTTP ${resp.status})`;
    try { const j = await resp.json(); if (j.error?.message) msg = j.error.message; } catch(e) {}
    throw new Error(msg);
  }
  const json = await resp.json();
  const text = json.candidates?.[0]?.content?.parts?.[0]?.text || '';
  if (!text) throw new Error('空のレスポンスが返されました');
  let parsed;
  try { parsed = JSON.parse(text); } catch(e) { throw new Error('JSONパース失敗: ' + text.slice(0, 120)); }
  return Array.isArray(parsed.pokemon) ? parsed.pokemon : [];
}

// ROSTER から日本語名でポケモンを検索（厳密→カッコ無視→部分一致）
function findRosterByJpName(name) {
  if (!name) return null;
  const n = String(name).trim();
  if (!n || n === '不明' || n === '不明なポケモン') return null;
  // 完全一致
  const exact = ROSTER.find(r => r.jp === n);
  if (exact) return exact;
  // カッコを除去して比較
  const strip = s => s.replace(/[（(].+?[)）]/g, '').trim();
  const nStripped = strip(n);
  const strippedExact = ROSTER.find(r => strip(r.jp) === nStripped);
  if (strippedExact) return strippedExact;
  // メガ/アローラ等の接頭辞マッチ
  const prefixes = ['メガ', 'アローラ', 'ガラル', 'ヒスイ', 'パルデア'];
  for (const pre of prefixes) {
    if (n.startsWith(pre)) {
      const body = n.slice(pre.length);
      const withPre = ROSTER.find(r => r.jp === pre + body || strip(r.jp) === pre + strip(body));
      if (withPre) return withPre;
    }
  }
  // 部分一致（入力が長い場合は含有、短い場合は前方一致優先）
  const partial = ROSTER.find(r => r.jp.includes(nStripped)) ||
    ROSTER.find(r => nStripped.includes(strip(r.jp)));
  return partial || null;
}

function rosterToSlot(r) {

  return { id: r.id, dex: r.dex, jp: r.jp, types: r.types, img: r.img, spd: r.spd, name: r.jp };
}

const SUPABASE_URL = 'https://qaflnljielffykrsyhei.supabase.co';
const SUPABASE_KEY = 'sb_publishable_e5AzS0JMdJUpvIuluHFPDA_r2CSc39V';

async function sha256Hex(str) {
  const buf = new TextEncoder().encode(str);
  const hashBuf = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// 24文字の同期キー生成 (Base32風: 読み間違えにくい文字集合)
function generateSyncKey() {
  const chars = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789'; // 0,O,1,I,l除外
  const bytes = new Uint8Array(24);
  crypto.getRandomValues(bytes);
  return Array.from(bytes).map(b => chars[b % chars.length]).join('');
}

async function supabaseRequest(path, opts = {}) {
  const { method = 'GET', hash, body, prefer } = opts;
  const headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${SUPABASE_KEY}`,
    'Content-Type': 'application/json',
  };
  if (hash) headers['x-sync-hash'] = hash;
  if (prefer) headers['Prefer'] = prefer;
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    method,
    headers,
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) {
    const text = await res.text();
    throw new Error(`Supabase ${res.status}: ${text}`);
  }
  if (res.status === 204) return null;
  const txt = await res.text();
  return txt ? JSON.parse(txt) : null;
}

async function syncPull(syncKey) {
  const hash = await sha256Hex(syncKey);
  const rows = await supabaseRequest(`user_teams?sync_key_hash=eq.${hash}&select=teams_json,updated_at`, { hash });
  return rows?.[0] || null;
}

async function syncPush(syncKey, payload) {
  const hash = await sha256Hex(syncKey);
  const now = new Date().toISOString();
  const rows = await supabaseRequest('user_teams', {
    method: 'POST',
    hash,
    body: { sync_key_hash: hash, teams_json: payload, updated_at: now },
    prefer: 'resolution=merge-duplicates,return=representation',
  });
  return rows?.[0] || { updated_at: now };
}

function SyncSetupModal({ onClose, onConnect }) {
  const [mode, setMode] = useState('choose'); // choose | new | existing
  const [key, setKey] = useState('');
  const [newKey, setNewKey] = useState('');
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState('');
  const [copied, setCopied] = useState(false);

  const handleCreate = () => {
    const k = generateSyncKey();
    setNewKey(k);
    setMode('new');
  };

  const handleConnectNew = async () => {
    setBusy(true); setError('');
    try {
      await onConnect(newKey, 'new');
      onClose();
    } catch (e) {
      setError(e.message || '接続に失敗しました');
    }
    setBusy(false);
  };

  const handleConnectExisting = async () => {
    const trimmed = key.trim();
    if (trimmed.length < 8) { setError('同期キーが短すぎます'); return; }
    setBusy(true); setError('');
    try {
      await onConnect(trimmed, 'existing');
      onClose();
    } catch (e) {
      setError(e.message || '接続に失敗しました');
    }
    setBusy(false);
  };

  const copyKey = async () => {
    try {
      await navigator.clipboard.writeText(newKey);
      setCopied(true);
      setTimeout(()=>setCopied(false), 2000);
    } catch(e) {}
  };

  return (
    <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" onClick={onClose}>
      <div className="bg-white rounded-lg max-w-md w-full p-4 shadow-xl" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between mb-3">
          <h3 className="font-bold">☁️ PC/携帯の同期設定</h3>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600">✕</button>
        </div>

        {mode === 'choose' && (
          <div className="space-y-3">
            <p className="text-sm text-gray-600">
              同期キーを使ってPC版と携帯版でチームを共有できます。
            </p>
            <button onClick={handleCreate}
              className="w-full bg-blue-600 text-white rounded px-4 py-3 font-bold hover:bg-blue-700 text-sm">
              ＋ 新しい同期キーを発行
            </button>
            <button onClick={()=>setMode('existing')}
              className="w-full bg-white border border-blue-300 text-blue-700 rounded px-4 py-3 font-bold hover:bg-blue-50 text-sm">
              📥 既存の同期キーで接続
            </button>
          </div>
        )}

        {mode === 'new' && (
          <div className="space-y-3">
            <div className="bg-amber-50 border border-amber-300 rounded p-2.5 text-xs text-amber-900">
              ⚠️ このキーを他の端末にコピペして入力してください。キーを紛失するとデータにアクセスできなくなります。
            </div>
            <div className="relative">
              <div className="font-mono text-sm bg-gray-100 border rounded p-3 break-all select-all">
                {newKey}
              </div>
              <button onClick={copyKey}
                className="absolute top-1 right-1 text-xs bg-white border rounded px-2 py-1 hover:bg-gray-50">
                {copied ? '✓ コピー済' : '📋 コピー'}
              </button>
            </div>
            {error && <div className="text-xs text-red-600">{error}</div>}
            <div className="flex gap-2">
              <button onClick={()=>setMode('choose')} className="px-3 py-2 border rounded text-sm">戻る</button>

                className="flex-1 bg-blue-600 text-white rounded px-4 py-2 font-bold hover:bg-blue-700 disabled:opacity-50 text-sm">

// ====== UIパーツ ======
function TypeBadge({type, size='sm'}) {
  const sz = size === 'sm' ? 'w-12 h-auto' : 'w-16 h-auto';
  return <img src={typeIconUrl(type)} alt={TYPE_JP[type]} title={TYPE_JP[type]} className={`${sz} inline-block align-middle`} />;
}
function MultBadge({mult}) {
  if (mult === 0)    return <span className="text-xs px-1.5 py-0.5 rounded bg-gray-800 text-white font-bold">0×</span>;
  if (mult === 4)    return <span className="text-xs px-1.5 py-0.5 rounded bg-red-600 text-white font-bold">4×</span>;
  if (mult === 2)    return <span className="text-xs px-1.5 py-0.5 rounded bg-orange-500 text-white font-bold">2×</span>;
  if (mult === 0.5)  return <span className="text-xs px-1.5 py-0.5 rounded bg-blue-400 text-white font-bold">½</span>;
  if (mult === 0.25) return <span className="text-xs px-1.5 py-0.5 rounded bg-blue-700 text-white font-bold">¼</span>;
  return <span className="text-xs px-1.5 py-0.5 rounded bg-gray-200 text-gray-700">1×</span>;
}

// ====== ポケモンピッカー ======
function PokemonPicker({onSelect, onClose}) {
  const [type1, setType1] = useState('');
  const [type2, setType2] = useState('');
  const [search, setSearch] = useState('');

  const results = useMemo(() => {
    let list = ROSTER;
    if (type1) list = list.filter(p => p.types.includes(type1));
    if (type2 && type2 !== type1) list = list.filter(p => p.types.includes(type2));
    return list;
  }, [type1, type2]);

  const filtered = useMemo(() => {
    if (!search) return results;
    const s = search.toLowerCase();
    return results.filter(p => p.jp.includes(search) || p.jp.toLowerCase().includes(s));
  }, [results, search]);

  const pick = (p) => {
    onSelect({ id:p.id, dex:p.dex, jp:p.jp, types:p.types, img:p.img, spd:p.spd, name:p.jp });
  };

  return (
    <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-2 sm:p-4" onClick={onClose}>
      <div className="bg-white rounded-lg w-full max-w-4xl max-h-[95vh] flex flex-col" onClick={e=>e.stopPropagation()}>
        <div className="p-3 border-b flex items-center justify-between">
          <h3 className="text-base sm:text-lg font-bold">ポケモン選択</h3>
          <button onClick={onClose} className="p-1 hover:bg-gray-100 rounded"><IconX className="w-5 h-5" /></button>
        </div>
        <div className="p-3 border-b space-y-2">
          <div className="flex items-center justify-between">
            <div className="text-xs font-bold text-gray-600">タイプを選択（1→2の順に最大2つ）</div>
            {(type1 || type2) && (
              <button onClick={()=>{setType1('');setType2('');}} className="text-xs text-blue-600 hover:underline">クリア</button>
            )}
          </div>
          <div className="grid grid-cols-3 sm:grid-cols-6 gap-2 justify-items-center">
            {TYPES.map(t => {
              const sel = type1===t ? 1 : (type2===t ? 2 : 0);
              const onClick = () => {
                if (type1 === t) { setType1(type2); setType2(''); return; }
                if (type2 === t) { setType2(''); return; }
                if (!type1) setType1(t);
                else if (!type2) setType2(t);
                else { setType1(type2); setType2(t); }
              };
              return <TypeIconButton key={t} type={t} selectedNum={sel||null} onClick={onClick} />;
            })}
          </div>
          <input type="text" placeholder="名前で絞り込み（任意）" value={search} onChange={e=>setSearch(e.target.value)}
            className="w-full border rounded px-2 py-1 text-sm" />
          <div className="text-xs text-gray-500">{`${filtered.length}/${ROSTER.length}件`}{!type1 && ' (全ポケモン表示中)'}</div>
        </div>
        <div className="flex-1 overflow-auto p-3">
          <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 gap-2">
            {filtered.map(p => (
              <button key={p.id} onClick={()=>pick(p)} className="border rounded p-2 hover:bg-blue-50 hover:border-blue-400 transition text-left">
                <img src={gwImgUrl(p.img)} alt="" loading="lazy" className="w-full aspect-square object-contain bg-gray-50 rounded"
                  onError={e => { e.target.src = artworkUrl(p.dex); }} />
                <div className="text-xs font-medium text-center mt-1 truncate">{p.jp}</div>
                <div className="text-[10px] text-gray-400 text-center">#{String(p.dex).padStart(4,'0')} · S{p.spd}</div>
              </button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ====== 自軍登録 ======
function TeamSetup({team, setTeam}) {
  const [pickerIdx, setPickerIdx] = useState(null);

  // 古い保存データにspd/img等が欠けている場合、ROSTERから補完
  useEffect(() => {
    let changed = false;
    const fixed = team.map(p => {
      if (!p) return p;
      const r = ROSTER.find(x => x.id === p.id);
      if (!r) return p;
      const patched = {...p};
      if (p.spd === undefined && r.spd !== undefined) { patched.spd = r.spd; changed = true; }
      if (!p.img && r.img) { patched.img = r.img; changed = true; }
      if (!p.dex && r.dex) { patched.dex = r.dex; changed = true; }
      return patched;
    });
    if (changed) setTeam(fixed);
  }, []);

  const setSlot = (idx, poke) => {
    const copy = [...team];
    copy[idx] = {
      ...poke,
      moves: copy[idx]?.moves || [{name:'',type:''},{name:'',type:''},{name:'',type:''},{name:'',type:''}],
      item: copy[idx]?.item || '',
    };
    setTeam(copy);
    setPickerIdx(null);
  };
  const setMove = (pIdx, mIdx, field, value) => {
    const copy = [...team];
    copy[pIdx].moves[mIdx] = { ...copy[pIdx].moves[mIdx], [field]: value };
    setTeam(copy);
  };
  const setItem = (idx, item) => {
    const copy = [...team];
    copy[idx] = { ...copy[idx], item };
    setTeam(copy);
  };
  const clearSlot = idx => {
    const copy = [...team];
    copy[idx] = null;
    setTeam(copy);
  };

  return (
    <div className="space-y-3">
      <div className="text-sm text-gray-600">自軍6体と各4技を登録。技はタイプだけ合っていればOK（弱点判定に使用）。</div>
      {team.some(Boolean) && (
        <div className="bg-white border rounded-lg p-2">

          <div className="flex flex-wrap gap-1.5">
            {team.filter(Boolean).slice().sort((a,b)=>effectiveSpeed(b)-effectiveSpeed(a)).map((p,i) => {
              const eff = effectiveSpeed(p);
              const boosted = p.item === 'choice_scarf';
              return (
                <div key={p.id+'-'+i} className="flex items-center gap-1 bg-gray-50 rounded px-1.5 py-0.5">
                  <img src={pokeImg(p)} onError={e=>{e.target.src=pokeImgFallback(p)}} className="w-6 h-6 object-contain" />
                  <span className="text-[10px] truncate max-w-[90px]">{p.jp}</span>
                  <span className={`text-[11px] font-bold ${boosted?'text-purple-700':'text-blue-700'}`}>
                    S{eff}{boosted && <span className="text-[9px] opacity-70">(×1.5)</span>}
                  </span>
                </div>
              );
            })}
          </div>
          <div className="text-[10px] text-gray-500 mt-1">
            平均 S{Math.round(team.filter(Boolean).reduce((s,p)=>s+effectiveSpeed(p),0)/Math.max(1,team.filter(Boolean).length))}
            ・最速 S{Math.max(0,...team.filter(Boolean).map(p=>effectiveSpeed(p)))}
            ・最遅 S{team.filter(Boolean).length ? Math.min(...team.filter(Boolean).map(p=>effectiveSpeed(p))) : 0}
          </div>
        </div>
      )}
      <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
        {[0,1,2,3,4,5].map(i => {
          const p = team[i];
          return (
            <div key={i} className="border rounded-lg p-3 bg-white">
              <div className="flex gap-3 items-start">
                {p ? (
                  <>
                    <img src={pokeImg(p)} alt="" className="w-20 h-20 object-contain bg-gray-50 rounded flex-shrink-0"
                      onError={e=>{e.target.src=pokeImgFallback(p)}} />
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center justify-between">
                        <div className="font-bold truncate">{p.jp}</div>
                        <div className="flex gap-1 items-center">
                          <a
                            href={gwDetailUrl(p.id)}
                            target="_blank"

                            title="GameWithで詳細を見る"
                          >🔍</a>
                          <button onClick={()=>clearSlot(i)} className="text-red-500 hover:bg-red-50 p-1 rounded"><IconTrash className="w-4 h-4" /></button>
                        </div>
                      </div>
                      <div className="flex gap-1 mt-1 flex-wrap items-center">

// ====== 相手分析 ======
function OpponentSlot({idx, opp, userTeam, onPick, onClear}) {
  if (!opp) {
    return (
      <button onClick={onPick} className="border-2 border-dashed rounded-lg p-6 text-gray-400 hover:border-blue-400 hover:text-blue-600 flex flex-col items-center justify-center gap-2 min-h-[160px]">
        <IconPlus className="w-6 h-6" />
        <span className="text-sm font-bold">相手{idx+1}を追加</span>
      </button>
    );
  }

  const weak = allWeaknesses(opp.types);
  const weak4 = TYPES.filter(t => weak[t] === 4);
  const weak2 = TYPES.filter(t => weak[t] === 2);
  const resist = TYPES.filter(t => weak[t] < 1 && weak[t] > 0);
  const immune = TYPES.filter(t => weak[t] === 0);

  const hits = [];
  userTeam.forEach((up, pi) => {
    if (!up) return;
    up.moves?.forEach(mv => {
      if (!mv.type || mv.cat === '変') return;
      const m = defensiveMult(mv.type, opp.types);
      if (m >= 2) {
        const stab = up.types.includes(mv.type);
        const offF = offensiveFactor(up, mv);
        const itemF = itemFactor(up, mv);
        const score = m * (stab ? 1.5 : 1) * offF * itemF;
        hits.push({
          userIdx:pi, userJp:up.jp,
          moveName: mv.name || '(無名)', moveType: mv.type, moveCat: mv.cat,
          mult: m, stab, offF, itemF, score,
          userItem: up.item || '',
          userStats: POKE_STATS[up.id] || null,
        });
      }
    });
  });
  hits.sort((a,b)=>b.score - a.score);

  // 素早さ比較（スカーフ込み実効素早さで判定）
  const oppSpd = effectiveSpeed(opp);
  const userFaster = userTeam.filter(u => u && effectiveSpeed(u) > oppSpd).length;
  const userTeamFilled = userTeam.filter(Boolean).length;

  return (
    <div className="border rounded-lg p-3 bg-white">
      <div className="flex gap-3 items-start">
        <img src={pokeImg(opp)} alt="" className="w-20 h-20 object-contain bg-gray-50 rounded flex-shrink-0"
          onError={e=>{e.target.src=pokeImgFallback(opp)}} />
        <div className="flex-1 min-w-0">
          <div className="flex items-center justify-between">
            <div className="font-bold truncate">{opp.jp}</div>
            <div className="flex gap-1 items-center">
              <a
                href={gwDetailUrl(opp.id)}
                target="_blank"
                rel="noopener noreferrer"
                className="text-xs text-gray-500 hover:text-blue-600 hover:bg-blue-50 px-1.5 py-0.5 rounded"
                title="GameWithで詳細を見る"
              >🔍</a>
              <button onClick={onPick} className="text-xs text-blue-600 hover:underline">変更</button>
              <button onClick={onClear} className="text-red-500 hover:bg-red-50 p-1 rounded"><IconX className="w-4 h-4" /></button>
            </div>
          </div>
          <div className="flex gap-1 mt-1 flex-wrap items-center">
            {opp.types.map(t => <TypeBadge key={t} type={t} />)}
            {opp.spd !== undefined && <span className="text-[10px] font-bold text-gray-600 bg-gray-100 px-1.5 py-0.5 rounded">S{opp.spd}</span>}
            <BiasBadge bias={classifyByStats(opp.id)} />
            {userTeamFilled > 0 && (
              <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${userFaster>=Math.ceil(userTeamFilled/2)?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}`}>
                先攻{userFaster}/{userTeamFilled}
              </span>
            )}
          </div>
        </div>
      </div>

      <div className="mt-3 space-y-1.5 text-xs">
        {weak4.length > 0 && (
          <div className="flex gap-1 flex-wrap items-center">
            <MultBadge mult={4} />
            {weak4.map(t => <TypeBadge key={t} type={t} />)}
          </div>
        )}
        {weak2.length > 0 && (
          <div className="flex gap-1 flex-wrap items-center">
            <MultBadge mult={2} />
            {weak2.map(t => <TypeBadge key={t} type={t} />)}
          </div>
        )}
        {resist.length > 0 && (
          <div className="flex gap-1 flex-wrap items-center opacity-70">
            <MultBadge mult={0.5} />
            {resist.map(t => <TypeBadge key={t} type={t} />)}
          </div>
        )}
        {immune.length > 0 && (
          <div className="flex gap-1 flex-wrap items-center opacity-70">
            <MultBadge mult={0} />
            {immune.map(t => <TypeBadge key={t} type={t} />)}
          </div>
        )}
      </div>

      <div className="mt-3 border-t pt-2">
        <div className="text-xs font-bold text-gray-600 mb-1.5 flex items-center gap-1">
          <IconSwords className="w-3 h-3" /> 自軍の抜群技
        </div>
        {hits.length === 0 ? (
          <div className="text-xs text-gray-400">抜群を取れる登録技なし</div>
        ) : (
          <div className="space-y-1">
            {hits.map((h, i) => {
              const scoreCls = h.score >= 6 ? 'bg-red-600 text-white'
                : h.score >= 4 ? 'bg-red-500 text-white'
                : h.score >= 3 ? 'bg-orange-500 text-white'
                : 'bg-gray-200 text-gray-700';
              const it = ITEM_MAP[h.userItem];
              const showItemBoost = (h.itemF && h.itemF !== 1);
              const statLabel = h.moveCat === '物' ? 'A' : (h.moveCat === '特' ? 'C' : '');
              const statVal = h.userStats && h.moveCat ? (h.moveCat === '物' ? h.userStats[0] : h.userStats[1]) : null;
              return (
                <div key={i} className="flex items-center gap-1 text-xs flex-wrap">
                  <span className={`text-[10px] font-bold px-1 py-0.5 rounded ${scoreCls}`} title={`総合スコア ${h.score.toFixed(2)}`}>
                    ×{h.score.toFixed(1)}
                  </span>
                  <MultBadge mult={h.mult} />
                  {h.stab && <span className="text-[9px] font-bold px-1 py-0.5 rounded bg-yellow-300 text-yellow-900">一致</span>}
                  <TypeBadge type={h.moveType} />
                  {h.moveCat && (
                    <span className={`text-[9px] font-bold px-1 py-0.5 rounded ${MOVE_CAT_CLS[h.moveCat]}`}>{h.moveCat}</span>
                  )}
                  {statVal !== null && (
                    <span className={`text-[9px] font-bold px-1 py-0.5 rounded ${h.offF < 0.9 ? 'bg-gray-200 text-gray-500' : (h.offF >= 1.3 ? 'bg-emerald-100 text-emerald-700' : 'bg-gray-100 text-gray-700')}`}
                      title={`攻撃側補正 ×${h.offF.toFixed(2)}`}>
                      {statLabel}{statVal}
                    </span>
                  )}
                  {showItemBoost && it && (
                    <span className="text-[9px] font-bold px-1 py-0.5 rounded bg-amber-100 text-amber-800 border border-amber-300"
                      title={`${it.jp} ×${h.itemF}`}>
                      {it.emoji}×{h.itemF}
                    </span>
                  )}
                  <span className="truncate flex-1 min-w-0">
                    <span className="font-medium">{h.userJp}</span>
                    <span className="text-gray-500"> / {h.moveName}</span>
                  </span>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// ====== 分析パネル ======
function AnalysisPanel({userTeam, opponents}) {
  const [open, setOpen] = useState(true);
  const users = userTeam.filter(Boolean);
  const opps = opponents.filter(Boolean);
  const ready = users.length >= 1 && opps.length >= 1;

  // 推奨選出3体（全探索）
  const trio = useMemo(() => {
    if (users.length < 3 || opps.length === 0) return null;
    const combos = combinations(users, 3);
    let best = null;
    for (const combo of combos) {
      let covered = 0, scoreSum = 0;
      for (const opp of opps) {
        const hits = combo.map(u => bestHitScore(u, opp).score);
        const mx = Math.max(...hits);
        if (mx >= 2) covered++;
        scoreSum += mx;
      }
      if (!best || covered > best.covered || (covered===best.covered && scoreSum > best.scoreSum)) {
        best = {combo, covered, scoreSum};
      }
    }
    return best;
  }, [userTeam, opponents]);

  // マトリクス
  const matrix = useMemo(() => {
    return users.map(u => opps.map(o => bestHitScore(u, o)));
  }, [userTeam, opponents]);

  // 共通弱点ランキング
  const commonWeak = useMemo(() => {
    return TYPES.map(atk => {
      let w2=0, w4=0, imm=0;
      opps.forEach(o => {
        const m = defensiveMult(atk, o.types);
        if (m === 4) w4++;
        else if (m === 2) w2++;
        if (m === 0) imm++;
      });
      return {type:atk, w2, w4, imm, effective: w2 + w4*2};
    }).filter(x=>x.w2>0||x.w4>0).sort((a,b)=>b.effective-a.effective || b.w4-a.w4);
  }, [opponents]);

  // 自軍の穴（全員が弱点 >1 のタイプ）
  const holes = useMemo(() => {
    if (users.length === 0) return [];
    return TYPES.filter(atk => users.every(u => defensiveMult(atk, u.types) > 1));
  }, [userTeam]);

  // カバー率
  const coverage = useMemo(() => {
    const moveTypes = new Set();
    users.forEach(u => (u.moves||[]).forEach(m => m.type && moveTypes.add(m.type)));
    let covered = 0;
    TYPES.forEach(def => {
      const canHit = [...moveTypes].some(atk => defensiveMult(atk, [def]) >= 2);
      if (canHit) covered++;
    });
    return {covered, total:18, moveTypes:[...moveTypes]};
  }, [userTeam]);

  if (!ready) return null;

  const scoreColor = (s) => {
    if (s >= 6) return 'bg-red-600 text-white';
    if (s >= 4) return 'bg-red-500 text-white';
    if (s >= 2.5) return 'bg-orange-500 text-white';
    if (s >= 1) return 'bg-gray-200 text-gray-700';
    if (s > 0) return 'bg-blue-400 text-white';
    return 'bg-gray-800 text-white';
  };
  const fmt = s => s===0?'0':(s>=1?(s%1===0?s.toString():s.toFixed(1)):(s.toString().replace('0.','.')));

  return (
    <div className="bg-white border rounded-lg mb-3">
      <button onClick={()=>setOpen(!open)} className="w-full flex items-center justify-between p-3 hover:bg-gray-50">
        <span className="text-sm font-bold text-gray-700">📊 分析パネル {open?'▼':'▶'}</span>
        <span className="text-xs text-gray-400">自軍{users.length}体 / 相手{opps.length}体</span>
      </button>
      {open && (
        <div className="border-t p-3 space-y-4">
          {/* 推奨選出3体 */}
          {users.length >= 3 && trio && (
            <div>
              <div className="text-xs font-bold text-gray-600 mb-1.5">
                ⭐ 推奨選出3体（{trio.covered}/{opps.length}体抑制・合計スコア{trio.scoreSum.toFixed(1)}）
              </div>
              <div className="flex gap-2 flex-wrap">
                {trio.combo.map((u,i) => (
                  <div key={i} className="border rounded p-1.5 bg-blue-50 flex items-center gap-1.5">
                    <img src={pokeImg(u)} onError={e=>{e.target.src=pokeImgFallback(u)}} className="w-10 h-10 object-contain" />
                    <div className="min-w-0">
                      <div className="text-xs font-bold truncate max-w-[100px]">{u.jp}</div>
                      <div className="flex items-center gap-1 mt-0.5">
                        <span className="text-[9px] text-gray-500">S{effectiveSpeed(u)}</span>
                        <ItemBadge itemId={u.item} compact />
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* マトリクス 6x6 */}
          <div>
            <div className="text-xs font-bold text-gray-600 mb-1.5">🔲 相性マトリクス（一致+AC種族値+持ち物込み総合スコア）</div>
            <div className="overflow-x-auto">
              <table className="text-xs border-collapse">
                <thead>
                  <tr>
                    <th className="p-1 border bg-gray-50"></th>
                    {opps.map((o,i) => (
                      <th key={i} className="p-1 border bg-gray-50 text-center">
                        <img src={pokeImg(o)} onError={e=>{e.target.src=pokeImgFallback(o)}} className="w-8 h-8 object-contain mx-auto" />
                        <div className="text-[9px] truncate max-w-[60px]">{o.jp}</div>
                        <div className="text-[9px] text-gray-500">S{effectiveSpeed(o)||'?'}</div>
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {users.map((u,ui) => (
                    <tr key={ui}>
                      <td className="p-1 border bg-gray-50">
                        <div className="flex items-center gap-1">
                          <img src={pokeImg(u)} onError={e=>{e.target.src=pokeImgFallback(u)}} className="w-8 h-8 object-contain" />
                          <div className="min-w-0">
                            <div className="text-[10px] truncate max-w-[70px]">{u.jp}</div>
                            <div className="flex items-center gap-0.5">
                              <span className="text-[9px] text-gray-500">S{effectiveSpeed(u)||'?'}</span>
                              {u.item && ITEM_MAP[u.item] && <span className="text-[9px]" title={ITEM_MAP[u.item].jp}>{ITEM_MAP[u.item].emoji}</span>}
                            </div>
                          </div>
                        </div>
                      </td>
                      {opps.map((o,oi) => {
                        const h = matrix[ui][oi];
                        const us = effectiveSpeed(u), os = effectiveSpeed(o);
                        const spdMark = us > os ? '先' : us < os ? '後' : '=';
                        const spdCls = us > os ? 'text-green-700 bg-green-100' : us < os ? 'text-red-700 bg-red-100' : 'text-gray-500 bg-gray-100';
                        const tip = h.mv
                          ? `${h.mv.name||'(無名)'} (${h.mv.cat||'?'})\n倍率×${h.mult} × 一致${h.stab?'1.5':'1'} × AC補正${h.offF.toFixed(2)} × 持ち物${h.itemF.toFixed(2)}\n= ${h.score.toFixed(2)}`
                          : '有効打なし';
                        return (
                          <td key={oi} className={`p-1 border text-center font-bold ${scoreColor(h.score)}`} title={tip}>
                            <div>{fmt(h.score)}×</div>
                            <div className="flex gap-0.5 justify-center items-center text-[8px] font-normal mt-0.5">
                              {h.stab && <span className="px-0.5 rounded bg-yellow-300 text-yellow-900">一</span>}
                              {h.itemF > 1 && <span className="px-0.5 rounded bg-amber-200 text-amber-900">持</span>}
                              <span className={`px-0.5 rounded ${spdCls}`}>{spdMark}</span>
                            </div>
                          </td>
                        );
                      })}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          {/* 相手パ共通弱点 */}
          {commonWeak.length > 0 && (
            <div>
              <div className="text-xs font-bold text-gray-600 mb-1.5">🎯 相手パ共通弱点ランキング</div>
              <div className="space-y-1">
                {commonWeak.slice(0,8).map((w,i) => (
                  <div key={i} className="flex items-center gap-2 text-xs">
                    <span className="w-5 text-gray-400">{i+1}.</span>
                    <TypeBadge type={w.type} />
                    <span className="text-gray-600">
                      {w.w4>0 && <span className="text-red-600 font-bold">4×が{w.w4}体 </span>}
                      {w.w2>0 && <span className="text-orange-600">2×が{w.w2}体</span>}
                      {w.imm>0 && <span className="text-gray-400 ml-1">（無効{w.imm}体）</span>}
                    </span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* 自軍の穴 */}
          <div>
            <div className="text-xs font-bold text-gray-600 mb-1.5">⚠ 自軍の穴（全員が弱点のタイプ）</div>
            {holes.length === 0 ? (
              <div className="text-xs text-green-600">穴なし ✓</div>
            ) : (
              <div className="flex gap-1 flex-wrap">
                {holes.map(t => <TypeBadge key={t} type={t} size="lg" />)}
              </div>
            )}
          </div>

          {/* カバー率 */}
          <div>
            <div className="text-xs font-bold text-gray-600 mb-1.5">
              📈 攻撃カバー率 {coverage.covered}/{coverage.total}タイプ（{Math.round(coverage.covered/coverage.total*100)}%）
            </div>
            <div className="flex gap-1 flex-wrap">
              {TYPES.map(def => {
                const canHit = coverage.moveTypes.some(atk => defensiveMult(atk, [def]) >= 2);
                return (
                  <div key={def} className={`flex items-center gap-0.5 px-1 py-0.5 rounded ${canHit?'bg-green-50':'bg-gray-100 opacity-50'}`}>
                    <TypeBadge type={def} />
                    <span className="text-[9px] font-bold">{canHit?'○':'×'}</span>
                  </div>
                );
              })}
            </div>
            <div className="text-[10px] text-gray-500 mt-1">登録技タイプ: {coverage.moveTypes.length>0 ? coverage.moveTypes.map(t=>TYPE_JP[t]).join('・') : 'なし'}</div>
          </div>
        </div>
      )}
    </div>
  );
}

// ====== 写真検出モーダル ======
function PhotoDetectModal({onApply, onClose}) {
  const [apiKey, setApiKey] = useState('');
  const [showKeyEditor, setShowKeyEditor] = useState(false);
  const [keyDraft, setKeyDraft] = useState('');
  const [file, setFile] = useState(null);
  const [previewUrl, setPreviewUrl] = useState('');
  const [detecting, setDetecting] = useState(false);
  const [error, setError] = useState('');
  const [rawNames, setRawNames] = useState([]);
  const [slots, setSlots] = useState([null,null,null,null,null,null]);
  const [overrideIdx, setOverrideIdx] = useState(null);
  const fileInputRef = useRef(null);

  // 初回: localStorage からAPIキー読み込み
  useEffect(() => {
    try {
      const saved = localStorage.getItem(GEMINI_KEY_STORAGE) || '';
      setApiKey(saved);
      if (!saved) setShowKeyEditor(true);
    } catch(e) {}
  }, []);

  // プレビューURLのクリーンアップ
  useEffect(() => {
    return () => { if (previewUrl) URL.revokeObjectURL(previewUrl); };
  }, [previewUrl]);

  const handleSaveKey = () => {
    const k = keyDraft.trim();
    if (!k) return;
    try { localStorage.setItem(GEMINI_KEY_STORAGE, k); } catch(e) {}
    setApiKey(k);
    setKeyDraft('');
    setShowKeyEditor(false);
    setError('');
  };
  const handleClearKey = () => {
    try { localStorage.removeItem(GEMINI_KEY_STORAGE); } catch(e) {}
    setApiKey('');
    setShowKeyEditor(true);
  };

  const handleFileChange = async (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    setError('');
    setRawNames([]);
    setSlots([null,null,null,null,null,null]);
    try {
      const resized = await resizeImageForApi(f, 1280);
      if (previewUrl) URL.revokeObjectURL(previewUrl);
      setPreviewUrl(URL.createObjectURL(resized));
      setFile(resized);
    } catch(err) {
      setError(err.message || '画像の処理に失敗しました');
    }
  };

  const handleDetect = async () => {
    if (!apiKey) { setError('Gemini APIキーを入力してください'); setShowKeyEditor(true); return; }
    if (!file) { setError('画像を選択してください'); return; }
    setError('');
    setDetecting(true);
    try {
      const base64 = await fileToBase64Data(file);
      const names = await detectPokemonFromImage(apiKey, base64, file.type || 'image/jpeg');
      const trimmed = names.slice(0, 6);
      const matched = trimmed.map(n => {
        const r = findRosterByJpName(n);
        return r ? rosterToSlot(r) : null;
      });
      // 6スロットに揃える
      while (matched.length < 6) matched.push(null);
      setRawNames(trimmed);
      setSlots(matched);
    } catch(err) {
      setError(err.message || 'AI検出に失敗しました');
    } finally {
      setDetecting(false);
    }
  };

  const handleSlotChange = (idx, poke) => {
    const copy = [...slots];
    copy[idx] = poke;
    setSlots(copy);
    setOverrideIdx(null);
  };
  const handleSlotClear = (idx) => {
    const copy = [...slots];
    copy[idx] = null;
    setSlots(copy);
  };

  const hasAnyResult = slots.some(Boolean);
  const canApply = hasAnyResult;

  return (
    <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-2 sm:p-4" onClick={onClose}>
      <div className="bg-white rounded-lg w-full max-w-3xl max-h-[95vh] flex flex-col" onClick={e=>e.stopPropagation()}>
        <div className="p-3 border-b flex items-center justify-between">
          <h3 className="text-base sm:text-lg font-bold">📷 写真から相手チーム検出</h3>
          <button onClick={onClose} className="p-1 hover:bg-gray-100 rounded"><IconX className="w-5 h-5" /></button>
        </div>

        <div className="flex-1 overflow-auto p-3 space-y-3">
          {/* APIキー管理 */}
          <div className="border rounded-lg bg-gray-50 p-2.5">
            <div className="flex items-center justify-between mb-1">
              <div className="text-xs font-bold text-gray-700">Gemini APIキー</div>
              {apiKey && !showKeyEditor && (
                <div className="flex gap-1.5">
                  <button onClick={()=>{setKeyDraft(apiKey); setShowKeyEditor(true);}}
                    className="text-[11px] text-blue-600 hover:underline">変更</button>
                  <button onClick={handleClearKey}
                    className="text-[11px] text-red-600 hover:underline">削除</button>
                </div>
              )}
            </div>
            {apiKey && !showKeyEditor ? (
              <div className="text-[11px] text-gray-600 font-mono">
                保存済み: ****{apiKey.slice(-6)} <span className="text-gray-400">(この端末にのみ保存)</span>
              </div>
            ) : (
              <div className="space-y-1.5">
                <input
                  type="password"
                  value={keyDraft}
                  onChange={e=>setKeyDraft(e.target.value)}
                  placeholder="AIza..."
                  className="w-full border rounded px-2 py-1 text-sm font-mono"
                />
                <div className="flex items-center gap-2">
                  <button onClick={handleSaveKey} disabled={!keyDraft.trim()}
                    className="text-xs font-bold px-2.5 py-1 rounded bg-blue-600 text-white disabled:bg-gray-300">
                    保存
                  </button>
                  {apiKey && (
                    <button onClick={()=>{setShowKeyEditor(false); setKeyDraft('');}}
                      className="text-xs px-2.5 py-1 rounded border">キャンセル</button>
                  )}
                  <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener"
                    className="text-[11px] text-blue-600 hover:underline ml-auto">APIキー取得 →</a>
                </div>
                <div className="text-[10px] text-gray-500">※ この端末のみに保存されます（同期対象外）</div>
              </div>
            )}
          </div>

          {/* 画像アップロード */}
          <div className="border rounded-lg p-2.5 space-y-2">
            <div className="text-xs font-bold text-gray-700">選出画面のスクショ / 写真</div>
            <div className="flex flex-wrap items-center gap-2">
              <input
                ref={fileInputRef}
                type="file"
                accept="image/*"
                capture="environment"
                onChange={handleFileChange}
                className="text-xs"
              />
              {file && (
                <span className="text-[11px] text-gray-500">
                  {Math.round(file.size/1024)}KB
                </span>
              )}
            </div>
            {previewUrl && (
              <div className="mt-1">
                <img src={previewUrl} alt="プレビュー" className="max-h-48 rounded border" />
              </div>
            )}
            <button
              onClick={handleDetect}
              disabled={!file || detecting || !apiKey}
              className="w-full text-sm font-bold px-3 py-2 rounded bg-emerald-600 text-white disabled:bg-gray-300"
            >
              {detecting ? '🔍 AI検出中...' : '✨ AIで検出する'}
            </button>
            {error && (
              <div className="text-xs text-red-600 bg-red-50 border border-red-200 rounded p-2">
                {error}
              </div>
            )}
          </div>

          {/* 検出結果 */}
          {(rawNames.length > 0 || hasAnyResult) && (
            <div className="border rounded-lg p-2.5 space-y-2">
              <div className="flex items-center justify-between">
                <div className="text-xs font-bold text-gray-700">検出結果 (必要に応じて修正)</div>
                <div className="text-[10px] text-gray-500">
                  マッチ {slots.filter(Boolean).length}/{rawNames.length || 6}
                </div>
              </div>
              <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
                {[0,1,2,3,4,5].map(i => {
                  const s = slots[i];
                  const raw = rawNames[i];
                  return (
                    <div key={i} className="border rounded p-2 bg-gray-50">
                      <div className="text-[10px] text-gray-500 mb-1">#{i+1}</div>
                      {s ? (
                        <div className="flex items-center gap-2">
                          <img src={gwImgUrl(s.img)} alt="" className="w-10 h-10 object-contain bg-white rounded"
                            onError={e => { e.target.src = artworkUrl(s.dex); }} />
                          <div className="flex-1 min-w-0">
                            <div className="text-xs font-bold truncate">{s.jp}</div>
                            <div className="text-[10px] text-gray-500">S{s.spd}</div>
                          </div>
                        </div>
                      ) : raw ? (
                        <div className="text-xs text-amber-700">
                          <div className="font-bold truncate">❓ {raw}</div>
                          <div className="text-[10px] text-gray-500">未マッチ</div>
                        </div>
                      ) : (
                        <div className="text-xs text-gray-400">（空き）</div>
                      )}
                      <div className="flex gap-1 mt-1.5">
                        <button onClick={()=>setOverrideIdx(i)}
                          className="flex-1 text-[11px] px-1.5 py-0.5 rounded border bg-white hover:bg-blue-50">
                          {s ? '変更' : '選択'}
                        </button>
                        {s && (
                          <button onClick={()=>handleSlotClear(i)}
                            className="text-[11px] px-1.5 py-0.5 rounded border bg-white text-red-600 hover:bg-red-50">
                            ✕
                          </button>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>

        <div className="p-3 border-t flex items-center justify-end gap-2">
          <button onClick={onClose} className="text-sm px-3 py-1.5 rounded border">キャンセル</button>
          <button
            onClick={()=>{ onApply(slots); onClose(); }}
            disabled={!canApply}
            className="text-sm font-bold px-3 py-1.5 rounded bg-blue-600 text-white disabled:bg-gray-300"
          >
            この結果を相手チームに反映
          </button>
        </div>

        {overrideIdx !== null && (
          <PokemonPicker
            onSelect={p => handleSlotChange(overrideIdx, p)}
            onClose={() => setOverrideIdx(null)}
          />
        )}
      </div>
    </div>
  );
}

function BattleView({opponents, setOpponents, userTeam}) {
  const [pickerIdx, setPickerIdx] = useState(null);
  const [confirmClear, setConfirmClear] = useState(false);
  const [showPhotoDetect, setShowPhotoDetect] = useState(false);

  const setSlot = (idx, poke) => {
    const copy = [...opponents];
    copy[idx] = poke;
    setOpponents(copy);
    setPickerIdx(null);
  };
  const clearSlot = idx => {
    const copy = [...opponents];
    copy[idx] = null;
    setOpponents(copy);
  };
  // 全クリア（2段階タップ方式: 1回目で赤くなり「もう一度タップで確定」、2秒で解除）
  const handleClearAll = () => {
    if (confirmClear) {
      setOpponents([null,null,null,null,null,null]);
      setConfirmClear(false);
    } else {
      setConfirmClear(true);
      setTimeout(() => setConfirmClear(false), 2000);
    }
  };

  const filled = opponents.filter(Boolean).length;
  const teamReady = userTeam.some(Boolean);

  // 相手構成の物理/特殊バイアス集計
  const biasSummary = useMemo(() => {
    const counts = { phys:0, spec:0, mixed:0 };
    opponents.forEach(o => {
      if (!o) return;
      const b = classifyByStats(o.id);
      if (b) counts[b.key] = (counts[b.key]||0) + 1;
    });
    return counts;
  }, [opponents]);

  return (
    <div className="space-y-3">
      {!teamReady && (
        <div className="bg-amber-50 border border-amber-300 rounded p-3 text-sm">
          <IconShield className="w-4 h-4 inline mr-1" />
          自軍が未登録です。上の「自軍登録」タブから先に登録してください（抜群技の判定に必要）。
        </div>
      )}
      <AnalysisPanel userTeam={userTeam} opponents={opponents} />
      {filled > 0 && (biasSummary.phys + biasSummary.spec + biasSummary.mixed > 0) && (
        <div className="bg-gray-50 border rounded-lg p-2 flex items-center gap-2 flex-wrap text-xs">
          <span className="font-bold text-gray-700">相手構成バイアス:</span>
          {biasSummary.phys > 0 && (
            <span className="inline-flex items-center gap-0.5 px-1.5 py-0.5 rounded border bg-red-100 text-red-700 border-red-300 font-bold">
              🥊物理 ×{biasSummary.phys}
            </span>
          )}
          {biasSummary.spec > 0 && (
            <span className="inline-flex items-center gap-0.5 px-1.5 py-0.5 rounded border bg-blue-100 text-blue-700 border-blue-300 font-bold">
              ✨特殊 ×{biasSummary.spec}
            </span>
          )}
          {biasSummary.mixed > 0 && (
            <span className="inline-flex items-center gap-0.5 px-1.5 py-0.5 rounded border bg-purple-100 text-purple-700 border-purple-300 font-bold">
              ⚔️両刀 ×{biasSummary.mixed}
            </span>
          )}
          {(() => {
            const max = Math.max(biasSummary.phys, biasSummary.spec);
            if (max >= 2 && biasSummary.phys !== biasSummary.spec) {
              const hint = biasSummary.phys > biasSummary.spec
                ? '→ 物理受けを残したい'
                : '→ 特殊受けを残したい';
              return <span className="text-gray-500 ml-1">{hint}</span>;
            }
            return null;
          })()}
        </div>
      )}
      <div className="flex items-center justify-between gap-2 flex-wrap">
        <div className="text-sm text-gray-600">相手パーティ ({filled}/6体)</div>
        <div className="flex items-center gap-1.5">
          <button
            onClick={()=>setShowPhotoDetect(true)}
            className="text-xs font-bold px-2.5 py-1 rounded border bg-white text-emerald-700 border-emerald-300 hover:bg-emerald-50"
            title="写真/スクショからAI検出"
          >
            📷 写真検出
          </button>
          {filled > 0 && (
            <button
              onClick={handleClearAll}
              className={`text-xs font-bold px-2.5 py-1 rounded border transition-colors ${
                confirmClear
                  ? 'bg-red-600 text-white border-red-600 animate-pulse'
                  : 'bg-white text-red-600 border-red-300 hover:bg-red-50'
              }`}
              title="相手の6スロットをすべてクリア"
            >
              {confirmClear ? '⚠ もう一度タップで確定' : '🗑️ 相手を全クリア'}
            </button>
          )}
        </div>
      </div>
      <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-3">
        {[0,1,2,3,4,5].map(i => (
          <OpponentSlot key={i} idx={i} opp={opponents[i]} userTeam={userTeam}
            onPick={()=>setPickerIdx(i)} onClear={()=>clearSlot(i)} />
        ))}
      </div>
      {pickerIdx !== null && (
        <PokemonPicker onSelect={p=>setSlot(pickerIdx, p)} onClose={()=>setPickerIdx(null)} />
      )}
      {showPhotoDetect && (
        <PhotoDetectModal
          onApply={newSlots => {
            // 既存のnullスロットは検出結果で埋め、検出結果がnullなら既存値を維持
            const merged = opponents.map((cur, i) => newSlots[i] || cur || null);
            // マッチした数が多い場合は全置換とみなす（5件以上検出された場合は完全置換）
            const detectedCount = newSlots.filter(Boolean).length;
            setOpponents(detectedCount >= 4 ? newSlots : merged);
          }}
          onClose={()=>setShowPhotoDetect(false)}
        />
      )}
    </div>
  );
}

// ====== チームスロット選択バー ======
function TeamSlotBar({teams, activeIdx, setActiveIdx, setTeams}) {
  const [editing, setEditing] = useState(false);
  const current = teams[activeIdx];
  const addTeam = () => {
    const newTeams = [...teams, {name:`チーム${teams.length+1}`, slots:[null,null,null,null,null,null]}];
    setTeams(newTeams);
    setActiveIdx(newTeams.length-1);
  };
  const delTeam = () => {
    if (teams.length <= 1) return;
    if (!confirm(`「${current.name}」を削除しますか？`)) return;
    const newTeams = teams.filter((_,i)=>i!==activeIdx);
    setTeams(newTeams);
    setActiveIdx(Math.max(0, activeIdx-1));
  };
  const dupTeam = () => {
    const copy = JSON.parse(JSON.stringify(current));
    copy.name = current.name + ' コピー';
    const newTeams = [...teams, copy];
    setTeams(newTeams);
    setActiveIdx(newTeams.length-1);
  };
  const renameTeam = (name) => {
    const newTeams = teams.map((t,i)=> i===activeIdx ? {...t, name} : t);
    setTeams(newTeams);
  };

  return (
    <div className="bg-white border rounded-lg p-2 mb-3">
      <div className="flex items-center gap-2 mb-2">
        <span className="text-xs font-bold text-gray-600 whitespace-nowrap">チーム</span>
        <div className="flex-1 overflow-x-auto flex gap-1">
          {teams.map((t,i) => (
            <button key={i} onClick={()=>{setActiveIdx(i);setEditing(false);}}
              className={`px-3 py-1 text-xs font-bold rounded whitespace-nowrap transition ${i===activeIdx?'bg-blue-600 text-white':'bg-gray-100 text-gray-700 hover:bg-gray-200'}`}>
              {t.name}
            </button>
          ))}
          <button onClick={addTeam} title="新規チーム追加"
            className="px-2 py-1 text-xs font-bold rounded bg-green-100 text-green-700 hover:bg-green-200 whitespace-nowrap">
            <IconPlus className="w-3 h-3 inline" /> 追加
          </button>
        </div>
      </div>
      <div className="flex items-center gap-1.5 flex-wrap">
        {editing ? (
          <input autoFocus type="text" value={current.name}
            onChange={e=>renameTeam(e.target.value)}
            onBlur={()=>setEditing(false)}
            onKeyDown={e=>{if(e.key==='Enter')setEditing(false);}}
            className="border rounded px-2 py-0.5 text-xs flex-1 min-w-[140px]" />
        ) : (
          <>
            <button onClick={()=>setEditing(true)} className="text-xs text-blue-600 hover:underline">名前変更</button>
            <button onClick={dupTeam} className="text-xs text-blue-600 hover:underline">複製</button>
            {teams.length > 1 && (
              <button onClick={delTeam} className="text-xs text-red-600 hover:underline">削除</button>
            )}
            <span className="text-[10px] text-gray-400 ml-auto">{teams.length}チーム保存中</span>
          </>
        )}
      </div>
    </div>
  );
}

// ====== メイン ======
function App() {
  const [tab, setTab] = useState('battle');
  const [teams, setTeams] = useState([{name:'チーム1', slots:[null,null,null,null,null,null]}]);
  const [activeIdx, setActiveIdx] = useState(0);
  const [opponents, setOpponents] = useState([null,null,null,null,null,null]);
  const [loaded, setLoaded] = useState(false);

  // 同期関連
  const [syncKey, setSyncKey] = useState(null);
  const [syncStatus, setSyncStatus] = useState('idle'); // idle | connecting | connected | pushing | pulling | error
  const [syncError, setSyncError] = useState('');
  const [showSyncModal, setShowSyncModal] = useState(false);
  const skipNextPushRef = useRef(false);
  const lastUpdatedAtRef = useRef(null);
  const pushTimerRef = useRef(null);

  // 旧アイテムIDのクリーンアップ（ポケチャン未実装アイテム削除）
  const sanitizeTeams = (teams) => {
    if (!Array.isArray(teams)) return teams;
    return teams.map(t => ({
      ...t,
      slots: (t.slots || []).map(s => {
        if (!s) return s;
        if (s.item && !ITEM_MAP[s.item]) return {...s, item:''};
        return s;
      })
    }));
  };

  // 初回ロード: localStorage復元
  useEffect(() => {
    try {
      const rawV2 = localStorage.getItem('user_teams_v2');
      if (rawV2) {
        const d = JSON.parse(rawV2);
        if (d.teams?.length) { setTeams(sanitizeTeams(d.teams)); setActiveIdx(d.activeIdx ?? 0); }
        if (d.opponents) setOpponents(d.opponents);
      } else {
        // 旧v1からマイグレーション
        const rawV1 = localStorage.getItem('user_team_v1');
        if (rawV1) {
          const slots = JSON.parse(rawV1);
          setTeams([{name:'チーム1', slots}]);
        }
      }
      // 前回同期時のサーバー updated_at を復元（競合解決に使用）
      const savedAt = localStorage.getItem('sync_updated_at_v1');
      if (savedAt) lastUpdatedAtRef.current = savedAt;
      const savedKey = localStorage.getItem('sync_key_v1');
      if (savedKey) setSyncKey(savedKey);
    } catch(e) {}
    setLoaded(true);
  }, []);

  // サーバー updated_at をlocalStorageに保存するヘルパー
  const setLastUpdatedAt = (ts) => {
    lastUpdatedAtRef.current = ts;
    try { if (ts) localStorage.setItem('sync_updated_at_v1', ts); } catch(e) {}
  };

  // localStorage保存
  useEffect(() => {
    if (!loaded) return;
    try { localStorage.setItem('user_teams_v2', JSON.stringify({teams, activeIdx, opponents})); } catch(e) {}
  }, [teams, activeIdx, opponents, loaded]);

  // 同期キー保存
  useEffect(() => {
    if (!loaded) return;
    try {
      if (syncKey) localStorage.setItem('sync_key_v1', syncKey);
      else localStorage.removeItem('sync_key_v1');
    } catch(e) {}
  }, [syncKey, loaded]);

  // 接続確立: pull → apply or push
  //   mode: 'new'      … 新規キー発行：現ローカルを初回プッシュ
  //   mode: 'existing' … 既存キーで接続：リモート優先
  //   mode: 'auto'     … 自動再接続：サーバー updated_at を比較して新しい方を採用
  const doConnect = async (key, mode) => {
    setSyncStatus('connecting');
    setSyncError('');
    try {
      const remote = await syncPull(key);
      const prevAt = lastUpdatedAtRef.current;
      if (remote) {
        if (mode === 'existing') {
          // 明示的接続：リモート優先で上書き
          skipNextPushRef.current = true;
          const d = remote.teams_json || {};
          if (d.teams?.length) { setTeams(sanitizeTeams(d.teams)); setActiveIdx(d.activeIdx ?? 0); }
          if (d.opponents) setOpponents(d.opponents);
          setLastUpdatedAt(remote.updated_at);
        } else if (mode === 'auto') {
          // 自動再接続：前回の保存時点より新しければリモート採用、そうでなければローカルを push
          if (!prevAt || remote.updated_at > prevAt) {
            skipNextPushRef.current = true;
            const d = remote.teams_json || {};
            if (d.teams?.length) { setTeams(d.teams); setActiveIdx(d.activeIdx ?? 0); }
            if (d.opponents) setOpponents(d.opponents);
            setLastUpdatedAt(remote.updated_at);
          } else {
            // ローカルが新しい（オフライン中の編集など）→ push
            const r = await syncPush(key, { teams, activeIdx, opponents });
            setLastUpdatedAt(r.updated_at);
          }
        } else {
          // mode === 'new' でリモートが既にある異常系 → 上書きpush
          const r = await syncPush(key, { teams, activeIdx, opponents });
          setLastUpdatedAt(r.updated_at);
        }
      } else {
        // リモート未作成 → 必ずローカルをプッシュ
        const r = await syncPush(key, { teams, activeIdx, opponents });
        setLastUpdatedAt(r.updated_at);
      }
      setSyncKey(key);
      setSyncStatus('connected');
    } catch (e) {
      setSyncStatus('error');
      setSyncError(e.message || String(e));
      throw e;
    }
  };

  // 切断
  const handleDisconnect = () => {
    if (!confirm('同期を解除しますか？\n（ローカルデータは残ります）')) return;
    setSyncKey(null);
    setSyncStatus('idle');
    lastUpdatedAtRef.current = null;
    try { localStorage.removeItem('sync_updated_at_v1'); } catch(e) {}
  };

  // リロード時の自動再接続（保存キーがあれば）
  const autoReconnectRef = useRef(false);
  useEffect(() => {
    if (!loaded || autoReconnectRef.current) return;
    if (syncKey && syncStatus === 'idle') {
      autoReconnectRef.current = true;
      doConnect(syncKey, 'auto').catch(() => {});
    }
  }, [loaded, syncKey]);

  // 変更検知 → debounce 2s → push
  useEffect(() => {
    if (!loaded || !syncKey || syncStatus === 'connecting' || syncStatus === 'idle') return;
    if (skipNextPushRef.current) { skipNextPushRef.current = false; return; }
    if (pushTimerRef.current) clearTimeout(pushTimerRef.current);
    pushTimerRef.current = setTimeout(async () => {
      try {
        setSyncStatus('pushing');
        const r = await syncPush(syncKey, { teams, activeIdx, opponents });
        setLastUpdatedAt(r.updated_at);
        setSyncStatus('connected');
      } catch (e) {
        setSyncStatus('error');
        setSyncError(e.message || String(e));
      }
    }, 2000);
    return () => { if (pushTimerRef.current) clearTimeout(pushTimerRef.current); };
  }, [teams, activeIdx, opponents, syncKey, loaded]);

  // ポーリング受信 (3秒毎)
  useEffect(() => {
    if (!syncKey || syncStatus === 'idle') return;
    let alive = true;
    const poll = async () => {
      if (!alive) return;
      try {
        const remote = await syncPull(syncKey);
        if (!alive || !remote) return;
        if (remote.updated_at !== lastUpdatedAtRef.current) {
          // リモートが新しい → ローカルに反映
          setLastUpdatedAt(remote.updated_at);
          skipNextPushRef.current = true;
          const d = remote.teams_json || {};
          if (d.teams?.length) {
            setTeams(sanitizeTeams(d.teams));
            setActiveIdx(Math.min(d.activeIdx ?? 0, d.teams.length - 1));
          }
          if (d.opponents) setOpponents(d.opponents);
        }
      } catch(e) { /* 一時的な失敗は無視 */ }
    };
    const id = setInterval(poll, 3000);
    return () => { alive = false; clearInterval(id); };
  }, [syncKey, syncStatus]);

  const userTeam = teams[activeIdx]?.slots || [null,null,null,null,null,null];
  const setUserTeam = (slots) => {
    setTeams(teams.map((t,i)=> i===activeIdx ? {...t, slots} : t));
  };

  return (
    <div className="min-h-screen bg-gray-50">
      <div className="max-w-6xl mx-auto p-3 sm:p-4">
        <header className="mb-4 flex items-start justify-between gap-3">
          <div>
            <h1 className="text-xl sm:text-2xl font-bold">ポケチャン選出補助</h1>
            <p className="text-xs text-gray-500">タイプ相性ベース / 自軍事前登録式</p>
          </div>
          <div className="flex flex-col items-end gap-1">
            <SyncStatusBadge
              status={syncKey ? syncStatus : 'idle'}
              onClick={() => syncKey ? handleDisconnect() : setShowSyncModal(true)} />
            {syncStatus === 'error' && syncError && (
              <div className="text-[10px] text-red-600 max-w-[200px] text-right truncate" title={syncError}>{syncError}</div>
            )}
          </div>
        </header>

        <TeamSlotBar teams={teams} activeIdx={activeIdx} setActiveIdx={setActiveIdx} setTeams={setTeams} />

        <div className="flex gap-1 mb-4 border-b">
          <button onClick={()=>setTab('battle')}
            className={`px-4 py-2 text-sm font-bold flex items-center gap-1 border-b-2 transition ${tab==='battle'?'border-blue-600 text-blue-600':'border-transparent text-gray-500 hover:text-gray-700'}`}>
            <IconSwords className="w-4 h-4" /> 対戦
          </button>
          <button onClick={()=>setTab('team')}
            className={`px-4 py-2 text-sm font-bold flex items-center gap-1 border-b-2 transition ${tab==='team'?'border-blue-600 text-blue-600':'border-transparent text-gray-500 hover:text-gray-700'}`}>
            <IconSettings className="w-4 h-4" /> 自軍登録
          </button>
        </div>

        {tab==='battle' && <BattleView opponents={opponents} setOpponents={setOpponents} userTeam={userTeam} />}
        {tab==='team' && <TeamSetup team={userTeam} setTeam={setUserTeam} />}

        {showSyncModal && (
          <SyncSetupModal onClose={()=>setShowSyncModal(false)} onConnect={doConnect} />
        )}

        <footer className="mt-8 text-xs text-gray-400 text-center">
          データ: GameWith / PokeAPI
        </footer>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
