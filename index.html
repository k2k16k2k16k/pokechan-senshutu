      setAb:['ひでり'], setMv:['にほんばれ'],
      abuseAb:['ようりょくそ','サンパワー','フラワーギフト','メガソーラー'],
      msg:'ほのお技×1.5、ようりょくそS×2、サンパワーC×1.5。天候上書き or 設置役撃破'},
    {key:'sand', icon:'🌪', label:'砂パ', color:'bg-yellow-100 border-yellow-300 text-yellow-900',
      setAb:['すなおこし','すなはき'], setMv:['すなあらし'],
      abuseAb:['すなかき','すなちらし','すなのちから'],
      msg:'岩タイプDは1.5倍、1/16スリップ(岩地鋼以外)。すなかき勢はS×2'},
    {key:'snow', icon:'❄', label:'雪パ', color:'bg-cyan-100 border-cyan-300 text-cyan-900',
      setAb:['ゆきふらし'], setMv:['ゆきげしき'],
      abuseAb:['ゆきかき','アイスボディ','アイスフェイス'],
      msg:'氷タイプB1.5倍、ふぶき命中100。オーロラベールで物特半減5Tに警戒'},
  ];
  let detectedWeather = null;
  for (const w of weatherDefs) {
    const setters = [...withAb(w.setAb), ...withMv(w.setMv).filter(p => !hasAb(p, w.setAb))];
    const uniq = [...new Map(setters.map(p=>[p.jp,p])).values()];
    const abusers = withAb(w.abuseAb);
    if (uniq.length > 0 && abusers.length > 0) {
      archetypes.push({
        key:w.key, icon:w.icon, label:w.label, color:w.color,
        confidence: abusers.length >= 2 ? 'high' : 'mid',
        evidence: [
          ...uniq.map(p => `${p.jp}(発動)`),
          ...abusers.map(p => `${p.jp}(${w.key}エース)`),
        ]
      });
      warnings.push({severity:'high', icon:w.icon, text:`${w.label}: ${w.msg}`});
      uniq.forEach(p => targets.push({poke:p, reason:`${w.label}の起点。倒せば${abusers.map(a=>a.jp).join('/')}の${w.key}バフ無力化`, priority:3}));
      detectedWeather = w.key;
    } else if (uniq.length > 0) {
      // setterあるがabuser不明 → 軽めの警戒
      warnings.push({severity:'low', icon:w.icon, text:`${w.label}起点の可能性: ${uniq.map(p=>p.jp).join('・')}が${w.label}を展開。エース役がまだ判明していない`});
    }
  }

  // === トリックルーム ===
  const trSetters = withMv(['トリックルーム']);
  const slowMons = o.filter(p => effectiveSpeed(p) > 0 && effectiveSpeed(p) < 70);
  const fastMons = o.filter(p => effectiveSpeed(p) > 100);
  if (trSetters.length > 0) {
    const slowAbusers = slowMons.filter(p => !trSetters.some(t => t.jp === p.jp));
    if (slowAbusers.length >= 1 || slowMons.length >= 2) {
      archetypes.push({
        key:'tr', icon:'🕳', label:'トリックルームパ', color:'bg-purple-100 border-purple-300 text-purple-900',
        confidence: slowAbusers.length >= 2 ? 'high' : 'mid',
        evidence: [
          ...trSetters.map(p=>`${p.jp}(TR発動)`),
          ...slowAbusers.map(p=>`${p.jp}(低速エース S${effectiveSpeed(p)})`),
        ]
      });
      warnings.push({severity:'high', icon:'🕳', text:`トリックルーム展開: 5T素早さ逆転。${slowMons.map(p=>`${p.jp}(S${effectiveSpeed(p)})`).join('・')}が先制して暴れる。ちょうはつ・急所撃破・TR発動ターン潰し推奨`});
      trSetters.forEach(p => targets.push({poke:p, reason:'TR発動役。ちょうはつ/即KOで展開阻止', priority:3}));
    }
  }

  // === ハザード / 撒き物 ===
  const hazardDefs = [
    {name:'ステルスロック', icon:'🪨', key:'sr', msg:'登場時1/8HP削り(岩4倍で1/2)。ひこう/むし/ほのお/こおり/ひこう4倍のポケは出すだけで瀕死圏。タスキ即破壊'},
    {name:'まきびし', icon:'🧷', key:'spikes', msg:'登場時1/8〜1/4削り(層数依存)。ひこう/ふゆう/ぎせいだは無効'},
    {name:'どくびし', icon:'🧪', key:'tspikes', msg:'登場時どく(2層で猛毒)。どく/はがねで除去、ひこう/ふゆうは無効'},
    {name:'ねばねばネット', icon:'🕸', key:'web', msg:'登場時S-1。先制技や対面選定に致命的、ひこう/ふゆう/クリアボディは無効'},
  ];
  const hazardsFound = [];
  for (const h of hazardDefs) {
    const setters = withMv([h.name]);
    if (setters.length > 0) {
      hazardsFound.push({...h, setters});
      warnings.push({severity:'high', icon:h.icon, text:`${h.name}: ${h.msg} (設置役: ${setters.map(p=>p.jp).join('・')})`});
    }
  }
  if (hazardsFound.length >= 2) {
    archetypes.push({
      key:'hazards', icon:'🧷', label:'ハザードスタック', color:'bg-orange-100 border-orange-300 text-orange-900',
      confidence: hazardsFound.length >= 3 ? 'high' : 'mid',
      evidence: hazardsFound.flatMap(h => h.setters.map(p => `${p.jp}: ${h.name}`))
    });
    // 設置役の優先撃破
    hazardsFound.forEach(h => h.setters.forEach(p => {
      if (!targets.some(t => t.poke.jp === p.jp))
        targets.push({poke:p, reason:`${h.name}設置役。初手で撃破して設置阻止`, priority:2});
    }));
  }

  // === 積み型 ===
  const setupAtkMoves = ['つるぎのまい','りゅうのまい','わるだくみ','ちょうのまい','からをやぶる','ビルドアップ','バルクアップ','めいそう','コスモパワー','ドわすれ','てっぺき','コットンガード'];
  const setupAces = o.filter(p => (p.moves||[]).some(m => setupAtkMoves.includes(m.name)));
  if (setupAces.length > 0) {
    const multiSetup = setupAces.filter(p => (p.moves||[]).filter(m => setupAtkMoves.includes(m.name)).length >= 2);
    archetypes.push({
      key:'setup', icon:'💪', label:'積みエース型', color:'bg-red-100 border-red-300 text-red-900',
      confidence: setupAces.length >= 2 ? 'high' : 'mid',
      evidence: setupAces.map(p=>`${p.jp}(${(p.moves||[]).filter(m=>setupAtkMoves.includes(m.name)).map(m=>m.name).join('/')})`)
    });
    warnings.push({severity:'high', icon:'💪', text:`積みエース警戒: ${setupAces.map(p=>p.jp).join('・')}。ちょうはつ/急所/確1 or 受けでリセット。1Tでも積ませると手遅れになる個体に注意`});
    setupAces.forEach(p => targets.push({poke:p, reason:'積み前に削るor処理。ちょうはつ/急所で起点化阻止', priority: multiSetup.includes(p) ? 3 : 2}));
  }

  // === 先制技持ち ===
  const priorityMons = o.filter(p => (p.moves||[]).some(m => movePriority(m) > 0 && m.cat !== '変'));
  if (priorityMons.length > 0) {
    const details = priorityMons.map(p => {
      const pri = (p.moves||[]).find(m => movePriority(m) > 0 && m.cat !== '変');
      return `${p.jp}(${pri.name}+${movePriority(pri)})`;
    });
    warnings.push({severity:'mid', icon:'⚡', text:`先制技: ${details.join('・')}。瀕死圏の自軍は引き or 耐久補強`});
  }
  // プリオリ特性（はやてのつばさ/しんりょく系）
  const priorityAbs = o.filter(p => p.ability && ['はやてのつばさ','ふゆう','はりきり','ファーコート','マルチスケイル'].includes(p.ability));

  // === いかく ===
  const intimidaters = withAb(['いかく']);
  if (intimidaters.length > 0) {
    warnings.push({severity:'mid', icon:'😤', text:`いかく: ${intimidaters.map(p=>p.jp).join('・')}。自軍物理アタッカーはA-1で火力減。繰り出し毎に発動 → 積極的に特殊技/ミラー/しろいけむり組で対処`});
  }

  // === メガ ===
  const megas = o.filter(p => isMega(p));
  if (megas.length > 1) {
    warnings.push({severity:'mid', icon:'💎', text:`メガ候補複数: ${megas.map(p=>p.jp).join('・')}。相手はこのうち1体だけメガ化。対面で「素」のステを想定しつつ、最も怖いメガを読んで対策`});
  } else if (megas.length === 1) {
    warnings.push({severity:'low', icon:'💎', text:`メガ: ${megas[0].jp}。能力値・タイプが変化する可能性あり`});
  }

  // === 状態異常/補助技 ===
  const statusAtkMoves = ['どくどく','おにび','でんじは','あくび','ちょうはつ'];
  const statusMons = o.filter(p => (p.moves||[]).some(m => statusAtkMoves.includes(m.name)));
  if (statusMons.length >= 2) {
    const statusList = statusMons.flatMap(p => (p.moves||[]).filter(m => statusAtkMoves.includes(m.name)).map(m => `${p.jp}:${m.name}`));
    warnings.push({severity:'mid', icon:'☠', text:`状態異常マシ: ${statusList.join('/')}。ラムのみ/しろいハーブ/しんぴのまもり持ちや、同じ状態を既に抱えたポケが対策`});
  }

  // === 物理/特殊偏重 ===
  const catCount = {phys:0, spec:0, mixed:0, none:0};
  o.forEach(p => {
    const c = classifyByMoves(p.moves);
    if (!c) { catCount.none++; return; }
    catCount[c.key]++;
  });
  if (catCount.phys >= Math.max(3, Math.floor(o.length * 0.6))) {
    warnings.push({severity:'low', icon:'🥊', text:`物理偏重 (${catCount.phys}/${o.length})。ファーコート/ふしぎなうろこ/いかく/リフレクター/高B受けで崩しにくくする`});
  }
  if (catCount.spec >= Math.max(3, Math.floor(o.length * 0.6))) {
    warnings.push({severity:'low', icon:'✨', text:`特殊偏重 (${catCount.spec}/${o.length})。ひかりのかべ/高D受け/めいそう積みでケア`});
  }

  // === 受け/耐久型検出 ===
  const recoveryMoves = ['じこさいせい','タマゴうみ','はねやすめ','つきのひかり','あさのひざし','こうごうせい','ねむる','ミルクのみ','なまけをなおす'];
  const stallers = o.filter(p => {
    const sCount = (p.moves||[]).filter(m => statusAtkMoves.includes(m.name)).length;
    const hasRec = (p.moves||[]).some(m => recoveryMoves.includes(m.name));
    return sCount >= 1 && hasRec;
  });
  if (stallers.length >= 2) {
    archetypes.push({
      key:'stall', icon:'🛡', label:'受けパ', color:'bg-green-100 border-green-300 text-green-800',
      confidence: stallers.length >= 3 ? 'high' : 'mid',
      evidence: stallers.map(p=>p.jp)
    });
    warnings.push({severity:'mid', icon:'🛡', text:`受け構成: ${stallers.map(p=>p.jp).join('・')}。毒+回復で粘る。ちょうはつ/かたやぶり/マジックミラー/ゾロア系の高火力で強引に崩す or PP切らし戦術`});
  }

  // === HO(高速展開型) ===
  const avgSpd = o.length ? o.reduce((s,p)=>s+effectiveSpeed(p),0)/o.length : 0;
  if (avgSpd > 95 && catCount.phys + catCount.spec >= 5) {
    archetypes.push({
      key:'ho', icon:'💥', label:'高速展開型(HO)', color:'bg-pink-100 border-pink-300 text-pink-900',
      confidence: 'mid',
      evidence: [`平均S${Math.round(avgSpd)}`, `全員アタッカー傾向`]
    });
    warnings.push({severity:'mid', icon:'💥', text:`高速アタッカー6体構成。こだわりスカーフ/リフレクター/ひかりのかべで火力を抑える or 先制技で崩す`});
  }

  // === 具体アドバイス生成 ===
  // 1) 優先撃破ターゲット
  const uniqTargets = [];
  const seen = new Set();
  targets.sort((a,b) => b.priority - a.priority).forEach(t => {
    if (!seen.has(t.poke.jp)) {
      seen.add(t.poke.jp);
      uniqTargets.push(t);
    }
  });
  if (uniqTargets.length > 0) {
    advice.push({tier:'high', icon:'🎯', text:'優先撃破推奨', subs: uniqTargets.slice(0, 4).map(t => `${t.poke.jp} — ${t.reason}`)});
  }

  // 2) 自軍vs敵 マッチアップ評価
  if (users.length > 0) {
    const assignments = o.map(opp => {
      let best = null, worst = null;
      for (const u of users) {
        const s = matchupScore(u, opp);
        if (!best || s.total > best.score) best = {u, score:s.total};
        if (!worst || s.total < worst.score) worst = {u, score:s.total};
      }
      return {opp, best, worst};
    });
    const strong = assignments.filter(a => a.best && a.best.score >= 2);
    const weak = assignments.filter(a => a.best && a.best.score < -0.5);
    if (strong.length > 0) {
      advice.push({tier:'mid', icon:'✅', text:'有利マッチアップ', subs: strong.map(a=>`${a.best.u.jp} → ${a.opp.jp} (+${a.best.score.toFixed(1)})`)});
    }
    if (weak.length > 0) {
      advice.push({tier:'warn', icon:'🚨', text:'処理困難', subs: weak.map(a=>`${a.opp.jp}: 最良担当 ${a.best.u.jp} でも ${a.best.score.toFixed(1)}。持ち物/技の見直し推奨`)});
    }
    // 3) スカーフ警戒（自軍全員が相手の素早さ上位に抜かれる可能性）
    const oppMaxSpd = Math.max(...o.map(p => effectiveSpeed(p)));
    const userMaxSpd = users.length ? Math.max(...users.map(u => effectiveSpeed(u))) : 0;
    if (oppMaxSpd * 1.5 > userMaxSpd && oppMaxSpd > 0) {
      const topSpd = o.filter(p => effectiveSpeed(p) >= oppMaxSpd - 5).map(p => p.jp).slice(0,2);
      advice.push({tier:'low', icon:'👟', text:`スカーフ警戒: ${topSpd.join('・')}がスカーフならS${Math.floor(oppMaxSpd*1.5)}で自軍最速(S${userMaxSpd})を抜く`});
    }
  }

  // 4) 天候対抗策
  if (detectedWeather && users.length > 0) {
    const userWeather = users.find(u => {
      const ab = u.ability ? ABILITY_MAP[u.ability] : null;
      if (ab?.group === 'weather') return true;
      return (u.moves||[]).some(m => ['あまごい','にほんばれ','すなあらし','ゆきげしき'].includes(m.name));
    });
    if (userWeather) {
      advice.push({tier:'mid', icon:'☁', text:`天候上書き可能: ${userWeather.jp}で相手の${detectedWeather}を潰せる`});
    } else {
      advice.push({tier:'low', icon:'☁', text:'天候上書き手段なし。設置役撃破or天候ターン切れまで耐える方針に'});
    }
  }

  return {archetypes, warnings, advice, targets:uniqTargets, stats:{avgSpd:Math.round(avgSpd), physCount:catCount.phys, specCount:catCount.spec, total:o.length}};
}

// ====== 対戦ガイド（バトル中のリアルタイム判断支援） ======
// フロー:
//   1) 自軍から3匹を選出（メガ2体は除外）
//   2) 相手のポケモンを判明次第その場で登録
//   3) 現在の対面（自軍・相手の選択中ペア）に対して「戦う / 引く / 後続に任せる」を提案
//   4) 倒れたポケモンをKOマークで管理
function LiveBattleView({userTeam, opponents, setOpponents}) {
  const users = useMemo(() => userTeam.filter(Boolean), [userTeam]);
  // ガイド用の独立state（戦略タブには影響させない）
  const [picks, setPicks] = useState([null, null, null]); // 選出3匹 (userTeamのindexを保持)
  const [koUser, setKoUser] = useState([false, false, false]); // 選出3匹のKO状態
  const [koOpp, setKoOpp] = useState([false, false, false, false, false, false]);
  const [activeUser, setActiveUser] = useState(null); // picks内のindex
  const [activeOpp, setActiveOpp] = useState(null); // opponents内のindex
  const [userPickerOpen, setUserPickerOpen] = useState(null); // picks内のindex
  const [oppPickerOpen, setOppPickerOpen] = useState(null); // opponents内のindex
  const [analysisOpen, setAnalysisOpen] = useState(true);   // 敵構成分析パネル開閉
  // フィールド状態トラッカー
  const [field, setField] = useState({
    weather: null,   // 'sun'|'rain'|'sand'|'snow'|null
    weatherT: 0,     // 残りターン
    terrain: null,   // 'electric'|'grass'|'psychic'|'misty'|null
    terrainT: 0,
    trickRoom: false,
    trickRoomT: 0,
    hazardsOpp: {sr:false, spikes:0, tspikes:0, web:false},  // 相手側(こちらが設置)
    hazardsUser: {sr:false, spikes:0, tspikes:0, web:false}, // こちら側(相手が設置)
    screens: {reflect:0, light:0, veil:0}, // 残Tまたは0=無し
  });
  const [turn, setTurn] = useState(1);

  // localStorage: 現在のバトル状態を復元
  useEffect(() => {
    try {
      const raw = localStorage.getItem('live_battle_v1');
      if (raw) {
        const d = JSON.parse(raw);
        if (Array.isArray(d.picks)) setPicks(d.picks);
        if (Array.isArray(d.koUser)) setKoUser(d.koUser);
        if (Array.isArray(d.koOpp)) setKoOpp(d.koOpp);
        if (typeof d.activeUser === 'number') setActiveUser(d.activeUser);
        if (typeof d.activeOpp === 'number') setActiveOpp(d.activeOpp);
        if (d.field && typeof d.field === 'object') setField(f => ({...f, ...d.field}));
        if (typeof d.turn === 'number') setTurn(d.turn);
      }
    } catch(e) {}
  }, []);

  // 相手ポケモンが削除されたらKOフラグもクリア（他タブで削除された場合の同期）
  useEffect(() => {
    setKoOpp(prev => prev.map((k, i) => (opponents[i] ? k : false)));
    if (activeOpp != null && !opponents[activeOpp]) setActiveOpp(null);
  }, [opponents]);

  // 自軍が変わった場合、選出indexが無効なら外す
  useEffect(() => {
    setPicks(prev => prev.map(pi => (pi != null && userTeam[pi]) ? pi : null));
  }, [userTeam]);
  useEffect(() => {
    try {
      localStorage.setItem('live_battle_v1', JSON.stringify({picks, koUser, koOpp, activeUser, activeOpp, field, turn}));
    } catch(e) {}
  }, [picks, koUser, koOpp, activeUser, activeOpp, field, turn]);

  const pickedUsers = picks.map(idx => idx != null ? userTeam[idx] : null);
  const pickedCount = pickedUsers.filter(Boolean).length;
  const megaPicked = pickedUsers.filter(u => u && isMega(u)).length;

  const toggleUserPick = (picksSlot, userIdx) => {
    // すでに他スロットで同じポケモン選出済みなら無効
    if (picks.some((p,i) => p === userIdx && i !== picksSlot)) return;
    const copy = [...picks];
    copy[picksSlot] = userIdx;
    setPicks(copy);
    setUserPickerOpen(null);
  };
  const clearUserPick = (picksSlot) => {
    const copy = [...picks];
    copy[picksSlot] = null;
    setPicks(copy);
    const koCopy = [...koUser];
    koCopy[picksSlot] = false;
    setKoUser(koCopy);
    if (activeUser === picksSlot) setActiveUser(null);
  };
  const resetBattle = () => {
    if (!confirm('バトル状態をリセットしますか？（選出・KO状態・場の状況をクリア）')) return;
    setPicks([null, null, null]);
    setKoUser([false, false, false]);
    setKoOpp([false, false, false, false, false, false]);
    setActiveUser(null);
    setActiveOpp(null);
    setField({
      weather: null, weatherT: 0, terrain: null, terrainT: 0,
      trickRoom: false, trickRoomT: 0,
      hazardsOpp: {sr:false, spikes:0, tspikes:0, web:false},
      hazardsUser: {sr:false, spikes:0, tspikes:0, web:false},
      screens: {reflect:0, light:0, veil:0},
    });
    setTurn(1);
  };
  // ターン進行（フィールド/壁/TRの残Tデクリメント）
  const advanceTurn = (delta) => {
    setTurn(t => Math.max(1, t + delta));
    if (delta > 0) {
      setField(f => ({
        ...f,
        weatherT: Math.max(0, f.weatherT - 1),
        weather: f.weatherT <= 1 ? null : f.weather,
        terrainT: Math.max(0, f.terrainT - 1),
        terrain: f.terrainT <= 1 ? null : f.terrain,
        trickRoomT: Math.max(0, f.trickRoomT - 1),
        trickRoom: f.trickRoomT <= 1 ? false : f.trickRoom,
        screens: {
          reflect: Math.max(0, f.screens.reflect - 1),
          light: Math.max(0, f.screens.light - 1),
          veil: Math.max(0, f.screens.veil - 1),
        },
      }));
    }
  };
  // フィールド状態操作
  const setWeather = (w) => setField(f => ({...f, weather: w === f.weather ? null : w, weatherT: w === f.weather ? 0 : 5}));
  const setTerrain = (t) => setField(f => ({...f, terrain: t === f.terrain ? null : t, terrainT: t === f.terrain ? 0 : 5}));
  const toggleTrickRoom = () => setField(f => ({...f, trickRoom: !f.trickRoom, trickRoomT: f.trickRoom ? 0 : 5}));
  const toggleHazardOpp = (k) => setField(f => ({
    ...f,
    hazardsOpp: {
      ...f.hazardsOpp,
      [k]: k === 'spikes' ? Math.min(3, (f.hazardsOpp.spikes || 0) + 1) % 4
         : k === 'tspikes' ? Math.min(2, (f.hazardsOpp.tspikes || 0) + 1) % 3
         : !f.hazardsOpp[k]
    }
  }));
  const toggleHazardUser = (k) => setField(f => ({
    ...f,
    hazardsUser: {
      ...f.hazardsUser,
      [k]: k === 'spikes' ? Math.min(3, (f.hazardsUser.spikes || 0) + 1) % 4
         : k === 'tspikes' ? Math.min(2, (f.hazardsUser.tspikes || 0) + 1) % 3
         : !f.hazardsUser[k]
    }
  }));
  const toggleScreen = (k) => setField(f => ({...f, screens: {...f.screens, [k]: f.screens[k] > 0 ? 0 : 5}}));
  const toggleKoUser = (i) => {
    const copy = [...koUser];
    copy[i] = !copy[i];
    setKoUser(copy);
    if (copy[i] && activeUser === i) setActiveUser(null);
  };
  const toggleKoOpp = (i) => {
    const copy = [...koOpp];
    copy[i] = !copy[i];
    setKoOpp(copy);
    if (copy[i] && activeOpp === i) setActiveOpp(null);
  };
  const setOppSlot = (idx, poke) => {
    const copy = [...opponents];
    copy[idx] = poke;
    setOpponents(copy);
    setOppPickerOpen(null);
  };
  const clearOppSlot = (idx) => {
    const copy = [...opponents];
    copy[idx] = null;
    setOpponents(copy);
    const koCopy = [...koOpp];
    koCopy[idx] = false;
    setKoOpp(koCopy);
    if (activeOpp === idx) setActiveOpp(null);
  };

  // 現在の対面推奨
  const faceOff = useMemo(() => {
    if (activeUser == null || activeOpp == null) return null;
    const u = pickedUsers[activeUser];
    const o = opponents[activeOpp];
    if (!u || !o) return null;
    const ms = matchupScore(u, o);
    // 他の残存自軍から、この敵に対するベスト候補を算出
    const alternatives = picks.map((pickIdx, i) => {
      if (i === activeUser || pickIdx == null || koUser[i]) return null;
      const alt = userTeam[pickIdx];
      if (!alt) return null;
      const am = matchupScore(alt, o);
      return {idx:i, poke:alt, ms:am};
    }).filter(Boolean).sort((a,b) => b.ms.total - a.ms.total);

    // 速度分析（スカーフ警戒込み）
    const sp = speedAnalysis(u, o);
    const priority = ms.off.priority || 0;
    // 確定数計算
    const bestMv = ms.off.mv;
    const offAcc = bestMv
      ? (bestMv.accuracy && bestMv.accuracy > 0 && bestMv.accuracy <= 100
         ? bestMv.accuracy : (MOVE_ACCURACY[bestMv.name] ?? 100))
      : 100;
    const kt = killTurns(ms.off.dmgPct, offAcc);
    const ktOpp = killTurns(ms.thr.dmgPct, 90); // 相手命中は90%相当で控えめ見積
    // レース判定
    const race = raceVerdict(kt, ktOpp, sp, priority);
    // スカーフ警戒（相手持ち物未判明 & スカーフで逆転される場合）
    const oppKnownScarf = o.item === 'choice_scarf';
    const scarfRisk = sp.isFaster && sp.scarfBeats && !oppKnownScarf;

    // 判定: 戦う / 引く / 交代 （raceResultを優先的に反映）
    let verdict, verdictColor, verdictReasons = [];
    const safer = alternatives.find(a => a.ms.total > ms.total + 1.2);
    if (race.verdict === 'win' && ms.total >= 0) {
      verdict = '⚔ 戦う（勝ち筋あり）';
      verdictColor = 'bg-green-600';
      verdictReasons.push(`${race.label} / ${race.reason}`);
    } else if (race.verdict === 'winProb') {
      verdict = '⚔ 戦える（要注意）';
      verdictColor = 'bg-emerald-500';
      verdictReasons.push(`${race.label} / ${race.reason}`);
    } else if (safer && race.verdict === 'lose') {
      verdict = `🔄 交代推奨（${safer.poke.jp}が有利）`;
      verdictColor = 'bg-sky-500';
      verdictReasons.push(`${safer.poke.jp}の相性+${safer.ms.total.toFixed(1)} vs 現在+${ms.total.toFixed(1)}`);
      verdictReasons.push(`現状: ${race.label}`);
    } else if (race.verdict === 'lose' && ms.thr.dmgPct >= 100) {
      verdict = '🚫 引く（先に倒される）';
      verdictColor = 'bg-red-600';
      verdictReasons.push(`${race.label} / 被弾${ms.thr.dmgPct}%`);
    } else if (race.verdict === 'lose') {
      verdict = '🚫 不利（火力/速度負け）';
      verdictColor = 'bg-orange-500';
      verdictReasons.push(race.label);
    } else if (race.verdict === 'draw') {
      verdict = '⚖ 拮抗（相打ち圏）';
      verdictColor = 'bg-gray-500';
      verdictReasons.push(race.label);
    } else {
      verdict = '⚔ 戦える';
      verdictColor = 'bg-emerald-500';
      verdictReasons.push(`マッチアップ+${ms.total.toFixed(1)}`);
    }
    if (scarfRisk) {
      verdictReasons.push(`⚠ スカーフ警戒: 相手${o.jp}がスカーフならS${sp.osScarf}で逆転`);
    }

    // 速度情報（詳細）
    const speedInfo = sp.isFaster ? {text:`先手 (${sp.us} vs ${sp.os})`, cls:'text-green-700'}
      : sp.isSame ? {text:`同速 (${sp.us}) - 乱数50%`, cls:'text-yellow-700'}
      : {text:`後手 (${sp.us} vs ${sp.os})`, cls:'text-red-600'};
    if (priority > 0) {
      speedInfo.text += ` / 先制技+${priority}`;
      speedInfo.cls = 'text-sky-700';
    }

    // 交代読み: 相手側の未出しポケで、現自軍に有利なもの
    const oppSwitchCandidates = opponents.map((oo, oi) => {
      if (!oo || koOpp[oi] || oi === activeOpp) return null;
      const altMs = matchupScore(u, oo);
      return {opp:oo, oppIdx:oi, ms:altMs};
    }).filter(Boolean)
      .filter(c => c.ms.total < ms.total - 1.5 && c.ms.total < 0) // こちらの相性が現状より大幅に悪くなる候補のみ
      .sort((a,b) => a.ms.total - b.ms.total)
      .slice(0, 2);

    // とくせい戦略アドバイス
    const abilityAdvice = [];
    const myAb = u.ability ? ABILITY_MAP[u.ability] : null;
    if (myAb) {
      // タイプ無効
      if ((myAb.group === 'immunity' || myAb.group === 'absorb') && myAb.immuneTypes) {
        const oppHasImmuneType = o.types.some(t => myAb.immuneTypes.includes(t));
        if (oppHasImmuneType) {
          abilityAdvice.push({
            text: `🛡 ${myAb.jp}で${myAb.immuneTypes.map(t=>TYPE_JP[t]||t).join('/')}技を無効化 → 一致技が通らない`,
            cls: 'text-green-700 font-bold'
          });
        } else {
          abilityAdvice.push({
            text: `💡 ${myAb.jp}は${myAb.immuneTypes.map(t=>TYPE_JP[t]||t).join('/')}技無効。読みで交代受け可`,
            cls: 'text-gray-600'
          });
        }
      }
      // タイプ半減
      if (myAb.group === 'resist' && myAb.resistTypes) {
        const hasResistType = o.types.some(t => myAb.resistTypes.includes(t));
        if (hasResistType) {
          abilityAdvice.push({
            text: `🛡 ${myAb.jp}で${myAb.resistTypes.map(t=>TYPE_JP[t]||t).join('/')}技半減 → 被ダメ大幅減`,
            cls: 'text-green-700 font-bold'
          });
        }
      }
      // 防御系
      if (myAb.group === 'defense') {
        if (myAb.id === 'マルチスケイル') abilityAdvice.push({text:'🛡 マルチスケイル: HP満タン維持なら被ダメ半減', cls:'text-green-700'});
        if (myAb.id === 'ファーコート' && ms.thr.cat === '物') abilityAdvice.push({text:'🛡 ファーコート発動: 物理技半減', cls:'text-green-700 font-bold'});
        if ((myAb.id === 'フィルター' || myAb.id === 'ハードロック') && ms.thr.mult >= 2) abilityAdvice.push({text:`🛡 ${myAb.jp}: 抜群被ダメ×0.75`, cls:'text-green-700'});
        if (myAb.id === 'マジックガード') abilityAdvice.push({text:'🛡 マジックガード: 天候/毒/やどりぎ等のダメ無効', cls:'text-green-700'});
      }
      // 威力強化
      if (myAb.group === 'boost') {
        if (myAb.id === 'テクニシャン' && ms.off.mv) {
          const bp = (ms.off.mv.bp != null) ? ms.off.mv.bp : (MOVE_BP[ms.off.mv.name] ?? 0);
          if (bp > 0 && bp <= 60) abilityAdvice.push({text:`🔥 テクニシャン発動: ${ms.off.mv.name}(威${bp})×1.5`, cls:'text-red-700 font-bold'});
        }
        if (myAb.id === 'てきおうりょく' && ms.off.stab) {
          abilityAdvice.push({text:'🔥 てきおうりょく: 一致技が大幅強化（×1.33相当）', cls:'text-red-700 font-bold'});
        }
        if (myAb.id === 'ちからずく' && ms.off.mv) {
          abilityAdvice.push({text:`🔥 ちからずく: ${ms.off.mv.name}×1.3（追加効果は消失）`, cls:'text-red-700'});
        }
        if (myAb.id === 'ヨガパワー' && ms.off.mv?.cat === '物') {
          abilityAdvice.push({text:'🔥 ヨガパワー: 物理×2.0', cls:'text-red-700 font-bold'});
        }
        if (myAb.id === 'ちからもち' && ms.off.mv?.cat === '物') {
          abilityAdvice.push({text:'🔥 ちからもち: 物理×2.0', cls:'text-red-700 font-bold'});
        }
      }
      // 優先度
      if (myAb.group === 'priority') {
        if (myAb.id === 'イタズラゴコロ') abilityAdvice.push({text:'⚡ イタズラゴコロ: 変化技+1優先度（先制で補助技）', cls:'text-sky-700'});
        if (myAb.id === 'はやてのつばさ' && u.moves?.some(mv => mv.type === 'flying')) {
          abilityAdvice.push({text:'⚡ はやてのつばさ: HP満タンでひこう技先制', cls:'text-sky-700 font-bold'});
        }
      }
      // 天候
      if (myAb.group === 'weather') {
        const weatherName = {sun:'晴れ', rain:'雨', sand:'砂嵐', hail:'雪'}[myAb.weather];
        abilityAdvice.push({text:`☀ ${myAb.jp}: 場に出るだけで${weatherName}。天候パ展開可`, cls:'text-amber-700'});
      }
      // 威嚇
      if (myAb.id === 'いかく' && ms.thr.cat === '物') {
        abilityAdvice.push({text:'😤 いかく発動: 相手の物理火力を-1段階ダウン', cls:'text-green-700 font-bold'});
      }
      // 相手とくせい無視
      if (myAb.id === 'かたやぶり' || myAb.id === 'ターボブレイズ' || myAb.id === 'テラボルテージ') {
        if (o.ability) {
          abilityAdvice.push({text:`⚙ ${myAb.jp}: 相手の${o.ability}を無視できる`, cls:'text-purple-700 font-bold'});
        }
      }
      // いろめがね
      if (myAb.id === 'いろめがね' && ms.off.mult < 1 && ms.off.mult > 0) {
        abilityAdvice.push({text:'⚙ いろめがね: いまひとつ技を等倍化', cls:'text-purple-700'});
      }
    }
    // 有効打が全てとくせいで無効化されている場合
    if (ms.off.abilityBlocked) {
      abilityAdvice.push({text:`🚫 相手の${o.ability}で主力技が無効化されている可能性`, cls:'text-red-700 font-bold'});
    }

    // 各技の打点解析
    const perMove = perMoveAnalysis(u, o);
    // 相手の判明技
    const oppMove = oppMoveAnalysis(o, u);
    // 積み窓口判定
    const setupOp = setupOpportunity(u, ms.thr, race);
    // 優先度レース
    const pRace = priorityRace(u, o);

    return {u, o, ms, verdict, verdictColor, verdictReasons, speedInfo, bestMv, offAcc,
            alternatives, sp, kt, ktOpp, race, scarfRisk, priority, oppSwitchCandidates, abilityAdvice,
            perMove, oppMove, setupOp, pRace};
  }, [activeUser, activeOpp, picks, koUser, koOpp, userTeam, opponents, pickedUsers]);

  // 残存状況サマリ
  const aliveUsers = picks.filter((p,i)=> p != null && !koUser[i]).length;
  const aliveOpps = opponents.filter((o,i)=> o && !koOpp[i]).length;
  const knownOpps = opponents.filter(Boolean).length;

  // 残存ポケ×残存敵の全マッチアップ（サイド切替判定用）
  const remainingMatrix = useMemo(() => {
    const rows = picks.map((pi, i) => {
      if (pi == null || koUser[i]) return null;
      const u = userTeam[pi];
      if (!u) return null;
      const cols = opponents.map((o, oi) => {
        if (!o || koOpp[oi]) return null;
        return {opp:o, oppIdx:oi, ms: matchupScore(u, o)};
      }).filter(Boolean);
      return {picksIdx:i, u, cols};
    }).filter(Boolean);
    return rows;
  }, [picks, koUser, koOpp, userTeam, opponents]);

  // ベスト交代先レコメンド（現在のアクティブ相手に対して最良の自軍を算出）
  const bestSwitches = useMemo(() => {
    if (activeOpp == null) return [];
    const o = opponents[activeOpp];
    if (!o) return [];
    return picks.map((pi, i) => {
      if (pi == null || koUser[i] || i === activeUser) return null;
      const u = userTeam[pi];
      if (!u) return null;
      return {idx:i, poke:u, ms: matchupScore(u, o)};
    }).filter(Boolean).sort((a,b) => b.ms.total - a.ms.total);
  }, [activeOpp, picks, koUser, userTeam, opponents, activeUser]);

  // 終盤詰め将棋: 残存ポケモン同士の最適割当
  // 各生存自軍をどの相手に当てるか、全順列から最適を探索
  const endgamePlan = useMemo(() => {
    const aliveU = picks.map((pi, i) => ({picksIdx:i, u: pi != null ? userTeam[pi] : null}))
      .filter(x => x.u && !koUser[x.picksIdx]);
    const aliveO = opponents.map((o, oi) => ({oppIdx:oi, o}))
      .filter(x => x.o && !koOpp[x.oppIdx]);
    if (aliveU.length === 0 || aliveO.length === 0) return null;
    // 全組み合わせ探索は指数的だが、最大3×3なので問題なし
    if (aliveU.length > 4 || aliveO.length > 4) return null;
    // スコア行列
    const sm = aliveU.map(x => aliveO.map(y => matchupScore(x.u, y.o)));
    // 各敵に対する最適担当者を決定（敵基準のアサイン）
    const perOpp = aliveO.map((_, oi) => {
      let bestUi = 0, bestT = -Infinity;
      for (let ui = 0; ui < aliveU.length; ui++) {
        if (sm[ui][oi].total > bestT) { bestT = sm[ui][oi].total; bestUi = ui; }
      }
      return {oppIdx: aliveO[oi].oppIdx, opp: aliveO[oi].o, ui: bestUi, u: aliveU[bestUi].u, picksIdx: aliveU[bestUi].picksIdx, ms: sm[bestUi][oi]};
    });
    // 各自軍が一度ずつ使えれば理想だが、数が足りないならダブル割当
    const userUsage = {};
    perOpp.forEach(p => { userUsage[p.ui] = (userUsage[p.ui] || 0) + 1; });
    // 詰み判定
    const noPositive = perOpp.filter(p => p.ms.total < 0).length;
    const strongWin = perOpp.filter(p => p.ms.total >= 2).length;
    const overworked = Object.entries(userUsage).filter(([_, c]) => c >= 2).length;
    let verdict, verdictCls;
    if (aliveU.length >= aliveO.length && noPositive === 0 && overworked === 0) {
      verdict = `✅ 勝ち筋あり（${aliveO.length}体すべて担当者が有利）`;
      verdictCls = 'text-green-700 bg-green-50 border-green-300';
    } else if (aliveU.length < aliveO.length && noPositive === 0) {
      verdict = `⚠ 数的不利だが相性は良好（${aliveU.length}体vs${aliveO.length}体）`;
      verdictCls = 'text-amber-700 bg-amber-50 border-amber-300';
    } else if (strongWin >= aliveO.length - 1) {
      verdict = `✅ ほぼ勝ち筋あり（${strongWin}/${aliveO.length}体を圧倒可）`;
      verdictCls = 'text-emerald-700 bg-emerald-50 border-emerald-300';
    } else if (noPositive >= aliveO.length / 2) {
      verdict = `🚨 詰み危機（${noPositive}体を処理できない）`;
      verdictCls = 'text-red-700 bg-red-50 border-red-300';
    } else {
      verdict = `⚖ 拮抗（${noPositive}体不利 / ${strongWin}体優勢）`;
      verdictCls = 'text-gray-700 bg-gray-50 border-gray-300';
    }
    return {perOpp, verdict, verdictCls, aliveU, aliveO, noPositive, strongWin};
  }, [picks, koUser, koOpp, userTeam, opponents]);

  // 敵チーム分析（アーキタイプ・警戒・具体アドバイス）
  const oppAnalysis = useMemo(() => analyzeOppTeam(opponents, userTeam), [opponents, userTeam]);

  // 固定構築専用: 選出パターン推奨＋対面別ガイド
  const fixedPartyActive = useMemo(() => isFixedPartyLoaded(userTeam), [userTeam]);
  const patternRec = useMemo(() => fixedPartyActive ? recommendPartyPattern(opponents) : null, [fixedPartyActive, opponents]);
  const perOppGuide = useMemo(() => {
    if (!fixedPartyActive) return [];
    return (opponents || []).map((o, i) => {
      if (!o) return null;
      return { idx: i, poke: o, hits: matchupFor(o.jp) };
    }).filter(x => x && x.hits.length > 0);
  }, [fixedPartyActive, opponents]);
  const [fixedPanelOpen, setFixedPanelOpen] = useState(true);

  // 選出候補: 自軍から未選出のもの
  const availableUserIdxs = userTeam.map((u,i)=>u?i:null).filter(i => i != null && !picks.includes(i));

  if (users.length < 3) {
    return (
      <div className="bg-amber-50 border border-amber-300 rounded p-3 text-sm">
        <IconShield className="w-4 h-4 inline mr-1" />
        対戦ガイドを使うには自軍を3匹以上登録してください（「自軍登録」タブから）。
      </div>
    );
  }

  return (
    <div className="space-y-3">
      {/* 進行状況ヘッダー */}
      <div className="bg-white border rounded-lg p-2.5 flex items-center justify-between gap-2 flex-wrap">
        <div className="flex items-center gap-3 flex-wrap text-xs">
          <span className="font-bold text-gray-700">🎮 対戦ガイド</span>
          <span className={`px-2 py-0.5 rounded font-bold ${aliveUsers > 0 ? 'bg-blue-100 text-blue-700' : 'bg-gray-200 text-gray-500'}`}>
            自軍 {aliveUsers}/{pickedCount}
          </span>
          <span className={`px-2 py-0.5 rounded font-bold ${aliveOpps > 0 ? 'bg-red-100 text-red-700' : 'bg-gray-200 text-gray-500'}`}>
            相手 {aliveOpps}/{knownOpps || '?'}
          </span>
          {megaPicked > 0 && (
            <span className="px-2 py-0.5 rounded font-bold bg-purple-100 text-purple-700">
              💎 メガ{megaPicked}体
            </span>
          )}
        </div>
        <button onClick={resetBattle}
          className="text-xs font-bold px-2.5 py-1 rounded border bg-white text-red-600 border-red-300 hover:bg-red-50">
          🗑 リセット
        </button>
      </div>

      {/* 固定構築専用: 選出パターン推奨＋対面別ガイド */}
      {fixedPartyActive && patternRec && (
        <div className={`border-2 rounded-lg overflow-hidden ${
          patternRec.pattern === '①' ? 'border-pink-400 bg-gradient-to-br from-pink-50 via-rose-50 to-fuchsia-50' :
          patternRec.pattern === '②' ? 'border-sky-400 bg-gradient-to-br from-sky-50 via-cyan-50 to-blue-50' :
          'border-amber-400 bg-gradient-to-br from-amber-50 via-orange-50 to-yellow-50'
        }`}>
          <button onClick={()=>setFixedPanelOpen(!fixedPanelOpen)} className="w-full px-2.5 py-1.5 flex items-center justify-between text-left">
            <div className="flex items-center gap-2 flex-wrap">
              <span className="text-sm font-bold">📘 固定構築ガイド</span>
              <span className={`text-xs font-bold px-2 py-0.5 rounded ${
                patternRec.pattern === '①' ? 'bg-pink-600 text-white' :
                patternRec.pattern === '②' ? 'bg-sky-600 text-white' :
                'bg-amber-600 text-white'
              }`}>
                推奨: パターン{patternRec.pattern}
              </span>
              <span className="text-[10px] font-bold px-1.5 py-0.5 rounded bg-white border">
                {patternRec.megaTo}
              </span>
              <span className={`text-[10px] px-1.5 py-0.5 rounded ${
                patternRec.confidence === 'high' ? 'bg-green-100 text-green-800' :
                patternRec.confidence === 'medium' ? 'bg-yellow-100 text-yellow-800' :
                'bg-red-100 text-red-800'
              }`}>
                確度: {patternRec.confidence === 'high' ? '高' : patternRec.confidence === 'medium' ? '中' : '低'}
              </span>
            </div>
            <span className="text-xs text-gray-500">{fixedPanelOpen ? '▲' : '▼'}</span>
          </button>
          {fixedPanelOpen && (
            <div className="px-2.5 pb-2.5 pt-0 space-y-2">
              {/* 選出ポケ表示 */}
              <div className="bg-white/80 rounded border p-1.5">
                <div className="text-[10px] font-bold text-gray-600 mb-1">選出する3体</div>
                <div className="flex items-center gap-1 flex-wrap">
                  {PATTERN_TO_IDS[patternRec.pattern].map((rid, idx) => {
                    const r = ROSTER.find(x => x.id === rid);
                    const fd = FIXED_PARTY_DATA.find(d => d.rosterId === rid);
                    const item = fd && ITEM_MAP[fd.item];
                    const isMegaForm = item?.group === 'mega';
                    return (
                      <React.Fragment key={rid}>
                        <div className="flex items-center gap-1 bg-white rounded px-1.5 py-1 border">
                          {r && <img src={pokeImg(r)} onError={e=>{e.target.src=pokeImgFallback(r)}} className="w-7 h-7 object-contain" />}
                          <div>
                            <div className="text-[11px] font-bold leading-tight">{isMegaForm ? 'メガ'+r.jp : r.jp}</div>
                            <div className="text-[9px] text-gray-500 leading-tight">{fd?.role}</div>
                          </div>
                        </div>
                        {idx < 2 && <span className="text-gray-400 text-[10px]">+</span>}
                      </React.Fragment>
                    );
                  })}
                </div>
              </div>

              {/* 判断理由 */}
              <div className="bg-white/80 rounded border p-1.5">
                <div className="text-[10px] font-bold text-gray-600 mb-1">判断理由</div>
                <div className="space-y-1">
                  {patternRec.reasons.map((r, i) => (
                    <div key={i} className="flex items-start gap-1.5 text-[11px]">
                      <span className="flex-shrink-0">{r.icon}</span>
                      <span className="text-gray-800 leading-relaxed">{r.text}</span>
                    </div>
                  ))}
                </div>
              </div>

              {/* 対面別ガイド */}
              {perOppGuide.length > 0 && (
                <div className="bg-white/80 rounded border p-1.5">
                  <div className="text-[10px] font-bold text-gray-600 mb-1">対面別ガイド（相手の登録ポケから自動抽出）</div>
                  <div className="space-y-1.5">
                    {perOppGuide.map(({idx, poke, hits}) => (
                      <div key={idx} className="border rounded p-1.5 bg-gray-50">
                        <div className="flex items-center gap-1.5 mb-1">
                          <img src={pokeImg(poke)} onError={e=>{e.target.src=pokeImgFallback(poke)}} className="w-6 h-6 object-contain" />
                          <span className="text-xs font-bold">{poke.jp}</span>
                          <button onClick={()=>setActiveOpp(idx)} className="ml-auto text-[9px] px-1.5 py-0.5 rounded bg-indigo-100 text-indigo-700 hover:bg-indigo-200">対面にセット</button>
                        </div>
                        <div className="space-y-1">
                          {hits.map((h, hi) => (
                            <div key={hi} className={`text-[10px] rounded px-1.5 py-1 border ${
                              h.severity === 'warn' ? 'bg-red-50 border-red-200' :
                              h.severity === 'tip' ? 'bg-green-50 border-green-200' :
                              'bg-blue-50 border-blue-200'
                            }`}>
                              <div className={`font-bold mb-0.5 ${
                                h.severity === 'warn' ? 'text-red-800' :
                                h.severity === 'tip' ? 'text-green-800' :
                                'text-blue-800'
                              }`}>
                                {h.severity === 'warn' ? '⚠' : h.severity === 'tip' ? '✓' : 'ℹ'} {h.title}
                              </div>
                              <div className="text-gray-700 leading-relaxed">{h.advice}</div>
                              {h.calc && (
                                <div className="text-[9px] text-gray-500 mt-0.5">📊 {h.calc}</div>
                              )}
                            </div>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* 次点プラン（副推奨） */}
              {(() => {
                const list = [];
                if (patternRec.pattern === '①') list.push({p:'③', reason:'初手に鋼が出たらカイリューで対応する変則'});
                if (patternRec.pattern === '②' || patternRec.pattern === '③') {
                  list.push({p: patternRec.pattern === '②' ? '③' : '②', reason:'サイクル戦 or タイマン勝負に切替える場合'});
                }
                return list.length > 0 && (
                  <div className="bg-white/60 rounded border p-1.5">
                    <div className="text-[10px] font-bold text-gray-600 mb-1">次点プラン</div>
                    {list.map((alt, i) => (
                      <div key={i} className="text-[10px] text-gray-700">
                        <span className="font-bold">パターン{alt.p}</span>: {alt.reason}
                      </div>
                    ))}
                  </div>
                );
              })()}
            </div>
          )}
        </div>
      )}

      {/* 敵構成 分析パネル */}
      {oppAnalysis && (oppAnalysis.archetypes.length > 0 || oppAnalysis.warnings.length > 0 || oppAnalysis.advice.length > 0) && (
        <div className="bg-gradient-to-br from-red-50 via-amber-50 to-yellow-50 border-2 border-amber-400 rounded-lg p-2.5">
          <div className="flex items-center justify-between mb-1.5">
            <div className="text-sm font-bold text-amber-900">
              🔍 敵構成分析 <span className="text-[10px] text-gray-500 font-normal">({oppAnalysis.stats.total}体登録)</span>
            </div>
            <button onClick={()=>setAnalysisOpen(!analysisOpen)}
              className="text-[10px] font-bold px-1.5 py-0.5 rounded border bg-white text-amber-700 hover:bg-amber-100">
              {analysisOpen ? '▼ 閉じる' : '▶ 開く'}
            </button>
          </div>
          {/* アーキタイプ（構成タイプ）バッジ */}
          {oppAnalysis.archetypes.length > 0 && (
            <div className="flex flex-wrap gap-1.5 mb-2">
              {oppAnalysis.archetypes.map((a,i) => (
                <div key={i} className={`border rounded-full px-2 py-0.5 text-[11px] font-bold ${a.color}`}
                  title={a.evidence.join('\n')}>
                  {a.icon} {a.label}
                  {a.confidence === 'high' ? ' ●' : a.confidence === 'mid' ? ' ◐' : ''}
                </div>
              ))}
              {oppAnalysis.archetypes.length === 0 && (
                <div className="text-[11px] text-gray-500">標準構成（特定アーキタイプは検出されず）</div>
              )}
            </div>
          )}

          {analysisOpen && (
            <div className="space-y-2">
              {/* 警戒ポイント */}
              {oppAnalysis.warnings.length > 0 && (
                <div>
                  <div className="text-[11px] font-bold text-red-800 mb-0.5">⚠ 警戒ポイント</div>
                  <div className="space-y-0.5">
                    {oppAnalysis.warnings.map((w,i) => {
                      const cls = w.severity === 'high' ? 'bg-red-100 border-red-300 text-red-900'
                        : w.severity === 'mid' ? 'bg-amber-50 border-amber-300 text-amber-900'
                        : 'bg-gray-50 border-gray-300 text-gray-700';
                      return (
                        <div key={i} className={`border rounded px-2 py-1 text-[11px] ${cls}`}>
                          <span className="mr-1">{w.icon}</span>{w.text}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* 具体アドバイス */}
              {oppAnalysis.advice.length > 0 && (
                <div>
                  <div className="text-[11px] font-bold text-blue-800 mb-0.5">💡 具体アドバイス</div>
                  <div className="space-y-1">
                    {oppAnalysis.advice.map((a,i) => {
                      const cls = a.tier === 'high' ? 'bg-blue-100 border-blue-400'
                        : a.tier === 'warn' ? 'bg-red-50 border-red-300'
                        : a.tier === 'mid' ? 'bg-emerald-50 border-emerald-300'
                        : 'bg-gray-50 border-gray-300';
                      return (
                        <div key={i} className={`border rounded px-2 py-1 text-[11px] ${cls}`}>
                          <div className="font-bold">{a.icon} {a.text}</div>
                          {a.subs && (
                            <ul className="mt-0.5 space-y-0.5 list-disc list-inside text-gray-700">
                              {a.subs.map((s,j) => <li key={j}>{s}</li>)}
                            </ul>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* 優先撃破ターゲット（画像付きで強調表示） */}
              {oppAnalysis.targets.length > 0 && (
                <div>
                  <div className="text-[11px] font-bold text-purple-800 mb-0.5">🎯 最優先撃破ターゲット</div>
                  <div className="flex gap-1.5 flex-wrap">
                    {oppAnalysis.targets.slice(0, 3).map((t,i) => {
                      const oi = opponents.findIndex(o => o && o.jp === t.poke.jp);
                      const isKo = oi >= 0 && koOpp[oi];
                      return (
                        <button key={i}
                          disabled={oi < 0 || isKo}
                          onClick={() => oi >= 0 && setActiveOpp(oi)}
                          className={`flex flex-col items-center border-2 rounded-lg p-1 min-w-[100px] text-[10px] ${
                            isKo ? 'bg-gray-200 border-gray-400 opacity-50'
                              : t.priority >= 3 ? 'bg-red-50 border-red-500'
                              : 'bg-amber-50 border-amber-400'
                          } hover:shadow-md transition`}>
                          <img src={pokeImg(t.poke)} onError={e=>{e.target.src=pokeImgFallback(t.poke)}}
                            className={`w-12 h-12 object-contain ${isKo ? 'grayscale' : ''}`} />
                          <div className="font-bold">{t.poke.jp}{isKo && ' ✕'}</div>
                          <div className="text-[9px] text-gray-600 text-center leading-tight">{t.reason}</div>
                        </button>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      )}

      {/* STEP1: 選出3匹 */}
      <div className="bg-white border rounded-lg p-2.5">
        <div className="text-xs font-bold text-gray-700 mb-1.5">
          STEP1: 選出3匹
          {megaPicked >= 2 && <span className="ml-2 text-red-600">⚠ メガは1バトル1体のみ</span>}
        </div>
        <div className="grid grid-cols-3 gap-2">
          {[0,1,2].map(slot => {
            const pickIdx = picks[slot];
            const u = pickIdx != null ? userTeam[pickIdx] : null;
            const ko = koUser[slot];
            const isActive = activeUser === slot;
            return (
              <div key={slot}
                className={`relative border-2 rounded-lg p-1.5 flex flex-col items-center gap-1 ${
                  ko ? 'bg-gray-200 border-gray-400 opacity-60'
                    : isActive ? 'bg-blue-100 border-blue-500'
                    : u ? (isMega(u) ? 'bg-purple-50 border-purple-300' : 'bg-white border-gray-200')
                    : 'bg-gray-50 border-dashed border-gray-300'
                }`}>
                {u ? (
                  <>
                    <img src={pokeImg(u)} onError={e=>{e.target.src=pokeImgFallback(u)}}
                      className={`w-14 h-14 object-contain ${ko ? 'grayscale' : ''}`} />
                    <div className="text-[10px] font-bold truncate max-w-full flex items-center gap-0.5">
                      {isMega(u) && <span>💎</span>}
                      <span>{u.jp}</span>
                    </div>
                    <div className="flex flex-wrap gap-0.5 justify-center">
                      {u.types.map(t => <TypeBadge key={t} type={t} size="xs" />)}
                    </div>
                    <div className="flex gap-1 mt-0.5">
                      <button onClick={()=>setActiveUser(isActive ? null : slot)}
                        disabled={ko}
                        className={`text-[10px] px-1.5 py-0.5 rounded font-bold ${
                          isActive ? 'bg-blue-600 text-white'
                          : ko ? 'bg-gray-200 text-gray-400 cursor-not-allowed'
                          : 'bg-blue-100 text-blue-700 hover:bg-blue-200'
                        }`}>
                        {isActive ? '場' : '出'}
                      </button>
                      <button onClick={()=>toggleKoUser(slot)}
                        className={`text-[10px] px-1.5 py-0.5 rounded font-bold ${
                          ko ? 'bg-red-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-red-100'
                        }`}>
                        {ko ? '復帰' : 'KO'}
                      </button>
                      <button onClick={()=>clearUserPick(slot)}
                        className="text-[10px] px-1.5 py-0.5 rounded font-bold bg-gray-100 text-gray-600 hover:bg-red-100">
                        ×
                      </button>
                    </div>
                  </>
                ) : (
                  <button onClick={()=>setUserPickerOpen(slot)}
                    className="w-full h-24 flex items-center justify-center text-xs text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded">
                    + 選出{slot+1}
                  </button>
                )}
              </div>
            );
          })}
        </div>
      </div>

      {/* STEP2: 相手（判明次第登録） */}
      <div className="bg-white border rounded-lg p-2.5">
        <div className="text-xs font-bold text-gray-700 mb-1.5">
          STEP2: 相手（判明次第タップで登録）
        </div>
        <div className="grid grid-cols-3 sm:grid-cols-6 gap-1.5">
          {[0,1,2,3,4,5].map(i => {
            const o = opponents[i];
            const ko = koOpp[i];
            const isActive = activeOpp === i;
            return (
              <div key={i}
                className={`relative border rounded p-1 flex flex-col items-center gap-0.5 ${
                  ko ? 'bg-gray-200 border-gray-400 opacity-60'
                    : isActive ? 'bg-red-100 border-red-500 border-2'
                    : o ? 'bg-red-50 border-red-200'
                    : 'bg-gray-50 border-dashed border-gray-300'
                }`}>
                {o ? (
                  <>
                    <img src={pokeImg(o)} onError={e=>{e.target.src=pokeImgFallback(o)}}
                      className={`w-10 h-10 object-contain ${ko ? 'grayscale' : ''}`} />
                    <div className="text-[9px] font-bold truncate max-w-full">{o.jp}</div>
                    <div className="flex gap-0.5">
                      <button onClick={()=>setActiveOpp(isActive ? null : i)}
                        disabled={ko}
                        className={`text-[9px] px-1 py-0.5 rounded font-bold ${
                          isActive ? 'bg-red-600 text-white'
                          : ko ? 'bg-gray-200 text-gray-400'
                          : 'bg-red-100 text-red-700 hover:bg-red-200'
                        }`}>
                        {isActive ? '場' : '出'}
                      </button>
                      <button onClick={()=>toggleKoOpp(i)}
                        className={`text-[9px] px-1 py-0.5 rounded font-bold ${
                          ko ? 'bg-red-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-red-100'
                        }`}>
                        {ko ? '戻' : '✕'}
                      </button>
                      <button onClick={()=>clearOppSlot(i)}
                        className="text-[9px] px-1 py-0.5 rounded font-bold bg-gray-100 text-gray-600 hover:bg-red-100"
                        title="削除">
                        🗑
                      </button>
                    </div>
                  </>
                ) : (
                  <button onClick={()=>setOppPickerOpen(i)}
                    className="w-full h-16 flex items-center justify-center text-[10px] text-gray-400 hover:text-red-600 hover:bg-red-50 rounded">
                    + 相手{i+1}
                  </button>
                )}
              </div>
            );
          })}
        </div>
        <div className="text-[10px] text-gray-500 mt-1.5">
          ※ 出してきた順に登録すれば前半ほど重要。登録しきれなくても推奨は既知の相手から算出します。
        </div>
      </div>

      {/* フィールド状態トラッカー */}
      <div className="bg-white border rounded-lg p-2.5">
        <div className="flex items-center justify-between mb-1.5">
          <div className="text-xs font-bold text-gray-700">🌤 場の状況トラッカー</div>
          <div className="flex items-center gap-1.5">
            <button onClick={()=>advanceTurn(-1)} className="text-[10px] font-bold px-1.5 py-0.5 rounded border bg-white hover:bg-gray-50" title="ターン戻す">−</button>
            <span className="text-[11px] font-bold text-gray-700">T{turn}</span>
            <button onClick={()=>advanceTurn(1)} className="text-[10px] font-bold px-1.5 py-0.5 rounded border bg-blue-100 text-blue-700 hover:bg-blue-200" title="ターン進める">＋</button>
          </div>
        </div>
        {/* 天候 */}
        <div className="mb-1.5">
          <div className="text-[10px] text-gray-500 mb-0.5">天候 {field.weather && <span className="text-blue-700 font-bold">残{field.weatherT}T</span>}</div>
          <div className="flex gap-1 flex-wrap">
            {[
              {k:'sun', label:'☀ 晴れ', cls:'bg-amber-100 text-amber-800 border-amber-300', active:'bg-amber-500 text-white border-amber-600'},
              {k:'rain', label:'🌧 雨', cls:'bg-blue-100 text-blue-800 border-blue-300', active:'bg-blue-500 text-white border-blue-600'},
              {k:'sand', label:'🌪 砂', cls:'bg-yellow-100 text-yellow-800 border-yellow-300', active:'bg-yellow-600 text-white border-yellow-700'},
              {k:'snow', label:'❄ 雪', cls:'bg-cyan-100 text-cyan-800 border-cyan-300', active:'bg-cyan-500 text-white border-cyan-600'},
            ].map(w => (
              <button key={w.k} onClick={()=>setWeather(w.k)}
                className={`text-[10px] font-bold px-2 py-0.5 rounded border ${field.weather === w.k ? w.active : w.cls}`}>
                {w.label}
              </button>
            ))}
          </div>
        </div>
        {/* フィールド */}
        <div className="mb-1.5">
          <div className="text-[10px] text-gray-500 mb-0.5">フィールド {field.terrain && <span className="text-green-700 font-bold">残{field.terrainT}T</span>}</div>
          <div className="flex gap-1 flex-wrap">
            {[
              {k:'electric', label:'⚡ エレキ', cls:'bg-yellow-100 text-yellow-800 border-yellow-300', active:'bg-yellow-500 text-white border-yellow-600'},
              {k:'grass', label:'🌿 グラス', cls:'bg-green-100 text-green-800 border-green-300', active:'bg-green-500 text-white border-green-600'},
              {k:'psychic', label:'🔮 サイコ', cls:'bg-pink-100 text-pink-800 border-pink-300', active:'bg-pink-500 text-white border-pink-600'},
              {k:'misty', label:'🌫 ミスト', cls:'bg-pink-50 text-pink-700 border-pink-200', active:'bg-pink-300 text-white border-pink-400'},
            ].map(t => (
              <button key={t.k} onClick={()=>setTerrain(t.k)}
                className={`text-[10px] font-bold px-2 py-0.5 rounded border ${field.terrain === t.k ? t.active : t.cls}`}>
                {t.label}
              </button>
            ))}
            <button onClick={toggleTrickRoom}
              className={`text-[10px] font-bold px-2 py-0.5 rounded border ${field.trickRoom ? 'bg-purple-500 text-white border-purple-600' : 'bg-purple-100 text-purple-800 border-purple-300'}`}>
              🕳 TR {field.trickRoom && `残${field.trickRoomT}T`}
            </button>
          </div>
        </div>
        {/* ハザード */}
        <div className="grid grid-cols-2 gap-2 mb-1.5">
          <div>
            <div className="text-[10px] text-red-600 font-bold mb-0.5">敵側ハザード(自軍が設置)</div>
            <div className="flex gap-1 flex-wrap">
              <button onClick={()=>toggleHazardOpp('sr')}
                className={`text-[10px] font-bold px-1.5 py-0.5 rounded border ${field.hazardsOpp.sr ? 'bg-orange-500 text-white border-orange-600' : 'bg-orange-50 text-orange-700 border-orange-200'}`}>
                🪨 SR
              </button>
              <button onClick={()=>toggleHazardOpp('spikes')}
                className={`text-[10px] font-bold px-1.5 py-0.5 rounded border ${field.hazardsOpp.spikes > 0 ? 'bg-amber-500 text-white border-amber-600' : 'bg-amber-50 text-amber-700 border-amber-200'}`}>
                🧷 びし×{field.hazardsOpp.spikes}
              </button>
              <button onClick={()=>toggleHazardOpp('tspikes')}
                className={`text-[10px] font-bold px-1.5 py-0.5 rounded border ${field.hazardsOpp.tspikes > 0 ? 'bg-purple-500 text-white border-purple-600' : 'bg-purple-50 text-purple-700 border-purple-200'}`}>
                🧪 毒×{field.hazardsOpp.tspikes}
              </button>
              <button onClick={()=>toggleHazardOpp('web')}
                className={`text-[10px] font-bold px-1.5 py-0.5 rounded border ${field.hazardsOpp.web ? 'bg-cyan-500 text-white border-cyan-600' : 'bg-cyan-50 text-cyan-700 border-cyan-200'}`}>
                🕸 網
              </button>
            </div>
          </div>
          <div>
            <div className="text-[10px] text-blue-600 font-bold mb-0.5">自軍側ハザード(相手が設置)</div>
            <div className="flex gap-1 flex-wrap">
              <button onClick={()=>toggleHazardUser('sr')}
                className={`text-[10px] font-bold px-1.5 py-0.5 rounded border ${field.hazardsUser.sr ? 'bg-orange-500 text-white border-orange-600' : 'bg-orange-50 text-orange-700 border-orange-200'}`}>
                🪨 SR
              </button>
              <button onClick={()=>toggleHazardUser('spikes')}
                className={`text-[10px] font-bold px-1.5 py-0.5 rounded border ${field.hazardsUser.spikes > 0 ? 'bg-amber-500 text-white border-amber-600' : 'bg-amber-50 text-amber-700 border-amber-200'}`}>
                🧷 びし×{field.hazardsUser.spikes}
              </button>
              <button onClick={()=>toggleHazardUser('tspikes')}
                className={`text-[10px] font-bold px-1.5 py-0.5 rounded border ${field.hazardsUser.tspikes > 0 ? 'bg-purple-500 text-white border-purple-600' : 'bg-purple-50 text-purple-700 border-purple-200'}`}>
                🧪 毒×{field.hazardsUser.tspikes}
              </button>
              <button onClick={()=>toggleHazardUser('web')}
                className={`text-[10px] font-bold px-1.5 py-0.5 rounded border ${field.hazardsUser.web ? 'bg-cyan-500 text-white border-cyan-600' : 'bg-cyan-50 text-cyan-700 border-cyan-200'}`}>
                🕸 網
              </button>
            </div>
          </div>
        </div>
        {/* 壁 */}
        <div>
          <div className="text-[10px] text-gray-500 mb-0.5">壁 (残T)</div>
          <div className="flex gap-1 flex-wrap">
            <button onClick={()=>toggleScreen('reflect')}
              className={`text-[10px] font-bold px-1.5 py-0.5 rounded border ${field.screens.reflect > 0 ? 'bg-red-500 text-white border-red-600' : 'bg-red-50 text-red-700 border-red-200'}`}>
              🟥 リフレクター {field.screens.reflect > 0 ? field.screens.reflect : ''}
            </button>
            <button onClick={()=>toggleScreen('light')}
              className={`text-[10px] font-bold px-1.5 py-0.5 rounded border ${field.screens.light > 0 ? 'bg-blue-500 text-white border-blue-600' : 'bg-blue-50 text-blue-700 border-blue-200'}`}>
              🟦 ひかりのかべ {field.screens.light > 0 ? field.screens.light : ''}
            </button>
            <button onClick={()=>toggleScreen('veil')}
              className={`text-[10px] font-bold px-1.5 py-0.5 rounded border ${field.screens.veil > 0 ? 'bg-cyan-500 text-white border-cyan-600' : 'bg-cyan-50 text-cyan-700 border-cyan-200'}`}>
              🌈 オーロラベール {field.screens.veil > 0 ? field.screens.veil : ''}
            </button>
          </div>
        </div>
        {/* 効果リマインダ */}
        {(field.weather || field.terrain || field.trickRoom) && (
          <div className="mt-1.5 pt-1.5 border-t text-[10px] text-gray-600 space-y-0.5">
            {field.weather === 'sun' && <div>☀ 晴れ: ほのお×1.5 / みず×0.5 / 回復技50%しか回復せず / ソーラービーム1T発動 / すいほう系バフ</div>}
            {field.weather === 'rain' && <div>🌧 雨: みず×1.5 / ほのお×0.5 / かみなり命中100 / ぼうふう命中100 / あめうけざら回復</div>}
            {field.weather === 'sand' && <div>🌪 砂: いわタイプのD1.5倍 / 砂ダメ毎T1/16 (岩/地/鋼以外)</div>}
            {field.weather === 'snow' && <div>❄ 雪: こおりタイプのB1.5倍 / ふぶき命中100 / オーロラベール使用可</div>}

              <div className="space-y-0.5">
                {faceOff.abilityAdvice.map((a, i) => (
                  <div key={i} className={`text-[11px] ${a.cls}`}>{a.text}</div>
                ))}

            </div>

          <div className="bg-white rounded border border-blue-200 p-2 space-y-1">

              <div>
                <div className={`font-bold ${faceOff.speedInfo.cls}`}>
                  🏃 {faceOff.speedInfo.text}
                </div>
                {faceOff.scarfRisk && (
                  <div className="text-[10px] text-amber-700 mt-0.5">
                    ⚠ スカーフなら S{faceOff.sp.osScarf} で逆転

                {faceOff.sp.scarfSafe && (
                  <div className="text-[10px] text-green-600 mt-0.5">

                  <div className="text-[10px] text-yellow-700 mt-0.5">

                  </div>

              </div>
              <div className={`font-bold ${faceOff.race.color}`}>
                🎯 {faceOff.race.label}
                <div className="text-[10px] font-normal text-gray-600 mt-0.5">
                  {faceOff.race.reason}
                </div>
              </div>
            </div>
            <div className="flex gap-2 text-[11px] pt-1 border-t border-gray-100">
              <div className="flex-1">
                <span className="text-gray-500">こちら→相手:</span>
                {faceOff.kt ? (
                  <span className="ml-1 font-bold text-blue-700">
                    {faceOff.kt.turns}発{faceOff.kt.accTurns > faceOff.kt.turns ? `(命中考慮${faceOff.kt.accTurns}発)` : ''}
                    <span className="text-gray-500 font-normal ml-1">({faceOff.ms.off.dmgPct}%)</span>
                  </span>
                ) : (
                  <span className="ml-1 text-red-600 font-bold">打点なし</span>
                )}
              </div>
              <div className="flex-1">
                <span className="text-gray-500">相手→こちら:</span>
                {faceOff.ktOpp ? (
                  <span className="ml-1 font-bold text-orange-700">
                    {faceOff.ktOpp.turns}発耐
                    <span className="text-gray-500 font-normal ml-1">({faceOff.ms.thr.dmgPct}%)</span>
                  </span>
                ) : (
                  <span className="ml-1 text-gray-500">不明</span>
                )}
              </div>
            </div>
          </div>

          <div className="text-[11px] space-y-0.5">
            {faceOff.bestMv && (
              <div className="text-gray-700">
                🎯 推奨技: <b>{faceOff.bestMv.name}</b>
                {faceOff.ms.off.dmgPct > 0 && <span className="ml-1 text-blue-700">約{faceOff.ms.off.dmgPct}%ダメ</span>}
                {faceOff.offAcc < 100 && <span className="ml-1 text-amber-600">命中{faceOff.offAcc}</span>}
                {faceOff.ms.off.stab && <span className="ml-1 text-red-600">⚡STAB</span>}
                {faceOff.ms.off.mult >= 2 && <span className="ml-1 text-green-700">✨抜群×{faceOff.ms.off.mult}</span>}
                {faceOff.priority > 0 && <span className="ml-1 text-sky-700">+{faceOff.priority}先制</span>}
              </div>
            )}
            <div className="text-orange-700">🛡 被弾予測: 最大 約{faceOff.ms.thr.dmgPct}%（{faceOff.ms.thr.cat === '物' ? '物理' : '特殊'}/{faceOff.ms.thr.type}）</div>
            {faceOff.verdictReasons.map((r, i) => (
              <div key={i} className="text-gray-600">💡 {r}</div>

          {/* 自軍4技の打点一覧 */}

            <div className="bg-white rounded border border-blue-200 p-2">

              <div className="space-y-0.5">
                {faceOff.perMove.map((m, i) => {
                  const dmg = m.dmgPct || 0;
                  const kt = m.isStatus || m.blocked ? null : killTurns(dmg, m.acc);
                  const rowCls = m.blocked
                    ? 'bg-gray-100 border-gray-300 text-gray-500'
                    : m.isStatus
                      ? 'bg-gray-50 border-gray-200 text-gray-600'
                      : dmg >= 100 ? 'bg-green-50 border-green-300'
                        : dmg >= 50 ? 'bg-emerald-50 border-emerald-200'
                        : dmg >= 25 ? 'bg-white border-gray-200'
                        : 'bg-orange-50 border-orange-200';
                  return (
                    <div key={i} className={`flex items-center gap-1.5 border rounded px-1.5 py-0.5 text-[11px] ${rowCls}`}>
                      <TypeBadge type={m.type} size="xs" />
                      {m.cat && <span className={`text-[9px] font-bold px-1 rounded ${MOVE_CAT_CLS[m.cat]||''}`}>{m.cat}</span>}
                      <span className="font-bold truncate flex-1">{m.name}</span>
                      {m.stab && <span className="text-[9px] text-red-600 font-bold">STAB</span>}
                      {m.priority > 0 && <span className="text-[9px] text-sky-700 font-bold">+{m.priority}</span>}
                      {m.priority < 0 && <span className="text-[9px] text-gray-500">{m.priority}</span>}
                      {m.mult !== undefined && m.mult !== 1 && !m.blocked && (
                        <span className={`text-[9px] font-bold ${m.mult >= 2 ? 'text-green-700' : 'text-gray-500'}`}>×{m.mult}</span>
                      )}
                      {m.resistBonus && (
                        <span className="text-[9px] text-orange-600 font-bold" title="特性による軽減">×{m.resistBonus}</span>
                      )}
                      {m.blocked ? (
                        <span className="text-[10px] font-bold text-red-600 ml-auto">🚫{m.reason}</span>
                      ) : m.isStatus ? (
                        <span className="text-[10px] text-gray-500 ml-auto">{SETUP_MOVES[m.name]?.stat || '変化技'}</span>
                      ) : (
                        <>
                          <span className="text-[10px] font-bold text-blue-700 ml-auto">{dmg}%</span>
                          {kt && <span className="text-[9px] text-gray-600">{kt.turns}発</span>}
                          {m.acc < 100 && <span className="text-[9px] text-amber-600">命{m.acc}</span>}
                        </>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* 相手の判明技（相手のmoves登録時のみ） */}
          {faceOff.oppMove && faceOff.oppMove.length > 0 && (
            <div className="bg-white rounded border border-red-200 p-2">
              <div className="text-[10px] font-bold text-red-900 mb-1">🛡 相手のわざ (判明分)</div>
              <div className="space-y-0.5">
                {faceOff.oppMove.map((m, i) => {
                  const dmg = m.dmgPct || 0;
                  const kt = m.isStatus || m.blocked ? null : killTurns(dmg, 90); // 相手命中粗めに90%
                  const rowCls = m.blocked
                    ? 'bg-green-50 border-green-300 text-green-700'
                    : m.isStatus
                      ? 'bg-gray-50 border-gray-200 text-gray-600'
                      : dmg >= 100 ? 'bg-red-100 border-red-400'
                        : dmg >= 50 ? 'bg-orange-50 border-orange-300'
                        : dmg >= 25 ? 'bg-yellow-50 border-yellow-200'
                        : 'bg-white border-gray-200';
                  return (
                    <div key={i} className={`flex items-center gap-1.5 border rounded px-1.5 py-0.5 text-[11px] ${rowCls}`}>
                      <TypeBadge type={m.type} size="xs" />
                      {m.cat && <span className={`text-[9px] font-bold px-1 rounded ${MOVE_CAT_CLS[m.cat]||''}`}>{m.cat}</span>}
                      <span className="font-bold truncate flex-1">{m.name}</span>
                      {m.stab && <span className="text-[9px] text-red-600 font-bold">STAB</span>}
                      {m.priority > 0 && <span className="text-[9px] text-sky-700 font-bold">+{m.priority}</span>}
                      {m.mult !== undefined && m.mult !== 1 && !m.blocked && (
                        <span className={`text-[9px] font-bold ${m.mult >= 2 ? 'text-red-700' : 'text-gray-500'}`}>×{m.mult}</span>
                      )}
                      {m.blocked ? (
                        <span className="text-[10px] font-bold text-green-700 ml-auto">✓{m.reason}</span>
                      ) : m.isStatus ? (
                        <span className="text-[10px] text-gray-500 ml-auto">{SETUP_MOVES[m.name]?.stat || '変化技'}</span>
                      ) : (
                        <>
                          <span className="text-[10px] font-bold text-orange-700 ml-auto">{dmg}%</span>
                          {kt && <span className="text-[9px] text-gray-600">{kt.turns}発</span>}
                          {m.acc < 100 && <span className="text-[9px] text-amber-600">命{m.acc}</span>}
                        </>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* 先制技レース */}
          {faceOff.pRace && (faceOff.pRace.user.length > 0 || faceOff.pRace.opp.length > 0) && (
            <div className="bg-sky-50 rounded border border-sky-200 p-2">
              <div className="text-[10px] font-bold text-sky-900 mb-1">⚡ 先制技レース</div>
              <div className="grid grid-cols-2 gap-2 text-[11px]">
                <div>
                  <div className="text-[10px] text-gray-600 mb-0.5">自軍 (<b>{faceOff.u.jp}</b>)</div>
                  {faceOff.pRace.user.length > 0 ? (
                    <div className="space-y-0.5">
                      {faceOff.pRace.user.map((m,i) => (
                        <div key={i} className="flex items-center gap-1 bg-white border border-sky-200 rounded px-1 py-0.5">
                          <TypeBadge type={m.type} size="xs" />
                          <span className="font-bold truncate flex-1">{m.name}</span>
                          <span className="text-sky-700 font-bold">+{m.priority}</span>

                      {faceOff.pRace.opp.map((m,i) => (

              <div className={`text-[10px] font-bold mb-1 ${
                faceOff.setupOp.level === 'high' ? 'text-purple-900' : 'text-indigo-900'

                {faceOff.setupOp.level === 'high' ? '💎 絶好の積み窓口（被弾' : '💫 積み/補助チャンス（被弾'}

                      s.ms.total >= 2 ? 'bg-green-50 border-green-300 text-green-800'

                    <img src={pokeImg(s.poke)} onError={e=>{e.target.src=pokeImgFallback(s.poke)}} className="w-5 h-5 object-contain" />

                    <span className="font-bold">{s.ms.total >= 0 ? '+' : ''}{s.ms.total.toFixed(1)}</span>
                  </button>
                ))}

      )}

      {/* 終盤詰め将棋 */}
      {endgamePlan && endgamePlan.aliveO.length > 0 && endgamePlan.aliveU.length > 0 && (
        <div className="bg-white border rounded-lg p-2.5">

          <div className="space-y-1">
            {endgamePlan.perOpp.map(p => {
              const t = p.ms.total;
              const cls = t >= 3 ? 'bg-green-100 border-green-400 text-green-900'
                : t >= 1 ? 'bg-emerald-50 border-emerald-300 text-emerald-800'
                : t >= 0 ? 'bg-gray-50 border-gray-300 text-gray-700'
                : 'bg-red-50 border-red-300 text-red-700';
              return (
                <div key={p.oppIdx} className={`flex items-center gap-2 border rounded px-2 py-1 ${cls}`}>
                  <div className="flex items-center gap-1 min-w-[80px]">
                    <img src={pokeImg(p.opp)} onError={e=>{e.target.src=pokeImgFallback(p.opp)}} className="w-6 h-6 object-contain" />
                    <span className="text-[11px] font-bold truncate max-w-[70px]">{p.opp.jp}</span>
                  </div>
                  <span className="text-gray-400">→</span>
                  <div className="flex items-center gap-1 flex-1 min-w-0">
                    <img src={pokeImg(p.u)} onError={e=>{e.target.src=pokeImgFallback(p.u)}} className="w-6 h-6 object-contain" />
                    <span className="text-[11px] font-bold truncate">{p.u.jp}</span>
                    {isMega(p.u) && <span title="メガ">💎</span>}
                  </div>
                  <span className="text-[11px] font-bold whitespace-nowrap">
                    {t >= 0 ? '+' : ''}{t.toFixed(1)}
                  </span>
                  <button onClick={()=>{
                    setActiveUser(p.picksIdx);
                    setActiveOpp(p.oppIdx);
                  }} className="text-[9px] px-1.5 py-0.5 rounded bg-white border hover:bg-blue-50 whitespace-nowrap">
                    対面
                  </button>
                </div>
              );
            })}
          </div>
          <div className="text-[10px] text-gray-500 mt-1.5 leading-snug">
            ※ 「対面」を押すと STEP3 にその組合せの詳細（確定数・速度レース）が出ます
          </div>
        </div>
      )}

      {/* 残存マッチアップ全景 */}
      {remainingMatrix.length > 0 && aliveOpps > 0 && (
        <div className="bg-white border rounded-lg p-2.5">
          <div className="text-xs font-bold text-gray-700 mb-1.5">📊 残存マッチアップ（数字＝相性スコア）</div>
          <div className="overflow-x-auto">
            <table className="text-[10px] border-collapse">
              <thead>
                <tr>
                  <th className="p-1 border-b"></th>
                  {opponents.map((o,oi) => (o && !koOpp[oi]) && (
                    <th key={oi} className="p-1 border-b text-center min-w-[48px]">
                      <img src={pokeImg(o)} onError={e=>{e.target.src=pokeImgFallback(o)}}
                        className="w-7 h-7 object-contain mx-auto" />
                      <div className="text-[9px] truncate max-w-[50px]">{o.jp}</div>
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {remainingMatrix.map(row => (
                  <tr key={row.picksIdx}>
                    <td className="p-1 border-r">
                      <div className="flex items-center gap-1">
                        <img src={pokeImg(row.u)} onError={e=>{e.target.src=pokeImgFallback(row.u)}}
                          className="w-6 h-6 object-contain" />
                        <span className="text-[9px] truncate max-w-[50px]">{row.u.jp}</span>
                      </div>
                    </td>
                    {opponents.map((o,oi) => {
                      if (!o || koOpp[oi]) return null;
                      const cell = row.cols.find(c => c.oppIdx === oi);
                      if (!cell) return <td key={oi} className="p-1 text-center">-</td>;
                      const t = cell.ms.total;
                      const cls = t >= 5 ? 'bg-green-700 text-white'
                        : t >= 3 ? 'bg-green-500 text-white'
                        : t >= 1.5 ? 'bg-emerald-300 text-emerald-900'
                        : t >= 0 ? 'bg-gray-100 text-gray-700'
                        : t >= -2 ? 'bg-orange-400 text-white'
                        : 'bg-red-600 text-white';
                      return (
                        <td key={oi} className="p-0.5 text-center">
                          <span className={`px-1.5 py-0.5 rounded font-bold inline-block ${cls}`}>
                            {t >= 0 ? '+' : ''}{t.toFixed(1)}
                          </span>
                        </td>
                      );
                    })}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

              {availableUserIdxs.length === 0 && (
                <div className="col-span-3 text-xs text-gray-500 text-center p-3">

      )}
    </div>
  );

function buildFixedPartySlots() {
  return FIXED_PARTY_DATA.map(d => {
    const r = ROSTER.find(x => x.id === d.rosterId);
    if (!r) return null;
    const moves = d.moves.map(name => {
      const md = lookupMove(name);
      if (!md) return { name, type: '', cat: '', bp: null, accuracy: null, priority: null };
      let bp;
      if (md.cat === '変') bp = 0;
      else if (MOVE_SPECIAL[name]) bp = null;
      else bp = MOVE_BP[name] != null ? MOVE_BP[name] : null;
      return {
        name,
        type: md.type,
        cat: md.cat,
        bp,
        accuracy: MOVE_ACCURACY[name] != null ? MOVE_ACCURACY[name] : null,
        priority: MOVE_PRIORITY[name] != null ? MOVE_PRIORITY[name] : null,
      };
    });
    return {
      id: r.id,
      dex: r.dex,
      jp: r.jp,
      types: r.types,
      img: r.img,
      spd: r.spd,
      moves,
      item: d.item,
      ability: d.ability,
    };
  });
}

// 名前突合（部分一致込み）
function matchupFor(name) {
  if (!name) return [];
  const strip = s => String(s).replace(/[（(].+?[)）]/g, '').trim();
  const n = strip(name);
  return MATCHUP_GUIDE.filter(g => g.match.some(m => {
    const mm = strip(m);
    return name === m || n === mm || name.includes(mm) || mm.includes(n);
  }));
}

// ====== 固定構築: 選出パターン推奨エンジン ======
// 記事の判断ロジックを実装
function recommendPartyPattern(opps) {
  const list = (opps || []).filter(Boolean);
  if (list.length === 0) return null;
  const names = list.map(x => x.jp);
  const strip = s => String(s).replace(/[（(].+?[)）]/g, '').trim();
  const hasName = (key) => names.some(n => n === key || n.includes(key) || strip(n).includes(strip(key)));

  // 苦手5匹カウント（メガ形態も含む）
  const toughKeys = ['ゲンガー','ハッサム','ギルガルド','マスカーニャ','ルカリオ'];
  const toughHits = [];
  toughKeys.forEach(k => {
    const hit = names.find(n => n.includes(k));
    if (hit) toughHits.push(hit);
  });

  // 初手になりやすい鋼(ギルガルド/ハッサム)
  const hasInitialSteel = hasName('ギルガルド') || hasName('ハッサム');

  // トリプルアクセル使い候補（名前ベース検出）
  const triAxelMons = ['グレイシア','マンムー','ケケンカニ','バイバニラ','ツンベアー','メガケケンカニ','ヒスイクレベース'];
  const hasTriAxelRisk = triAxelMons.some(n => hasName(n));

  // 補助技系サポーター
  const stallSupporters = ['カバルドン','ブラッキー','ドヒドイデ','エアームド','フォレトス'];
  const hasStaller = stallSupporters.some(n => hasName(n));

  // 引き分け対象
  const drawTargets = ['ドヒドイデ','ブラッキー'];
  const drawHits = drawTargets.filter(n => hasName(n));

  // 雨始動+エース（コメント回答: 雨パは①でOK）
  const hasRainSetter = hasName('ペリッパー') || hasName('ニョロトノ');
  const rainAbusers = ['イダイトウ','ブリジュラス','スターミー','ゲッコウガ'];
  const hasRainCombo = hasRainSetter && rainAbusers.some(n => hasName(n));

  // === 判断ロジック ===
  const reasons = [];
  let pattern, megaTo, confidence = 'high';

  if (hasRainCombo) {
    // 雨パは①で選出（コメント回答より）
    pattern = '①';
    megaTo = 'メガピクシー';
    reasons.push({icon:'☔', text:`雨パ検出（ペリッパー + ${rainAbusers.filter(n=>hasName(n)).join('/')}）→ ①で選出。ブリまでバトンできれば全抜き可`});
  } else if (toughHits.length >= 2) {
    pattern = '②';
    megaTo = 'メガカイリュー';
    reasons.push({icon:'⚠', text:`苦手5匹が${toughHits.length}体(${toughHits.join(' / ')}) → 表選出②ではなく裏選出②`});
    if (hasTriAxelRisk) {
      confidence = 'medium';
      reasons.push({icon:'⚡', text:`トリプルアクセル使い候補あり → カイリュー初手は避けて、イダイトウ先発など慎重に`});
    } else {
      reasons.push({icon:'✓', text:'トリアク持ちなし → カイリュー初手でタイマン1体持っていくプラン有効'});
    }
  } else if (hasInitialSteel && toughHits.length === 1) {
    pattern = '③';
    megaTo = 'メガカイリュー';
    reasons.push({icon:'🔧', text:`初手ギルガルド/ハッサムが出そう → ③でカイリュー対応、クエス+ブリでサイクル`});
    reasons.push({icon:'ℹ', text:'サイクル戦化したらカイリューへのバトンも可（サブプラン）'});
  } else {
    pattern = '①';
    megaTo = 'メガピクシー';
    if (toughHits.length === 1) {
      reasons.push({icon:'⚖', text:`苦手5匹は1体のみ(${toughHits[0]}) → ブリ全抜きが現実的なら表選出でOK`});
      confidence = 'medium';
    } else {
      reasons.push({icon:'✓', text:'苦手5匹なし → 表選出が通りやすい'});
    }
    if (hasStaller) {
      reasons.push({icon:'🎭', text:`補助技系(${stallSupporters.filter(n=>hasName(n)).join('/')})あり → ピクシー見せで吼え/ふきとばし牽制`});
    }
    if (drawHits.length > 0) {
      reasons.push({icon:'⚠', text:`引き分け対象(${drawHits.join('/')})あり → 積めないケースは引き分け狙いに切替`});
      confidence = 'medium';
    }
  }

  // 副推奨（次点プラン）
  const alt = [];
  if (pattern === '①') {
    if (hasInitialSteel) alt.push({pattern:'③', reason:'初手に鋼が出たらカイリューで対応する変則プラン'});
  } else if (pattern === '②') {
    alt.push({pattern:'③', reason:'相手が鋼+物理偏重ならクエス+ブリのサイクルに切替'});
  } else if (pattern === '③') {
    alt.push({pattern:'②', reason:'相手にトリアク持ちがいないならカイリュー初手+サイクルも強い'});
  }

  return { pattern, megaTo, reasons, confidence, toughHits, hasTriAxelRisk, drawHits };
}
