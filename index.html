  );
}

// ====== 相手分析 ======
function OpponentSlot({idx, opp, userTeam, onPick, onClear}) {
  if (!opp) {
    return (
      <button onClick={onPick} className="border-2 border-dashed rounded-lg p-6 text-gray-400 hover:border-blue-400 hover:text-blue-600 flex flex-col items-center justify-center gap-2 min-h-[160px]">
        <IconPlus className="w-6 h-6" />
        <span className="text-sm font-bold">相手{idx+1}を追加</span>
      </button>
    );
  }

  const weak = allWeaknesses(opp.types);
  const weak4 = TYPES.filter(t => weak[t] === 4);
  const weak2 = TYPES.filter(t => weak[t] === 2);
  const resist = TYPES.filter(t => weak[t] < 1 && weak[t] > 0);
  const immune = TYPES.filter(t => weak[t] === 0);

  const hits = [];
  userTeam.forEach((up, pi) => {
    if (!up) return;
    up.moves?.forEach(mv => {
      if (!mv.type || mv.cat === '変') return;
      const m = defensiveMult(mv.type, opp.types);
      if (m >= 2) {
        const stab = up.types.includes(mv.type);
        const offF = offensiveFactor(up, mv);
        const defF = defensiveFactor(opp, mv);
        const powF = powerFactor(mv);
        const itemF = itemFactor(up, mv);
        const bonus = multNonLinearBonus(m);
        const accF = accuracyFactor(mv);
        const score = m * (stab ? 1.5 : 1) * offF * defF * powF * itemF * bonus * accF;
        const bpSrc = bpSource(mv);
        // 与ダメ期待値%
        const oppStats = getPokeStatsObj(opp.id);
        const hpBase = oppStats?.hp || 80;
        const dmgPct = Math.min(200, Math.round(score * 3300 / hpBase));
        hits.push({
          userIdx:pi, userJp:up.jp,
          moveName: mv.name || '(無名)', moveType: mv.type, moveCat: mv.cat,
          mult: m, stab, offF, defF, powF, itemF, bonus, accF, score, dmgPct, bpSrc,
          priority: movePriority(mv),
          userItem: up.item || '',
          userStats: getPokeStatsObj(up.id),
        });
      }
    });
  });
  hits.sort((a,b)=>b.score - a.score);

  // 素早さ比較（スカーフ込み実効素早さで判定）
  const oppSpd = effectiveSpeed(opp);
  const userFaster = userTeam.filter(u => u && effectiveSpeed(u) > oppSpd).length;
  const userTeamFilled = userTeam.filter(Boolean).length;

  return (
    <div className="border rounded-lg p-3 bg-white">
      <div className="flex gap-3 items-start">
        <img src={pokeImg(opp)} alt="" className="w-20 h-20 object-contain bg-gray-50 rounded flex-shrink-0"
          onError={e=>{e.target.src=pokeImgFallback(opp)}} />
        <div className="flex-1 min-w-0">
          <div className="flex items-center justify-between">
            <div className="font-bold truncate">{opp.jp}</div>
            <div className="flex gap-1 items-center">
              <a
                href={gwDetailUrl(opp.id)}
                target="_blank"
                rel="noopener noreferrer"
                className="text-xs text-gray-500 hover:text-blue-600 hover:bg-blue-50 px-1.5 py-0.5 rounded"
                title="GameWithで詳細を見る"
              >🔍</a>
              <button onClick={onPick} className="text-xs text-blue-600 hover:underline">変更</button>
              <button onClick={onClear} className="text-red-500 hover:bg-red-50 p-1 rounded"><IconX className="w-4 h-4" /></button>
            </div>
          </div>
          <div className="flex gap-1 mt-1 flex-wrap items-center">
            {opp.types.map(t => <TypeBadge key={t} type={t} />)}
            {opp.spd !== undefined && <span className="text-[10px] font-bold text-gray-600 bg-gray-100 px-1.5 py-0.5 rounded">S{opp.spd}</span>}
            <BiasBadge bias={classifyByStats(opp.id)} />
            {userTeamFilled > 0 && (
              <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${userFaster>=Math.ceil(userTeamFilled/2)?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}`}>
                先攻{userFaster}/{userTeamFilled}
              </span>
            )}
          </div>
        </div>
      </div>

      <div className="mt-3 space-y-1.5 text-xs">
        {weak4.length > 0 && (
          <div className="flex gap-1 flex-wrap items-center">
            <MultBadge mult={4} />
            {weak4.map(t => <TypeBadge key={t} type={t} />)}
          </div>
        )}
        {weak2.length > 0 && (
          <div className="flex gap-1 flex-wrap items-center">
            <MultBadge mult={2} />
            {weak2.map(t => <TypeBadge key={t} type={t} />)}
          </div>
        )}
        {resist.length > 0 && (
          <div className="flex gap-1 flex-wrap items-center opacity-70">
            <MultBadge mult={0.5} />
            {resist.map(t => <TypeBadge key={t} type={t} />)}
          </div>
        )}
        {immune.length > 0 && (
          <div className="flex gap-1 flex-wrap items-center opacity-70">
            <MultBadge mult={0} />
            {immune.map(t => <TypeBadge key={t} type={t} />)}
          </div>
        )}
      </div>

      <div className="mt-3 border-t pt-2">
        <div className="text-xs font-bold text-gray-600 mb-1.5 flex items-center gap-1">
          <IconSwords className="w-3 h-3" /> 自軍の抜群技
        </div>
        {hits.length === 0 ? (
          <div className="text-xs text-gray-400">抜群を取れる登録技なし</div>
        ) : (
          <div className="space-y-1">
            {hits.map((h, i) => {
              // 新スケール(威力/防御/ボーナス含む)に合わせた閾値
              const scoreCls = h.score >= 12 ? 'bg-red-700 text-white'
                : h.score >= 7 ? 'bg-red-500 text-white'
                : h.score >= 4 ? 'bg-orange-500 text-white'
                : h.score >= 2 ? 'bg-amber-200 text-amber-900'
                : 'bg-gray-200 text-gray-700';
              const it = ITEM_MAP[h.userItem];
              const showItemBoost = (h.itemF && h.itemF !== 1);
              const statLabel = h.moveCat === '物' ? 'A' : (h.moveCat === '特' ? 'C' : '');
              const statVal = h.userStats && h.moveCat ? (h.moveCat === '物' ? h.userStats.atk : h.userStats.spa) : null;
              return (
                <div key={i} className="flex items-center gap-1 text-xs flex-wrap">
                  <span className={`text-[10px] font-bold px-1 py-0.5 rounded ${scoreCls}`} title={`総合スコア ${h.score.toFixed(2)}`}>
                    ×{h.score.toFixed(1)}
                  </span>
                  <MultBadge mult={h.mult} />
                  {h.stab && <span className="text-[9px] font-bold px-1 py-0.5 rounded bg-yellow-300 text-yellow-900">一致</span>}
                  <TypeBadge type={h.moveType} />
                  {h.moveCat && (
                    <span className={`text-[9px] font-bold px-1 py-0.5 rounded ${MOVE_CAT_CLS[h.moveCat]}`}>{h.moveCat}</span>
                  )}
                  {statVal !== null && (
                    <span className={`text-[9px] font-bold px-1 py-0.5 rounded ${h.offF < 0.9 ? 'bg-gray-200 text-gray-500' : (h.offF >= 1.3 ? 'bg-emerald-100 text-emerald-700' : 'bg-gray-100 text-gray-700')}`}
                      title={`攻撃側補正 ×${h.offF.toFixed(2)}`}>
                      {statLabel}{statVal}
                    </span>
                  )}
                  {showItemBoost && it && (
                    <span className="text-[9px] font-bold px-1 py-0.5 rounded bg-amber-100 text-amber-800 border border-amber-300"
                      title={`${it.jp} ×${h.itemF}`}>
                      {it.emoji}×{h.itemF}
                    </span>
                  )}
                  {h.priority > 0 && (
                    <span className="text-[9px] font-bold px-1 py-0.5 rounded bg-sky-200 text-sky-900"
                      title={`先制技 優先度+${h.priority}`}>先+{h.priority}</span>
                  )}
                  {h.bpSrc === 'special' && (
                    <span className="text-[9px] font-bold px-1 py-0.5 rounded bg-purple-100 text-purple-700 border border-purple-300"
                      title="特殊挙動の技（固定ダメ/多段/変動/カウンター等）として計算">特殊</span>
                  )}
                  {h.bpSrc === 'default' && (
                    <span className="text-[9px] font-bold px-1 py-0.5 rounded bg-yellow-100 text-yellow-800 border border-yellow-400"
                      title="威力が辞書・入力ともに未登録 → デフォルト(90相当)で計算。実数値を入れると精度が上がります">⚠威力?</span>
                  )}
                  {h.accF < 1 && (
                    <span className="text-[9px] font-bold px-1 py-0.5 rounded bg-rose-100 text-rose-700 border border-rose-300"
                      title={`命中率補正 ×${h.accF.toFixed(2)}（期待値で減衰）`}>命中{Math.round(h.accF*100)}%</span>
                  )}
                  {h.dmgPct > 0 && (
                    <span className={`text-[9px] font-bold px-1 py-0.5 rounded ${h.dmgPct >= 100 ? 'bg-red-600 text-white' : h.dmgPct >= 60 ? 'bg-red-300 text-red-900' : 'bg-gray-100 text-gray-700'}`}
                      title={`与ダメ期待値 ${h.dmgPct}%（HP100基準の粗見積り）`}>
                      約{h.dmgPct}%
                    </span>
                  )}
                  <span className="truncate flex-1 min-w-0">
                    <span className="font-medium">{h.userJp}</span>
                    <span className="text-gray-500"> / {h.moveName}</span>
                  </span>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// ====== 分析パネル ======
function AnalysisPanel({userTeam, opponents}) {
  const [open, setOpen] = useState(true);
  const [legendOpen, setLegendOpen] = useState(false);
  const [matrixMode, setMatrixMode] = useState('total'); // 'total'|'offense'|'threat'|'speed'
  const users = userTeam.filter(Boolean);
  const opps = opponents.filter(Boolean);
  const ready = users.length >= 1 && opps.length >= 1;

  // 推奨選出3体（全探索 + 総合マッチアップ + 多様性）
  const trio = useMemo(() => {
    if (users.length < 3 || opps.length === 0) return null;
    const combos = combinations(users, 3);
    // マッチアップスコアのキャッシュ
    const cache = new Map();
    const ms = (u, o) => {
      const key = `${u.id}|${o.id}`;
      if (!cache.has(key)) cache.set(key, matchupScore(u, o));
      return cache.get(key);
    };
    let best = null;
    for (const combo of combos) {
      // メガ2体以上は除外（1バトル1回のメガ進化なので実質不可）
      const megaCount = combo.filter(isMega).length;
      if (megaCount >= 2) continue;
      // 各敵に対する最良担当者を決定
      const perOpp = opps.map(o => {
        let bestIdx = 0, bestTotal = -Infinity, bestMS = null;
        combo.forEach((u, i) => {
          const m = ms(u, o);
          if (m.total > bestTotal) { bestTotal = m.total; bestIdx = i; bestMS = m; }
        });
        return {opp:o, bestIdx, bestTotal, bestMS};
      });
      // 基礎スコア: 各敵への最良マッチアップの合計
      const baseScore = perOpp.reduce((s,p)=>s+p.bestTotal, 0);
      // 担当分散ボーナス（複数体で敵をカバーしている）
      const assignedIdx = new Set(perOpp.map(p=>p.bestIdx));
      const distributionBonus = assignedIdx.size * 0.4;
      // タイプ多様性ボーナス
      const typeSet = new Set();
      combo.forEach(u => u.types.forEach(t => typeSet.add(t)));
      const diversityBonus = Math.min(typeSet.size, 6) * 0.12;
      // 素早さ帯分散ボーナス（速・中・遅でカバー）
      const speeds = combo.map(u => effectiveSpeed(u));
      const spdTiers = new Set(speeds.map(s => s >= 110 ? 'fast' : s >= 80 ? 'mid' : 'slow'));
      const speedBonus = spdTiers.size * 0.15;
      // 重複タイプ組ペナルティ
      const typeKeys = combo.map(u => [...u.types].sort().join(','));
      const dupPenalty = (typeKeys.length - new Set(typeKeys).size) * 0.6;
      // 抜群担当数
      const covered = perOpp.filter(p => (p.bestMS?.off?.mult || 0) >= 2).length;
      // 有効打保持（正のtotal）を持つ敵の数
      const positiveCount = perOpp.filter(p => p.bestTotal > 0).length;
      const positiveBonus = positiveCount * 0.25;
      const total = baseScore + distributionBonus + diversityBonus + speedBonus - dupPenalty + positiveBonus;
      if (!best || total > best.total) {
        best = {combo, total, covered, baseScore, perOpp, distributionBonus, diversityBonus, speedBonus, dupPenalty, positiveBonus, typeCount: typeSet.size, tierCount: spdTiers.size, megaCount};
      }
    }
    return best;
  }, [userTeam, opponents]);

  // マトリクス（マッチアップスコア: 攻撃 - 脅威*0.7 + 速度ボーナス）
  const matrix = useMemo(() => {
    return users.map(u => opps.map(o => matchupScore(u, o)));
  }, [userTeam, opponents]);

  // 敵ごとの最大脅威（マトリクスから集計: 自軍のどれかが受ける最大ダメ予測）
  const oppThreats = useMemo(() => {
    return opps.map((o, oi) => {
      let maxThreat = 0, maxDmgPct = 0;
      users.forEach((u, ui) => {
        const m = matrix[ui]?.[oi];
        if (!m) return;
        if (m.thr?.threat > maxThreat) maxThreat = m.thr.threat;
        if (m.thr?.dmgPct > maxDmgPct) maxDmgPct = m.thr.dmgPct;
      });
      return {threat:maxThreat, dmgPct:maxDmgPct};
    });
  }, [matrix, opponents]);

  // 先発（1番手）候補ランキング
  // 先発に求められる要素: 先手 / 平均マッチアップ / 最悪ケースの小ささ / 先制技 / 圧倒相手の存在
  const leadCandidates = useMemo(() => {
    if (opps.length === 0 || users.length === 0) return [];
    const scored = users.map((u, ui) => {
      const row = matrix[ui] || [];
      if (row.length === 0) return null;
      const totals = row.map(m => m.total);
      const avgMatchup = totals.reduce((a,b)=>a+b, 0) / totals.length;
      const worstMatchup = Math.min(...totals);
      const bestMatchup = Math.max(...totals);
      const bestIdx = totals.indexOf(bestMatchup);
      const worstIdx = totals.indexOf(worstMatchup);
      const us = effectiveSpeed(u);
      const fasterCount = opps.filter(o => us > effectiveSpeed(o)).length;
      const sameCount = opps.filter(o => us === effectiveSpeed(o)).length;
      const slowerCount = opps.length - fasterCount - sameCount;
      const fasterRate = fasterCount / opps.length;
      const maxDmgPct = Math.max(...row.map(m => m.thr?.dmgPct || 0));
      const maxThreatIdx = row.findIndex(m => (m.thr?.dmgPct || 0) === maxDmgPct);
      const dominateCount = totals.filter(t => t >= 3).length;
      const dangerCount = totals.filter(t => t < -1).length;
      // 先制技の有無と最大優先度
      const priMoves = (u.moves || [])
        .filter(mv => mv.type && mv.cat !== '変' && movePriority(mv) > 0)
        .map(mv => ({name:mv.name || '(無名)', pri: movePriority(mv)}));
      const maxPri = priMoves.length > 0 ? Math.max(...priMoves.map(m=>m.pri)) : 0;
      const priorityBonus = maxPri > 0 ? 0.4 + maxPri * 0.2 : 0;
      // 安全性（最大被弾が低いほど加点、高いと減点）
      const safetyBonus = maxDmgPct < 50 ? 0.6
        : maxDmgPct < 80 ? 0.3
        : maxDmgPct < 110 ? 0
        : maxDmgPct < 150 ? -0.4
        : -0.9;
      // 極端に悪いマッチアップがあると先発しにくい
      const worstPenalty = worstMatchup < -4 ? 1.6
        : worstMatchup < -2 ? 0.8
        : worstMatchup < -1 ? 0.3 : 0;
      const score =
        avgMatchup * 0.55
        + fasterRate * 1.3
        + dominateCount * 0.3
        - dangerCount * 0.15
        - worstPenalty
        + priorityBonus
        + safetyBonus;
      return {
        u, ui, score,
        avgMatchup, worstMatchup, bestMatchup,
        bestOpp: opps[bestIdx], worstOpp: opps[worstIdx],
        us, fasterCount, sameCount, slowerCount, fasterRate,
        maxDmgPct, maxThreatOpp: opps[maxThreatIdx],
        dominateCount, dangerCount,
        priMoves, maxPri,
      };
    }).filter(Boolean);
    scored.sort((a,b) => b.score - a.score);
    return scored;
  }, [userTeam, opponents, matrix]);

  // 共通弱点ランキング
  const commonWeak = useMemo(() => {
    return TYPES.map(atk => {
      let w2=0, w4=0, imm=0;
      opps.forEach(o => {
        const m = defensiveMult(atk, o.types);
        if (m === 4) w4++;
        else if (m === 2) w2++;
        if (m === 0) imm++;
      });
      return {type:atk, w2, w4, imm, effective: w2 + w4*2};
    }).filter(x=>x.w2>0||x.w4>0).sort((a,b)=>b.effective-a.effective || b.w4-a.w4);
  }, [opponents]);

  // 自軍の穴（全員が弱点 >1 のタイプ）
  const holes = useMemo(() => {
    if (users.length === 0) return [];
    return TYPES.filter(atk => users.every(u => defensiveMult(atk, u.types) > 1));
  }, [userTeam]);

  // カバー率
  const coverage = useMemo(() => {
    const moveTypes = new Set();
    users.forEach(u => (u.moves||[]).forEach(m => m.type && moveTypes.add(m.type)));
    let covered = 0;
    TYPES.forEach(def => {
      const canHit = [...moveTypes].some(atk => defensiveMult(atk, [def]) >= 2);
      if (canHit) covered++;
    });
    return {covered, total:18, moveTypes:[...moveTypes]};
  }, [userTeam]);

  if (!ready) return null;

  // 総合マッチアップの色分け（高=有利・緑 / 低=不利・赤）
  const matchupColor = (s) => {
    if (s >= 5) return 'bg-green-700 text-white';
    if (s >= 3) return 'bg-green-500 text-white';
    if (s >= 1.5) return 'bg-emerald-300 text-emerald-900';
    if (s >= 0) return 'bg-gray-100 text-gray-700';
    if (s >= -2) return 'bg-orange-400 text-white';
    return 'bg-red-600 text-white';

    if (s === 0) return '0';

    const sign = s < 0 ? '-' : '';
    if (abs >= 1) return sign + (abs % 1 === 0 ? abs.toString() : abs.toFixed(1));
    // 1未満の正数は ".5" と簡略化、負数は可読性重視で "-0.5" のまま
    if (s < 0) return sign + abs.toFixed(1);
    return abs.toFixed(1).replace(/^0/,'');

                  const reasons = [];
                  if (c.fasterCount === opps.length) {
                    reasons.push({icon:'🚀', text:`全${opps.length}体より先手（実効S${c.us}）`, cls:'text-green-700'});

                    reasons.push({icon:'🚀', text:`${c.fasterCount}/${opps.length}体より先手（S${c.us}）`, cls:'text-green-700'});
                  } else if (c.fasterCount > 0) {
                    reasons.push({icon:'🚀', text:`${c.fasterCount}/${opps.length}体に先手`, cls:'text-gray-600'});
                  } else {
                    reasons.push({icon:'🐢', text:`全員に後手（S${c.us}）`, cls:'text-red-600'});
                  }
                  if (c.dominateCount > 0) {
                    reasons.push({icon:'⚔', text:`${c.dominateCount}体を圧倒できる（${c.bestOpp?.jp}ほか）`, cls:'text-green-700'});
                  }
                  if (c.avgMatchup >= 2) {
                    reasons.push({icon:'📈', text:`平均相性+${c.avgMatchup.toFixed(1)}（全体的に有利）`, cls:'text-green-700'});
                  } else if (c.avgMatchup >= 0.5) {
                    reasons.push({icon:'📊', text:`平均相性+${c.avgMatchup.toFixed(1)}`, cls:'text-gray-700'});
                  } else {
                    reasons.push({icon:'📉', text:`平均相性${c.avgMatchup.toFixed(1)}（やや不利寄り）`, cls:'text-orange-700'});

                  }
                  if (c.worstMatchup < -2) {
                    reasons.push({icon:'🚫', text:`${c.worstOpp?.jp}に相性${c.worstMatchup.toFixed(1)}（対面回避推奨）`, cls:'text-red-600'});

                    <div key={rank} className={`border rounded-lg p-2 ${rank === 0 ? 'bg-yellow-50 border-yellow-400 border-2' : 'bg-white'}`}>
                      <div className="flex items-start gap-2">

                        <div className="flex-1 min-w-0">

                            <span className="font-bold text-sm truncate">{c.u.jp}</span>
                            <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${scoreCls}`}
                              title={`先発スコア = 平均相性×0.55 + 先手率×1.3 + 圧倒数×0.3 - 危険×0.15 - 最悪懲罰 + 先制補正 + 安全補正`}>
                              先発{c.score.toFixed(1)}
                            </span>
                            <span className="text-[10px] text-gray-500">S{c.us}</span>
                            {c.u.item && ITEM_MAP[c.u.item] && (
                              <span className="text-[10px]" title={ITEM_MAP[c.u.item].jp}>
                                {ITEM_MAP[c.u.item].emoji}

                            {c.u.types.map(t => <TypeBadge key={t} type={t} />)}
                          </div>
                          <div className="mt-1 space-y-0.5">
                            {reasons.map((r, ri) => (
                              <div key={ri} className={`text-[11px] ${r.cls} leading-tight`}>
                                <span className="mr-1">{r.icon}</span>{r.text}
                              </div>
                            ))}
                          </div>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
              <div className="text-[10px] text-gray-500 mt-1 leading-snug">
                ※ 先発スコアは「先手率×1.3 + 平均相性×0.55 + 圧倒数×0.3 + 先制技・安全補正 − 最悪マッチアップ懲罰」で算出。
                対面事故を避けたい試合では🥇、攻めたい時は⚔の多い候補がおすすめ。

              <div className="mt-1.5 text-[10px] text-gray-500 leading-snug">
                選出理由:
                <span className="ml-1">

              </div>

          {/* マトリクス: 総合マッチアップスコア（攻撃 - 脅威*0.7 + 速度） */}

              <div className="text-xs font-bold text-gray-600">
                🔲 相性マトリクス

              <div className="flex items-center gap-1 flex-wrap">
                <div className="inline-flex rounded border overflow-hidden">

                    {k:'total', label:'総合', on:'bg-indigo-600 text-white'},

                    {k:'threat', label:'🛡 被弾', on:'bg-orange-600 text-white'},
                    {k:'speed', label:'⚡ 速度', on:'bg-sky-600 text-white'},

                      className={`text-[10px] font-bold px-2 py-0.5 transition ${

                      {m.label}
                    </button>
                  ))}
                </div>
                <button
                  onClick={()=>setLegendOpen(!legendOpen)}
                  className="text-[10px] text-blue-600 hover:bg-blue-50 px-2 py-0.5 rounded border border-blue-200">

                </button>
              </div>
            </div>
            <div className="text-[10px] text-gray-500 mb-1">
              {matrixMode === 'total' && '総合: 攻撃スコア − 脅威×0.7 + 速度補正（総合的な有利度）'}
              {matrixMode === 'offense' && '⚔ 与ダメ視点: 自軍攻撃が相手にどれだけ通るか。色は与ダメ%に連動（緑=大ダメ、赤=通らない）'}
              {matrixMode === 'threat' && '🛡 被弾視点: 相手攻撃を自軍がどれだけ受けるか。色は被弾%に連動（緑=軽微、赤=致命傷）'}
              {matrixMode === 'speed' && '⚡ 速度視点: 素早さの差。緑=先手、灰=同速、赤=後手。スカーフ想定時の警戒表示'}
            </div>

            {legendOpen && (
              <div className="bg-blue-50 border border-blue-200 rounded p-2.5 mb-2 text-[11px] leading-relaxed space-y-2">
                <div>
                  <div className="font-bold text-blue-900 mb-0.5">📖 マトリクスの読み方</div>
                  <div className="text-gray-700">
                    縦＝自軍 / 横＝相手。各マスは「その自軍ポケモンがその相手と対面した時の<b>総合有利度</b>」。
                  </div>
                </div>
                <div>
                  <div className="font-bold text-blue-900 mb-0.5">🎨 色の意味（数値は高いほど有利）</div>
                  <div className="flex flex-wrap gap-1">
                    <span className="px-1.5 py-0.5 rounded bg-green-700 text-white">≥5 圧倒</span>
                    <span className="px-1.5 py-0.5 rounded bg-green-500 text-white">≥3 有利</span>
                    <span className="px-1.5 py-0.5 rounded bg-emerald-300 text-emerald-900">≥1.5 やや有利</span>
                    <span className="px-1.5 py-0.5 rounded bg-gray-100 text-gray-700 border">≥0 互角</span>
                    <span className="px-1.5 py-0.5 rounded bg-orange-400 text-white">≥-2 やや不利</span>
                    <span className="px-1.5 py-0.5 rounded bg-red-600 text-white">&lt;-2 不利</span>
                  </div>
                </div>
                <div>

                  <div className="text-gray-700 font-mono text-[10px] bg-white px-1.5 py-1 rounded border">
                    総合 = 攻撃スコア − 脅威×0.7 + 素早さ補正<br/>

                    脅威 = 敵の想定一致技で自軍が受ける被弾予測<br/>

                  </div>
                </div>
                <div>
                  <div className="font-bold text-blue-900 mb-0.5">🔖 セル内バッジ</div>
                  <div className="grid grid-cols-2 gap-x-3 gap-y-0.5 text-gray-700">
                    <div><span className="px-1 rounded bg-yellow-300 text-yellow-900 font-bold">一</span> タイプ一致（×1.5）</div>
                    <div><span className="px-1 rounded bg-amber-200 text-amber-900 font-bold">持</span> 持ち物で火力UP</div>
                    <div><span className="px-1 rounded bg-sky-200 text-sky-900 font-bold">先制</span> 先制技あり</div>
                    <div><span className="px-1 rounded bg-purple-200 text-purple-900 font-bold">特</span> 特殊挙動の技</div>
                    <div><span className="px-1 rounded bg-yellow-200 text-yellow-900 font-bold border border-yellow-500">⚠</span> 威力が未登録（要入力）</div>
                    <div><span className="px-1 rounded bg-rose-200 text-rose-900 font-bold">命中%</span> 命中率で期待値減衰</div>
                    <div><span className="px-1 rounded bg-green-100 text-green-700 font-bold">先</span> 自分が先手</div>
                    <div><span className="px-1 rounded bg-red-100 text-red-700 font-bold">後</span> 自分が後手</div>
                  </div>
                </div>
                <div>
                  <div className="font-bold text-blue-900 mb-0.5">⚡ 列ヘッダの % は被弾最大予測</div>
                  <div className="text-gray-700">
                    敵の列の上に表示される ⚡XX% は、その敵の一致技を受けた時の<b>最大ダメージ予測</b>。
                    ⚡が赤い（≥3）敵は危険な相手 → マトリクスでその列が緑の自軍ポケモンをぶつけるのが基本戦略。

                  </div>

            {(() => {

                if (!dmg || dmg === 0) return 'bg-red-600 text-white';
                if (dmg >= 100) return 'bg-green-700 text-white';
                if (dmg >= 60)  return 'bg-green-500 text-white';
                if (dmg >= 40)  return 'bg-emerald-300 text-emerald-900';
                if (dmg >= 25)  return 'bg-yellow-100 text-yellow-800';
                if (dmg >= 10)  return 'bg-orange-300 text-orange-900';
                return 'bg-red-500 text-white';

              const threatCellColor = (dmg) => { // 低い=良い、高い=悪い
                if (!dmg || dmg <= 15) return 'bg-green-700 text-white';
                if (dmg <= 30) return 'bg-green-500 text-white';
                if (dmg <= 50) return 'bg-emerald-300 text-emerald-900';
                if (dmg <= 80) return 'bg-yellow-100 text-yellow-800';
                if (dmg <= 110) return 'bg-orange-400 text-white';
                return 'bg-red-600 text-white';

              const speedCellColor = (diff) => {
                if (diff > 30) return 'bg-green-700 text-white';
                if (diff > 0) return 'bg-green-500 text-white';
                if (diff === 0) return 'bg-gray-300 text-gray-700';

                              )}

                        })}
                      </tr>
                    </thead>
                    <tbody>
                      {users.map((u,ui) => (

                                <div className="flex items-center gap-0.5">

                                </div>
                              </div>
                            </div>
                          </td>
                          {opps.map((o,oi) => {
                            const m = matrix[ui][oi];
                            const h = m.off;

                            const us = effectiveSpeed(u), os = effectiveSpeed(o);
                            const spdMark = us > os ? '先' : us < os ? '後' : '=';
                            const spdCls = us > os ? 'text-green-700 bg-green-100' : us < os ? 'text-red-700 bg-red-100' : 'text-gray-500 bg-gray-100';

                            const thrTip = t?.type
                              ? `🛡 敵の想定打点: ${TYPE_JP[t.type]||t.type} ${t.cat||''}技\n  倍率×${t.mult} 被弾予測${t.dmgPct}% → 脅威${t.threat.toFixed(2)}`

                            let mainLabel = fmt(m.total);
                            if (matrixMode === 'offense') {
                              cellCls = offenseColor(h?.dmgPct || 0);
                              mainLabel = h?.dmgPct != null ? `${h.dmgPct}%` : '—';
                            } else if (matrixMode === 'threat') {
                              cellCls = threatCellColor(t?.dmgPct || 0);
                              mainLabel = t?.dmgPct != null ? `${t.dmgPct}%` : '—';
                            } else if (matrixMode === 'speed') {
                              cellCls = speedCellColor(us - os);

                                <div className="flex gap-0.5 justify-center items-center text-[8px] font-normal mt-0.5 opacity-90">
                                  {matrixMode !== 'speed' && h?.stab && <span className="px-0.5 rounded bg-yellow-300 text-yellow-900">一</span>}
                                  {matrixMode !== 'speed' && h?.itemF > 1 && <span className="px-0.5 rounded bg-amber-200 text-amber-900">持</span>}
                                  {matrixMode !== 'speed' && h?.priority > 0 && <span className="px-0.5 rounded bg-sky-200 text-sky-900">先制</span>}
                                  {matrixMode === 'offense' && h?.mult != null && h.mult !== 1 && <span className={`px-0.5 rounded ${h.mult >= 2 ? 'bg-green-200 text-green-900' : 'bg-gray-200 text-gray-700'}`}>×{h.mult}</span>}
                                  {matrixMode === 'threat' && t?.mult != null && t.mult !== 1 && <span className={`px-0.5 rounded ${t.mult >= 2 ? 'bg-red-200 text-red-900' : 'bg-gray-200 text-gray-700'}`}>×{t.mult}</span>}
                                  {matrixMode !== 'offense' && matrixMode !== 'threat' && h?.bpSrc === 'default' && <span className="px-0.5 rounded bg-yellow-200 text-yellow-900 border border-yellow-500" title="威力未登録">⚠</span>}
                                  <span className={`px-0.5 rounded ${spdCls}`}>{spdMark}</span>
                                </div>
                                {matrixMode === 'total' && h?.dmgPct > 0 && (
                                  <div className="text-[8px] font-normal opacity-90">{h.dmgPct}%</div>
                                )}
                                {matrixMode === 'offense' && h?.mv?.name && (
                                  <div className="text-[8px] font-normal opacity-90 truncate max-w-[60px] mx-auto">{h.mv.name}</div>
                                )}
                                {matrixMode === 'threat' && t?.type && (
                                  <div className="text-[8px] font-normal opacity-90">{TYPE_JP[t.type]||t.type}{t.cat||''}</div>
                                )}
                                {matrixMode === 'speed' && (
                                  <div className="text-[8px] font-normal opacity-90">{us}vs{os}</div>
                                )}
                              </td>
                            );
                          })}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              );
            })()}
            {/* 自チーム攻撃合計 / 相手チーム攻撃合計 の行比較 */}
            <div className="mt-2 grid grid-cols-1 md:grid-cols-2 gap-2">
              <div className="bg-green-50 border border-green-200 rounded p-2">
                <div className="text-[11px] font-bold text-green-800 mb-1">⚔ 自チーム攻撃の通り (各自軍 → 敵6体の平均%)</div>
                <div className="space-y-0.5">
                  {users.map((u,ui) => {
                    const dmgs = opps.map((_,oi) => matrix[ui][oi].off?.dmgPct || 0);
                    const avg = dmgs.length ? Math.round(dmgs.reduce((s,d)=>s+d,0) / dmgs.length) : 0;
                    const best = Math.max(...dmgs);
                    const worst = Math.min(...dmgs);
                    const barCls = avg >= 80 ? 'bg-green-600'
                      : avg >= 50 ? 'bg-emerald-400'
                      : avg >= 30 ? 'bg-yellow-400'
                      : avg >= 15 ? 'bg-orange-400'
                      : 'bg-red-500';
                    return (
                      <div key={ui} className="flex items-center gap-1.5 text-[10px]">
                        <img src={pokeImg(u)} onError={e=>{e.target.src=pokeImgFallback(u)}} className="w-5 h-5 object-contain" />
                        <span className="truncate max-w-[70px]">{u.jp}</span>
                        <div className="flex-1 h-3 bg-gray-200 rounded overflow-hidden relative">
                          <div className={`h-full ${barCls}`} style={{width: `${Math.min(100, avg)}%`}}></div>
                        </div>
                        <span className="font-bold w-12 text-right">平均{avg}%</span>
                        <span className="text-gray-500 w-20 text-right">高{best}/低{worst}</span>
                      </div>
                    );
                  })}
                </div>
              </div>
              <div className="bg-red-50 border border-red-200 rounded p-2">
                <div className="text-[11px] font-bold text-red-800 mb-1">🛡 相手チーム攻撃の脅威 (各敵 → 自軍3〜6体の平均%)</div>
                <div className="space-y-0.5">
                  {opps.map((o,oi) => {
                    const dmgs = users.map((_,ui) => matrix[ui][oi].thr?.dmgPct || 0);
                    const avg = dmgs.length ? Math.round(dmgs.reduce((s,d)=>s+d,0) / dmgs.length) : 0;
                    const best = Math.max(...dmgs);
                    const worst = Math.min(...dmgs);
                    const barCls = avg >= 80 ? 'bg-red-600'
                      : avg >= 50 ? 'bg-orange-500'
                      : avg >= 30 ? 'bg-yellow-500'
                      : avg >= 15 ? 'bg-emerald-400'
                      : 'bg-green-500';
                    return (
                      <div key={oi} className="flex items-center gap-1.5 text-[10px]">
                        <img src={pokeImg(o)} onError={e=>{e.target.src=pokeImgFallback(o)}} className="w-5 h-5 object-contain" />
                        <span className="truncate max-w-[70px]">{o.jp}</span>
                        <div className="flex-1 h-3 bg-gray-200 rounded overflow-hidden relative">
                          <div className={`h-full ${barCls}`} style={{width: `${Math.min(100, avg)}%`}}></div>
                        </div>
                        <span className="font-bold w-12 text-right">平均{avg}%</span>
                        <span className="text-gray-500 w-20 text-right">高{best}/低{worst}</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
            <div className="text-[10px] text-gray-500 mt-1">
              ⚡% は被弾最大予測（敵の想定一致技）、マウスオーバーで詳細な計算内訳が確認できます。
            </div>
          </div>

          {/* 相手パ共通弱点 */}
          {commonWeak.length > 0 && (
            <div>
              <div className="text-xs font-bold text-gray-600 mb-1.5">🎯 相手パ共通弱点ランキング</div>
              <div className="space-y-1">
                {commonWeak.slice(0,8).map((w,i) => (
                  <div key={i} className="flex items-center gap-2 text-xs">
                    <span className="w-5 text-gray-400">{i+1}.</span>
                    <TypeBadge type={w.type} />
                    <span className="text-gray-600">
                      {w.w4>0 && <span className="text-red-600 font-bold">4×が{w.w4}体 </span>}
                      {w.w2>0 && <span className="text-orange-600">2×が{w.w2}体</span>}
                      {w.imm>0 && <span className="text-gray-400 ml-1">（無効{w.imm}体）</span>}
                    </span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* 自軍の穴 */}
          <div>
            <div className="text-xs font-bold text-gray-600 mb-1.5">⚠ 自軍の穴（全員が弱点のタイプ）</div>
            {holes.length === 0 ? (
              <div className="text-xs text-green-600">穴なし ✓</div>
            ) : (
              <div className="flex gap-1 flex-wrap">
                {holes.map(t => <TypeBadge key={t} type={t} size="lg" />)}
              </div>
            )}
          </div>

          {/* カバー率 */}
          <div>
            <div className="text-xs font-bold text-gray-600 mb-1.5">
              📈 攻撃カバー率 {coverage.covered}/{coverage.total}タイプ（{Math.round(coverage.covered/coverage.total*100)}%）
            </div>
            <div className="flex gap-1 flex-wrap">
              {TYPES.map(def => {
                const canHit = coverage.moveTypes.some(atk => defensiveMult(atk, [def]) >= 2);
                return (
                  <div key={def} className={`flex items-center gap-0.5 px-1 py-0.5 rounded ${canHit?'bg-green-50':'bg-gray-100 opacity-50'}`}>
                    <TypeBadge type={def} />
                    <span className="text-[9px] font-bold">{canHit?'○':'×'}</span>
                  </div>
                );
              })}
            </div>
            <div className="text-[10px] text-gray-500 mt-1">登録技タイプ: {coverage.moveTypes.length>0 ? coverage.moveTypes.map(t=>TYPE_JP[t]).join('・') : 'なし'}</div>
          </div>
        </div>
      )}
    </div>
  );
}

// ====== 写真検出モーダル ======
function PhotoDetectModal({onApply, onClose}) {
  const [apiKey, setApiKey] = useState('');
  const [showKeyEditor, setShowKeyEditor] = useState(false);
  const [keyDraft, setKeyDraft] = useState('');
  const [file, setFile] = useState(null);
  const [previewUrl, setPreviewUrl] = useState('');
  const [detecting, setDetecting] = useState(false);
  const [error, setError] = useState('');
  const [rawNames, setRawNames] = useState([]);
  const [slots, setSlots] = useState([null,null,null,null,null,null]);
  const [overrideIdx, setOverrideIdx] = useState(null);
  const [cameraOn, setCameraOn] = useState(false);
  const [cameraError, setCameraError] = useState('');
  const fileInputRef = useRef(null);
  const videoRef = useRef(null);
  const streamRef = useRef(null);

  // 初回: localStorage からAPIキー読み込み
  useEffect(() => {
    try {
      const saved = localStorage.getItem(GEMINI_KEY_STORAGE) || '';
      setApiKey(saved);
      if (!saved) setShowKeyEditor(true);
    } catch(e) {}
  }, []);

  // プレビューURLのクリーンアップ
  useEffect(() => {
    return () => { if (previewUrl) URL.revokeObjectURL(previewUrl); };
  }, [previewUrl]);

  // カメラストリームのクリーンアップ（アンマウント時）
  useEffect(() => {
    return () => {
      if (streamRef.current) {
        streamRef.current.getTracks().forEach(t => t.stop());
        streamRef.current = null;
      }
    };
  }, []);

  // カメラ起動後、video要素にストリームをバインド
  useEffect(() => {
    if (cameraOn && videoRef.current && streamRef.current) {
      videoRef.current.srcObject = streamRef.current;
      videoRef.current.play().catch(()=>{});
    }
  }, [cameraOn]);

  const startCamera = async () => {
    setCameraError('');
    setError('');
    try {
      if (!navigator.mediaDevices?.getUserMedia) {
        setCameraError('このブラウザはカメラAPIに未対応です。「ファイルを選択」からギャラリー経由でアップしてください。');
        return;
      }
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } },
        audio: false,
      });
      streamRef.current = stream;
      setCameraOn(true);
    } catch(err) {
      setCameraError(err.message || 'カメラを起動できません（権限を確認してください）');
    }
  };
  const stopCamera = () => {
    if (streamRef.current) {
      streamRef.current.getTracks().forEach(t => t.stop());
      streamRef.current = null;
    }
    setCameraOn(false);
  };
  const handleCapture = async () => {
    const video = videoRef.current;
    if (!video || !video.videoWidth) return;
    try {
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      const blob = await new Promise((resolve, reject) => {
        canvas.toBlob(b => b ? resolve(b) : reject(new Error('キャプチャ失敗')), 'image/jpeg', 0.9);
      });
      const capturedFile = new File([blob], 'capture.jpg', { type: 'image/jpeg' });
      stopCamera();
      setError('');
      setRawNames([]);
      setSlots([null,null,null,null,null,null]);
      const resized = await resizeImageForApi(capturedFile, 1280);
      if (previewUrl) URL.revokeObjectURL(previewUrl);
      setPreviewUrl(URL.createObjectURL(resized));
      setFile(resized);
    } catch(err) {
      setError(err.message || 'キャプチャに失敗しました');
    }
  };

  const handleSaveKey = () => {
    const k = keyDraft.trim();
    if (!k) return;
    try { localStorage.setItem(GEMINI_KEY_STORAGE, k); } catch(e) {}
    setApiKey(k);
    setKeyDraft('');
    setShowKeyEditor(false);
    setError('');
  };
  const handleClearKey = () => {
    try { localStorage.removeItem(GEMINI_KEY_STORAGE); } catch(e) {}
    setApiKey('');
    setShowKeyEditor(true);
  };

  const handleFileChange = async (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    setError('');
    setRawNames([]);
    setSlots([null,null,null,null,null,null]);
    try {
      const resized = await resizeImageForApi(f, 1280);
      if (previewUrl) URL.revokeObjectURL(previewUrl);
      setPreviewUrl(URL.createObjectURL(resized));
      setFile(resized);
    } catch(err) {
      setError(err.message || '画像の処理に失敗しました');
    }
  };

  const handleDetect = async () => {
    if (!apiKey) { setError('Gemini APIキーを入力してください'); setShowKeyEditor(true); return; }
    if (!file) { setError('画像を選択してください'); return; }
    setError('');
    setDetecting(true);
    try {
      const base64 = await fileToBase64Data(file);
      const names = await detectPokemonFromImage(apiKey, base64, file.type || 'image/jpeg');
      const trimmed = names.slice(0, 6);
      const matched = trimmed.map(n => {
        const r = findRosterByJpName(n);
        return r ? rosterToSlot(r) : null;
      });
      // 6スロットに揃える
      while (matched.length < 6) matched.push(null);
      setRawNames(trimmed);
      setSlots(matched);
    } catch(err) {
      setError(err.message || 'AI検出に失敗しました');
    } finally {
      setDetecting(false);
    }
  };

  const handleSlotChange = (idx, poke) => {
    const copy = [...slots];
    copy[idx] = poke;
    setSlots(copy);
    setOverrideIdx(null);
  };
  const handleSlotClear = (idx) => {
    const copy = [...slots];
    copy[idx] = null;
    setSlots(copy);
  };

  const hasAnyResult = slots.some(Boolean);
  const canApply = hasAnyResult;

  return (
    <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-2 sm:p-4" onClick={onClose}>
      <div className="bg-white rounded-lg w-full max-w-3xl max-h-[95vh] flex flex-col" onClick={e=>e.stopPropagation()}>
        <div className="p-3 border-b flex items-center justify-between">
          <h3 className="text-base sm:text-lg font-bold">📷 写真から相手チーム検出</h3>
          <button onClick={onClose} className="p-1 hover:bg-gray-100 rounded"><IconX className="w-5 h-5" /></button>
        </div>

        <div className="flex-1 overflow-auto p-3 space-y-3">
          {/* APIキー管理 */}
          <div className="border rounded-lg bg-gray-50 p-2.5">
            <div className="flex items-center justify-between mb-1">
              <div className="text-xs font-bold text-gray-700">Gemini APIキー</div>
              {apiKey && !showKeyEditor && (
                <div className="flex gap-1.5">
                  <button onClick={()=>{setKeyDraft(apiKey); setShowKeyEditor(true);}}
                    className="text-[11px] text-blue-600 hover:underline">変更</button>
                  <button onClick={handleClearKey}
                    className="text-[11px] text-red-600 hover:underline">削除</button>
                </div>
              )}
            </div>
            {apiKey && !showKeyEditor ? (
              <div className="text-[11px] text-gray-600 font-mono">
                保存済み: ****{apiKey.slice(-6)} <span className="text-gray-400">(この端末にのみ保存)</span>
              </div>
            ) : (
              <div className="space-y-1.5">
                <input
                  type="password"
                  value={keyDraft}
                  onChange={e=>setKeyDraft(e.target.value)}
                  placeholder="AIza..."
                  className="w-full border rounded px-2 py-1 text-sm font-mono"
                />
                <div className="flex items-center gap-2">
                  <button onClick={handleSaveKey} disabled={!keyDraft.trim()}
                    className="text-xs font-bold px-2.5 py-1 rounded bg-blue-600 text-white disabled:bg-gray-300">
                    保存
                  </button>
                  {apiKey && (
                    <button onClick={()=>{setShowKeyEditor(false); setKeyDraft('');}}
                      className="text-xs px-2.5 py-1 rounded border">キャンセル</button>
                  )}
                  <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener"
                    className="text-[11px] text-blue-600 hover:underline ml-auto">APIキー取得 →</a>
                </div>
                <div className="text-[10px] text-gray-500">※ この端末のみに保存されます（同期対象外）</div>
              </div>
            )}
          </div>

          {/* 画像アップロード */}
          <div className="border rounded-lg p-2.5 space-y-2">
            <div className="text-xs font-bold text-gray-700">選出画面のスクショ / 写真</div>
            <div className="flex flex-wrap items-center gap-2">
              <button
                type="button"
                onClick={startCamera}
                className="text-xs font-bold px-2.5 py-1.5 rounded bg-indigo-600 text-white hover:bg-indigo-700"
                title="ガイド枠付きでカメラ起動"
              >
                📷 カメラ起動（ガイド付き）
              </button>
              <span className="text-[11px] text-gray-400">または</span>
              <input
                ref={fileInputRef}
                type="file"
                accept="image/*"
                onChange={handleFileChange}
                className="text-xs"
              />
              {file && (
                <span className="text-[11px] text-gray-500">
                  {Math.round(file.size/1024)}KB
                </span>
              )}
            </div>
            {cameraError && (
              <div className="text-[11px] text-amber-700 bg-amber-50 border border-amber-200 rounded p-2">
                {cameraError}
              </div>
            )}
            {previewUrl && (
              <div className="mt-1">
                <img src={previewUrl} alt="プレビュー" className="max-h-48 rounded border" />
              </div>
            )}
            <button
              onClick={handleDetect}
              disabled={!file || detecting || !apiKey}
              className="w-full text-sm font-bold px-3 py-2 rounded bg-emerald-600 text-white disabled:bg-gray-300"
            >
              {detecting ? '🔍 AI検出中...' : '✨ AIで検出する'}
            </button>
            {error && (
              <div className="text-xs text-red-600 bg-red-50 border border-red-200 rounded p-2">
                {error}
              </div>
            )}
          </div>

          {/* 検出結果 */}
          {(rawNames.length > 0 || hasAnyResult) && (
            <div className="border rounded-lg p-2.5 space-y-2">
              <div className="flex items-center justify-between">
                <div className="text-xs font-bold text-gray-700">検出結果 (必要に応じて修正)</div>
                <div className="text-[10px] text-gray-500">
                  マッチ {slots.filter(Boolean).length}/{rawNames.length || 6}
                </div>
              </div>
              <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
                {[0,1,2,3,4,5].map(i => {
                  const s = slots[i];
                  const raw = rawNames[i];
                  return (
                    <div key={i} className="border rounded p-2 bg-gray-50">
                      <div className="text-[10px] text-gray-500 mb-1">#{i+1}</div>
                      {s ? (
                        <div className="flex items-center gap-2">
                          <img src={gwImgUrl(s.img)} alt="" className="w-10 h-10 object-contain bg-white rounded"
                            onError={e => { e.target.src = artworkUrl(s.dex); }} />
                          <div className="flex-1 min-w-0">
                            <div className="text-xs font-bold truncate">{s.jp}</div>
                            <div className="text-[10px] text-gray-500">S{s.spd}</div>
                          </div>
                        </div>
                      ) : raw ? (
                        <div className="text-xs text-amber-700">
                          <div className="font-bold truncate">❓ {raw}</div>
                          <div className="text-[10px] text-gray-500">未マッチ</div>
                        </div>
                      ) : (
                        <div className="text-xs text-gray-400">（空き）</div>
                      )}
                      <div className="flex gap-1 mt-1.5">
                        <button onClick={()=>setOverrideIdx(i)}
                          className="flex-1 text-[11px] px-1.5 py-0.5 rounded border bg-white hover:bg-blue-50">
                          {s ? '変更' : '選択'}
                        </button>
                        {s && (
                          <button onClick={()=>handleSlotClear(i)}
                            className="text-[11px] px-1.5 py-0.5 rounded border bg-white text-red-600 hover:bg-red-50">
                            ✕
                          </button>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>

        <div className="p-3 border-t flex items-center justify-end gap-2">
          <button onClick={onClose} className="text-sm px-3 py-1.5 rounded border">キャンセル</button>
          <button
            onClick={()=>{ onApply(slots); onClose(); }}
            disabled={!canApply}
            className="text-sm font-bold px-3 py-1.5 rounded bg-blue-600 text-white disabled:bg-gray-300"
          >
            この結果を相手チームに反映
          </button>
        </div>

        {overrideIdx !== null && (
          <PokemonPicker
            onSelect={p => handleSlotChange(overrideIdx, p)}
            onClose={() => setOverrideIdx(null)}
          />
        )}

        {cameraOn && (
          <div className="fixed inset-0 bg-black z-[60] flex flex-col" onClick={e=>e.stopPropagation()}>
            {/* ビデオフィード（全画面） */}
            <video
              ref={videoRef}
              playsInline
              muted
              autoPlay
              className="absolute inset-0 w-full h-full object-cover"
            />

            {/* ガイド枠オーバーレイ: 中央の縦長枠が明るく、外側が暗く */}
            <div className="absolute inset-0 pointer-events-none">
              {/* 上 */}
              <div className="absolute left-0 right-0 top-0 bg-black/60" style={{height:'7%'}} />
              {/* 下 */}
              <div className="absolute left-0 right-0 bottom-0 bg-black/60" style={{height:'18%'}} />
              {/* 左 */}
              <div className="absolute bg-black/60" style={{left:0, top:'7%', bottom:'18%', width:'28%'}} />
              {/* 右 */}
              <div className="absolute bg-black/60" style={{right:0, top:'7%', bottom:'18%', width:'28%'}} />
              {/* ガイド枠線 */}
              <div
                className="absolute border-2 border-emerald-400 rounded"
                style={{left:'28%', right:'28%', top:'7%', bottom:'18%', boxShadow:'0 0 0 1px rgba(0,0,0,0.5)'}}
              >
                {/* 四隅のL字マーカー */}
                <div className="absolute top-0 left-0 w-5 h-5 border-t-4 border-l-4 border-emerald-300" />
                <div className="absolute top-0 right-0 w-5 h-5 border-t-4 border-r-4 border-emerald-300" />
                <div className="absolute bottom-0 left-0 w-5 h-5 border-b-4 border-l-4 border-emerald-300" />
                <div className="absolute bottom-0 right-0 w-5 h-5 border-b-4 border-r-4 border-emerald-300" />
                {/* 6スロットの仕切りガイド（縦に6等分） */}
                {[1,2,3,4,5].map(i => (
                  <div key={i}
                    className="absolute left-2 right-2 border-t border-dashed border-emerald-300/40"
                    style={{top:`${(i/6)*100}%`}}
                  />
                ))}

function BattleView({opponents, setOpponents, userTeam}) {
  const [pickerIdx, setPickerIdx] = useState(null);
  const [confirmClear, setConfirmClear] = useState(false);
  const [showPhotoDetect, setShowPhotoDetect] = useState(false);

  const setSlot = (idx, poke) => {
    const copy = [...opponents];
    copy[idx] = poke;
    setOpponents(copy);
    setPickerIdx(null);
  };
  const clearSlot = idx => {
    const copy = [...opponents];
    copy[idx] = null;
    setOpponents(copy);
  };
  // 全クリア（2段階タップ方式: 1回目で赤くなり「もう一度タップで確定」、2秒で解除）
  const handleClearAll = () => {
    if (confirmClear) {
      setOpponents([null,null,null,null,null,null]);
      setConfirmClear(false);
    } else {
      setConfirmClear(true);
      setTimeout(() => setConfirmClear(false), 2000);
    }
  };

  const filled = opponents.filter(Boolean).length;
  const teamReady = userTeam.some(Boolean);

  // 相手構成の物理/特殊バイアス集計
  const biasSummary = useMemo(() => {
    const counts = { phys:0, spec:0, mixed:0 };
    opponents.forEach(o => {
      if (!o) return;
      const b = classifyByStats(o.id);
      if (b) counts[b.key] = (counts[b.key]||0) + 1;
    });
    return counts;

  return (
    <div className="space-y-3">
      {!teamReady && (
        <div className="bg-amber-50 border border-amber-300 rounded p-3 text-sm">

            onClick={()=>setShowPhotoDetect(true)}
            className="text-xs font-bold px-2.5 py-1 rounded border bg-white text-emerald-700 border-emerald-300 hover:bg-emerald-50"
            title="写真/スクショからAI検出"
          >
            📷 写真検出
          </button>
          {filled > 0 && (
            <button
              onClick={handleClearAll}
              className={`text-xs font-bold px-2.5 py-1 rounded border transition-colors ${
                confirmClear
                  ? 'bg-red-600 text-white border-red-600 animate-pulse'
                  : 'bg-white text-red-600 border-red-300 hover:bg-red-50'
              }`}
              title="相手の6スロットをすべてクリア"

          )}

      </div>
      <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-3">
        {[0,1,2,3,4,5].map(i => (
          <OpponentSlot key={i} idx={i} opp={opponents[i]} userTeam={userTeam}
            onPick={()=>setPickerIdx(i)} onClear={()=>clearSlot(i)} />
        ))}
      </div>
      {filled > 0 && (biasSummary.phys + biasSummary.spec + biasSummary.mixed > 0) && (
        <div className="bg-gray-50 border rounded-lg p-2 flex items-center gap-2 flex-wrap text-xs">
          <span className="font-bold text-gray-700">相手構成バイアス:</span>
          {biasSummary.phys > 0 && (
            <span className="inline-flex items-center gap-0.5 px-1.5 py-0.5 rounded border bg-red-100 text-red-700 border-red-300 font-bold">
              🥊物理 ×{biasSummary.phys}
            </span>
          )}
          {biasSummary.spec > 0 && (
            <span className="inline-flex items-center gap-0.5 px-1.5 py-0.5 rounded border bg-blue-100 text-blue-700 border-blue-300 font-bold">
              ✨特殊 ×{biasSummary.spec}
            </span>
          )}
          {biasSummary.mixed > 0 && (
            <span className="inline-flex items-center gap-0.5 px-1.5 py-0.5 rounded border bg-purple-100 text-purple-700 border-purple-300 font-bold">
              ⚔️両刀 ×{biasSummary.mixed}
            </span>
          )}
          {(() => {
            const max = Math.max(biasSummary.phys, biasSummary.spec);
            if (max >= 2 && biasSummary.phys !== biasSummary.spec) {
              const hint = biasSummary.phys > biasSummary.spec
                ? '→ 物理受けを残したい'
                : '→ 特殊受けを残したい';
              return <span className="text-gray-500 ml-1">{hint}</span>;
            }
            return null;
          })()}
        </div>
      )}

      {pickerIdx !== null && (
        <PokemonPicker onSelect={p=>setSlot(pickerIdx, p)} onClose={()=>setPickerIdx(null)} />
      )}

        <PhotoDetectModal
          onApply={newSlots => {
            // 既存のnullスロットは検出結果で埋め、検出結果がnullなら既存値を維持
            const merged = opponents.map((cur, i) => newSlots[i] || cur || null);
            // マッチした数が多い場合は全置換とみなす（5件以上検出された場合は完全置換）
            const detectedCount = newSlots.filter(Boolean).length;
            setOpponents(detectedCount >= 4 ? newSlots : merged);
          }}

        />
      )}

  );

function TeamSlotBar({teams, activeIdx, setActiveIdx, setTeams}) {
  const [editing, setEditing] = useState(false);

    const newTeams = [...teams, {name:`チーム${teams.length+1}`, slots:[null,null,null,null,null,null]}];
    setTeams(newTeams);
    setActiveIdx(newTeams.length-1);
  };
  const delTeam = () => {
    if (teams.length <= 1) return;
    if (!confirm(`「${current.name}」を削除しますか？`)) return;
    const newTeams = teams.filter((_,i)=>i!==activeIdx);
    setTeams(newTeams);

// ====== 対戦ガイド用 詳細解析ヘルパー ======
// 各攻撃/変化技を個別評価した配列を返す（ダメージ%・命中・優先度・ブロック）
function perMoveAnalysis(userPoke, opp) {
  if (!userPoke || !opp) return [];
  const oppStats = getPokeStatsObj(opp.id);
  const hpBase = oppStats?.hp || 80;
  const out = [];
  for (const mv of (userPoke.moves || [])) {
    if (!mv || !mv.type) continue;
    const priority = movePriority(mv);
    const acc = (mv.accuracy != null && mv.accuracy > 0 && mv.accuracy <= 100)
      ? mv.accuracy : (MOVE_ACCURACY[mv.name] ?? 100);
    const bp = (mv.bp != null && mv.bp > 0) ? mv.bp : (MOVE_BP[mv.name] ?? null);
    const stab = userPoke.types.includes(mv.type);
    if (mv.cat === '変') {
      out.push({mv, isStatus:true, priority, name:mv.name, type:mv.type, cat:mv.cat, acc, stab:false});
      continue;
    }
    const mult = defensiveMult(mv.type, opp.types);
    const abDefMul = abilityDefenseMult(opp, mv.type, mult, userPoke.ability);
    if (mult === 0) {
      out.push({mv, blocked:true, reason:'タイプ無効', stab, mult, priority, acc, bp, name:mv.name, type:mv.type, cat:mv.cat});
      continue;
    }
    if (abDefMul === 0) {
      out.push({mv, blocked:true, reason:`${opp.ability}無効`, stab, mult, priority, acc, bp, name:mv.name, type:mv.type, cat:mv.cat});
      continue;
    }
    const offF = offensiveFactor(userPoke, mv);
    const defF = defensiveFactor(opp, mv);
    const powF = powerFactor(mv);
    const itemF = itemFactor(userPoke, mv);
    const bonus = multNonLinearBonus(mult);
    const accF = accuracyFactor(mv);
    const abF = abilityAttackMult(userPoke, mv);
    const itemDefF = itemDefenseFactor(userPoke, opp, mv.type, mult);
    const score = mult * (stab ? 1.5 : 1) * offF * defF * powF * itemF * bonus * accF * abF * abDefMul * itemDefF;
    const dmgPct = Math.min(300, Math.round(score * 3300 / hpBase));
    out.push({mv, dmgPct, mult, stab, priority, acc, bp, score, name:mv.name, type:mv.type, cat:mv.cat, abDefMul, resistBonus: abDefMul < 1 ? abDefMul : null});
  }
  out.sort((a,b) => {
    if (a.isStatus !== b.isStatus) return a.isStatus ? 1 : -1;
    if (a.blocked !== b.blocked) return a.blocked ? 1 : -1;
    return (b.dmgPct || 0) - (a.dmgPct || 0);
  });
  return out;
}

    const itemDefF = itemDefenseFactor(opp, userPoke, mv.type, mult);
    const score = mult * (stab ? 1.5 : 1) * offF * defF * powF * itemF * bonus * accF * abF * abDefMul * itemDefF;
    const dmgPct = Math.min(300, Math.round(score * 3300 / hpBase));

// 積み窓口判定: 相手が低火力+自軍に積み技がある
function setupOpportunity(userPoke, thr, race) {
  if (!userPoke) return null;
  const setups = (userPoke.moves || []).filter(m => m && SETUP_MOVES[m.name]);
  if (setups.length === 0) return null;
  const thrPct = thr?.dmgPct ?? 100;
  // 相手が確3以下 (dmg < 35) かつこちらが火力/速度で勝っている＝積み適性高
  const veryComfortable = thrPct < 22 && (race?.verdict === 'win' || race?.verdict === 'winProb');
  const comfortable = thrPct < 35;
  if (!comfortable) return null;
  // 攻撃技ブースト系を優先的に提案
  const tierRank = (name) => {
    if (['つるぎのまい','りゅうのまい','わるだくみ','ちょうのまい','からをやぶる'].includes(name)) return 3;
    if (['めいそう','コスモパワー','バルクアップ','ビルドアップ','コットンガード','てっぺき','ドわすれ'].includes(name)) return 2;
    return 1;
  };
  const moves = setups.map(m => ({mv:m, info:SETUP_MOVES[m.name], rank:tierRank(m.name)}))
    .sort((a,b) => b.rank - a.rank);
  return {
    level: veryComfortable ? 'high' : 'mid',
    thrPct,
    moves
  };
}

// 優先度技レース
function priorityRace(userPoke, opp) {
  const pick = (poke) => (poke?.moves || []).filter(m => m && movePriority(m) > 0)
    .map(m => ({name:m.name, type:m.type, cat:m.cat, priority:movePriority(m)}))
    .sort((a,b) => b.priority - a.priority);
  const u = pick(userPoke);
  const o = pick(opp);
  if (u.length === 0 && o.length === 0) return null;
  return {user:u, opp:o};
}
