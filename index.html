<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;

// ====== 定数 ======
const TYPES = ['normal','fire','water','electric','grass','ice','fighting','poison','ground','flying','psychic','bug','rock','ghost','dragon','dark','steel','fairy'];

const TYPE_JP = {
  normal:'ノーマル', fire:'ほのお', water:'みず', electric:'でんき', grass:'くさ',
  ice:'こおり', fighting:'かくとう', poison:'どく', ground:'じめん', flying:'ひこう',
  psychic:'エスパー', bug:'むし', rock:'いわ', ghost:'ゴースト', dragon:'ドラゴン',
  dark:'あく', steel:'はがね', fairy:'フェアリー'
};

const TYPE_COLOR = {
  normal:'bg-gray-400', fire:'bg-red-500', water:'bg-blue-500', electric:'bg-yellow-400',
  grass:'bg-green-500', ice:'bg-cyan-400', fighting:'bg-red-700', poison:'bg-purple-500',
  ground:'bg-amber-600', flying:'bg-indigo-300', psychic:'bg-pink-500', bug:'bg-lime-500',
  rock:'bg-yellow-700', ghost:'bg-purple-700', dragon:'bg-indigo-700', dark:'bg-gray-700',
  steel:'bg-slate-500', fairy:'bg-pink-300'
};

const EFFECTIVE = {
  normal:   { rock:0.5, ghost:0, steel:0.5 },
  fire:     { fire:0.5, water:0.5, grass:2, ice:2, bug:2, rock:0.5, dragon:0.5, steel:2 },
  water:    { fire:2, water:0.5, grass:0.5, ground:2, rock:2, dragon:0.5 },
  electric: { water:2, electric:0.5, grass:0.5, ground:0, flying:2, dragon:0.5 },
  grass:    { fire:0.5, water:2, grass:0.5, poison:0.5, ground:2, flying:0.5, bug:0.5, rock:2, dragon:0.5, steel:0.5 },
  ice:      { fire:0.5, water:0.5, grass:2, ice:0.5, ground:2, flying:2, dragon:2, steel:0.5 },
  fighting: { normal:2, ice:2, poison:0.5, flying:0.5, psychic:0.5, bug:0.5, rock:2, ghost:0, dark:2, steel:2, fairy:0.5 },
  poison:   { grass:2, poison:0.5, ground:0.5, rock:0.5, ghost:0.5, steel:0, fairy:2 },
  ground:   { fire:2, electric:2, grass:0.5, poison:2, flying:0, bug:0.5, rock:2, steel:2 },
  flying:   { electric:0.5, grass:2, fighting:2, bug:2, rock:0.5, steel:0.5 },
  psychic:  { fighting:2, poison:2, psychic:0.5, dark:0, steel:0.5 },
  bug:      { fire:0.5, grass:2, fighting:0.5, poison:0.5, flying:0.5, psychic:2, ghost:0.5, dark:2, steel:0.5, fairy:0.5 },
  rock:     { fire:2, ice:2, fighting:0.5, ground:0.5, flying:2, bug:2, steel:0.5 },
  ghost:    { normal:0, psychic:2, ghost:2, dark:0.5 },
  dragon:   { dragon:2, steel:0.5, fairy:0 },
  dark:     { fighting:0.5, psychic:2, ghost:2, dark:0.5, fairy:0.5 },
  steel:    { fire:0.5, water:0.5, electric:0.5, ice:2, rock:2, steel:0.5, fairy:2 },
  fairy:    { fire:0.5, fighting:2, poison:0.5, dragon:2, dark:2, steel:0.5 }
};

// ====== 計算 ======
function defensiveMult(attackType, defTypes) {
  let m = 1;
  defTypes.forEach(t => {
    const v = EFFECTIVE[attackType]?.[t];
    if (v !== undefined) m *= v;
  });
  return m;
}

// ====== とくせい補正 ======
// 防御側のとくせいによる被ダメ倍率（0=無効、0.5=半減、0.75=軽減、1=等倍）
// attackerがかたやぶり系なら無視されるため、attackerAbility引数もあり
function abilityDefenseMult(defender, attackType, typeMult, attackerAbility) {
  if (!defender || !defender.ability) return 1;
  const atkAb = attackerAbility ? ABILITY_MAP[attackerAbility] : null;
  // かたやぶり系は相手とくせいを無視
  if (atkAb && (atkAb.id === 'かたやぶり' || atkAb.id === 'ターボブレイズ' || atkAb.id === 'テラボルテージ')) return 1;
  const ab = ABILITY_MAP[defender.ability];
  if (!ab) return 1;
  // タイプ無効
  if ((ab.group === 'immunity' || ab.group === 'absorb') && ab.immuneTypes && ab.immuneTypes.includes(attackType)) return 0;
  // タイプ半減
  if (ab.group === 'resist' && ab.resistTypes && ab.resistTypes.includes(attackType)) return 0.5;
  // 効果抜群軽減
  if ((ab.id === 'フィルター' || ab.id === 'ハードロック') && typeMult >= 2) return 0.75;
  // マルチスケイル: HP満タン仮定で半減
  if (ab.id === 'マルチスケイル') return 0.5;
  // ファーコート: 物理半減（簡易: 全体的に0.85扱い）
  if (ab.id === 'ファーコート') return 0.65;
  return 1;
}

// 攻撃側とくせいによる火力倍率
function abilityAttackMult(attacker, mv) {
  if (!attacker || !attacker.ability || !mv) return 1;
  const ab = ABILITY_MAP[attacker.ability];
  if (!ab) return 1;
  // 威力強化系
  if (ab.id === 'てきおうりょく' && attacker.types?.includes(mv.type)) return 1.33; // STAB 1.5 → 2.0 を粗く
  if (ab.id === 'テクニシャン') {
    const bp = (mv.bp != null) ? mv.bp : (MOVE_BP[mv.name] ?? 0);
    if (bp > 0 && bp <= 60) return 1.5;
  }
  if (ab.id === 'ちからずく') return 1.3;
  if (ab.id === 'メガランチャー') {
    const waveMoves = ['はどうだん','みずのはどう','あくのはどう','りゅうのはどう','あくうせつだん'];
    if (waveMoves.some(n => mv.name && mv.name.includes(n))) return 1.5;
  }
  if (ab.id === 'てつのこぶし') {
    const punchMoves = ['パンチ','アイアンヘッド','ばくれつパンチ','れいとうパンチ','ほのおのパンチ','かみなりパンチ','れいとうパンチ','ドレインパンチ'];
    if (mv.name && punchMoves.some(n => mv.name.includes('パンチ'))) return 1.2;
  }
  if (ab.id === 'ヨガパワー' && mv.cat === '物') return 2.0;
  if (ab.id === 'ちからもち' && mv.cat === '物') return 2.0;
  if (ab.id === 'いろめがね') {
    // いまひとつなら等倍化（mult半減を補正）→ ここでは別途処理が必要なので省略
    return 1;
  }
  return 1;
}
function allWeaknesses(defTypes) {
  const r = {};
  TYPES.forEach(atk => { r[atk] = defensiveMult(atk, defTypes); });
  return r;
}

// 一致技考慮の最大攻撃スコア（マルチファクタ）
// 形式: score = 倍率 × 一致 × 攻AC × 防BD × 威力 × 持ち物 × 4倍非線形
// 返却: スコアの他、内訳と最適技、想定ダメージ% (期待値の粗見積り)
function bestHitScore(userPoke, opp) {
  const blank = {score:0, mult:0, stab:false, mv:null, offF:1, defF:1, powF:1, itemF:1, bonus:1, accF:1, abF:1, priority:0, dmgPct:0, bpSrc:'default', abilityBlocked:false};
  if (!userPoke || !opp) return blank;
  let best = blank;
  for (const mv of (userPoke.moves || [])) {
    if (!mv.type || mv.cat === '変') continue;
    const mult = defensiveMult(mv.type, opp.types);
    if (mult === 0) continue;
    // 相手のとくせいで無効化される場合はスキップ
    const abDefMul = abilityDefenseMult(opp, mv.type, mult, userPoke.ability);
    if (abDefMul === 0) continue;
    const stab = userPoke.types.includes(mv.type);
    const offF = offensiveFactor(userPoke, mv);
    const defF = defensiveFactor(opp, mv);
    const powF = powerFactor(mv);
    const itemF = itemFactor(userPoke, mv);
    const bonus = multNonLinearBonus(mult);
    const accF = accuracyFactor(mv);
    const abF = abilityAttackMult(userPoke, mv);
    const score = mult * (stab ? 1.5 : 1) * offF * defF * powF * itemF * bonus * accF * abF * abDefMul;
    const priority = movePriority(mv);
    const bpSrc = bpSource(mv);
    // 相手HPに対する期待ダメージ%（粗見積り）
    const oppStats = getPokeStatsObj(opp.id);
    const hpBase = oppStats?.hp || 80;
    const dmgPct = Math.min(200, Math.round(score * 3300 / hpBase));
    if (score > best.score) best = {score, mult, stab, mv, offF, defF, powF, itemF, bonus, accF, abF, priority, dmgPct, bpSrc, abilityBlocked:false};
  }
  // もし全ての技が相手とくせいで無効化されているなら abilityBlocked フラグ
  if (best.score === 0) {
    const hasAttackMove = (userPoke.moves || []).some(mv => mv.type && mv.cat !== '変');
    if (hasAttackMove) {
      // 有効打なし（タイプ相性 or とくせい無効）
      best = {...blank, abilityBlocked: !!opp.ability && (userPoke.moves || []).some(mv => {
        if (!mv.type || mv.cat === '変') return false;
        return abilityDefenseMult(opp, mv.type, defensiveMult(mv.type, opp.types), userPoke.ability) === 0;
      })};
    }
  }
  return best;
}

// 相手→自軍の脅威読み: 敵の想定タイプ/カテゴリから最大想定火力を推定
// 敵の技は未知なので、敵のタイプから最適STAB技を仮定し、敵の[atk,spa]の高い方で火力推定。
// 返却: threatScore（0-10前後）、threatType、movCat（想定カテゴリ）、dmgPct、hasSTAB
function defenseThreat(opp, userPoke) {
  const blank = {threat:0, type:null, cat:null, mult:0, dmgPct:0};
  if (!userPoke || !opp) return blank;
  const oppStats = getPokeStatsObj(opp.id);
  if (!oppStats) return blank;
  // 攻撃側カテゴリは A vs C の高い方
  const cat = oppStats.atk >= oppStats.spa ? '物' : '特';
  const useStat = cat === '物' ? oppStats.atk : oppStats.spa;
  // 線形攻撃補正
  const offF = Math.max(0.4, Math.min(2.0, useStat / 100));
  // 相手のタイプ各々について、自軍への倍率を計算し最大を採用
  // （相手は一致技 STAB=1.5を使えると仮定）
  let best = blank;
  for (const t of opp.types) {
    const mult = defensiveMult(t, userPoke.types);
    if (mult === 0) continue;
    // 自軍のとくせいで無効化されるタイプ技はスキップ
    const abDefMul = abilityDefenseMult(userPoke, t, mult, opp.ability);
    if (abDefMul === 0) continue;
    // 自軍のBD
    const userStats = getPokeStatsObj(userPoke.id);
    const defStat = cat === '物' ? (userStats?.def || 80) : (userStats?.sdef || 80);
    const defF = Math.max(0.55, Math.min(1.6, 100 / Math.max(40, defStat)));
    // 想定威力90を仮定
    const powF = 1.0;
    const bonus = multNonLinearBonus(mult);
    // 持ち物による軽減
    const itemDefF = itemDefenseFactor(opp, userPoke, t, mult);
    const threat = mult * 1.5 * offF * defF * powF * bonus * itemDefF * abDefMul;
    const hp = userStats?.hp || 80;
    const dmgPct = Math.min(200, Math.round(threat * 3300 / hp));
    if (threat > best.threat) {
      best = {threat, type:t, cat, mult, dmgPct, itemDefF, abDefMul};
    }
  }
  // タイプなしor全て無効の場合、ノーマル物理技を仮定（最低限の脅威）
  if (best.threat === 0) {
    const mult = 1;
    const userStats = getPokeStatsObj(userPoke.id);
    const defStat = cat === '物' ? (userStats?.def || 80) : (userStats?.sdef || 80);
    const defF = Math.max(0.55, Math.min(1.6, 100 / Math.max(40, defStat)));
    const threat = mult * 1.0 * offF * defF * 1.0 * 1.0;
    const hp = userStats?.hp || 80;
    best = {threat, type:'normal', cat, mult, dmgPct:Math.min(200, Math.round(threat * 3300 / hp)), itemDefF:1};
  }
  return best;
}

// 総合マッチアップ: offense - defense_threat + speed_bonus
// 返却: totalスコア（高いほど有利）、内訳
function matchupScore(userPoke, opp) {
  if (!userPoke || !opp) return {total:0, offense:0, threat:0, speed:0};
  const off = bestHitScore(userPoke, opp);
  const thr = defenseThreat(opp, userPoke);
  const us = effectiveSpeed(userPoke);
  const os = effectiveSpeed(opp);
  // 速度ボーナス: 先制技があればその優先度分も加算
  let speedBonus = 0;
  if (off.priority > 0) {
    speedBonus = 0.5 + off.priority * 0.25;
  } else if (us > os) {
    speedBonus = 0.4;
  } else if (us === os) {
    speedBonus = 0;
  } else {
    speedBonus = -0.5; // 後手ペナルティ（相手のOHKOリスク）
  }
  // 脅威重みは0.7（こちらの攻撃を優先しつつ被弾も考慮）
  const total = off.score - thr.threat * 0.7 + speedBonus;
  return {total, offense:off.score, threat:thr.threat, speed:speedBonus, off, thr};
}

// ====== 確定数・速度分析ヘルパー（対戦ガイド用） ======
// 確定数: dmgPctから何発で落とせるか (+ 命中補正)
// 返却: null (攻撃手段なし) or {turns, accTurns, dmgPct, accuracy}
function killTurns(dmgPct, accuracy) {
  const acc = (accuracy == null || accuracy > 100) ? 100 : Math.max(1, accuracy);
  if (!dmgPct || dmgPct <= 0) return null;
  const clamped = Math.min(dmgPct, 400);
  const turns = Math.max(1, Math.ceil(100 / clamped));
  const eff = clamped * acc / 100;
  const accTurns = Math.max(1, Math.ceil(100 / Math.max(1, eff)));
  return {turns, accTurns, dmgPct:clamped, accuracy:acc};
}

// 速度比較分析（スカーフ警戒込み）
function speedAnalysis(u, o) {
  if (!u || !o) return null;
  const us = effectiveSpeed(u);
  const os = effectiveSpeed(o);
  const osScarf = Math.floor(os * 1.5);
  const isFaster = us > os;
  const isSlower = us < os;
  const isSame = us === os;
  const scarfBeats = us <= osScarf; // 相手がこだわりスカーフならこちらが負ける
  const scarfSafe = us > osScarf;   // スカーフでも勝てる
  return {us, os, osScarf, isFaster, isSlower, isSame, scarfBeats, scarfSafe};
}

// レース勝敗判定: こちらの確定数・相手の確定数・速度から勝ち筋を推定
// 返却: {verdict:'win'|'winProb'|'draw'|'lose', label, reason, color}
function raceVerdict(kt, ktOpp, speed, priority) {
  const hasPri = priority > 0;
  if (!kt) return {verdict:'lose', label:'攻撃手段なし', reason:'有効打がない', color:'text-red-700'};
  if (!ktOpp) return {verdict:'win', label:`${kt.turns}発で撃破`, reason:'相手の火力データ不足', color:'text-green-700'};
  const a = kt.turns;    // 自分が倒すのに必要な発数
  const b = ktOpp.turns; // 相手が倒すのに必要な発数
  if (a === 1 && (speed.isFaster || hasPri)) return {verdict:'win', label:`1発KO（先制${hasPri?'技':''}）`, reason:'確1確定', color:'text-green-700'};
  if (speed.isFaster) {
    if (a <= b) return {verdict:'win', label:`先手${a}発勝ち`, reason:`相手${b}発耐え`, color:'text-green-700'};
    if (a === b + 1 && hasPri) return {verdict:'winProb', label:'先制技で捲り可', reason:`先制技で最後の1発`, color:'text-emerald-600'};
    return {verdict:'lose', label:`${b}発で負け`, reason:`こちら${a}発必要だが相手${b}発で先KO`, color:'text-red-600'};
  }
  if (speed.isSame) {
    if (a < b) return {verdict:'winProb', label:`同速${a}発勝ち（50%）`, reason:'同速乱数', color:'text-yellow-700'};
    if (a === b) return {verdict:'draw', label:'同速相打ち圏', reason:`両者${a}発`, color:'text-gray-700'};
    return {verdict:'lose', label:`${b}発で負け`, reason:'同速乱数でも不利', color:'text-red-600'};
  }
  // 後手
  if (hasPri && a <= b) return {verdict:'win', label:`先制技で${a}発勝ち`, reason:'後手だが先制で抜ける', color:'text-green-700'};
  if (a < b) return {verdict:'win', label:`後手${a}発勝ち`, reason:`相手${b}発耐え`, color:'text-green-700'};
  if (a === b) return {verdict:'lose', label:`後手${b}発で先KO負け`, reason:'同発数・後手', color:'text-red-600'};
  return {verdict:'lose', label:`${b}発で負け`, reason:'先手取れず火力不足', color:'text-red-700'};
}

// チーム総合評価 (高いほど良い)
function evaluateTeam(team) {
  const filled = team.filter(Boolean);
  if (filled.length === 0) return 0;
  let weakCoverage = 0;
  let holes = 0;
  TYPES.forEach(atk => {
    let resist = 0, weak = 0;
    filled.forEach(u => {
      const m = defensiveMult(atk, u.types);
      if (m > 1) weak++;
      else if (m < 1) resist++;
    });
    weakCoverage += (resist - weak);
    if (filled.every(u => defensiveMult(atk, u.types) > 1)) holes++;
  });
  const typeSet = new Set();
  filled.forEach(u => u.types.forEach(t => typeSet.add(t)));
  const diversity = typeSet.size;
  const combos = {};
  filled.forEach(u => {
    const key = [...u.types].sort().join(',');
    combos[key] = (combos[key]||0) + 1;
  });
  const dup = Object.values(combos).reduce((s,c)=>s+(c>1?c-1:0),0);
  return weakCoverage + diversity - holes*30 - dup*5;
}

// C(n,k) 組み合わせ列挙
function combinations(arr, k) {
  const res = [];
  const rec = (start, pick) => {
    if (pick.length === k) { res.push([...pick]); return; }
    for (let i=start; i<arr.length; i++) {
      pick.push(arr[i]);
      rec(i+1, pick);
      pick.pop();
    }
  };
  rec(0, []);
  return res;
}
function idFromUrl(url) {
  const m = url.match(/\/pokemon\/(\d+)\//);
  return m ? parseInt(m[1]) : null;
}

// ====== 物理/特殊型判定 ======
// POKE_STATS形式: [hp, atk, def, spa, sdef]
// 正規化ヘルパー（hp,def,sdef は未登録時 80 で補完）
function getPokeStatsObj(pokeId) {
  const s = POKE_STATS[pokeId];
  if (!s) return null;
  // 後方互換: 旧 [atk,spa] 形式でも読めるように
  if (s.length === 2) return { hp:80, atk:s[0], def:80, spa:s[1], sdef:80 };
  return { hp:s[0], atk:s[1], def:s[2], spa:s[3], sdef:s[4] };
}
function classifyByStats(pokeId) {
  const s = getPokeStatsObj(pokeId);
  if (!s) return null;
  const {atk, spa} = s;
  if (atk >= spa * 1.25) return {key:'phys', jp:'物理', emoji:'🥊', cls:'bg-red-100 text-red-700 border-red-300', atk, spa};
  if (spa >= atk * 1.25) return {key:'spec', jp:'特殊', emoji:'✨', cls:'bg-blue-100 text-blue-700 border-blue-300', atk, spa};
  return {key:'mixed', jp:'両刀', emoji:'⚔️', cls:'bg-purple-100 text-purple-700 border-purple-300', atk, spa};
}
// 技カテゴリベース: 登録技の物/特/変を集計
function classifyByMoves(moves) {
  const cats = (moves||[]).map(m => m?.cat).filter(Boolean);
  const phys = cats.filter(c => c === '物').length;
  const spec = cats.filter(c => c === '特').length;
  const stat = cats.filter(c => c === '変').length;
  const off = phys + spec;
  if (off === 0) return null;
  if (phys > 0 && spec === 0) return {key:'phys', jp:'物理型', emoji:'🥊', cls:'bg-red-100 text-red-700 border-red-300', phys, spec, stat};
  if (spec > 0 && phys === 0) return {key:'spec', jp:'特殊型', emoji:'✨', cls:'bg-blue-100 text-blue-700 border-blue-300', phys, spec, stat};
  return {key:'mixed', jp:'両刀型', emoji:'⚔️', cls:'bg-purple-100 text-purple-700 border-purple-300', phys, spec, stat};
}

// 技名からタイプ・分類を推論（MOVE_DATAにあれば優先、なければnull）
function lookupMove(name) {
  if (!name) return null;
  return MOVE_DATA[name] || null;
}

// ====== 五十音順ソート & ポケ別候補フィルタ ======
// 日本語ロケールで文字列ソート（ひらがな・カタカナ・漢字対応）
function sortJP(arr) {
  return arr.slice().sort((a, b) => String(a).localeCompare(String(b), 'ja'));
}

// そのポケに候補として見せる技一覧（五十音順）。showAll=true なら全表示
function movesForPoke(poke, showAll) {
  const all = sortJP(Object.keys(MOVE_DATA));
  if (showAll || !poke || !poke.types || poke.types.length === 0) return all;
  const pokeTypes = new Set(poke.types); // 英字 'fire','water'...
  return all.filter(name => {
    const mv = MOVE_DATA[name];
    if (!mv) return false;
    // 変化技: ユニバーサル変化技 or タイプ一致のもののみ
    if (mv.cat === '変') {
      return UNIVERSAL_STATUS_MOVES.has(name) || pokeTypes.has(mv.type);
    }
    // ダメージ技: タイプ一致 or 汎用コーチング技
    if (pokeTypes.has(mv.type)) return true;
    if (UNIVERSAL_COVERAGE_MOVES.has(name)) return true;
    return false;
  });
}

// そのポケに候補として見せるとくせい一覧（五十音順）。showAll=true なら全表示
function abilitiesForPoke(poke, showAll) {
  const sorted = ABILITIES.slice().sort((a, b) => a.jp.localeCompare(b.jp, 'ja'));
  if (showAll || !poke || !poke.types || poke.types.length === 0) return sorted;
  const pokeTypes = new Set(poke.types);
  return sorted.filter(ab => {
    if (!ab.typeAffinity) return true; // 汎用
    return ab.typeAffinity.some(t => pokeTypes.has(t));
  });
}

// メガストーン判定ヘルパー
function isMega(poke) {
  if (!poke || !poke.item) return false;
  const it = ITEM_MAP[poke.item];
  return !!(it && it.group === 'mega');
}

// 優先度のある技だけ記載（未登録は0扱い）
const MOVE_PRIORITY = {
  'しんそく':2,
  'でんこうせっか':1,'マッハパンチ':1,'バレットパンチ':1,'しんくうは':1,'アクアジェット':1,

  // 追加: 優先度持ち
  'ジェットパンチ':1,'かみなりあらし':1,'フェイント':2,'てだすけ':5,
  'みちづれ':0,'ほろびのうた':0,
};

// ====== スコア計算エンジン（攻撃/防御/マッチアップ） ======
// 基準値100を中心に、線形 stat/100 を採用（非クランプ）。
// 期待ダメージは ~ AC/BD に比例するので、線形が最も解釈しやすい。

// 攻撃側ステータス補正（技の分類に応じて A/C を参照、不一致は大幅減点）
function offensiveFactor(poke, mv) {
  if (!poke || !mv || !mv.cat || mv.cat === '変') return 1;
  const s = getPokeStatsObj(poke.id);
  if (!s) return 1;
  const useStat = mv.cat === '物' ? s.atk : s.spa;
  const altStat = mv.cat === '物' ? s.spa : s.atk;
  // 線形 AC/100、下限0.4・上限2.0（極端な分布も反映）
  let f = Math.max(0.4, Math.min(2.0, useStat / 100));
  // 不一致型（物理技なのに特殊型、など）は半減
  if (useStat < altStat * 0.8) f *= 0.5;
  return f;
}

// 防御側ステータス補正（相手のB/Dを考慮した実ダメージ比例化）
// 敵のB/Dが高いほど与ダメージは下がる → スコアに 100/DB を乗算
function defensiveFactor(opp, mv) {
  if (!opp || !mv || mv.cat === '変') return 1;
  const s = getPokeStatsObj(opp.id);
  if (!s) return 1;
  const defStat = mv.cat === '物' ? s.def : s.sdef;
  // 100 基準、下限0.55・上限1.6（ゴツい壁にはスコアがしっかり下がる）
  return Math.max(0.55, Math.min(1.6, 100 / Math.max(40, defStat)));
}

// 威力の出所を返す（UI バッジ判定用）
// 'user'     ユーザー入力
// 'special'  特殊挙動（MOVE_SPECIAL）
// 'dict'     辞書ヒット（MOVE_BP）
// 'default'  デフォルト（90相当）で代入された＝精度低い
// 'status'   変化技（威力計算対象外）
function bpSource(mv) {
  if (!mv) return 'default';
  if (mv.cat === '変') return 'status';
  if (mv.bp != null && mv.bp > 0) return 'user';
  if (MOVE_SPECIAL[mv.name]) return 'special';
  if (MOVE_BP[mv.name] != null) return 'dict';
  return 'default';
}

// 技の威力補正（特殊技→辞書→デフォルト）
// 期待ダメージを威力90基準に正規化して返す (0.25〜2.0)
function powerFactor(mv) {
  if (!mv || mv.cat === '変') return 0.3;
  // 特殊技処理（固定ダメ/多段/割合/変動/カウンター/OHKO）
  const sp = MOVE_SPECIAL[mv.name];
  if (sp) {
    switch (sp.kind) {
      case 'fixed': {
        // 固定ダメージ: level相当の絶対値 → 威力換算
        // （だいたい 40相当≒威力60換算）
        return Math.max(0.2, Math.min(1.2, (sp.damage * 1.2) / 90));
      }
      case 'fraction': {
        // 割合ダメ: pct=50 → HP半分 ≒ 威力80相当くらい
        return Math.max(0.25, Math.min(1.5, (sp.pct * 1.4) / 90));
      }
      case 'multi': {
        const totalBp = sp.bp * (sp.avgHits || 3);
        return Math.max(0.25, Math.min(2.0, totalBp / 90));
      }
      case 'multi_progressive': {
        // 威力漸増: 平均ヒット数に応じた期待合計威力
        const avgH = sp.avgHits || 2.5;
        const bps = sp.bps || [];
        let total = 0;
        for (let i = 0; i < bps.length; i++) {
          // i+1 ヒット目の発生確率（累積）
          const prob = Math.max(0, Math.min(1, avgH - i));
          total += bps[i] * prob;
        }
        return Math.max(0.25, Math.min(2.0, total / 90));
      }
      case 'conditional': {
        // 条件充足時の平均威力で見積もる
        const avg = sp.avgBp ?? ((sp.baseBp + sp.altBp) / 2);
        return Math.max(0.25, Math.min(1.8, avg / 90));
      }
      case 'variable_weight': {
        return Math.max(0.25, Math.min(1.5, sp.avg / 90));
      }
      case 'counter': {
        // 相手依存のため中庸値（過大評価を避ける）
        return 0.5;
      }
      case 'ohko': {
        // 一撃必殺: 期待ダメ = HP × 命中率 → 威力換算で大きめだが成功率で減衰
        // 成功率30%なら実効ダメ30% → 威力30相当、保守的に評価
        return Math.max(0.15, Math.min(1.2, (sp.accuracy || 30) / 90 * 1.5));
      }
      case 'priority_reactive': {
        // ふいうち: 相手の攻撃手選択に依存、平均的に成立仮定で 70*0.8
        return Math.max(0.25, Math.min(1.5, (sp.baseBp || 70) * 0.8 / 90));
      }
      case 'fixed_max_leave1': {
        // みねうち: HP1まで。実質固定小ダメ評価
        return 0.45;
      }
    }
  }
  const bp = (mv.bp != null && mv.bp > 0) ? mv.bp : (MOVE_BP[mv.name] ?? null);
  if (bp == null) {
    // 登録無し: カテゴリ別デフォルト値で妥当な推定
    return mv.cat === '変' ? 0.3 : 1.0;
  }
  // 威力90を基準に線形、下限0.25/上限1.5
  return Math.max(0.25, Math.min(1.5, bp / 90));
}

// 命中率補正（期待値換算）
function accuracyFactor(mv) {
  if (!mv || mv.cat === '変') return 1;
  // 一撃必殺は powerFactor 側で成功率を反映済み
  const sp = MOVE_SPECIAL[mv.name];
  if (sp?.kind === 'ohko') return 1;
  const acc = (mv.accuracy != null && mv.accuracy > 0 && mv.accuracy <= 100)
    ? mv.accuracy
    : (MOVE_ACCURACY[mv.name] ?? 100);
  return Math.max(0.3, Math.min(1, acc / 100));
}

// 技の優先度（MOVE_PRIORITY から参照、未登録は0）
function movePriority(mv) {
  if (!mv) return 0;
  if (mv.priority != null) return mv.priority;
  return MOVE_PRIORITY[mv.name] ?? 0;
}

// 4倍弱点/4倍耐性の非線形ボーナス（実戦ではほぼ確定OHKO/確定ガード）
function multNonLinearBonus(mult) {
  if (mult >= 4) return 1.2;   // 4倍 → 実質+20%ボーナス
  if (mult <= 0.25) return 0.8; // 1/4 → 追加減衰
  return 1;
}

// 持ち物による攻撃側ダメージ補正（ポケチャン準拠）
function itemFactor(poke, mv) {
  if (!poke?.item || !mv) return 1;
  const it = ITEM_MAP[poke.item];
  if (!it) return 1;
  if (poke.item === 'light_ball' && poke.id === '33' && (mv.cat === '物' || mv.cat === '特')) return 2.0;
  if (it.typeBoost && mv.type === it.typeBoost) return 1.2;
  return 1;
}

// 防御側の持ち物補正（受けるダメージの軽減倍率を返す。小さいほど耐える）
// - きあいのタスキ: OHKO回避想定で 0.5（運用上半減相当とみなす）
// - たべのこし: 小さな持続回復→軽い軽減 0.92
// - 弱点半減きのみ: 該当タイプ×効果抜群時のみ 0.5
// - しろいハーブ/メンタルハーブ/スカーフ: 受けダメ補正は無し
function itemDefenseFactor(opp, user, oppMoveType, userMult) {
  if (!user?.item) return 1;
  const it = ITEM_MAP[user.item];
  if (!it) return 1;
  if (it.id === 'focus_sash') return 0.5;
  if (it.id === 'leftovers' || it.id === 'shell_bell' || it.id === 'sitrus' || it.id === 'oran') return 0.92;
  if (it.group === 'berry_resist' && it.resist === oppMoveType && userMult >= 2) return 0.5;
  return 1;
}

// 実効素早さ（こだわりスカーフ 1.5倍）
function effectiveSpeed(poke) {
  const base = poke?.spd || 0;
  if (poke?.item === 'choice_scarf') return Math.floor(base * 1.5);
  return base;
}

function ItemBadge({itemId, compact}) {
  const it = ITEM_MAP[itemId];
  if (!it || !it.id) return null;
  return (
    <span className="inline-flex items-center gap-0.5 text-[10px] font-bold px-1.5 py-0.5 rounded border bg-amber-50 text-amber-800 border-amber-300"
      title={it.desc ? `${it.jp}：${it.desc}` : it.jp}>
      <span>{it.emoji}</span>{!compact && <span>{it.short}</span>}
    </span>
  );
}

function BiasBadge({bias, compact}) {
  if (!bias) return null;
  const detail = bias.atk !== undefined
    ? ` A${bias.atk}/C${bias.spa}`
    : (bias.phys !== undefined ? ` 物${bias.phys}特${bias.spec}${bias.stat?`変${bias.stat}`:''}` : '');
  return (
    <span className={`inline-flex items-center gap-0.5 text-[10px] font-bold px-1.5 py-0.5 rounded border ${bias.cls}`}
      title={`${bias.jp}${detail}`}>
      <span>{bias.emoji}</span><span>{bias.jp}</span>
      {!compact && detail && <span className="opacity-70 font-normal">{detail}</span>}
    </span>
  );
}

// 画像を最大幅にリサイズしてJPEGに変換（API費用とレイテンシを節約）
async function resizeImageForApi(file, maxWidth = 1280) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      const scale = Math.min(1, maxWidth / img.width);
      const w = Math.max(1, Math.floor(img.width * scale));
      const h = Math.max(1, Math.floor(img.height * scale));
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      canvas.toBlob(b => {
        if (!b) return reject(new Error('画像変換に失敗しました'));
        resolve(new File([b], 'detect.jpg', { type: 'image/jpeg' }));
      }, 'image/jpeg', 0.85);
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('画像を読み込めません')); };
    img.src = url;
  });
}

async function fileToBase64Data(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result.split(',')[1]);
    r.onerror = () => reject(new Error('画像の読み込みに失敗しました'));
    r.readAsDataURL(file);
  });
}

// ROSTER から日本語名でポケモンを検索（厳密→カッコ無視→部分一致）
function findRosterByJpName(name) {
  if (!name) return null;
  const n = String(name).trim();
  if (!n || n === '不明' || n === '不明なポケモン') return null;
  // 完全一致
  const exact = ROSTER.find(r => r.jp === n);
  if (exact) return exact;
  // カッコを除去して比較
  const strip = s => s.replace(/[（(].+?[)）]/g, '').trim();
  const nStripped = strip(n);
  const strippedExact = ROSTER.find(r => strip(r.jp) === nStripped);
  if (strippedExact) return strippedExact;
  // メガ/アローラ等の接頭辞マッチ
  const prefixes = ['メガ', 'アローラ', 'ガラル', 'ヒスイ', 'パルデア'];
  for (const pre of prefixes) {
    if (n.startsWith(pre)) {
      const body = n.slice(pre.length);
      const withPre = ROSTER.find(r => r.jp === pre + body || strip(r.jp) === pre + strip(body));
      if (withPre) return withPre;
    }
  }
  // 部分一致（入力が長い場合は含有、短い場合は前方一致優先）
  const partial = ROSTER.find(r => r.jp.includes(nStripped)) ||
    ROSTER.find(r => nStripped.includes(strip(r.jp)));
  return partial || null;
}

const SUPABASE_URL = 'https://qaflnljielffykrsyhei.supabase.co';
const SUPABASE_KEY = 'sb_publishable_e5AzS0JMdJUpvIuluHFPDA_r2CSc39V';

async function sha256Hex(str) {
  const buf = new TextEncoder().encode(str);
  const hashBuf = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// 24文字の同期キー生成 (Base32風: 読み間違えにくい文字集合)
function generateSyncKey() {
  const chars = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789'; // 0,O,1,I,l除外
  const bytes = new Uint8Array(24);
  crypto.getRandomValues(bytes);
  return Array.from(bytes).map(b => chars[b % chars.length]).join('');
}

async function supabaseRequest(path, opts = {}) {
  const { method = 'GET', hash, body, prefer } = opts;
  const headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${SUPABASE_KEY}`,
    'Content-Type': 'application/json',
  };
  if (hash) headers['x-sync-hash'] = hash;
  if (prefer) headers['Prefer'] = prefer;
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    method,
    headers,
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) {
    const text = await res.text();
    throw new Error(`Supabase ${res.status}: ${text}`);
  }
  if (res.status === 204) return null;
  const txt = await res.text();
  return txt ? JSON.parse(txt) : null;
}

async function syncPull(syncKey) {
  const hash = await sha256Hex(syncKey);
  const rows = await supabaseRequest(`user_teams?sync_key_hash=eq.${hash}&select=teams_json,updated_at`, { hash });
  return rows?.[0] || null;
}

async function syncPush(syncKey, payload) {
  const hash = await sha256Hex(syncKey);
  const now = new Date().toISOString();
  const rows = await supabaseRequest('user_teams', {
    method: 'POST',
    hash,
    body: { sync_key_hash: hash, teams_json: payload, updated_at: now },
    prefer: 'resolution=merge-duplicates,return=representation',
  });
  return rows?.[0] || { updated_at: now };
}

    primary = '💥 こだわり物理アタッカー';
    desc = 'こだわりハチマキで物理火力1.5倍。技をロックされるが一撃の威力が高い。タイプ受けされない対面で押し込む。';
  } else if (poke.item === 'choice_specs') {
    primary = '💥 こだわり特殊アタッカー';
    desc = 'こだわりメガネで特殊火力1.5倍。技固定だが火力は全役割中トップクラス。';
  } else if (hasHazards) {
    primary = '🪤 設置役（ステロ/まきびし）';
    desc = '相手の登場時にダメージを蓄積する罠を撒く。初手に出して設置後はサポートに回るか交代。';
  } else if (hasScreen) {
    primary = '🛡 壁貼り / 補助';
    desc = 'リフレクター/ひかりのかべで味方を守る。初手で展開し、エースの積み技サポートに。';
  } else if (hasSetup && bulk >= 90) {
    primary = '🔥 耐久積みアタッカー';
    desc = `受けながら「${setupName}」で強化、硬さを活かして積み展開を狙う。全抜き筋あり。`;
  } else if (hasSetup) {
    primary = '⚡ 積みエース（全抜き候補）';
    desc = `「${setupName}」で一気に強化、弱点を突かれる前に相手を崩す高速エース。隙を見て積む。`;
  } else if (hasRecovery && bulk >= 130) {
    primary = '🛡 受け / 起点作り';
    desc = '高耐久で技を受けつつ回復。相手のエースを流したり、状態異常で崩す役。';
  } else if (ab?.group === 'weather') {
    const wn = {sun:'晴れ',rain:'雨',sand:'砂嵐',hail:'雪'}[ab.weather];
    primary = `☀ ${wn}エース / 天候始動`;
    desc = `${ab.jp}で場に${wn}を展開。天候パーティの起点として先発推奨。`;
  } else if (hasPivot && spd >= 90) {
    primary = '🔄 高速サイクル / 展開役';
    desc = `「${mvNames.find(n=>PIVOT_MOVES.includes(n))}」で有利対面に交代しながら削る。相手の選出を揺さぶる。`;
  } else if (ab?.id === 'いかく') {
    primary = '😤 いかく物理受け';
    desc = 'いかくで相手物理攻撃を1段階ダウン。物理型相手に繰り出すと安定。';
  } else if (spd >= 110 && atkPower >= 100) {
    primary = '🏹 高速アタッカー';
    desc = `S${spd}で大半を抜ける。先手から高火力で押し切る。`;
  } else if (isPhys) {
    primary = '🥊 物理アタッカー';
    desc = `A${atk}中心。物理技で押し込むパンチャー役。`;
  } else if (isSpec) {
    primary = '✨ 特殊アタッカー';
    desc = `C${spa}中心。特殊技で押し込む役。`;
  } else if (hasStatus) {
    primary = '⚙ 補助 / 崩し役';
    desc = '状態異常で相手を機能停止させ、味方のエースを通しやすくする補助役。';
  } else {
    primary = '⚖ バランス型';
    desc = '特化が少なく汎用的。受けとも攻めともどちらでも動ける。';
  }

  // タグ（補足能力）
  const tags = [];
  if (hasPriority) tags.push(`先制技(${priMoves.join('/')})`);
  if (ab?.group === 'weather') tags.push(`${ab.jp}`);
  if (ab?.id === 'イタズラゴコロ') tags.push('イタズラ先制補助');
  if (ab?.id === 'いかく' && primary && !primary.includes('いかく')) tags.push('いかく');
  if (ab?.id === 'マルチスケイル') tags.push('満タンで半減');
  if (ab?.id === 'マジックガード') tags.push('定数ダメ無効');
  if (ab?.group === 'immunity' || ab?.group === 'absorb') tags.push(`${ab.immuneTypes?.map(t=>TYPE_JP[t]||t).join('/')}無効`);
  if (item?.id === 'focus_sash') tags.push('タスキ確1耐え');
  if (item?.id === 'leftovers') tags.push('たべのこし');
  if (item?.id === 'life_orb') tags.push('いのちのたま(×1.3)');

  // 使い方Tips
  const tips = [];
  if (hasSetup) tips.push(`受け出し安全 or 相手が積まれたくない場面で「${setupName}」を撃つ`);
  if (hasRecovery) tips.push('HP50%前後で回復、HP満タンを維持し展開を長く');
  if (hasPivot) tips.push('不利対面なら交代技で仕切り直し、有利対面を作る');
  if (poke.item === 'choice_scarf') tips.push('終盤に取っておき、一掃できるHPラインまで相手を削る');
  if (poke.item === 'choice_band' || poke.item === 'choice_specs') tips.push('選出前に「タイプ一致・抜群」を取れる対面を読む、状況に応じて交代');
  if (hasHazards) tips.push('初手1ターン目に設置、相手の交代で更にダメを稼ぐ');
  if (spd >= 120) tips.push(`S${spd}は最速級。ほぼ全ての相手を抜ける`);
  else if (spd <= 50 && !mvNames.includes('トリックルーム')) tips.push(`S${spd}は遅め。一撃耐えて撃つ or 先制技でカバー`);
  if (ab?.id === 'いかく') tips.push('物理アタッカーに対面させると一発目が軽くなる');

  return {primary, desc, tags, tips, atkPower, isPhys, isSpec, bulk, spd, hasSetup, hasRecovery, hasHazards, hasPivot, hasPriority, setupName};
}

// ====== TeamGuide（自軍の使い方解説） ======
function TeamGuide({team}) {
  const filled = team.filter(Boolean);
  if (filled.length === 0) {
    return (
      <div className="bg-gray-50 border border-dashed border-gray-300 rounded-lg p-4 text-center text-sm text-gray-500">
        📖 使い方ガイド: 自軍を登録すると、各ポケの役割や勝ち筋を自動解説します
      </div>
    );
  }

  // 各ポケの役割分析
  const analyses = team.map(p => p ? analyzeRole(p) : null);

  // 初手推奨: 高速アタッカー / 設置役 / いかく / 天候始動 を優先
  const leadCandidates = team.map((p, i) => {
    if (!p) return null;
    const a = analyses[i];
    let score = 0;
    const reasons = [];
    // 速度が高いほど先発向き
    if (a.spd >= 120) { score += 4; reasons.push(`S${a.spd}で多くの相手を抜ける`); }
    else if (a.spd >= 100) { score += 2; reasons.push(`S${a.spd}でそこそこ速い`); }
    // 設置役は先発
    if (a.hasHazards) { score += 5; reasons.push('設置役（初手でステロ/まきびし設置）'); }
    // 壁貼りも先発
    if (a.primary && a.primary.includes('壁貼り')) { score += 4; reasons.push('壁貼りで味方のお膳立て'); }
    // 天候始動
    if (a.primary && (a.primary.includes('晴れ')||a.primary.includes('雨')||a.primary.includes('砂嵐')||a.primary.includes('雪'))) {
      score += 4; reasons.push('場に出るだけで天候を展開');
    }
    // いかく
    if (a.tags.includes('いかく')) { score += 2; reasons.push('いかくで相手物理を下げる'); }
    // 高火力かつ速い=先手取って叩ける
    if (a.atkPower >= 110 && a.spd >= 100) { score += 2; reasons.push('高火力+速度で先制圧力'); }
    // こだわりスカーフは先発より終盤
    if (p.item === 'choice_scarf') { score -= 2; reasons.push('⚠ スカーフは終盤温存が◎'); }
    // 高耐久の受け型は初手で出しにくい
    if (a.bulk >= 150 && !a.hasHazards) { score -= 1; reasons.push('受け型は交代で出すのが安全'); }
    return {poke:p, idx:i, score, reasons, analysis:a};
  }).filter(Boolean).sort((a,b) => b.score - a.score);

  const top = leadCandidates[0];

  // 勝ち筋（Win Condition）: 最高火力ポケ+役割で特定
  const aces = team.map((p, i) => {
    if (!p) return null;
    const a = analyses[i];
    let score = a.atkPower;
    if (a.hasSetup) score += 40; // 積み展開でエース候補
    if (p.item === 'choice_band' || p.item === 'choice_specs') score += 30;
    if (p.item === 'life_orb') score += 20;
    if (a.spd >= 110) score += 15;
    return {poke:p, idx:i, score, analysis:a};
  }).filter(Boolean).sort((a,b) => b.score - a.score);

  const ace = aces[0];
  const supports = aces.slice(1).filter(x => {
    const a = x.analysis;
    return a.hasHazards || a.hasScreen || a.tags.some(t=>t.includes('いかく')) || a.hasPivot;
  }).slice(0, 2);

  // チーム弱点分析: 3体以上が弱点のタイプ
  const weaknessCount = {};
  TYPES.forEach(t => { weaknessCount[t] = 0; });
  filled.forEach(p => {
    TYPES.forEach(atk => {
      const m = defensiveMult(atk, p.types);
      if (m > 1) weaknessCount[atk] += (m >= 4 ? 2 : 1);
      // とくせい無効/半減
      const ab = ABILITY_MAP[p.ability];
      if (ab && (ab.group === 'immunity' || ab.group === 'absorb') && ab.immuneTypes?.includes(atk)) {
        weaknessCount[atk] -= 1;
      }
    });
  });
  const dangerTypes = TYPES
    .filter(t => weaknessCount[t] >= 3)
    .sort((a,b) => weaknessCount[b] - weaknessCount[a]);

  // 苦手対策: 各dangerTypeに対して、抵抗/無効を持つポケを提案
  const counters = dangerTypes.map(dt => {
    const defenders = team.map((p, i) => {
      if (!p) return null;
      const m = defensiveMult(dt, p.types);
      const ab = ABILITY_MAP[p.ability];
      const abImmune = ab && (ab.group === 'immunity' || ab.group === 'absorb') && ab.immuneTypes?.includes(dt);
      const abResist = ab && ab.group === 'resist' && ab.resistTypes?.includes(dt);
      if (abImmune) return {poke:p, idx:i, note:`${ab.jp}で無効`, mult:0};
      if (m < 1 || abResist) return {poke:p, idx:i, note:abResist?`${ab.jp}で半減`:`タイプ耐性×${m}`, mult:m};
      return null;
    }).filter(Boolean).sort((a,b) => a.mult - b.mult);
    return {type:dt, count:weaknessCount[dt], defenders};
  });

  return (
    <div className="space-y-3 mt-4 border-t-2 border-blue-200 pt-4">
      <div className="flex items-center gap-2">
        <div className="text-lg font-bold text-blue-900">📖 このチームの使い方</div>
        <span className="text-[10px] bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded">初心者向け自動解説</span>
      </div>

      {/* 初手推奨 */}
      {top && (
        <div className="bg-gradient-to-br from-green-50 to-emerald-50 border-2 border-green-300 rounded-lg p-3">
          <div className="text-sm font-bold text-green-900 mb-1">🎯 初手（先発）おすすめ</div>
          <div className="flex items-center gap-3">
            <img src={pokeImg(top.poke)} onError={e=>{e.target.src=pokeImgFallback(top.poke)}} className="w-14 h-14 object-contain" />
            <div className="flex-1 min-w-0">
              <div className="font-bold text-base">{top.poke.jp}</div>
              <div className="text-[11px] text-gray-600 mt-0.5">{top.analysis.primary}</div>
              <div className="text-[11px] text-gray-700 mt-1">
                <span className="font-bold text-green-700">理由:</span>
                <ul className="ml-4 list-disc">
                  {top.reasons.map((r,i) => <li key={i} className={r.startsWith('⚠')?'text-amber-700':''}>{r}</li>)}
                </ul>
              </div>
            </div>
          </div>
          {leadCandidates.length > 1 && (
            <div className="mt-2 pt-2 border-t border-green-200">
              <div className="text-[10px] text-green-900 mb-1 font-bold">対戦相手によって切替候補:</div>
              <div className="flex flex-wrap gap-1.5">
                {leadCandidates.slice(1, 3).map(c => (
                  <div key={c.idx} className="flex items-center gap-1 bg-white border border-green-200 rounded px-1.5 py-0.5 text-[10px]">
                    <img src={pokeImg(c.poke)} onError={e=>{e.target.src=pokeImgFallback(c.poke)}} className="w-5 h-5 object-contain" />
                    <span>{c.poke.jp}</span>
                    <span className="text-gray-500">({c.reasons[0] || ''})</span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      )}

      {/* 勝ち筋 */}
      {ace && (
        <div className="bg-gradient-to-br from-orange-50 to-red-50 border-2 border-orange-300 rounded-lg p-3">
          <div className="text-sm font-bold text-red-900 mb-1">🏆 勝ち筋（Win Condition）</div>
          <div className="flex items-center gap-3">
            <img src={pokeImg(ace.poke)} onError={e=>{e.target.src=pokeImgFallback(ace.poke)}} className="w-14 h-14 object-contain" />
            <div className="flex-1 min-w-0">
              <div className="font-bold text-base">{ace.poke.jp}<span className="ml-2 text-[10px] bg-red-500 text-white px-1.5 py-0.5 rounded">エース</span></div>
              <div className="text-[11px] text-gray-600 mt-0.5">{ace.analysis.primary}</div>
              <div className="text-[11px] text-gray-700 mt-1">{ace.analysis.desc}</div>
            </div>
          </div>
          {supports.length > 0 && (
            <div className="mt-2 pt-2 border-t border-orange-200">
              <div className="text-[10px] text-red-900 font-bold mb-1">お膳立て役（エースを通すサポート）:</div>
              <div className="space-y-1">
                {supports.map(s => (
                  <div key={s.idx} className="flex items-center gap-2 text-[11px]">
                    <img src={pokeImg(s.poke)} onError={e=>{e.target.src=pokeImgFallback(s.poke)}} className="w-6 h-6 object-contain" />
                    <span className="font-bold">{s.poke.jp}</span>
                    <span className="text-gray-600">→ {s.analysis.primary}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
          <div className="mt-2 text-[11px] bg-white rounded p-2 border border-orange-200">
            <div className="font-bold text-red-800 mb-0.5">💡 典型的な勝ちパターン:</div>
            <div className="text-gray-700">
              {ace.analysis.hasSetup
                ? `① サポート役で相手のエースを削る or 状態異常 → ② ${ace.poke.jp}を安全に出して「${ace.analysis.setupName}」で積む → ③ 強化後に全抜きを狙う`
                : supports.length > 0
                ? `① 設置/壁/いかくでお膳立て → ② ${ace.poke.jp}を刺せる相手に繰り出す → ③ 高火力で押し切る`
                : `① 有利対面を作って ${ace.poke.jp}を繰り出す → ② 高火力技で相手のエースを落とす → ③ 残りを抜き役（スカーフ持ち等）で処理`}
            </div>
          </div>
        </div>
      )}

      {/* 苦手タイプ/対策 */}
      {dangerTypes.length > 0 && (
        <div className="bg-gradient-to-br from-amber-50 to-yellow-50 border-2 border-amber-300 rounded-lg p-3">
          <div className="text-sm font-bold text-amber-900 mb-1.5">⚠ チームの苦手タイプと対策</div>
          <div className="space-y-2">
            {counters.slice(0, 3).map(c => (
              <div key={c.type} className="bg-white rounded p-2 border border-amber-200">
                <div className="flex items-center gap-2 text-[11px] mb-1">
                  <TypeBadge type={c.type} />
                  <span className="text-red-700 font-bold">{c.count}体が弱点</span>
                  <span className="text-gray-500">— {TYPE_JP[c.type]}技に注意</span>
                </div>
                {c.defenders.length > 0 ? (
                  <div className="text-[11px] text-gray-700">
                    <span className="font-bold text-green-700">受け役:</span>
                    <div className="flex flex-wrap gap-1 mt-0.5">
                      {c.defenders.slice(0, 3).map(d => (
                        <span key={d.idx} className="inline-flex items-center gap-1 bg-green-50 border border-green-300 rounded px-1.5 py-0.5 text-[10px]">
                          <img src={pokeImg(d.poke)} onError={e=>{e.target.src=pokeImgFallback(d.poke)}} className="w-4 h-4 object-contain" />
                          <span className="font-bold">{d.poke.jp}</span>
                          <span className="text-green-700">({d.note})</span>
                        </span>
                      ))}
                    </div>
                  </div>
                ) : (
                  <div className="text-[11px] text-red-700 font-bold">⚠ 受け役なし — 積まれる前に先手で倒すか、交代駆け引きで対応</div>
                )}
              </div>
            ))}
          </div>
          <div className="mt-2 text-[10px] text-amber-800">
            💡 対戦前の選出で、苦手タイプを持つ相手がいたら「受け役」は必ず選出に入れる
          </div>
        </div>
      )}

      {/* 各ポケの役割解説 */}
      <div className="bg-white border-2 border-indigo-300 rounded-lg p-3">
        <div className="text-sm font-bold text-indigo-900 mb-2">🎭 各ポケモンの役割</div>
        <div className="space-y-2">
          {team.map((p, i) => {
            if (!p) return null;
            const a = analyses[i];
            if (!a) return null;
            return (
              <div key={i} className="flex gap-3 p-2 bg-indigo-50 rounded border border-indigo-200">
                <img src={pokeImg(p)} onError={e=>{e.target.src=pokeImgFallback(p)}} className="w-14 h-14 object-contain flex-shrink-0" />
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-1.5 flex-wrap">
                    <span className="font-bold text-sm">{p.jp}</span>
                    <span className="text-[10px] bg-indigo-600 text-white rounded px-1.5 py-0.5 font-bold">{a.primary}</span>
                    <span className="text-[10px] text-gray-500">S{a.spd}</span>
                  </div>
                  <div className="text-[11px] text-gray-700 mt-1">{a.desc}</div>
                  {a.tags.length > 0 && (
                    <div className="flex flex-wrap gap-1 mt-1">
                      {a.tags.map((t, ti) => (
                        <span key={ti} className="text-[9px] bg-white border border-indigo-200 text-indigo-700 rounded px-1 py-0.5">{t}</span>
                      ))}
                    </div>
                  )}
                  {a.tips.length > 0 && (
                    <ul className="mt-1.5 ml-4 text-[11px] text-gray-600 list-disc space-y-0.5">
                      {a.tips.map((tip, ti) => <li key={ti}>{tip}</li>)}
                    </ul>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <div className="text-[10px] text-gray-500 text-center">
        ※ この解説はステータス・技・持ち物・とくせいから自動推定しています。実際の使い方はポケモン単体ページ(🔍)でも確認推奨
      </div>
    </div>
  );
}

// ====== 自軍登録 ======
function TeamSetup({team, setTeam}) {
  const [pickerIdx, setPickerIdx] = useState(null);
  // 技・とくせい候補の「すべて表示」トグル（OFFで登録ポケに準じたものだけ）
  const [showAllCandidates, setShowAllCandidates] = useState(false);

  // 古い保存データにspd/img等が欠けている場合、ROSTERから補完
  useEffect(() => {
    let changed = false;
    const fixed = team.map(p => {
      if (!p) return p;
      const r = ROSTER.find(x => x.id === p.id);
      if (!r) return p;
      const patched = {...p};
      if (p.spd === undefined && r.spd !== undefined) { patched.spd = r.spd; changed = true; }
      if (!p.img && r.img) { patched.img = r.img; changed = true; }
      if (!p.dex && r.dex) { patched.dex = r.dex; changed = true; }
      return patched;
    });
    if (changed) setTeam(fixed);
  }, []);

  const setSlot = (idx, poke) => {
    const copy = [...team];
    copy[idx] = {
      ...poke,
      moves: copy[idx]?.moves || [{name:'',type:''},{name:'',type:''},{name:'',type:''},{name:'',type:''}],
      item: copy[idx]?.item || '',
      ability: copy[idx]?.ability || '',
    };
    setTeam(copy);
    setPickerIdx(null);
  };
  const setMove = (pIdx, mIdx, field, value) => {
    const copy = [...team];
    const cur = { ...copy[pIdx].moves[mIdx], [field]: value };
    // 技名変更時: 辞書と一致したらタイプ・分類・威力・命中・優先度を自動補完
    if (field === 'name' && value) {
      const data = lookupMove(value);
      if (data) {
        cur.type = data.type;
        cur.cat = data.cat;
        // 変化技ならBPは0
        if (data.cat === '変') {
          cur.bp = 0;
        } else {
          // 特殊技辞書を優先チェック
          const sp = MOVE_SPECIAL[value];
          if (sp) {
            // 特殊挙動技は威力自動計算するので空のまま
            cur.bp = null;
          } else if (MOVE_BP[value] != null) {
            cur.bp = MOVE_BP[value];
          }
        }
        // 命中・優先度の自動補完
        if (MOVE_ACCURACY[value] != null) cur.accuracy = MOVE_ACCURACY[value];
        else cur.accuracy = null; // 未登録は100扱い（nullで空欄に）
        if (MOVE_PRIORITY[value] != null) cur.priority = MOVE_PRIORITY[value];
        else cur.priority = null;
      }
    }
    copy[pIdx].moves[mIdx] = cur;
    setTeam(copy);
  };
  const setItem = (idx, item) => {
    const copy = [...team];
    copy[idx] = { ...copy[idx], item };
    setTeam(copy);
  };
  const setAbility = (idx, ability) => {
    const copy = [...team];
    copy[idx] = { ...copy[idx], ability };
    setTeam(copy);
  };
  const clearSlot = idx => {
    const copy = [...team];
    copy[idx] = null;
    setTeam(copy);
  };

  return (
    <div className="space-y-3">
      <div className="flex items-center justify-between flex-wrap gap-2">
        <div className="text-sm text-gray-600">自軍6体と各4技を登録。技はタイプだけ合っていればOK（弱点判定に使用）。</div>
        <label className="flex items-center gap-1 text-[11px] text-gray-600 cursor-pointer select-none bg-white border rounded px-2 py-1">
          <input type="checkbox" checked={showAllCandidates} onChange={e=>setShowAllCandidates(e.target.checked)} className="accent-blue-600" />
          <span>候補をすべて表示</span>
          <span className="text-[9px] text-gray-400">（OFFで登録ポケに合うもののみ・五十音順）</span>
        </label>
      </div>
      {team.some(Boolean) && (
        <div className="bg-white border rounded-lg p-2">
          <div className="text-xs font-bold text-gray-600 mb-1.5">素早さ一覧（速い順・スカーフ込み）</div>
          <div className="flex flex-wrap gap-1.5">
            {team.filter(Boolean).slice().sort((a,b)=>effectiveSpeed(b)-effectiveSpeed(a)).map((p,i) => {
              const eff = effectiveSpeed(p);
              const boosted = p.item === 'choice_scarf';
              return (
                <div key={p.id+'-'+i} className="flex items-center gap-1 bg-gray-50 rounded px-1.5 py-0.5">
                  <img src={pokeImg(p)} onError={e=>{e.target.src=pokeImgFallback(p)}} className="w-6 h-6 object-contain" />
                  <span className="text-[10px] truncate max-w-[90px]">{p.jp}</span>
                  <span className={`text-[11px] font-bold ${boosted?'text-purple-700':'text-blue-700'}`}>
                    S{eff}{boosted && <span className="text-[9px] opacity-70">(×1.5)</span>}
                  </span>
                </div>
              );
            })}
          </div>
          <div className="text-[10px] text-gray-500 mt-1">
            平均 S{Math.round(team.filter(Boolean).reduce((s,p)=>s+effectiveSpeed(p),0)/Math.max(1,team.filter(Boolean).length))}
            ・最速 S{Math.max(0,...team.filter(Boolean).map(p=>effectiveSpeed(p)))}
            ・最遅 S{team.filter(Boolean).length ? Math.min(...team.filter(Boolean).map(p=>effectiveSpeed(p))) : 0}
          </div>
        </div>
      )}
      <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
        {[0,1,2,3,4,5].map(i => {
          const p = team[i];
          return (
            <div key={i} className="border rounded-lg p-3 bg-white">
              <div className="flex gap-3 items-start">
                {p ? (
                  <>
                    <img src={pokeImg(p)} alt="" className="w-20 h-20 object-contain bg-gray-50 rounded flex-shrink-0"
                      onError={e=>{e.target.src=pokeImgFallback(p)}} />
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center justify-between">
                        <div className="font-bold truncate">{p.jp}</div>
                        <div className="flex gap-1 items-center">
                          <a
                            href={gwDetailUrl(p.id)}
                            target="_blank"
                            rel="noopener noreferrer"
                            className="text-xs text-gray-500 hover:text-blue-600 hover:bg-blue-50 px-1.5 py-0.5 rounded"
                            title="GameWithで詳細を見る"
                          >🔍</a>
                          <button onClick={()=>clearSlot(i)} className="text-red-500 hover:bg-red-50 p-1 rounded"><IconTrash className="w-4 h-4" /></button>
                        </div>
                      </div>
                      <div className="flex gap-1 mt-1 flex-wrap items-center">
                        {p.types.map(t => <TypeBadge key={t} type={t} />)}
                        {p.spd !== undefined && (
                          <span className="text-[10px] font-bold text-gray-600 bg-gray-100 px-1.5 py-0.5 rounded">
                            S{p.spd}{p.item === 'choice_scarf' && <span className="text-purple-600">→{effectiveSpeed(p)}</span>}
                          </span>
                        )}
                        <BiasBadge bias={classifyByStats(p.id)} compact />
                        <BiasBadge bias={classifyByMoves(p.moves)} />
                        <ItemBadge itemId={p.item} />
                        {p.ability && ABILITY_MAP[p.ability] && (
                          <span className="inline-flex items-center gap-0.5 text-[10px] font-bold px-1.5 py-0.5 rounded border bg-indigo-50 text-indigo-800 border-indigo-300"
                            title={`${p.ability}: ${ABILITY_MAP[p.ability].desc}`}>
                            ✨{p.ability}
                          </span>
                        )}
                      </div>
                      <button onClick={()=>setPickerIdx(i)} className="text-xs text-blue-600 hover:underline mt-1">変更</button>
                    </div>
                  </>
                ) : (
                  <button onClick={()=>setPickerIdx(i)} className="w-full border-2 border-dashed rounded p-4 text-gray-400 hover:border-blue-400 hover:text-blue-600 flex items-center justify-center gap-2">
                    <IconPlus className="w-4 h-4" /> スロット{i+1}
                  </button>
                )}
              </div>
              {p && (
                <div className="mt-3 space-y-1.5">
                  <div className="flex items-center gap-1.5">
                    <span className="text-xs font-bold text-gray-600 whitespace-nowrap">持ち物</span>
                    <select value={p.item || ''} onChange={e=>setItem(i, e.target.value)}
                      className="flex-1 border rounded px-2 py-1 text-xs bg-white">
                      <option value="">— なし —</option>
                      {ITEM_GROUPS.map(g => (
                        <optgroup key={g.key} label={g.label}>
                          {ITEMS.filter(it => it.group === g.key)
                            .slice().sort((a,b) => a.jp.localeCompare(b.jp, 'ja'))
                            .map(it => {
                            const suffix = it.typeBoost ? ` (${TYPE_JP[it.typeBoost]}×1.2)`
                              : it.resist ? ` (${TYPE_JP[it.resist]}技半減)`
                              : it.desc ? ` — ${it.desc}`
                              : '';
                            return (
                              <option key={it.id} value={it.id}>
                                {it.emoji} {it.jp}{suffix}
                              </option>
                            );
                          })}
                        </optgroup>
                      ))}
                    </select>
                  </div>
                  <div className="flex items-center gap-1.5">
                    <span className="text-xs font-bold text-gray-600 whitespace-nowrap">とくせい</span>
                    {(() => {
                      const abList = abilitiesForPoke(p, showAllCandidates);
                      // 選択中のとくせいがフィルタ対象外なら、そのままでも選択可能なよう強制的に追加
                      const hasSelected = !p.ability || abList.some(a => a.id === p.ability);
                      const selectedAb = !hasSelected ? ABILITY_MAP[p.ability] : null;
                      const combined = selectedAb ? [...abList, selectedAb] : abList;
                      const byGroup = (g) => combined.filter(a => g.includes(a.group));
                      return (
                        <select value={p.ability || ''} onChange={e=>setAbility(i, e.target.value)}
                          className="flex-1 border rounded px-2 py-1 text-xs bg-white">
                          <option value="">— 未設定 —</option>
                          {byGroup(['immunity','absorb']).length > 0 && (
                            <optgroup label="◆ タイプ無効/吸収">
                              {byGroup(['immunity','absorb']).map(a => (
                                <option key={a.id} value={a.id}>✨ {a.jp} — {a.desc}</option>
                              ))}
                            </optgroup>
                          )}
                          {byGroup(['resist','defense']).length > 0 && (
                            <optgroup label="◆ 軽減/耐性">
                              {byGroup(['resist','defense']).map(a => (
                                <option key={a.id} value={a.id}>🛡 {a.jp} — {a.desc}</option>
                              ))}
                            </optgroup>
                          )}
                          {byGroup(['boost']).length > 0 && (
                            <optgroup label="◆ 威力強化">
                              {byGroup(['boost']).map(a => (
                                <option key={a.id} value={a.id}>🔥 {a.jp} — {a.desc}</option>
                              ))}
                            </optgroup>
                          )}
                          {byGroup(['priority']).length > 0 && (
                            <optgroup label="◆ 優先度/素早さ">
                              {byGroup(['priority']).map(a => (
                                <option key={a.id} value={a.id}>⚡ {a.jp} — {a.desc}</option>
                              ))}
                            </optgroup>
                          )}
                          {byGroup(['weather']).length > 0 && (
                            <optgroup label="◆ 天候">
                              {byGroup(['weather']).map(a => (
                                <option key={a.id} value={a.id}>☀ {a.jp} — {a.desc}</option>
                              ))}
                            </optgroup>
                          )}
                          {byGroup(['intimidate']).length > 0 && (
                            <optgroup label="◆ 威嚇/妨害">
                              {byGroup(['intimidate']).map(a => (
                                <option key={a.id} value={a.id}>😤 {a.jp} — {a.desc}</option>
                              ))}
                            </optgroup>
                          )}
                          {byGroup(['special']).length > 0 && (
                            <optgroup label="◆ 特殊戦略">
                              {byGroup(['special']).map(a => (
                                <option key={a.id} value={a.id}>⚙ {a.jp} — {a.desc}</option>
                              ))}
                            </optgroup>
                          )}
                        </select>
                      );
                    })()}
                  </div>
                  <div className="text-xs font-bold text-gray-600 pt-1 flex items-center gap-1">
                    <span>わざ</span>
                    <span className="text-[9px] font-normal text-gray-400">（技名を入力するとタイプ・威力・命中・優先度が自動入力）</span>
                  </div>
                  {[0,1,2,3].map(m => {
                    const mv = p.moves[m] || {};
                    const sp = MOVE_SPECIAL[mv.name];
                    const autoBp = sp ? null : MOVE_BP[mv.name];
                    const autoAcc = MOVE_ACCURACY[mv.name];
                    const autoPri = MOVE_PRIORITY[mv.name];
                    const src = bpSource({...mv, cat: mv.cat || '物'});
                    const recognized = mv.name && !!MOVE_DATA[mv.name];
                    return (
                      <div key={m} className="flex gap-1.5 flex-wrap items-center">
                        <div className="relative flex-1 min-w-[120px]">
                          <input type="text" placeholder={`技${m+1}（名前を入力）`} value={mv.name || ''}
                            list={`moves-datalist-${i}-${m}`}
                            onChange={e=>setMove(i,m,'name',e.target.value)}
                            className={`w-full border rounded px-2 py-1 text-xs pr-6 ${recognized ? 'bg-green-50 border-green-300' : (mv.name ? 'bg-yellow-50 border-yellow-300' : '')}`} />
                          {recognized && (
                            <span className="absolute right-1.5 top-1/2 -translate-y-1/2 text-green-600 text-xs font-bold" title="辞書と一致、自動補完済み">✓</span>
                          )}
                          {mv.name && !recognized && (
                            <span className="absolute right-1.5 top-1/2 -translate-y-1/2 text-amber-600 text-xs font-bold" title="辞書未登録: 手動で設定を">?</span>
                          )}
                          <datalist id={`moves-datalist-${i}-${m}`}>
                            {movesForPoke(p, showAllCandidates).map(name => (
                              <option key={name} value={name} />
                            ))}
                          </datalist>
                        </div>
                        <select value={mv.type || ''} onChange={e=>setMove(i,m,'type',e.target.value)}
                          className="border rounded px-1 py-1 text-xs w-24">
                          <option value="">タイプ</option>
                          {TYPES.map(t=><option key={t} value={t}>{TYPE_JP[t]}</option>)}
                        </select>
                        <div className="flex gap-0.5" role="group" aria-label="分類">
                          {['物','特','変'].map(c => {
                            const active = mv.cat === c;
                            return (
                              <button key={c} type="button"
                                onClick={()=>setMove(i,m,'cat', active ? '' : c)}
                                title={c==='物'?'物理':(c==='特'?'特殊':'変化')}
                                className={`w-7 h-7 text-xs font-bold rounded border transition ${active ? MOVE_CAT_CLS[c]+' border-transparent' : 'bg-white text-gray-400 border-gray-300 hover:bg-gray-50'}`}>
                                {c}
                              </button>
                            );
                          })}
                        </div>
                        <input type="number" min="0" max="250" step="5"
                          placeholder={sp ? '特殊' : autoBp != null ? `威${autoBp}` : '威力'}
                          value={mv.bp == null ? '' : mv.bp}
                          disabled={!!sp}
                          onChange={e=>setMove(i,m,'bp', e.target.value === '' ? null : Math.max(0, Math.min(300, Number(e.target.value))))}
                          title={sp ? `特殊挙動技（${sp.kind}）: 威力は内部で計算` : autoBp != null ? `自動推定: ${autoBp}` : '技の威力（BP）: 未入力ならデフォルト(90相当)'}
                          className={`border rounded px-1 py-1 text-xs w-14 ${sp ? 'bg-purple-50 text-purple-600' : src === 'default' && mv.name ? 'bg-yellow-50 border-yellow-400' : ''}`} />
                        <input type="number" min="0" max="100" step="5"
                          placeholder={autoAcc != null ? `命${autoAcc}` : '命中'}
                          value={mv.accuracy == null ? '' : mv.accuracy}
                          onChange={e=>setMove(i,m,'accuracy', e.target.value === '' ? null : Math.max(0, Math.min(100, Number(e.target.value))))}
                          title={autoAcc != null ? `自動推定: 命中${autoAcc}%` : '命中率（0〜100）: 未入力なら100扱い'}
                          className="border rounded px-1 py-1 text-xs w-14" />
                        <input type="number" min="-5" max="5" step="1"
                          placeholder={autoPri != null ? `優${autoPri>0?'+':''}${autoPri}` : '優先'}
                          value={mv.priority == null ? '' : mv.priority}
                          onChange={e=>setMove(i,m,'priority', e.target.value === '' ? null : Math.max(-5, Math.min(5, Number(e.target.value))))}
                          title={autoPri != null ? `自動推定: ${autoPri>0?'+':''}${autoPri}` : '優先度（-5〜+5）: 未入力なら辞書から推定'}
                          className="border rounded px-1 py-1 text-xs w-14" />
                        {mv.name && src === 'default' && (
                          <span className="text-[9px] font-bold px-1 py-0.5 rounded bg-yellow-100 text-yellow-800 border border-yellow-400 self-center"
                            title="この技は辞書に未登録。威力を入力すると精度UP">⚠威力?</span>
                        )}
                        {sp && (
                          <span className="text-[9px] font-bold px-1 py-0.5 rounded bg-purple-100 text-purple-700 border border-purple-300 self-center"
                            title={`特殊挙動（${sp.kind}）: 専用式で計算`}>特殊</span>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}
      </div>
      {pickerIdx !== null && (
        <PokemonPicker onSelect={p=>setSlot(pickerIdx, p)} onClose={()=>setPickerIdx(null)} />
      )}
      <TeamGuide team={team} />
    </div>
  );
}

// ====== 相手分析 ======
function OpponentSlot({idx, opp, userTeam, onPick, onClear}) {
  if (!opp) {
    return (
      <button onClick={onPick} className="border-2 border-dashed rounded-lg p-6 text-gray-400 hover:border-blue-400 hover:text-blue-600 flex flex-col items-center justify-center gap-2 min-h-[160px]">
        <IconPlus className="w-6 h-6" />
        <span className="text-sm font-bold">相手{idx+1}を追加</span>
      </button>
    );
  }

  const weak = allWeaknesses(opp.types);
  const weak4 = TYPES.filter(t => weak[t] === 4);
  const weak2 = TYPES.filter(t => weak[t] === 2);
  const resist = TYPES.filter(t => weak[t] < 1 && weak[t] > 0);
  const immune = TYPES.filter(t => weak[t] === 0);

  const hits = [];
  userTeam.forEach((up, pi) => {
    if (!up) return;
    up.moves?.forEach(mv => {
      if (!mv.type || mv.cat === '変') return;
      const m = defensiveMult(mv.type, opp.types);
      if (m >= 2) {
        const stab = up.types.includes(mv.type);
        const offF = offensiveFactor(up, mv);
        const defF = defensiveFactor(opp, mv);
        const powF = powerFactor(mv);
        const itemF = itemFactor(up, mv);
        const bonus = multNonLinearBonus(m);
        const accF = accuracyFactor(mv);
        const score = m * (stab ? 1.5 : 1) * offF * defF * powF * itemF * bonus * accF;
        const bpSrc = bpSource(mv);
        // 与ダメ期待値%
        const oppStats = getPokeStatsObj(opp.id);
        const hpBase = oppStats?.hp || 80;
        const dmgPct = Math.min(200, Math.round(score * 3300 / hpBase));
        hits.push({
          userIdx:pi, userJp:up.jp,
          moveName: mv.name || '(無名)', moveType: mv.type, moveCat: mv.cat,
          mult: m, stab, offF, defF, powF, itemF, bonus, accF, score, dmgPct, bpSrc,
          priority: movePriority(mv),
          userItem: up.item || '',
          userStats: getPokeStatsObj(up.id),
        });
      }
    });
  });
  hits.sort((a,b)=>b.score - a.score);

  // 素早さ比較（スカーフ込み実効素早さで判定）
  const oppSpd = effectiveSpeed(opp);
  const userFaster = userTeam.filter(u => u && effectiveSpeed(u) > oppSpd).length;
  const userTeamFilled = userTeam.filter(Boolean).length;

  return (
    <div className="border rounded-lg p-3 bg-white">
      <div className="flex gap-3 items-start">
        <img src={pokeImg(opp)} alt="" className="w-20 h-20 object-contain bg-gray-50 rounded flex-shrink-0"
          onError={e=>{e.target.src=pokeImgFallback(opp)}} />
        <div className="flex-1 min-w-0">
          <div className="flex items-center justify-between">
            <div className="font-bold truncate">{opp.jp}</div>
            <div className="flex gap-1 items-center">
              <a
                href={gwDetailUrl(opp.id)}
                target="_blank"
                rel="noopener noreferrer"
                className="text-xs text-gray-500 hover:text-blue-600 hover:bg-blue-50 px-1.5 py-0.5 rounded"
                title="GameWithで詳細を見る"
              >🔍</a>
              <button onClick={onPick} className="text-xs text-blue-600 hover:underline">変更</button>
              <button onClick={onClear} className="text-red-500 hover:bg-red-50 p-1 rounded"><IconX className="w-4 h-4" /></button>
            </div>
          </div>
          <div className="flex gap-1 mt-1 flex-wrap items-center">
            {opp.types.map(t => <TypeBadge key={t} type={t} />)}
            {opp.spd !== undefined && <span className="text-[10px] font-bold text-gray-600 bg-gray-100 px-1.5 py-0.5 rounded">S{opp.spd}</span>}
            <BiasBadge bias={classifyByStats(opp.id)} />
            {userTeamFilled > 0 && (
              <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${userFaster>=Math.ceil(userTeamFilled/2)?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}`}>
                先攻{userFaster}/{userTeamFilled}
              </span>
            )}
          </div>
        </div>
      </div>

      <div className="mt-3 space-y-1.5 text-xs">
        {weak4.length > 0 && (
          <div className="flex gap-1 flex-wrap items-center">
            <MultBadge mult={4} />
            {weak4.map(t => <TypeBadge key={t} type={t} />)}
          </div>
        )}
        {weak2.length > 0 && (
          <div className="flex gap-1 flex-wrap items-center">
            <MultBadge mult={2} />
            {weak2.map(t => <TypeBadge key={t} type={t} />)}
          </div>
        )}
        {resist.length > 0 && (
          <div className="flex gap-1 flex-wrap items-center opacity-70">
            <MultBadge mult={0.5} />
            {resist.map(t => <TypeBadge key={t} type={t} />)}
          </div>
        )}
        {immune.length > 0 && (
          <div className="flex gap-1 flex-wrap items-center opacity-70">
            <MultBadge mult={0} />
            {immune.map(t => <TypeBadge key={t} type={t} />)}
          </div>
        )}
      </div>

      <div className="mt-3 border-t pt-2">
        <div className="text-xs font-bold text-gray-600 mb-1.5 flex items-center gap-1">
          <IconSwords className="w-3 h-3" /> 自軍の抜群技
        </div>
        {hits.length === 0 ? (
          <div className="text-xs text-gray-400">抜群を取れる登録技なし</div>
        ) : (
          <div className="space-y-1">
            {hits.map((h, i) => {
              // 新スケール(威力/防御/ボーナス含む)に合わせた閾値
              const scoreCls = h.score >= 12 ? 'bg-red-700 text-white'
                : h.score >= 7 ? 'bg-red-500 text-white'
                : h.score >= 4 ? 'bg-orange-500 text-white'
                : h.score >= 2 ? 'bg-amber-200 text-amber-900'
                : 'bg-gray-200 text-gray-700';
              const it = ITEM_MAP[h.userItem];
              const showItemBoost = (h.itemF && h.itemF !== 1);
              const statLabel = h.moveCat === '物' ? 'A' : (h.moveCat === '特' ? 'C' : '');
              const statVal = h.userStats && h.moveCat ? (h.moveCat === '物' ? h.userStats.atk : h.userStats.spa) : null;
              return (
                <div key={i} className="flex items-center gap-1 text-xs flex-wrap">
                  <span className={`text-[10px] font-bold px-1 py-0.5 rounded ${scoreCls}`} title={`総合スコア ${h.score.toFixed(2)}`}>
                    ×{h.score.toFixed(1)}
                  </span>
                  <MultBadge mult={h.mult} />
                  {h.stab && <span className="text-[9px] font-bold px-1 py-0.5 rounded bg-yellow-300 text-yellow-900">一致</span>}
                  <TypeBadge type={h.moveType} />
                  {h.moveCat && (
                    <span className={`text-[9px] font-bold px-1 py-0.5 rounded ${MOVE_CAT_CLS[h.moveCat]}`}>{h.moveCat}</span>
                  )}
                  {statVal !== null && (
                    <span className={`text-[9px] font-bold px-1 py-0.5 rounded ${h.offF < 0.9 ? 'bg-gray-200 text-gray-500' : (h.offF >= 1.3 ? 'bg-emerald-100 text-emerald-700' : 'bg-gray-100 text-gray-700')}`}
                      title={`攻撃側補正 ×${h.offF.toFixed(2)}`}>
                      {statLabel}{statVal}
                    </span>
                  )}
                  {showItemBoost && it && (
                    <span className="text-[9px] font-bold px-1 py-0.5 rounded bg-amber-100 text-amber-800 border border-amber-300"
                      title={`${it.jp} ×${h.itemF}`}>
                      {it.emoji}×{h.itemF}
                    </span>
                  )}
                  {h.priority > 0 && (
                    <span className="text-[9px] font-bold px-1 py-0.5 rounded bg-sky-200 text-sky-900"
                      title={`先制技 優先度+${h.priority}`}>先+{h.priority}</span>
                  )}
                  {h.bpSrc === 'special' && (
                    <span className="text-[9px] font-bold px-1 py-0.5 rounded bg-purple-100 text-purple-700 border border-purple-300"
                      title="特殊挙動の技（固定ダメ/多段/変動/カウンター等）として計算">特殊</span>
                  )}
                  {h.bpSrc === 'default' && (
                    <span className="text-[9px] font-bold px-1 py-0.5 rounded bg-yellow-100 text-yellow-800 border border-yellow-400"
                      title="威力が辞書・入力ともに未登録 → デフォルト(90相当)で計算。実数値を入れると精度が上がります">⚠威力?</span>
                  )}
                  {h.accF < 1 && (
                    <span className="text-[9px] font-bold px-1 py-0.5 rounded bg-rose-100 text-rose-700 border border-rose-300"
                      title={`命中率補正 ×${h.accF.toFixed(2)}（期待値で減衰）`}>命中{Math.round(h.accF*100)}%</span>
                  )}
                  {h.dmgPct > 0 && (
                    <span className={`text-[9px] font-bold px-1 py-0.5 rounded ${h.dmgPct >= 100 ? 'bg-red-600 text-white' : h.dmgPct >= 60 ? 'bg-red-300 text-red-900' : 'bg-gray-100 text-gray-700'}`}
                      title={`与ダメ期待値 ${h.dmgPct}%（HP100基準の粗見積り）`}>
                      約{h.dmgPct}%
                    </span>
                  )}
                  <span className="truncate flex-1 min-w-0">
                    <span className="font-medium">{h.userJp}</span>
                    <span className="text-gray-500"> / {h.moveName}</span>
                  </span>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// ====== 分析パネル ======
function AnalysisPanel({userTeam, opponents}) {
  const [open, setOpen] = useState(true);
  const [legendOpen, setLegendOpen] = useState(false);
  const users = userTeam.filter(Boolean);
  const opps = opponents.filter(Boolean);
  const ready = users.length >= 1 && opps.length >= 1;

  // 推奨選出3体（全探索 + 総合マッチアップ + 多様性）
  const trio = useMemo(() => {
    if (users.length < 3 || opps.length === 0) return null;
    const combos = combinations(users, 3);
    // マッチアップスコアのキャッシュ
    const cache = new Map();
    const ms = (u, o) => {
      const key = `${u.id}|${o.id}`;
      if (!cache.has(key)) cache.set(key, matchupScore(u, o));
      return cache.get(key);
    };
    let best = null;
    for (const combo of combos) {
      // メガ2体以上は除外（1バトル1回のメガ進化なので実質不可）
      const megaCount = combo.filter(isMega).length;
      if (megaCount >= 2) continue;
      // 各敵に対する最良担当者を決定
      const perOpp = opps.map(o => {
        let bestIdx = 0, bestTotal = -Infinity, bestMS = null;
        combo.forEach((u, i) => {
          const m = ms(u, o);
          if (m.total > bestTotal) { bestTotal = m.total; bestIdx = i; bestMS = m; }
        });
        return {opp:o, bestIdx, bestTotal, bestMS};
      });
      // 基礎スコア: 各敵への最良マッチアップの合計
      const baseScore = perOpp.reduce((s,p)=>s+p.bestTotal, 0);
      // 担当分散ボーナス（複数体で敵をカバーしている）
      const assignedIdx = new Set(perOpp.map(p=>p.bestIdx));
      const distributionBonus = assignedIdx.size * 0.4;
      // タイプ多様性ボーナス
      const typeSet = new Set();
      combo.forEach(u => u.types.forEach(t => typeSet.add(t)));
      const diversityBonus = Math.min(typeSet.size, 6) * 0.12;
      // 素早さ帯分散ボーナス（速・中・遅でカバー）
      const speeds = combo.map(u => effectiveSpeed(u));
      const spdTiers = new Set(speeds.map(s => s >= 110 ? 'fast' : s >= 80 ? 'mid' : 'slow'));
      const speedBonus = spdTiers.size * 0.15;
      // 重複タイプ組ペナルティ
      const typeKeys = combo.map(u => [...u.types].sort().join(','));
      const dupPenalty = (typeKeys.length - new Set(typeKeys).size) * 0.6;
      // 抜群担当数
      const covered = perOpp.filter(p => (p.bestMS?.off?.mult || 0) >= 2).length;
      // 有効打保持（正のtotal）を持つ敵の数
      const positiveCount = perOpp.filter(p => p.bestTotal > 0).length;
      const positiveBonus = positiveCount * 0.25;
      const total = baseScore + distributionBonus + diversityBonus + speedBonus - dupPenalty + positiveBonus;
      if (!best || total > best.total) {
        best = {combo, total, covered, baseScore, perOpp, distributionBonus, diversityBonus, speedBonus, dupPenalty, positiveBonus, typeCount: typeSet.size, tierCount: spdTiers.size, megaCount};
      }
    }
    return best;
  }, [userTeam, opponents]);

  // マトリクス（マッチアップスコア: 攻撃 - 脅威*0.7 + 速度ボーナス）
  const matrix = useMemo(() => {
    return users.map(u => opps.map(o => matchupScore(u, o)));
  }, [userTeam, opponents]);

  // 敵ごとの最大脅威（マトリクスから集計: 自軍のどれかが受ける最大ダメ予測）
  const oppThreats = useMemo(() => {
    return opps.map((o, oi) => {
      let maxThreat = 0, maxDmgPct = 0;
      users.forEach((u, ui) => {
        const m = matrix[ui]?.[oi];
        if (!m) return;
        if (m.thr?.threat > maxThreat) maxThreat = m.thr.threat;
        if (m.thr?.dmgPct > maxDmgPct) maxDmgPct = m.thr.dmgPct;
      });
      return {threat:maxThreat, dmgPct:maxDmgPct};
    });
  }, [matrix, opponents]);

  // 先発（1番手）候補ランキング
  // 先発に求められる要素: 先手 / 平均マッチアップ / 最悪ケースの小ささ / 先制技 / 圧倒相手の存在
  const leadCandidates = useMemo(() => {
    if (opps.length === 0 || users.length === 0) return [];
    const scored = users.map((u, ui) => {
      const row = matrix[ui] || [];
      if (row.length === 0) return null;
      const totals = row.map(m => m.total);
      const avgMatchup = totals.reduce((a,b)=>a+b, 0) / totals.length;
      const worstMatchup = Math.min(...totals);
      const bestMatchup = Math.max(...totals);
      const bestIdx = totals.indexOf(bestMatchup);
      const worstIdx = totals.indexOf(worstMatchup);
      const us = effectiveSpeed(u);
      const fasterCount = opps.filter(o => us > effectiveSpeed(o)).length;
      const sameCount = opps.filter(o => us === effectiveSpeed(o)).length;
      const slowerCount = opps.length - fasterCount - sameCount;
      const fasterRate = fasterCount / opps.length;
      const maxDmgPct = Math.max(...row.map(m => m.thr?.dmgPct || 0));
      const maxThreatIdx = row.findIndex(m => (m.thr?.dmgPct || 0) === maxDmgPct);
      const dominateCount = totals.filter(t => t >= 3).length;
      const dangerCount = totals.filter(t => t < -1).length;
      // 先制技の有無と最大優先度
      const priMoves = (u.moves || [])
        .filter(mv => mv.type && mv.cat !== '変' && movePriority(mv) > 0)
        .map(mv => ({name:mv.name || '(無名)', pri: movePriority(mv)}));
      const maxPri = priMoves.length > 0 ? Math.max(...priMoves.map(m=>m.pri)) : 0;
      const priorityBonus = maxPri > 0 ? 0.4 + maxPri * 0.2 : 0;
      // 安全性（最大被弾が低いほど加点、高いと減点）
      const safetyBonus = maxDmgPct < 50 ? 0.6
        : maxDmgPct < 80 ? 0.3
        : maxDmgPct < 110 ? 0
        : maxDmgPct < 150 ? -0.4
        : -0.9;
      // 極端に悪いマッチアップがあると先発しにくい
      const worstPenalty = worstMatchup < -4 ? 1.6
        : worstMatchup < -2 ? 0.8
        : worstMatchup < -1 ? 0.3 : 0;
      const score =
        avgMatchup * 0.55
        + fasterRate * 1.3
        + dominateCount * 0.3
        - dangerCount * 0.15
        - worstPenalty
        + priorityBonus
        + safetyBonus;
      return {
        u, ui, score,
        avgMatchup, worstMatchup, bestMatchup,
        bestOpp: opps[bestIdx], worstOpp: opps[worstIdx],
        us, fasterCount, sameCount, slowerCount, fasterRate,
        maxDmgPct, maxThreatOpp: opps[maxThreatIdx],
        dominateCount, dangerCount,
        priMoves, maxPri,
      };
    }).filter(Boolean);
    scored.sort((a,b) => b.score - a.score);
    return scored;
  }, [userTeam, opponents, matrix]);

  // 共通弱点ランキング
  const commonWeak = useMemo(() => {
    return TYPES.map(atk => {
      let w2=0, w4=0, imm=0;
      opps.forEach(o => {
        const m = defensiveMult(atk, o.types);
        if (m === 4) w4++;
        else if (m === 2) w2++;
        if (m === 0) imm++;
      });
      return {type:atk, w2, w4, imm, effective: w2 + w4*2};
    }).filter(x=>x.w2>0||x.w4>0).sort((a,b)=>b.effective-a.effective || b.w4-a.w4);
  }, [opponents]);

  // 自軍の穴（全員が弱点 >1 のタイプ）
  const holes = useMemo(() => {
    if (users.length === 0) return [];
    return TYPES.filter(atk => users.every(u => defensiveMult(atk, u.types) > 1));
  }, [userTeam]);

  // カバー率
  const coverage = useMemo(() => {
    const moveTypes = new Set();
    users.forEach(u => (u.moves||[]).forEach(m => m.type && moveTypes.add(m.type)));
    let covered = 0;
    TYPES.forEach(def => {
      const canHit = [...moveTypes].some(atk => defensiveMult(atk, [def]) >= 2);
      if (canHit) covered++;
    });
    return {covered, total:18, moveTypes:[...moveTypes]};
  }, [userTeam]);

  if (!ready) return null;

  // 総合マッチアップの色分け（高=有利・緑 / 低=不利・赤）
  const matchupColor = (s) => {
    if (s >= 5) return 'bg-green-700 text-white';
    if (s >= 3) return 'bg-green-500 text-white';
    if (s >= 1.5) return 'bg-emerald-300 text-emerald-900';
    if (s >= 0) return 'bg-gray-100 text-gray-700';
    if (s >= -2) return 'bg-orange-400 text-white';
    return 'bg-red-600 text-white';
  };
  // 脅威の色分け（敵がこちらに与える被弾予測）
  const threatColor = (t) => {
    if (t >= 5) return 'bg-red-700 text-white';
    if (t >= 3) return 'bg-red-500 text-white';
    if (t >= 1.5) return 'bg-orange-400 text-white';
    return 'bg-gray-200 text-gray-600';
  };
  const fmt = s => {
    if (s === 0) return '0';
    const abs = Math.abs(s);
    const sign = s < 0 ? '-' : '';
    if (abs >= 1) return sign + (abs % 1 === 0 ? abs.toString() : abs.toFixed(1));
    // 1未満の正数は ".5" と簡略化、負数は可読性重視で "-0.5" のまま
    if (s < 0) return sign + abs.toFixed(1);
    return abs.toFixed(1).replace(/^0/,'');
  };

  return (
    <div className="bg-white border rounded-lg mb-3">
      <button onClick={()=>setOpen(!open)} className="w-full flex items-center justify-between p-3 hover:bg-gray-50">
        <span className="text-sm font-bold text-gray-700">📊 分析パネル {open?'▼':'▶'}</span>
        <span className="text-xs text-gray-400">自軍{users.length}体 / 相手{opps.length}体</span>
      </button>
      {open && (
        <div className="border-t p-3 space-y-4">
          {/* 先発（1番手）推奨 */}
          {leadCandidates.length > 0 && (
            <div>
              <div className="text-xs font-bold text-gray-600 mb-1.5">
                🥇 先発（1番手）推奨
              </div>
